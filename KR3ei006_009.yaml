body:
  text: 卷之九胎前門下傷食大全曰經云飲食自倍腸胃乃傷又云陰之所生本在五味陰之五宮傷在五味若妊子飲食不節生冷毒物恣性食啖致傷脾胃故娠傷食最難得藥惟木香丸白朮散二方最穩捷薛氏曰東垣先生云脾胃之氣壯則過時而不飢多食而不傷蓋胃主司納脾主消化五臟之本也然食倍而傷者乃脾氣虛而不化也若投以峻劑則脾胃復傷而胎亦損矣當審其所因而調治之若飲食停滯或肚腹作痛用平胃散腹滿泄瀉用六君子湯若脾氣下陷用補中益氣湯凡噯覺藥氣且戒藥餌節飲食經云損其脾者調其飲食適其寒溫大凡脾胃虛弱飲食難化以白朮陳皮為末等分陳曲糊丸常服最善枳朮丸但可暫用枳實峻厲能耗真氣治者慎之一妊婦因傷食服枳朮丸胸腹不利飲食益少更服消導寬胸之劑其胎下墜余謂此脾氣虛而不能承載也用補中益氣及六君子湯中氣漸健其胎漸安又用八珍湯加柴胡升麻調理而痊平胃散治妊娠飲食停滯或肚腹作痛蒼朮米泔浸炒厚朴薑製陳皮各一錢甘草炙五分上銼加生薑三片棗一枚水煎服嘔吐噁心加枳殼砂仁吞酸噯腐加黃連三分吳茱萸二分六君子湯治脾胃虛弱飲食難化或腹滿泄瀉人參白朮茯苓甘草炙半夏陳皮各一錢上銼加生薑三片棗一枚水煎服停滯肉食加山楂停滯麵食倍加麥蘖停滯糯米食用白酒麴一味停滯米飲倍加谷蘖魚腥所傷倍加陳皮傷辛熱之物加黃連傷生冷之物加砂仁木香如不應更加肉豆蔻補骨脂再不應用四神丸木香丸治妊娠脾胃虛弱飲食不消肚腹膨脹或嘔吐泄瀉木香二錢三稜三稜犯胎忌與人參並用或無妨亦須看人強弱人參白茯苓各三錢上為末麵糊丸如緑豆大每服三四十丸熟水下白朮散治妊娠脾胃虛弱氣不調和飲食易傷白朮炒佐紫蘇白芷調和胃氣妙紫蘇各一兩人參白芷炒各七錢半川芎訶子皮青皮各半兩甘草炒二錢半上每服二錢加生薑三片水煎服中惡大全云夫妊娠忽然心腹刺痛俗謂絞腸痧即此悶絶欲死者謂之中惡蓋邪惡之氣中於胎而傷人也所以然者血氣自養而為精神之主若血氣不和則精神衰弱故邪毒之氣得以中之妊娠病此亦致損胎也薛氏曰前證當調補正氣為善用金銀藤一味煎湯飲之當歸散治妊娠中惡心腹絞痛溫行惡氣當歸丁香川芎各三兩青橘皮吳茱萸半兩去梗湯泡三次炒黑上為細末溫酒調下一錢無時又方生乾地黃一兩枳殼木香各七錢半上為細末每服一錢酒調下又方苦梗一兩細銼略炒生薑半兩水煎服散滯湯治觸惡冒氣傷胎肚痛手不可近不思飲食青皮三錢黃芩芍藥各二錢歸尾一錢半川芎一錢木香五分甘草炙少許上分二帖水三盞先煮苧根兩大片至二盞去苧根入前藥同煎至一盞熱服補遺方治妊娠中惡心腹絞急切痛如鬼擊之狀不可按摩或吐衄血者用熟艾如拳大煮汁頻服此真中惡也煮艾方極妙一方用鹽一盞水二盞調和服以冷水噀之吐出即安一方用灶心土為末每服二錢井水調服白湯亦可傷寒吳氏曰凡妊娠傷寒六經治例皆同但要安胎為主凡藥中有犯胎者則不可用也如藿香正氣散十味芎蘇散參蘇飲小柴胡湯之類有半夏能犯胎如用須去之若痰多嘔逆必用之以半夏曲則可如無沸湯泡七次去皮臍生薑自然汁拌曬乾乃可用也凡川烏附子天雄側子肉桂乾薑大黃芒硝芫花甘遂大戟蜀漆水蛭虻蟲桃仁牡丹乾漆代赭石瞿麥牛膝等類之物皆動胎之藥凡用必須斟酌仔細詳之大抵妊娠傷寒合用湯劑必加黃芩白朮二味能安胎也或與此二味煎湯與之或為細末白湯調下二三錢亦佳如妊婦素稟弱者藥中四物湯佐之不可缺也且如用小柴胡湯去半夏加白朮合四物湯用之可以保胎除熱也其效如神余皆仿此用之則妙矣萬密齋云妊娠傷寒專以清熱安胎為主或汗或下各宜隨其五臟表裡所見脈證主治勿犯胎氣故在表發汗以香蘇散為主半表半裡則和解之以黃龍湯為主在裡則下之以三黃解毒湯為主此吾家傳之祕活人甚多汗下和三法固成法也而主以香蘇黃龍三黃解毒三方則發前人所未發矣妙甚如古方六合湯雖分治詳明猶不及此切當古方六合湯自表虛四物湯至四物大黃湯共計十五方詳見第一卷調經門四物湯加減條下白朮散治傷寒熱病先以此安胎但覺頭痛發熱便可服二三服即瘥若四肢厥逆陰證也不可用白朮黃芩各等分新瓦上炒上細切每三錢加生薑三片大棗一枚水煎服安胎阿膠散治妊娠傷寒時氣先服此以安胎卻以主藥間服先服安胎雖是大頭腦然表證重者須斟酌阿膠炙白朮炒桑寄生人參白茯苓各等分上為末每服一錢用糯米飲調下日三服香蘇散凡妊婦傷寒勿論日數但見惡寒頭疼此主之香附炒黑紫蘇各二錢陳皮一錢甘草五分上銼加生薑三片蔥五根煎服頭痛加川芎白芷各一錢名芎芷香蘇散假令得肝脈其外證善潔面青善怒其三部脈俱浮而弦惡寒里和謂清便自調也本方加羌活防風各一錢謂肝主風是膽受病也假令得心脈其外證面赤口乾善笑其三部俱浮而洪惡寒里和本方加黃芩石膏各一錢半謂心主熱是小腸受病也假令得脾脈面黃善噫善思尺寸俱浮而緩惡寒里和本方加白朮防己各一錢半謂脾主濕是陽明受病也假令得肺脈其外證面白善嚏善悲不樂欲哭其尺寸脈俱浮面澀惡寒里和本方加黃耆防風各一錢謂肺主燥是大腸受病也假令得腎脈其外證面黑善恐其尺寸脈俱浮而濡惡寒里和本方加附子炮一錢謂腎主寒是膀胱經受病也附子犯胎禁用吳茱萸溫之可也附子雖云犯胎然仲景附子湯亦治胎寒但須真寒方可酌用羌活湯河間云解利傷寒不問何經所受雖不能盡解亦無壞證尤益妊婦羌活二錢白朮一錢半防風川芎白芷黃芩甘草炙各一錢細辛三分上銼水煎服無時如無汗去白朮用蒼朮加紫蘇亦可黃龍湯妊婦傷寒得之三五日後有惡寒發熱內有煩渴引飲小便赤澀之證此邪在半表半裡也宜此方主之柴胡二錢黃芩一錢半人參甘草各一錢上加薑棗水煎服黃龍湯即小柴胡減半夏為少陽經藥而此專重在和解故主之其加減法更妙如寒熱往來無汗口乾加葛根二錢去棗入蔥白三根如頭疼不止加川芎白芷各一錢去棗加蔥白三根如發熱有汗口渴加白朮栝蔞根各一錢半如脈浮大有力大熱大渴本方加人參白虎湯去薑棗如心煩不得臥加白茯苓麥冬各一錢如嘔噦加半夏制白茯苓各一錢去棗如胸膈滿痛加枳殼炒香附子炒黑川芎各一錢如大便祕初加大黃五分得利則止不利加一錢以利為度三黃解毒湯妊娠傷寒五六日後表邪悉罷並無頭疼惡寒之證止煩躁發熱大渴小便赤大便祕或利下赤水六脈沉實此病邪在裡也宜此方主之黃芩黃連黃柏山梔大黃各等分上銼水煎服更隨五臟脈證加減假令得肝脈其內證煩滿消渴溲便難尺寸脈沉弦有力是肝經本臟受病也本方加當歸一錢半甘草五分倍山梔假令得心脈其內證煩躁心痛掌中熱而噦尺寸脈沉數有力是心經本臟受病也本方加麥門冬一錢竹茹一團倍黃連假令得脾脈其內證腹脹滿譫妄其脈沉緊有力是脾經本臟受病也本方加枳實炒厚朴薑汁炒各一錢半倍大黃假令得肺脈其內證喘咳胸滿尺寸脈沉澀有力是肺經本臟受病也本方加葶藶炒一錢桔梗五分倍黃連假令得腎脈泄如下重足脛寒而逆尺寸脈沉而石是腎經本臟受病也加乾薑炮五分既寒逆矣又主三黃雖加乾薑恐終未妥酌之熟地黃一錢半倍黃柏黃耆解肌湯治妊娠傷風自汗傷風自汗如頭疼邪盛者此方用當斟酌人參黃耆當歸川芎甘草炙各半兩芍藥六錢上㕮咀每服八錢水煎服加蒼朮生地亦可桂枝芍藥當歸湯治婦人有孕傷寒脈浮頭重腹中切痛宜此方桂枝桂能墮胎宜火焙用芍藥當歸各一兩上銼細每服一兩水煎服芍藥湯治婦人妊娠傷寒自利腹中痛食飲不下脈沉者太陰病也宜此方裡虛者宜之芍藥白朮茯苓甘草各一兩上銼每服一兩水煎服加減當歸六黃湯治妊婦傷寒發汗後汗漏不止胎氣損者當歸身黃耆炙生地黃黃芩白芷阿膠珠炙甘草各等分上用浮小麥一撮煎湯去麥下藥五錢煎至七分溫服先煎法妙加味黃芩湯治妊婦傷寒下後協熱而利不止胎氣損者黃芩二錢白芍藥白朮白茯苓炙甘草阿膠各一錢上用水一盞半後入阿膠再煎至八分服加味竹葉湯妊婦汗下後熱不除者虛也此方主之人參麥門冬生地黃阿膠炙甘草各一錢上加竹葉十二片粳米一合煎服此竹葉石膏湯變法也以阿膠生地易知母石膏妙甚黃龍四物湯治妊婦傷寒瘥後發熱者宜此方柴胡二錢黃芩一錢半人參甘草當歸川芎芍藥地黃各一錢上銼水煎服若因於食者本方加枳實加減四物湯治妊婦傷寒熱極發斑狀如錦紋者當歸白芍藥生地黃黃芩各等分上銼每服八錢水煎服梔子大青湯治妊婦傷寒發斑變為黑色升麻黃芩梔子各二兩大青杏仁各半兩上㕮咀每服五錢水一盞半細切蔥白三寸煎服一方治妊娠傷寒發斑忽黑小便如血胎欲落梔子升麻各四兩青黛二兩生地黃二十根石膏半斤蔥白切一升黃芩三兩上用水煎分三服忌熱物又以井中泥塗心下干則易護胎法治傷寒熱病護胎用白藥子不拘多少為末以雞蛋清調攤於紙上如碗大貼臍下胎存處干則以水潤之護胎法治孕婦一切有熱內外諸證護胎法妙伏龍肝為末以井底泥調敷心下令胎不傷中風大全論曰夫四時八方之氣為風也常以冬至之日候之若從其鄉來者長養萬物若不從其鄉來者名為虛邪賊害萬物人體虛則中之風者百病之長中之則隨所挾而現病此語簡明詳略妙妙若風邪客於皮膚入於經絡即頑痹不仁若入於筋脈挾寒則攣急喎僻挾濕則弛縱痿軟若入臟腑則恍惚驚悸凡五臟俞皆在背臟腑虛寒邪皆從俞而入隨所傷臟腑經絡而為諸病妊娠中風若不早治則令墮胎也薛氏曰按機要云風本為熱熱勝則風動宜以靜勝其燥是養血也治法須少汗亦宜少下多汗則虛其衛多下則損其營雖有汗下之戒而有中臟中腑之分中腑者多著四肢則脈浮惡寒拘急不仁中臟者多著九竅則唇緩失音耳聾鼻塞目瞀便祕中腑者宜汗之中臟者宜下之表裡已和宜治在經當以大藥養之此中風之要法妊娠患之亦當宜此施治而佐以安胎之藥防風散治妊娠中風卒倒心神悶亂口噤不能言四肢急強防風去蘆葛根桑寄生各一兩羚羊角屑細辛去苗當歸甘菊花漢防己去皮秦艽去蘆桂心茯神去木甘草炙各半兩上㕮咀每服八錢水一盞半生薑五片煎至一大盞去滓入竹瀝半合攪勻溫服無時生犀角散治妊娠卒中風不語四肢強直心神昏憒惟真中風而有表邪無汗者宜之生犀角屑麻黃去節各一兩防風去蘆赤箭羌活當歸人參各去蘆葛根赤芍藥各七錢半秦艽甘草炙各半兩石膏一兩半上㕮咀每服八錢煎服法如前防己散治妊娠中風口眼喎斜手足頑痹防己去皮羌活防風各去蘆麻黃去節黃松木節羚羊角屑桂心荊芥穗薏苡仁桑寄生炙甘草各一兩上㕮咀每服五錢生薑五片水煎溫服不拘時白殭蠶散治妊娠中風口噤心膈痰涎壅滯言語不得四肢強直急於治痰白殭蠶炒天麻獨活去蘆各一兩麻黃去節兩半烏犀角屑七錢半白附子炮半夏湯洗七次薑製天南星炮藿香各半兩龍腦二錢半另研上為細末入研藥合勻每服一錢生薑薄荷湯調下不拘時日三服赤箭丸治妊娠中風手足不隨筋脈緩急言語謇澀皮膚不仁赤箭萆薢酒浸麻黃去節獨活去蘆鼠黏子干熟地黃羚羊角屑各一兩阿膠炒防風去蘆川芎當歸去蘆苡仁五加皮秦艽去蘆漢防己去皮柏子仁酸棗仁炒丹參去蘆各七錢半上為細末煉蜜和搗三五百下丸如梧桐子大每服三十丸豆淋酒送下食前服白朮酒治妊娠中風口噤語言不得白朮一兩半獨活一兩黑豆一合炒上細銼以酒三升煎取一升半去滓溫分四服口噤者拗口灌之得汗即愈醋艾尉法治妊娠因感外風如中風狀不省人事此方中寒中風俱妙熟艾三兩陳米醋炒令極熱以綿帛裹尉臍下良久即省風痙即子癇大全云妊娠體虛受風而傷太陽之經絡後復遇風寒相搏發則口噤背強名之曰痙又云痙其候冒悶不識人須臾自醒良久復作謂之風痙一名子癇一名子冒甚則反張薛氏曰前證若心肝風熱用鉤藤湯肝脾血虛加味逍遙散肝脾鬱怒加味歸脾湯氣逆痰滯紫蘇飲肝火風熱鉤藤散脾郁痰滯二陳薑汁竹瀝若兼證相雜當參照子煩門丹溪治一婦人懷妊六月發癇手足揚直面紫黑色閣眼涎出昏憒不省人事半時而醒醫與震靈丹五十餘帖其疾時作時止無減證直至臨産方自愈産一女蓐中子母皆安次年其夫疑丹毒必作求治之診其脈浮取弦重取澀按至骨則沉實帶數時正二月因未見其癇發症狀未敢與藥意其舊年癇發時乃五月欲待其時度此疾必作當審證施治至五月半其疾果作皆是午巳兩時遂教以自制防風通聖散用甘草加桃仁多紅花少或服或嘔至四五十劑疾漸疏而輕後發為疥而愈以防風通聖散桃仁紅花治之者為浮為風弦為飲澀為瘀血沉實為有餘數為熱也觀發疥而愈知此藥之妙羚羊角散治妊娠冒悶角弓反張名曰子癇風痙羚羊角鎊獨活酸棗仁炒五加皮薏苡仁炒防風當歸酒浸川芎茯神去木杏仁各五分木香甘草各二分上㕮咀加生薑五片水煎服葛根湯療妊娠臨月因發風痙忽悶憒不識人吐逆眩倒少醒復發名曰子癇葛根貝母去心牡丹皮防風當歸川芎官桂白茯苓澤瀉甘草各二兩獨活石膏碎人參各三兩上㕮咀每服八錢水煎服貝母令人易産若未臨月者以升麻代之升麻代貝母人所未信忌海藻菘菜酢物此方犯桂與牡丹不如羚羊角散之安芎活湯治子癇兼用産後逐惡血下胞衣以風為主川芎羌活各等分上銼水煎入酒少許溫服羌活酒治妊娠中風痙口噤四肢強直角弓反張此方甚佳可通雜癥羌活去蘆一兩半防風去蘆一兩黑豆一合去皮上前二味㕮咀好酒五升浸一宿每服用黑豆一合炒令熱投入藥酒一大盞候沸即住去滓分兩服灌之瘈瘲薛氏曰瘈者筋脈急而縮也瘲者筋脈緩而伸也一縮一伸手足相引搐搦不已與嬰兒發搐相似謂之瘈瘲也此證多屬風蓋風主搖動也駱龍吉云心主脈肝主筋心屬火肝屬木火主熱木主風風火相熾則為瘈瘲也治法若因風熱此風皆本內熱故立方亦皆從內用鉤藤湯加柴胡山梔黃芩白朮以平肝木降心火養氣血若風痰上湧加竹瀝南星半夏若風邪急搐加全蠍殭蠶虧損氣血用八珍湯加鉤藤山梔為主若無力抽搐戴眼反折汗出如珠者肝絶也皆不治一妊婦四肢不能伸服祛風燥血之劑遺屎痰甚四肢抽搐余謂肝火血燥用八珍湯加炒黑黃芩為主佐以鉤藤湯而安後因怒前證復作小便下血寒熱少寐飲食少思用鉤藤散加山梔柴胡而血止用加味逍遙散寒熱退而得寐用六君子湯加芍藥鉤藤鉤飲食進而漸安鉤藤湯方見胎動不安子喑大全云孕婦不語非病也間有如此者不須服藥臨産月但服保生丸四物湯之類産下便語得亦自然之理非藥之功也醫家不説與人臨月則與尋常之藥産後能語則以為醫之功豈其功也哉黃帝問曰人有重身九月而喑此為何也岐伯對曰胞之絡脈絶也帝曰何以言之岐伯曰胞絡者繫於腎少陰之脈貫腎系舌本故不能言亦腎氣之不足帝曰治之奈何岐伯曰無治也當十月復咳嗽大全云夫肺內主氣外司皮毛皮毛不密寒邪乘之則咳嗽秋則肺受之冬則腎受之春則肝受之夏則心受之其嗽不已則傳於腑妊娠嗽久不已則傷胎也薛氏曰前證若秋間風邪傷肺用金沸草散雜咳嗽夏間火邪剋金用人參平肺散雜喘冬間寒邪傷肺用人參敗毒散雜傷濕春間風邪傷肺用參蘇飲雜發熱若脾肺氣虛用六君芎歸桔梗若血虛四物加桑白皮杏仁桔梗腎火上炎用六味丸加五味子煎服脾胃氣虛風寒所傷用補中益氣加桑皮杏仁桔梗蓋肺屬辛金生於己土嗽久不愈者多因脾土虛而不能生肺氣以致腠理不密外邪復感或因肺氣虛不能生水以致陰火上炎所致治法當壯土金生腎水為善一妊婦嗽則便自出此肺氣不足腎氣虧損不能司攝用補中益氣湯以培土金六味丸加五味以生腎水而愈一妊婦咳嗽其痰上湧日五六碗許諸藥不應豫以為此水泛為痰用六味丸料及四君子湯各一劑稍愈數劑而安一妊婦因怒咳嗽吐痰兩脅作痛此肝火傷肺金以小柴胡湯加山梔熾殼白朮茯苓治之而愈但欲作嘔此肝侮脾也用六君子加升麻柴胡而愈桔梗散治妊娠肺壅咳嗽喘急不食天門冬去心赤茯苓各一錢桑白皮桔梗紫蘇各五分麻黃去節三分貝母人參甘草炙各二分一方有杏仁無貝母上銼加生薑水煎服馬兜鈴散治妊娠氣壅塞咳嗽氣喘馬兜鈴苦梗人參甘草貝母各五分桑白皮陳皮去白大腹皮黑豆水浸洗紫蘇各一錢五味子二分半一方有枳殼無人參貝母桑白皮三味上銼一服加生薑三片水煎服百合散治妊娠風壅咳嗽痰多喘滿百合蒸紫菀茸洗貝母去心白芍前胡赤茯苓桔梗炒各一錢甘草炙五分上作一服水二盅生薑五片煎至一盅溫服風壅咳嗽而用百合白芍恐非所宜必久嗽者方可紫菀湯治妊娠咳嗽不止胎動不安紫菀天門冬去心各一兩桔梗半兩杏仁桑白皮甘草各一錢半一方有防風五分上㕮咀每服三錢加竹茹一塊水煎去滓入蜜半匙再煎一二沸溫服加蜜法妙喘急呂滄洲治經歷哈散侍人病喘不得臥衆作肺氣受風邪治之呂診之氣口盛於人迎一倍厥陰絃動而疾兩尺俱短而離經診法妙絶因告之曰病蓋得之毒藥動血以致胎死不下奔迫而上衝非風寒作喘也乃用催生湯加芎歸煮二三升服之夜半果下一死胎喘即止哈散密囑曰病妾誠有懷以室人見嫉故藥去之衆所不知也衆慚而去平安散治妊娠上氣喘急大便不通嘔吐不食腹脅脹痛川芎木香各一錢半陳皮熟地黃洗乾薑炮生薑厚朴制炒甘草各一錢上作一服水二盅入燒鹽一捻煎至一盅不拘時服桔梗湯馬兜鈴散並見前咳嗽條吐血衄血咳唾血大全云妊娠吐血者皆由臟腑有傷凡憂思驚怒皆傷臟腑氣逆於上血隨而溢心悶胸滿久而不已心悶甚者死妊娠病此多墮胎也薛氏曰前證若肝經怒火先用小柴胡加山梔生地次用前藥合四物後用加味逍遙散肝經風熱防風子苓丸心經有熱硃砂安神丸心氣不足補心湯思慮傷心妙香散胃經有火犀角地黃湯膏粱積熱加味清胃散鬱結傷脾加味歸脾湯肺經有火黃芩清肺飲河間生地黃散治吐血衄血咯血溺血下血諸見血無寒皆屬於熱但血家證皆宜服此藥生地黃熟地黃枸杞子地骨皮天門冬黃耆白芍藥黃芩甘草各等分上㕮咀每服一兩水煎服黃耆益氣枸杞助陽似於血症當斟酌然與諸藥同用則又助氣益血耳如脈微身涼惡風每兩加桂半錢如下血加地榆局方必勝散治男子婦人血妄流溢吐血衄血嘔血咯血熟乾地黃小薊並根用人參蒲黃微炒當歸去蘆川芎烏梅肉各一兩上件搗羅為粗末每服五錢水煎溫服此方有人參芎歸烏梅血症新起不可輕試瘧疾大全云妊娠病瘧瘧病虐人症候大都相似但妊婦患此恐傷其胎故立乃夏傷於暑客於皮膚至秋而發陽盛則熱陰盛則寒陰陽相勝寒熱俱作其發晏者由風邪客於風府循膂而下衛氣至一日一夜常大會於風府故發日晏其發早者衛氣之行風府日下一節二十一日下至尾骶二十二日入脊內上注於伏沖之脈其行九日出缺盆其氣既上故發更早其間日發者風邪內搏五臟橫連募原其道遠其氣深其行遲不能日作也妊娠而發多傷於肺薛氏曰前證因脾胃虛弱飲食停滯或外邪所感或鬱怒傷脾或暑邪所伏實系飲食停滯用六君子加桔梗蒼朮藿香外邪多而飲食少用藿香正氣散外邪少而飲食多用人參養胃湯勞傷元氣用補中益氣湯若鬱怒所傷用小柴胡湯兼歸脾湯若木侮土久而不愈用六君子為主佐以安胎藥仍參三陰三陽經而治之七寶散治男婦一切瘧疾或先寒後熱或先熱後寒或寒多熱少或熱多寒少或一日一發或一日兩三發或連日發或間日發或三四日一發不問塊瘧食瘧不伏水土山嵐瘴氣似瘧者並皆治之常山厚朴薑製青皮陳皮一不去白一云去白甘草炒檳榔草果去殼各等分上㕮咀每服半兩於未發隔夜用水酒各一盞煎至一大盞去滓露一宿再用水酒煎滓亦露一宿來日當發之早燙溫面東先服頭藥少頃再服藥滓大有神效準繩云嘗治一妊婦六七個月患瘧先寒後熱六脈浮緊醫用柴胡桂枝無效豫曰此非常山不愈衆醫難之越數日疾甚乃從豫治以七寶散一服瘥黃帝問曰婦人重身毒之奈何歧伯曰有故無殞帝曰何謂也歧伯曰大積大聚其可犯也衰其大半而止誠審藥物之性明治療之方何疑攻治哉人參養胃湯治妊娠瘧疾寒多熱少或但寒不熱頭痛惡心身痛面色青白脈弦遲者驅邪散治證亦同半夏厚朴制橘紅各八分蒼朮一錢藿香葉草果茯苓人參各五分甘草炙三分上加生薑七片烏梅一個水煎服清脾飲治妊娠瘧疾寒少熱多或但熱不寒口苦舌乾大便祕澀不進飲食脈弦數者青皮厚朴薑製白朮炒草果茯苓半夏黃芩柴胡甘草炙各五分上加生薑水煎服驅邪散治妊娠停食感冷發為瘧疾高良薑炒白朮草果仁橘紅藿香葉縮砂仁白茯苓各一錢半甘草炙五分上㕮咀作一服加生薑五片棗一枚水煎服柴胡散治妊娠瘧疾此大柴胡湯法也惟外邪未解而內熱實甚者宜之然須酌用柴胡二錢生大黃二錢生黃芩一錢五分甘草一錢上作一服水煎臨發日五更溫服取利為度又方此方傷暑而內有痰熱多煩渴者宜之常山石膏各一兩黃芩甘草炙各半兩烏梅七個上細切以水酒各一碗浸一宿平旦煎至一碗去滓分二服臨發時服上二方犯常山大黃吐下之劑若六脈浮緊有力中有頑痰積熱者用之所謂有故無殞也其他療治方法已備雜證瘧門若熱甚恐致動胎者若果內熱之極必須用藥以清之亦如傷寒熱病治方以白藥子伏龍肝等塗臍上下可也霍亂大全云飲食過度觸冒風冷陰陽不和清濁相干謂之霍亂論霍亂詳明雜症亦不外此其間或先吐或腹痛吐利是因於熱也若頭痛體疼發熱是挾風邪也若風折皮膚則氣不宣通而風熱上衝為頭痛若風入腸胃則泄利嘔吐甚則手足逆冷此陽氣暴竭謂之四逆妊娠患之多致傷胎也薛氏曰前證若因內傷飲食外感風寒用藿香正氣散若因飲食停滯用平胃散若果脾胃頓傷陽氣虛寒手足逆冷者須用溫補之劑治當詳審毋使動胎也萬密齋曰霍亂者陽明胃經之病名也蓋因平日五味肥釀腐積成痰七情鬱結氣盛為火停蓄胃中乍因寒熱之感邪正交爭陰陽相混故令心腹絞痛吐利並作揮霍變亂故名霍亂如邪在上胃脘則當心而痛其吐多邪在下胃脘則當臍而痛其利多邪在中脘其腹中痛吐利俱多吐多則傷氣利多則傷血血氣受傷不能護養其胎況邪氣鼓擊胎元母壽未有不殞者矣此危惡之證不可不亟治也宜香蘇散加藿香葉主之香蘇散加藿香方治妊娠霍亂此方平正可法香附炒紫蘇各二錢陳皮一錢甘草炙藿香葉縮砂各五分上銼水煎服如轉筋加木瓜一錢胎動不安加白朮一錢半如夏月得之加黃芩一錢半黃連一錢香薷二錢如冬月得之加人參白朮各一錢乾薑炮五分回生散治中氣不和霍亂吐瀉但一點胃氣存者服之回生此方甚良陳皮去白藿香各五分上為末水煎溫服七味白朮散治脾胃虛弱吐瀉作渴不食白朮人參茯苓甘草炙木香藿香各半兩乾葛一兩上為末沸湯調服二錢吐甚者加生薑汁頻頻服之理中湯治妊娠霍亂腹痛四肢逆冷汗出脈虛弱者白朮人參乾薑炮甘草炙各一錢上銼水煎服甚者加熟附子五分人參散治妊娠霍亂吐瀉心煩腹痛飲食不入心煩腹痛而用人參炮薑豈煩非熱而痛屬虛乎虛實寒熱用者須斟酌之人參厚朴薑製橘紅各二錢當歸炒乾薑炮甘草炙各一錢上作一服加生薑三片棗一枚水煎服白朮散治妊娠霍亂腹痛吐利不止此真虛寒腹痛吐利方也勿妄用白朮炒益智仁枳殼麩炒橘紅各七錢半草豆蔻煨去皮良薑炒各半兩上為散每服五錢入生薑半分水煎去滓溫服木瓜煎治妊娠霍亂吐瀉轉筋悶絶此方可常用吳茱萸湯洗七次生薑切各七錢半木瓜竹刀切一兩半上細銼水二盞煎一盞二分去滓分三服熱服一方有蘹香七錢半甘草一錢茱萸半兩加紫蘇煎上四方用乾薑豆蔻茱萸俱大溫之劑霍亂切忌溫藥猶者必死即不發熱煩渴者亦不可輕用慎之慎之若發熱煩渴脈數陽證者服之即死宜用後方竹茹湯方見胎前門惡阻益元散桂苓甘露飲冬葵子湯並治霍亂方見胎前門子淋泄瀉大全云妊娠泄瀉或青或白水穀不化腹痛腸鳴謂之洞泄水穀不化喜飲嘔逆謂之協熱下利並以五苓散利小便次以黃連阿膠丸或三黃熟艾湯以安之若瀉黃有沫腸鳴腹痛脈沉緊數用戊己丸和之噯腐不食胃脈沉緊用感應丸下之後調和脾胃若風冷水穀不化如豆汁用胃風湯寒冷臍下陰冷洞泄用理中湯治中湯伏暑煩渴瀉水用四苓散傷濕泄瀉小便自利用不換金正氣散胃苓湯此四證之大略也薛氏曰泄瀉若米食所傷用六君加谷蘖麵食所傷用六君加麥蘖肉食所傷用六君加山楂若兼寒熱作嘔乃肝木侮脾土用六君加柴胡生薑兼嘔吐腹痛手足逆冷乃寒水侮土六君加薑桂不應用錢氏益黃散若元氣下陷發熱作渴肢體倦怠用補中益氣湯若泄瀉色黃乃脾土之真色用六君加木香肉果若作嘔不食腹痛惡寒乃脾土虛寒用六君加木香薑桂若瀉在五更侵晨飲食少思乃脾胃虛弱五更服四神丸日間服白朮散如不應或愈而復作或飲食少思急用八味丸補命門火以生脾土為善進士王徵之內懷妊泄瀉惡食作嘔余曰脾氣傷也其夫憂之強進米飲余謂飲亦能傷胃且不必強俟脾胃醒宿滯自化飲食自進不信別用人參養胃湯飲之吐水酸苦又欲投降火寒藥余曰若然則胃氣益傷也經云損其脾者調其飲食適其寒溫後不藥果愈胃苓湯治脾濕太過胃氣不和腹痛泄瀉水穀不化陰陽不分此平胃散與五苓散合方也蒼朮厚朴陳皮白朮茯苓豬苓澤瀉各一錢官桂甘草炙各五分上加生薑三片棗二枚水煎食遠服不換金正氣散治妊婦傷濕泄瀉蒼朮厚朴陳皮藿香半夏各一錢甘草五分上加薑棗煎服胃風湯治風冷乘虛入客腸胃米穀不化泄瀉注下及腸胃濕毒下如豆汁或下瘀血或下魚腦日夜無度人參白朮茯苓當歸川芎芍藥肉桂各等分上銼每服八錢入粟米一撮水煎服此方治瀉久氣血兩虛誠妙然肉桂非久虛臟冷者斷不可用其曰胃風取其益胃而升舉也如腹痛加木香加味理中湯治妊娠泄瀉人參白朮白芍藥白茯苓乾薑黃連木香藿香葉訶子肉肉豆蔻甘草各一錢上銼水二盅生薑三片大棗二枚煎一盅飢時服加味治中湯治飲食過多脾胃之氣不足以運化而瀉人參白朮乾薑炮甘草炙各一錢陳皮去白青皮各七分砂仁五分錢氏益黃散治妊娠泄瀉嘔吐腹痛手足厥逆陳皮青皮訶子肉各五錢丁香二錢甘草炙三錢上為末每服三錢水煎服草果散治臟腑虛寒腹痛泄瀉無度厚朴薑汁拌炒三兩肉豆蔻十個麵煨草豆蔻十個煨上每服三錢加生薑煎服痢疾大全云妊娠飲食生冷脾胃不能克化致令心腹疼痛若血分病則色赤氣分病則色白血氣俱病則赤白相雜若熱乘大腸血虛受患則成血痢也薛氏曰治痢之法當參前篇其下黃水乃脾土虧損真氣下陷也當升補中氣若黃而兼青乃肝木克脾土宜平肝補脾若黃而兼白乃子令母虛須補脾胃若黃而兼黑是水反侮土矣必溫補脾胃若黃而兼赤乃心母益子但用補中益氣若腸胃虛弱風邪客之用胃風湯或胎氣不安急補脾胃而自安矣凡安胎之藥當臨病制宜不必拘用阿膠艾葉之類重墜起於久病故為下元氣虛而以補中六君治之若非久病者猶當以安胎為主也地官胡成甫之內妊娠久痢自用消導理氣之劑腹內重墜胎氣不安又用阿膠艾葉之類不應余曰腹重墜下元氣虛也胎動不安內熱盛也遂用補中益氣湯而安又用六君子湯痊愈壺仙翁治湯總兵夫人妊娠病痢不止翁診其脈虛而滑兩關若澀此由胎氣不和相火炎上而有熱似痢實非痢也乃用黃芩白朮以安胎四物生地黃以調血數劑而安白朮湯一名三物湯治孕婦下痢膿血白朮黃芩當歸各等分上㕮咀每服三錢至四錢水二盞煎至一盞去渣溫服日夜三次嗽者加桑白皮食後服之當歸芍藥湯治妊娠腹中絞痛下痢赤白白芍藥白茯苓當歸川芎澤瀉各五錢白朮七分半上為細末溫酒或米飲任意調服一方無川芎有條芩甘草黃連木香檳榔㕮咀煎服黃連湯治妊娠下痢赤白膿血不止黃連八分厚朴制阿膠當歸乾薑各六分黃柏艾葉各四分上為細末空心米飲調下方寸匕日三服蒙薑黃連丸治妊娠下痢赤白穀道腫痛冷熱皆可服乾薑炮黃連縮砂仁炮川芎阿膠蛤粉炒白朮各一兩乳香二錢另研枳殼去白麩炒半兩上為末用烏梅三個取肉入少醋糊同杵丸如桐子大每服四十丸白痢乾薑湯下赤痢甘草湯下赤白痢乾薑甘草湯下一方有木香二錢三黃熟艾湯治妊娠挾熱下痢黃連黃芩黃柏熟艾各等分上銼每服五錢水煎服嘔加橘皮生薑以三黃湯加熟艾治熱痢加橘皮生薑治嘔俱妙歸耆湯治妊娠下痢腹痛須審腹痛是有餘否小便澀滯黃耆當歸焙各一兩糯米一合上細切分四服水煎服大寧散治妊娠下痢赤白灰色泄瀉疼痛垂死者黑豆二十粒甘草二寸半生炙各半粟殼二個去頂半生半炒上為粗末作一服加生薑三片水煎食前服神效厚朴散治妊娠下痢黃水不絶厚朴薑汁製黃連各三兩肉豆蔻五個連皮用上銼水煎徐徐服一方肉豆蔻止用一枚鴨蛋湯治婦人胎前産後赤白痢生薑年少者百錢老者二百錢重取自然汁鴨蛋一個打碎入薑汁內攪勻上二味煎至八分入蒲黃三錢煎五七沸空心溫服立效二黃散治妊娠下赤白絞刺疼痛雞子一枚烏雞者佳傾出清留黃用黃丹一錢入雞子殼內同黃攪勻以厚紙糊牢鹽泥固濟火上煨乾上研為細末每服二錢米飲調下一服愈者是男二服愈者是女大小便不通大全云妊娠大小便不通由臟腑之熱所致若大腸熱則大便不通小腸熱則小便不利大小腸俱熱則大小便俱不通更推其因而藥之薛氏曰前證若大腸血燥用四物湯加條芩桃仁大腸氣滯用紫蘇飲加杏仁條芩腸胃氣虛用六君子加紫蘇杏仁肝脾蘊熱用龍膽瀉肝湯心肝虛熱用加味逍遙散加車前子亞卿李浦汀側室妊娠大小便不利或用降火理氣之劑元氣反虛肝脈弦急脾脈遲滯視其面色青黃不澤余曰此鬱怒所致也用加味歸脾湯為主佐以加味逍遙散而安主政王在成之內妊娠痢疾愈後二便不通其家世醫自用清熱之劑未效余診其脈浮大而澀此氣血虛也朝用八珍湯加桃仁杏仁夕用加味逍遙加車前子而痊大腹皮散治妊娠大小便不通大腹皮赤茯苓枳殼麩炒各一兩甘草炙二錢上為細末每服二錢濃煎蔥白湯調下一方銼作散入郁李仁去皮尖一錢半水煎空心連服以通為度如不通必六腑熱祕用枳殼炒一錢半大黃炮二錢甘草炙一錢研為細末作三服濃煎蔥白湯調下當歸散治妊娠因怒肚腹脹痛四肢浮腫氣急作喘大便難小便澀産門腫當歸五分赤茯苓枳殼麩炒白芍藥川芎各一錢白薑炮木香煨粉草各三分上用薑水煎服氣弱枳殼減半大便祕加蜜同煎一方治妊娠小便不通腹脅痞悶不思飲食大黃木通檳榔各一兩枳殼麩炒七錢半訶黎勒四個去核半生半煨大腹子三枚上為末用童便一盞蔥白二寸煎六分調服二錢一方治妊娠風氣大便祕澀枳殼麩炒三兩防風二兩甘草炙一兩上為末每一二錢空心用白滾湯調服日三次又方車前子一兩大黃半兩炒上為末每服三錢湯調服又方治虛羸大便祕枳殼制阿膠炒各等分上為細末煉蜜和劑杵二三千下丸如桐子大別研滑石末為衣研滑石末妙溫湯下二十丸半日來未通再服三十丸止於五十丸葵子湯治妊娠得病六七日以上身熱入臟大小便不利安胎除熱此利竅除熱藥也葵子二升滑石四兩碎上以水五升煮取一升去渣盡服須臾當下便愈又方葵子一合川朴硝一兩朴硝非妊娠所宜用者須慎上每服三錢水煎溫服豬苓散治妊娠小便澀痛兼治胎水豬苓五兩去皮為末白湯調方寸匕加至二匕日三夜二不瘥宜轉下之服後藥甘遂散治妊娠子淋大小便並不利氣急已服豬苓散不瘥宜服此下之用泰山赤皮甘遂二兩為末以白蜜二合和服如豆大一粒覺心下煩得微下者日一服下之後還服豬苓散不得下日兩服漸加至半錢以微利為度此藥太峻不可輕用上陳良甫氏所録諸方今並存之納甘遂朴硝非至實至危不得已而為之不可輕用其他亦宜審訂用之仍味薛氏之説而參之以雜病諸方庶無誤也小便不通轉胞大全云妊娠小便不通為小腸有熱傳於胞而不通耳若兼心肺氣滯則致喘急陳無擇云妊娠胎滿逼胞多致小便不利若心腎氣虛清濁相干則為諸淋若胞系了戾小便不通名曰轉胞若胎滿尿出名曰遺尿丹溪云轉胞病胎婦稟受弱者憂悶多者性急躁者食味厚者大率有之古方皆用滑利疏導藥鮮有應效因思胞為胎所壓轉在一旁胞系了戾不通耳胎若舉起懸在中央胞系得疏水道自行然胎之墜下必有其由一日吳宅寵人患此脈之兩手似澀重取則弦左手稍和豫曰此得之憂患澀為血少氣多弦為有飲血少則胞弱而不能自舉氣多有飲中焦不清而隘則胞知所避而就下故喜墜遂以四物湯加參朮半夏陳皮生甘草生薑空心飲隨以指探喉中吐出藥汁候少頃氣定又與一帖次日亦然如是八帖而安此法果為的確恐偶中耳後有數人歷歷有效未知果何如耶仲景云婦人本肌盛頭舉身滿今反羸瘦頭舉中空減胞系了戾亦致胞轉其義未詳必有能知之者一婦人四十一歲妊孕九個月轉胞小便不出三日矣下急腳腫不堪存活來告急豫往視之見其形瘁脈之右澀而左稍和此飽食而氣傷胎系弱不能自舉而下墜壓著膀胱偏在一旁氣急為其所閉所以水竅不能出也轉胞之病大率如此豫遂制一方補血養氣血氣既正胎系自舉則不下墜方有安之理遂作人參當歸身尾白芍藥白朮陳皮炙甘草半夏生薑煎濃湯與四帖任其叫啖至次早又與四帖藥渣作一帖煎令頓飲之探喉令吐出次藥湯小便立通皆黑水後就此方加大腹皮枳殼青蔥葉縮砂仁二十帖與之以防産前後之虛果得就蓐平安産後亦健一婦人妊娠七八個月患小便不通百醫不能利轉加急脹診其脈細弱豫意其血氣虛弱不能承載其胎故胎重墜下壓住膀胱下口因此溺不得出若服補藥升扶胎起則自下藥力未至愈加急滿遂令一老婦用香油塗手自産門入托起其胎溺出如注脹急頓解一面卻以人參黃耆升麻大劑煮服或少有急滿仍用手托放取溺如此三日後胎漸起小便如故又一法以健人同病婦皆仰臥將兩足直伸相對其健人以雙足抵病人足頻頻細聳令病人身亦細細頻聳則胎自隨聳而上胞不了戾而小便自通矣其無妊婦人亦有胞系了戾溺不出者可令伶俐收生婦人以手法轉其胞溺亦隨出矣又有將病婦兩足倒提向上如是數次溺亦隨通並附之薛氏曰前證亦有脾肺氣虛不能下輸膀胱者亦有氣熱鬱結膀胱津液不利者亦有金為火爍脾土濕熱甚而不利者更當詳審施治司徒李杏岡仲子室孕五月小便不利諸藥不應余曰非八味丸不能救不信別用分利之藥肚腹腫脹以致不起儒者王文遠室患此小腹腫脹幾至於殆用八味丸一服小便滴瀝再以前丸料加車前子一劑即利肚腹頓空而安仲景云問曰婦人病飲食如故煩熱不臥而反得倚息者何也師曰此名轉胞不得溺也以胞系了戾故致此病但利小便則愈宜腎氣丸主之即八味丸方見虛勞每以酒下十五丸至二十丸日再服冬葵子散治孕婦轉胞小便不通及男子小便不通皆效冬葵子山梔子炒滑石各半兩木通三錢上銼一劑水煎空心溫服外以冬葵子滑石梔子為末田螺肉搗膏或蔥汁調膏貼臍中立通全生茯苓散治妊娠小便不通赤茯苓冬葵子各等分上㕮咀每服五錢水煎空心服濟生方加發灰少許極效葵榆湯治妊娠小便不通臍下妨悶心神煩亂葵子研榆白皮切各一兩上水煎分三服獨聖散治妊娠小便不通蔓荊子為末每服二錢食前濃煎蔥白湯調下蔓荊子涼諸經之血其性輕揚有升一之義歸母苦參丸治妊娠小便難飲食如故當歸貝母苦參各四兩上為末煉蜜為丸如小豆大每服三丸加至十丸男子加滑石半兩雜方治妊娠卒不得小便杏仁去皮尖炒黃搗丸如緑豆大燈心湯吞七粒一方搗杏仁入滑石末飯丸小豆大每服二十丸白湯下一方滑石為末水和塗臍下一方車前子搗汁調滑石末塗臍周圍四寸熱易之一方紫菀為丸井華水調下二錢一方桑螵蛸搗末米飲服方寸匕日三服子淋大全云妊娠小便淋者乃腎與膀胱虛熱不能制水然妊娠胞系於腎腎間虛熱而成斯證甚者心煩悶亂名曰子淋也薛氏曰前證若小便澀少淋瀝用安榮散若腿足轉筋而小便不利急用八味丸緩則不救若服燥劑而小便頻數或不利用生地黃茯苓牛膝黃柏知母芎歸甘草若頻數而色黃用四物加黃柏知母五味麥門玄參若肺氣虛而短少用補中益氣加山藥麥門若陰挺痿痹而頻數用地黃丸若熱結膀胱而不利用五淋散若脾肺燥不能化生宜黃芩清肺飲若膀胱陰虛陽無所主用滋腎丸若膀胱陽虛陰無所化用腎氣丸萬密齋曰子淋之病須分二證一則妊母自病一則子為母病然好母自病又分二證或服食辛熱因生內熱者或自汗自利津液燥者其子為母病亦分二證或胎氣熱壅者或胎形迫塞者證既不同治亦有別也大抵熱則清之燥則潤之壅則通之塞則行之此治之之法也五淋散治孕婦熱結膀胱小便淋瀝赤芍藥山梔子各二錢赤茯苓一錢二分當歸一錢子芩六分甘草五分上水煎服一方加生地黃澤瀉木通滑石車前子各等分子淋散治妊娠小便澀痛頻數麥門冬去心赤茯苓大腹皮木通甘草淡竹葉等分上銼水煎空心服一方無甘草大腹皮二味安榮散治妊娠小便澀少遂成淋瀝名曰子淋麥門冬去心通草滑石人參細辛各二錢當歸酒浸燈草甘草各半兩上為細末每服二錢煎麥門冬湯調下此用細辛自有深意蓋腎苦燥故用辛以潤之欲使天降之陰沛然於陰分也一方無滑石燈心有車前萹蓄此方恐滑石太重而滑胎若臨月可用若六七個月以前宜斟酌之加味木通湯治妊婦奉養太厚喜食炙爆酒面辛熱之物以致內熱小便赤澀作痛者木通生地黃赤芍藥條芩甘草梢各等分上銼加淡竹葉十二片水煎服生津湯治妊婦嘗病自汗或因下痢後小便短少不痛者此津液不足也當歸甘草炙各五錢麥門冬去心通草滑石各三錢人參細辛各一錢上為細末每服六七錢燈心煎湯空心調服冬葵子湯治妊婦素淡滋味不嗜辛酸病小便赤澀而痛者此胎熱也此方主之冬葵子一兩赤芍藥條芩各半兩赤茯苓車前子各三錢上為末每服二錢米飲調服不拘時如小便不通恐是轉胞加發灰少許極效發灰能使氣血上行故轉胞加之妙大腹皮散治妊婦八九月胎形肥碩小便短少小腹脹身重惡寒起則暈眩欲倒此胎氣逼寒膀胱之氣不行也宜此方主之赤茯苓三錢大腹皮枳殼麩炒甘草炙各一錢上為末每服一錢濃煎蔥白湯下地膚子湯治孕婦小便澀數名曰子淋此方寓升於降妙地膚子車前子知母黃芩赤茯苓白芍藥枳殼麩炒升麻通草甘草炙各三分上切一劑水煎服地膚大黃湯治妊娠子淋宜下此治實熱而淋者大便通則小便自利矣大黃炒地膚草各三兩知母黃芩炒豬苓赤芍藥通草升麻枳實炒甘草各三兩上銼每服四五錢水煎服療妊娠數月小便淋瀝疼痛心煩悶亂不思飲食方瞿麥穗赤茯苓桑白皮木通葵子各一兩黃芩芍藥枳殼車前子各半兩上銼每服四錢水煎服忘憂散治妊娠心經蘊熱小便赤澀淋瀝作痛琥珀不拘多少萱草根一握上琥珀為細末每服五分濃煎萱草根調服補遺方治胎前諸般淋瀝小便不通此可治氣淋恐與熱淋無與檳榔赤芍藥各等分上銼每服五錢水煎溫服甚效一方治子淋小便數出或熱疼痛及子煩地膚草四兩以水四升煮取二升半分三服或新取地膚草搗取自然汁服亦可不獨治子淋凡小便淋閉服之無不效雜方治妊娠子淋葵子一升以水三升煮取二升分再服一方葵根一把以水三升煮取二升分再服一方蕪菁子七合為末水和服方寸匕日三一方豬苓為末白湯調方寸匕加至二匕遺尿薛氏曰若脬中有熱宜用加味逍遙散若脾肺氣虛宜用補中益氣湯加益智若肝腎陰虛宜用六味丸一妊婦遺尿內熱肝脈洪數按之微弱或兩太陽作痛脅肋作脹余以為肝火血虛用加味逍遙散六味地黃丸尋愈後又寒熱或發熱或恚怒前證仍作用八珍散逍遙散兼以清肝火養肝血而痊白薇散治妊娠尿出不知白薇白芍藥各等分上為末每服三錢食前溫酒調服本草謂芍藥白補赤瀉蓋金收而火散也故子淋方中多用赤而遺尿方中則用白也桑螵蛸散治妊娠小便不禁桑螵蛸炙黃二十枚上為末每服二錢空心米飲調下一方白礬牡蠣上為末每服二錢酒調下一方益智為末米飲下亦效尿血大全云妊婦勞傷經絡有熱在內熱乘於血血得熱則流溢滲入子脬故令尿血也按尿血之人皆從勞心斫喪中來薛氏曰前證因怒動火者宜小柴胡湯加山梔因勞動火者宜補中益氣湯因厚味積熱宜清胃散方見雜病齒門加犀角連翹甘草因肝經血熱宜加味逍遙散一妊婦因怒尿血內熱作渴寒熱往來胸乳間作脹飲食少用肝脈弦弱此肝經血虛而熱也用加味逍遙散六味地黃丸兼服漸愈又用八珍湯加柴胡丹皮山梔而痊續斷湯治妊娠下血及尿血當歸生地黃各一兩續斷半兩赤芍藥二錢半分兩差等可法上為末每服二錢空心蔥白湯調下一方治妊娠尿血阿膠炒熟地黃各等分上為細末空心粥飲調下二錢薑蜜湯治妊娠小便尿血生薑七片蜜半盞白茅根一握上入水濃煎服加減五苓散本方去桂加阿膠炒同為粗末每服四錢用車前子白茅根濃煎溫服雜方溫涼滑利不同在人自擇用葵子一升研細水五升煮二升分溫三服一方用生艾一斤酒五升煮二升分三服一方用生地黃一斤酒四斤煮二升分三服一方豬苓為末白湯調下一匙日三一方白茅根濃煮湯吞酒蒸黃連丸一方治無故尿血止血之劑龍骨一兩蒲黃半兩上為末每服二錢酒調日三服眼目一婦將臨月忽然兩目失明不見燈火頭痛眩暈項腮腫滿不能轉頸諸治不瘥反加危困偶得消風散服之病減七分獲安分娩其眼吊起人物不辨乃以四物湯加荊芥防風更服眼科天門冬飲子二方間服目漸稍明目病大都因火而懷妊則胎熱居多故以涼散之劑取效大忌酒面煎炙雞羊鵝鴨豆腐辛辣熱物並房勞此證因懷妊多居火間衣著太暖伏熱在內或酒面炙爆太過以致胎熱也天門冬飲子治妊娠肝經風熱上攻眼目帶吊失明天門冬去心知母茺蔚子五味子防風去蘆茯苓去皮川羌活去蘆人參各一錢上作一服水二盅生薑三片煎至一盅食後服臟躁悲傷仲景云婦人臟躁悲傷欲哭象如神靈所作數欠伸甘麥大棗湯主之臟躁者肺金燥也肺之志為悲胎熱則火炎肺不能自持故無故悲哭茲治以甘緩佐以涼瀉無不愈矣許學士云鄉里有一婦人數次無故悲泣不止或謂之有祟祈禳請禱備至終不應豫忽憶金匱有一證云婦人臟躁悲傷欲哭象如神靈數欠伸者宜甘麥大棗湯豫急令治藥盡劑而愈古人識病制方種種絶妙如此薛氏曰前證或因寒水攻心或肺有風邪者治當審察一妊婦無故自悲用大棗湯二劑而愈後復患又用前湯佐以四君子加山梔而安一妊婦悲哀煩躁其夫詢之云我無故但自欲悲耳用淡竹茹湯為主佐以八珍湯而安甘麥大棗湯治婦人臟躁悲傷不止悲傷肺病此方補脾所謂補母也且甘能生濕濕生則又何燥焉甘草三兩小麥一升大棗十枚上以水六升煮取三升溫分三服亦補脾氣淡竹茹湯治妊婦心虛驚悸臟躁悲傷不止又治虛煩甚效麥門冬去心小麥半夏湯泡各一錢半人參白茯苓各一錢甘草五分一作一服加生薑五片棗一枚淡竹茹一團如指大水煎服一方治胎臟躁悲哭及自笑自哭用紅棗燒存性米飲調下妊病下胎大全云妊娠羸瘦或挾疾病臟腑虛損氣血枯竭不能養胎致胎動而不堅固若終不能安者則可下之免害妊婦也薛氏曰前證宜用腰腹背痛門方論主治其胎果不能安者方可議下慎之慎之大中丞許少微公向令金壇時夫人胎漏療治不止時迫於上計公欲因其勢遂下之謀於余余第令服佛手散以為可安即安不可安即下順其自然而已既數服公憂疑不決女科醫者檢方以進乃用牛膝一兩酒煎服謂牛膝固補下部藥耳用之何害公遂信而服之而胎果下余時有從母之戚未及知此知而馳至則聞盈庭皆桂麝氣蓋因胞衣未下女醫又進香桂散矣血遂暴下如大河決不可復止亟煎獨參湯未成而卒公哀傷甫定而過余謝且詢余曰牛膝補藥而能墮胎何也余對曰生則宣而熟則補生宣熱補之説似是而實非宜思之故破血之與填精如箭鋒相拄豈獨牛膝哉鹿角亦墮胎破血而煎為白膠則安胎止血因其熟而信其生此之謂粗工公嘆恨無已余故特著之以為世戒桂心散治妊娠因病胎不能安者可下之桂心栝蔞牛膝瞿麥各五分當歸一錢上銼水煎服一方單用牛膝一兩酒一盅煎七分作二服千金神造湯婦人脈陰陽俱盛名曰雙軀若少陰微緊者血即凝濁經養不周胎即偏夭其一獨生其一獨死不去其死害母失胎此方主之蟹爪一升阿膠三兩甘草二兩上銼取東流水一斗先煮蟹爪甘草至三升去滓下膠令煬頓服之不能分再服阿膠固胎蟹爪破血甘草和中並行不悖奇哉下胎方治妊母因疾病胎不能安可下之取七月七日法面大全作曲四兩水二大盞煎取一盞三分綿瀝去滓分溫三服立下又方大麴五升清酒一斗煮二沸去滓分五服隔宿勿食但再服其子如糜母無疾苦千金不傳妙方又方麥蘖麥蘖能破血一升為末和水煮二升服之即下神效又方附子二枚為末以淳苦酒和塗右足去之大良又方取雞子一枚以三指撮鹽放雞子中服之立出按陳良甫以列有牛膝湯桂心散諸方樓全善皆不之取而獨取此數方其見卓矣防胎自墮丹溪云陽施陰化胎孕乃成血氣虛損不足營養其胎自墮或勞怒傷情內火便動亦能墮胎推原其本皆因熱火消物造化自然病源乃謂風冷傷於子臟而墮此未得病情者也豫見賈氏婦但有孕至三月左右必墮診其脈左手大而無力重取則澀知其血少也以其妙年只補中氣使血自榮時正初夏教以濃煎白朮湯單用白朮補中以營出中焦土生萬物也下黃芩末一錢服三四十帖遂得保全其生因而思之墮因內熱而虛者於理為多曰熱曰虛當分輕重蓋孕至三月正屬相火所以易墮不然何以黃芩熟艾熟艾性溫亦助相火若果有熱或恐不宜阿膠等為安胎妙藥耶好生之工幸無輕視一婦年三十餘或經住或成形未具其胎必墮察其性急多怒色黑氣實此相火太盛不能生氣化胎反食氣傷精故也因令住經第二月用黃芩白朮當歸甘草服至三月盡止藥後生一子一婦住經三月後尺脈或澀或微弱其婦卻無病知是子宮真氣不全故陽不施陰不化精血雖凝終不成形至産血塊或産血胞一婦腹漸大如懷子至十月求易産藥察其神色甚困難與之藥不數日生白蟲半桶蓋由婦之元氣太虛精血雖凝不能成胎而為穢腐蘊積之久濕化為熱濕熱生蟲理之所有亦須周十月之氣發動而産終非佳兆其婦不及一月而死濕熱生蟲譬之溝渠汙濁積久不流則諸蟲生於其間矣汪石山治一婦長瘦色黃白性躁急年三十餘常患墮胎已七八見矣診其脈皆柔軟無力兩尺雖浮而弱不任尋按曰此因胎墮太多氣血耗甚胎無滋養故頻墮譬之水涸而禾枯土削而木倒也況三月五月正屬少陽火動之時加以性躁而急發之故墮多在三五七月也宜大補陰湯去桂加黃柏黃芩煎服仍用研末蜜丸服之庶可保生服半年胎固而生二子錢仲陽治一孕婦病醫言胎且墮錢曰妊者五臟傳養率六旬乃更候其月偏補之何必墮已而母子皆全陳鬥岩治一婦有胎四月墮下逾旬腹腫發熱氣喘脈洪盛面赤口鼻舌青黑陳診之曰脈洪盛者胎未墮也面赤心火盛而血乾也舌青口鼻黑肝既絶而胎死矣內外皆曰胎墮久矣復診色脈如前以蛇蛻煎湯下平胃散加芒硝歸尾一倍服之須臾腹鳴如雷腰腹陳痛復一死胎隨下病亦愈程仁甫治一婦年近四十稟氣素弱自去其胎五日內漸漸腹脹如鼓至心前上吐不能食用補藥不效診六脈微弱但只叫脹死此乃損傷脾氣而作脹然急則治標若泥丹溪法恐緩不及事用桃仁承氣加枳實厚朴倍硝黃煎服四分吐去其一次早仍不通事急又服琥珀丸三錢至申時大通脹減但體倦四肢無力口不知味發熱再用參耆歸芍楂朮陳皮八劑而安江應宿治汪鎬妻三十一歲厭産誤服打胎藥下血如崩旬余腹痛一陳即行或時鼻衄諸藥不效診得六脈數而微弦乃厥陰之火泛逆投四物換生地黃加阿膠炒黑山梔蒲黃一劑愈薛氏云大抵治法須審某月屬某經育養而藥之芎藭補中湯治懷妊血氣虛弱不能衛養以致數月而墮名曰半産每見婦人孕不滿十月而損墮得服此遂安全川芎五味子阿膠蛤粉炒乾薑炮各一錢黃耆去蘆蜜炙當歸酒浸白芍藥白朮各一錢半人參杜仲去皮木香不見火甘草炙各五分上作一服水二盅煎至一盅不拘時服阿膠湯治妊娠數墮胎小腹絞痛不可忍阿膠炙燥熟乾地黃焙艾葉微炒川芎當歸切焙杜仲去粗皮炙銼白朮各一兩上㕮咀每服四錢棗三枚水煎食前溫服千金保胎丸凡女人受孕經三月而胎墮者雖氣血不足乃中衝脈有傷中衝脈即陽明胃經供應胎孕至此時必須節飲食絶欲戒怒庶免小産之患服此可以保全三月雖手心主養胎而實十二經皆受氣於陽明陽明屬中衝故中衝傷胎亦墮也此方極穩當白朮土炒熟地黃薑汁炒杜仲薑汁炒各四兩當歸酒洗續斷酒洗阿膠蛤粉炒香附米四制益母草條芩炒各二兩陳皮川芎艾葉醋炙各一兩砂仁炒五錢上為細末煮棗肉為丸如桐子大每服百丸空心米湯下杜仲丸治妊娠三兩個月胎動不安防其欲墮宜預服之杜仲去粗皮薑汁炒去絲上為末棗肉杵丸桐子大每服七十丸米飲下胎繫於腎故用杜仲補腎若云胎動不安則有脾虛氣虛血虛有寒有熱之不同又當因病而藥之不可執也刪繁方治妊娠懷胎數落而不結實或冷或熱百病之源黃耆人參白朮甘草川芎地黃吳茱萸各等分一方有當歸乾薑上為末空心溫酒調下二錢忌菘菜桃李雀肉醋物樓氏曰按丹溪論俱是虛熱而無寒者今姑存此一方以俟施之於千百而一者也此言宜玩胎墮後為半産夫妊娠日月未足胎氣未全而産者謂之半産蓋由妊婦衝任氣虛不能滋養於胎胎氣不固或顛撲閃墜致氣血損動或因熱病溫瘧之類皆令半産仲景謂寒虛相搏此名為革婦人則半産漏下是也又云半産俗呼小産或三四月或五六月皆為半産以男女成形故也或因憂恐悲哀暴怒或因勞力打撲損動或觸冒暑熱忌黑神散恐犯熱藥轉生他疾宜玉燭散和經湯之類便産須知云小産不可輕視將養十倍於正産可也又云半産即肌肉腐爛補其虛損生其肌肉益其氣血去其風邪養其臟氣將養過於正産十倍無不平復宜審之薛氏曰小産重於大産蓋大産如栗熟自脫小産有如生採破其皮殼傷其根蒂也但人輕忽致死者多治法宜補形氣生新血去瘀血若未足月痛而欲産芎歸補中湯倍加知母止之若産而血不止人參黃耆湯補之若産而心腹痛當歸川芎湯主之胎氣弱而小産者八珍湯固之若血出過多而發熱者聖愈湯汗不止急用獨參湯發熱煩躁肉瞤筋惕八珍湯大渴面赤脈洪而虛當歸補血湯身熱面赤脈沉而微四君加薑附東垣云晝發熱而夜安靜是陽氣自旺於陽分也晝安靜而夜發熱是陽氣下陷於陰分也如晝夜俱發熱者是重陽無陰也當峻補其陰王太僕云如大寒而甚熱之不熱是無火也熱來復去晝見夜伏夜發晝止時節而動是無火也如大熱而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也若陽氣自旺者四物二連湯陽氣陷於陰者補中益氣湯重陽無陰者四物湯無火者八味丸無水者六味丸一妊婦五月服剪紅丸墮胎腹中脹痛服破血藥益甚手按之愈痛余曰此峻藥重傷脾胃受患用八珍倍參耆加半夏乳沒二劑痛止數劑痊愈倍法加法俱有獨見史仲子室年甫二十困疫胎墮時咳服清肺解表喘急不寐請視余曰脾土虛不能生肺金藥重損之與補中益氣加茯苓半夏五味炮薑四劑漸愈往視又與八珍加五味及十全大補湯而痊愈東垣云婦人分娩及半産漏下昏冒不省瞑目無所知覺蓋因血暴亡有形血去則心神無所養心與包絡者君火相火也得血則安亡血則危火上熾故令人昏冒火勝其肺瞑目不省人事是陰血暴去不能鎮撫也血已虧損往往用滑石甘草石膏之類乃甘辛大寒之藥能瀉氣中之熱是血虧瀉氣乃陰虧瀉陽使二者俱傷所謂有兩死而無兩生也反為不足虛勞之病昏迷不省者上焦心肺之熱也此無形之熱用寒涼之藥驅令下行豈不知上焦之病悉屬於表乃陰證也汗之則愈今反下之幸而不死暴虧氣血必夭天年又不知內經有説病氣不足宜補不宜瀉但瞑目之病悉屬於陰宜汗不宜下又不知傷寒鬱冒得汗則愈是禁用寒涼藥也分娩半産本氣不病是暴去其血亡血補血又何疑焉補其血則神昌常時血下降亡今當補而升舉之妙在升陽心得血養而神不昏矣血若暴下是秋冬之令太旺令舉而升之助其陽則目張神不昏矣今立一方補血養血生血益陽以補手足厥陰之不足也名全生活血湯生産後諸證更於産後方論中參用之人參湯治半産後血下過多心驚體顫頭目運轉或寒或熱臍腹虛脹疼痛人參別録謂人參能治心腹鼓痛此用之蓋虛痛也若實痛則不宜矣麥門冬去心生乾地黃當歸洗芍藥炒黃耆白茯苓甘草炙各一兩上㕮咀每服三錢水一盞煎七分食前溫服人參黃耆湯治小産氣虛血下不止脾統血氣載血此方最妙人參黃耆炒白朮炒當歸白芍藥艾葉各一錢阿膠炒二錢上作一劑水煎服龍骨散治因損娠下惡血不止此重在惡血不止故薑艾之用也龍骨當歸地黃各二兩芍藥地榆乾薑阿膠各一兩半艾葉一兩炒蒲黃一兩二錢半牛角鰓炙焦二兩半上為細末食前用米飲調下二錢全生活血湯治婦人分娩及半産漏下昏冒不省瞑目無所知覺此因血暴亡心神無所養也用此補血升陽陰從陽升故用藥如此升麻三陰三陽之氣俱升白芍藥各三錢當歸酒洗葛根柴胡去苗羌活獨活防風甘草炙各二錢川芎藁本各一錢五分生地黃夏月加熟地黃各一錢蔓荊子細辛各五分紅花三分上㕮咀每服五錢水二盞煎至一盞去滓食前稍熱服以上治血下過多之劑生地黃湯治妊娠胎氣損動氣血不調或跌撲閃墜以致胎墮墮後惡滯不盡腹中絞痛生乾地黃一兩大黃暴煨芍藥白茯苓當歸細辛黃芩甘草炙桂去粗皮各半兩妙在桂與大黃同用然須認病真切方可上㕮咀每服五錢水一盞半入生薑大棗拍碎同煎至一盞去滓不拘時溫服當歸酒治妊娠墮胎後血不出當歸炙令香芍藥炒各二兩上㕮咀每服三錢無灰酒一盞入生地黃汁一合銀器內慢火煎至七分去滓溫服以惡血下為度産後忌芍藥而此以血不出者用之要知與當歸同用以無灰酒生地汁同煮則不收斂而入肝行血矣烏金散治妊娠墮胎後血不下兼治諸疾血病好墨二兩折二寸挺子燒通赤用好醋一升蘸七遍又再燒通赤放冷另研為末沒藥研麒麟竭各二錢半麝香一錢上為細末每服溫酒調下一錢匕如血迷心用童便加酒調下二錢匕紅藍花散治墮胎後血不出奔心悶絶不識人二方俱宜合之以備緩急紅藍花微炒男子發燒存性京墨燒紅血竭研蒲黃隔紙炒各等分上為細末以童便小半盞調二錢服之立效白蜜酒治墮胎後惡血不出妙在緩肝行血白蜜二兩生地黃取汁一盞酒半盞上汁與酒共入銅器中煎五七沸入蜜攪勻分兩服服三劑百病可愈以上治惡血不出之劑以上諸方攻補不同所謂寒熱溫涼各從其事也用者審之當歸湯治妊娠墮胎胞衣不出此方活血滑利催生下胞俱可用當歸切炒牛膝酒浸各一兩半木通滑石研各二兩冬葵子炒三合瞿麥穗一兩上㕮咀每服三錢水煎服未下再服以下為度地黃湯治胞衣不出方法俱妙宜詳之蒲黃炒生薑切炒各二錢半生地黃半兩以銅竹刀切炒上以無灰酒三盞於銀器內同煎至二盞去滓分三服未下再作服澤蘭湯治胞衣不出澤蘭葉切研滑石末各半兩生麻油少許上以水三盞先煎澤蘭至一盞半去滓入滑石末並油更煎三沸頓服之未下更服蒲黃酒治胞衣不下一方一變切似化工蒲黃炒一合槐子十四枚為末上以酒三盞煎至二盞去滓分溫二服未下更作服以上治胎衣不下之劑當歸川芎湯治小産後瘀血心腹痛或發熱惡寒平正之方可法可法尤妙當歸川芎熟地黃白芍藥玄胡索炒紅花香附青皮澤蘭牡丹皮桃仁各等分上水煎入童便酒各小半盞服若以手按腹愈痛此瘀血為患宜此藥或失笑散消之若按之不痛此是血虛宜四物參芩白朮芎藭湯治墮胎心腹冷痛川芎芍藥白朮阿膠炒令燥甘草炙各一兩既曰冷痛則不宜芍藥又曰腹痛則不宜白朮用者詳之一方無白朮有人參上㕮咀每服三錢入艾葉糯米生薑同煎食前服當歸散治産後氣血虛弱惡露內停憎寒發熱當歸白芍藥炒川芎黃芩炒各二兩白朮五錢上為細末溫童便調下二錢此方以氣血虛弱而用則可以惡露內停而用芩芍白朮恐不宜當歸補血湯治肌熱躁熱目赤面紅煩渴引飲晝夜不息脈洪大而虛重按全無此脈虛血虛也若誤服白虎湯必死病似陽明症象白虎故云然當歸三錢黃耆一兩上作一服水煎服此東垣神方也病真藥當一服如神四物二連湯治血虛發熱或口舌生瘡或晝安夜熱此河間方後二味非實熱心火不用當歸川芎芍藥熟地黃胡黃連宣黃連各一錢上作一服水煎服胎不長大全云妊娠不長者因而宿疾或因失調以致臟腑衰損氣血虛弱而胎不長也當治其疾疚益其氣血則胎自長矣薛氏曰前證更當察其經絡審其所因而治之一妊婦胎六月體倦懶食面黃晡熱而胎不長因勞欲墜此脾氣不足也用八珍湯倍加參朮茯苓三十餘劑脾胃漸健胎安而長矣一妊婦因怒寒熱往長內熱晡熱脅痛嘔吐胎至八月而不長此因肝脾鬱怒所致用六君加柴胡山梔枳殼紫蘇桔梗病愈而胎亦長矣安胎白朮散治妊娠宿有冷胎痿不長或失於將理傷胎多墮引藥補榮衛養胎氣白朮川芎各一兩吳茱萸湯泡半兩甘草炙一兩半上為細末每服二錢食前溫酒調下忌生冷果實天地以大氣春生夏長人身以心肝應之若有宿冷者春氣不溫也以吳茱萸溫之胎痿不長者夏氣不大也以川芎大之白朮甘草乃培土以補其母也以此為法思過半矣黃耆湯治妊娠胎不長安胎和氣思食利四肢黃耆炒白朮炒白茯苓前胡人參各七分半川芎甘草炒各五分上㕮咀加生薑三片棗二枚水煎食前服此方悉以補氣為主而前胡散結氣川芎行結血皆所助其生長也觀其主治乃得其妙長胎白朮丸治孕婦宿有風冷胎痿不長或將理失宜傷動胎氣多致損墮常服益血保胎調補衝任白朮川芎阿膠生地各六分當歸一兩牡蠣二分川椒三分上為末煉蜜丸如桐子大每服三十丸米飲下此方以風冷而用川椒川芎以傷動而用白朮牡蠣阿膠生地涼血固胎不多用者畏其涼也當歸一兩其血中之主藥歟故以為君分兩奇人參丸治妊娠胎不長宜服養胎此方助生氣寬中育胎又是一法人參白茯苓當歸柴胡刺薊厚朴桑寄生各一兩枳殼七錢半甘草半兩上為細末煉蜜丸桐子大每服二十丸食前溫水下先期欲産過期不産大全云婦人懷胎有七月八月而産者有至九月十月而産者有經一年二年乃至四年而後産者各依後治法樓氏曰先期欲産者涼血安胎過期不産者補血行滯薛氏曰一妊婦八個月胎欲墜似産臥久少安日晡益甚此氣血虛弱也朝用補中益氣湯加茯苓半夏隨愈更以八珍湯數劑而安知母丸治妊娠日月未足而痛如欲産者兼治産難及子煩治子煩胎熱妙劑知母不拘多少為細末煉蜜丸如雞頭實大溫酒嚼下日三服一方丸如桐子大粥飲下二十丸槐子丸治妊娠月數不足而似欲産腹痛者槐子蒲黃各等分上為細末蜜丸如桐子大溫酒下二十丸以痛止為度此方與治胞衣不下蒲黃酒同而一以酒煎作湯一以蜜丸酒下煎丸分兩雖殊而其藥則一也宜致思之又方取蒲黃篩過如棗核大以井華水調服又方搗菖蒲根汁一二升灌喉中又方梁上塵灶突墨同為末空心溫酒服方寸匕加味四物湯治過月不産者用此補血行滯四物湯香附桃仁枳殼縮砂紫蘇上用水煎服即生鬼胎大全云夫人臟腑調和則血氣充實風邪鬼魅不能幹之若榮衛虛損則精神衰弱妖魅鬼精得入於臟狀如懷娠故曰鬼胎也薛氏曰前證因七情相干脾肺虧損氣血虛弱行失常道衝任乖違而致之者乃元氣不足病氣有餘也若見經候不調就行調補庶免此證治法以補元氣為主而佐以雄黃丸之類行散之若脾經鬱結氣逆者用加味歸脾湯調補之若脾虛血不足者用六君芎歸培養之肝火血耗者用加味逍遙散滋抑之肝脾鬱怒者用加味歸脾逍遙二藥兼服腎肝虛弱者用六味地黃丸一婦人經閉八月肚腹漸大面色或青或黃用胎證之藥不應余診視之曰面青脈澀寒熱往來肝經血病也面黃腹大少食體倦脾經血病也此鬱怒傷脾肝之證非胎也不信仍用治胎散之類不驗余用加味歸脾逍遙二藥各二十餘劑諸證稍愈彼欲速效遂服通經丸一服下血昏慣自汗惡寒手足俱冷嘔吐不食余用人參炮薑二劑漸愈斬鬼丹治鬼胎如抱一甕下三方皆治諸蟲怪疾之假氣血而成形者又何獨論鬼胎之有吳茱萸川烏一方作川芎秦艽柴胡白殭蠶巴戟巴豆不去油芫花醋煮各二兩上為末煉蜜丸如桐子大每服七丸蜜酒送下即出惡物而愈輕者去芫花巴豆巴戟斑玄丸治鬼胎惑於妖魅狀如癥瘕一切氣血痛亦效斑蝥去頭足翅炒斑蝥宜慎用玄胡索炒各三錢上為末糊丸酒下或為末以溫酒調下半錢以胎下為度雄黃丸治鬼胎瘀血腹痛雖曰有故無殞然大毒之藥亦須慎也雄黃細研鬼臼去毛莽草丹砂細研巴豆去油獺肝炙黃各半兩蜥蜴一枚炙黃蜈蚣一條炙黃上為細末煉蜜丸如桐子大每服二丸空心溫酒下日兩服後當利如不利加至三丸初下清水次下蟲如馬尾狀無數病極者下蛇蟲或如蝦膜卵雞子或如白膏或如豆汁其病即除枳實檳榔丸治妊娠癥瘕癖塊及二者疑似之間久服安養胎氣消散癥瘕兼寬膈進食此方甚平何以能治癥瘕痞塊惟疑似者庶乎可枳實檳榔黃連黃柏黃芩當歸阿膠炒成珠木香各半兩上為末水和丸如小豆大每服三十丸溫米飲下不計時日三服
