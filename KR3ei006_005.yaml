body:
  text: 卷之五積聚癥瘕門論婦人諸積形狀準繩云大全良方分痃癖諸氣疝瘕八瘕腹中瘀血癥痞食癥血癥凡七門外有腸覃石瘕疝瘕三症亦當與此條參看痃者在腹內近臍左右各有一條筋脈急痛大者如臂次者如指因氣而成如弦之狀故名曰痃癖者僻在兩肋之間有時而痛故名曰癖疝者痛也癖者假也其結聚浮假而痛推移乃動也八瘕者黃瘕青瘕燥瘕血瘕脂瘕狐瘕蛇瘕鱉瘕積在腹內或腸胃之間與臟氣結搏堅牢雖推之不移名曰癥言其病形可徵驗也氣壅塞為痞言其氣痞塞不宣暢也傷食成塊堅而不移名曰食癥瘀血成塊堅而不移名曰血癥若夫腹中瘀血則積而未堅未至於成塊者也大抵以推之不動為癥推之動為瘕也至夫疝與痃癖則與痛俱痛即現不痛即隱在臍左右為痃在兩肋之間為癖在小腹而牽引腰脅為疝恐學者一時難了未免淆亂故總敘而條析之按七門之中而瘕有八其疝氣或聚或散痃癖之與痛俱見下痛則隱亦可與癖並穩則八瘕之外又有三積矣又男子為七疝女為瘕則疝與瘕亦可同經男與女亦有同病是瘕不止於八也痞一癥二曰血曰食而不言及痰飲何也蓋痞氣之中未嘗無飲而血癥食癥之內未嘗無痰則痰食血又未有不先因氣病而後形病也故消積之中當兼行氣消痰消瘀之藥為是論婦人八瘕所因病源曰八瘕者皆胞胎生產月水往來血脈精氣不調之所生也腎為陰主開閉左為胞門右為子戶主定月水生子之道胞門子戶主子精神氣所出入合於中黃門玉門四旁主持關元禁閉子精臍下三寸名曰關元主藏魂魄婦人之胞三焦之府常所從止然婦人經脈俞絡合調則月水以時來至故能生子而無病婦人榮衛經絡斷絕不通邪氣便得往來入合於臟若生血未盡而合陰陽即使婦人血脈攣急小腹重急支滿胞脅腰背相引四肢痠痛飲食不調結牢惡血不除月水不時或月前月後因生積聚如懷胎狀邪氣甚盛者令人恍惚多夢寒熱四肢不欲動陰中生氣腫內生風甚者小便不利苦痛如淋狀面目黃黑歲月久即不復生子也黃瘕者婦人月水始下若新傷墮血氣未止臥寢未定五臟六腑虛羸精神不足因向大風便利陰陽開闔關節四邊中於風濕氣從下上入於陰中稽留不去名為陰虛則生黃瘕黃瘕之聚令人苦四肢寒熱身重淋露臥不欲食左脅下有氣結牢不可得抑若腰背相引痛月水不利令人不產小腹急下引陰中如刺不得小便或時寒熱下赤黃汁令人無子當刺關元氣衝行以毒藥瘕下即愈青瘕者婦人新產未滿十日起行以浣洗太早陰陽虛玉門四邊皆解散子戶未安骨肉皆痛手臂不舉飲食未復內臟吸吸又當風臥不自隱蔽若居濕席令入苦寒洒洒入腹煩悶沉淖惡血不除結熱不得散則生青瘕聚在左右脅下藏於背膂上與肩胛腰下攣急腹下有氣起喜唾不可多食四肢不欲動搖手足腫面目黃大小便難其後月水為之不通利或不復禁狀如崩中此自過所致令人少子療之當刺胃管行以毒藥有法瘕當下即愈燥瘕者婦人月水下惡血未盡其人虛憊而以夏月熱行疾步若舉重移輕汗出交流氣血未平而卒以恚怒致腹中猥咽不泄經脈攣急內結不舒煩懣少力氣上達胸膈背膂少腹壅急月水與氣俱不通利而反以飲清快心月水橫流溢入他臟不去有熱則生燥瘕之聚大如半杯上下腹中苦痛連兩脅下上引心而煩害飲食欲嘔吐胸及腹中不得太息腰背汗重喜臥盜汗足酸削久立而痛小便失時忽然自出若失精月水閉塞大便澀難病如此者其人少子療之以長針按而刺之法度行以毒藥瘕當下即愈血瘕者婦人月水新下未滿日數而中止因飲食過度五穀氣盛溢入他臟若大飢寒吸吸不足呼吸未調而自勞動血下未定左右走腸胃之間留絡不去內有寒熱與月水合會為血瘕之聚令腰痛不可俯仰橫骨下有積氣牢如石小腹裡急苦痛背膂疼深達腰腹下攣陰里若生風冷子門僻月水不時乍來乍不來此病令人無子療之瘕當下即愈脂瘕者婦人月水新來若生未滿三十日以合陰陽絡脈分胞門傷子戶失禁關節散五臟六腑津液流行陰道瞤動百脈關樞四解外不見其形子精與血氣相遇犯禁子精化不足成子則為脂瘕之聚令人肢滿裡急痹引少腹重腰背如刺狀四肢不舉飲食不甘臥不安席左右走腹中切痛時瘥時甚或時少氣頭眩身體解㑊苦寒惡風膀胱脹月水乍來乍去不如常度大小便血不止如此者令人無子療之當刺以長針行以毒藥瘕當下即愈狐瘕者婦人月水當日數來而反悲哀憂恐若似遠行逢暴風疾雨雷電驚恐衣被沉濕疲倦少氣心中恍惚未定四肢懈惰情振寒苦寤寐氣絕精神遊亡邪氣入於陰里不去則生狐瘕之聚食人子臟令人月水閉不通小腹瘀滯胸膈腰背痛陰中腫小便難胞門子戶不受男精不藏氣盛令人嗜食欲嘔喜唾多所思如有身狀四肢不舉有此病者終身無子其瘕有手足成形者殺人未成者可療以長針急持刺之行以毒藥有法瘕當下即愈蛇瘕者婦人月水已下新止適閉未復胞門子戶勞傷陰陽未平榮衛分行若其中風暴病羸劣飲食未調若起行當風及涉泥途因沖寒太早若坐濕地名陰陽亂腹中虛若遠行道路飲汙井之水食不潔之食吞蛇鼠之精留絡不去因生蛇瘕之聚上食心肝長大其形如膝在臍上下還絞左右脅不得吐氣兩股脛間苦疼少腹多熱小便赤黃膀胱引陰中孿急腰目俱痛難以動作喜發寒熱月水或多或少有此病者不復生子其瘕手足成形者殺人未成者可治療之有法行以毒藥瘕當下即愈鱉瘕者婦人月水新至其人劇作疲勞汗出衣服潤濕不以時去之若當風睡足踐濕地恍惚覺悟庶立未安顏色未平復見所好心為之開魂魄感動五內脫消若入水浣洗沐浴不以時出而神不守水精與邪氣俱入至三焦之中幕玉門先閉津液妄行留絡不去因生鱉瘕之聚大如小柈令人小腹內切痛惡氣左右走上下腹中苦痛苦存若亡持之躍手下引陰里腰背亦痛不可以息月水不通面目黃黑脫聲少氣有此病者令人絕子其瘕有手足成形者殺人未成者可治療有法度以長針按療之行以毒藥瘕當下即愈論婦人癥痞大全云婦人癥痞由飲食失節脾胃虧損邪正相搏積於腹中牢固不動有可徵驗故名曰癥氣道壅塞故名曰痞得冷則發冷入子臟則不孕入胞絡則月水不通薛氏曰前證若脾胃虛弱用六君子加芎歸若肝脾虛弱用補中益氣及歸脾湯薛氏之說可為病久虛羸者法若肝火鬱滯佐以蘆薈丸六味丸外貼阿魏膏患者須慎七情六淫飲食起居治者不時審察病機而藥之庶幾有效論食癥大全云婦人食癥臟腑虛弱月候來時食生冷之物脾胃既虛不能消化與臟氣相搏結聚成塊日漸生長盤牢不移故謂之食癥也薛氏曰前證若形氣弱須先調補脾胃為主而佐以消導若形氣充實當先疏導為主而佐以補脾胃若氣壅血滯而不行者宜烏藥散散而行之散用烏藥莪朮醋浸炒桂心當歸桃仁青皮木香各等分為末每服二錢熱酒調下脾氣虛而血不行者宜用四君芎歸補而行之若脾氣鬱血不行者宜用歸脾湯解而行之若肝脾血燥而不行者宜用加味逍遙散清而行之大抵食積痞塊之證為有形蓋邪氣勝則實真氣奪則虛當養正辟邪而積自除矣雖然堅者削之客者除之胃氣未虛或可宜用若病久虛弱者不可輕試也論血癥大全云婦人寒熱失節臟腑氣虛風冷在內飲食不消與血氣相結漸生顆塊盤牢不移動者是也皆因血氣勞傷月水往來經絡痞塞惡血不除結聚所生久而不瘥則心腹兩脅苦痛害於飲食肌膚羸瘦問癥一也何以知是血癥曰血外之證有以左畔為血癥者凡肝之部皆可為血病瞀悶煩躁迷忘驚狂痰嘔汗多骨熱肢冷其蓄在下焦者必臍下結急外熱內痛尺脈洪而數也桃仁靈脂生地黃牛膝大黃甘草祛逐之薛氏曰前證多兼七情虧損五臟氣血乖達而致此說甚佳蓋氣主噓之血主濡之脾統血肝藏血故鬱結傷脾恚怒傷肝者多患之腹脅作痛正屬肝脾二經證也潔古曰養正積自除東垣云人以胃氣為主治法當主於固元氣而佐以攻伐之劑必需之歲月若期速效投以峻劑反致有誤論腹中瘀血大全云婦人月經痞塞不通或產後余穢未盡因而乘風取涼為風冷所乘血得冷則成瘀血也血瘀在內則時時體熱面黃瘀久不消則為積聚癥癖矣薛氏曰前證若鬱結傷脾用加味歸脾湯若恚怒傷肝用加味逍遙散若產後惡露用失笑散若肝脾虛損用六君子加柴胡以補元氣為主胃氣虛弱用補中益氣湯加茯苓半夏為主大凡腹中作痛畏手按者此內有瘀血若形體如常屬病氣元氣俱實用桃仁承氣湯直下之若痛而肢體倦怠飲食少思此脾胃受傷屬病氣有餘元氣不足用當歸散調和之立齋專重脾胃故其言如此然亦一偏之見但攻削之藥不得其竅反致傷氣以致不救故不如善守之為愈矣若痛而喜手按腹形體倦怠飲食少思此形氣病氣俱不足用六君炮薑芎歸純補之若痛而大便不實飲食難化此脾腎虛寒用六君炮薑肉果溫補之若痛而作嘔少食此脾胃虛弱用六君炮薑藿香若痛而嘔吐不食泄瀉用六君薑桂若兼手足逆冷自汗更加附子此證多有因攻伐而致者論痃癖大全云痃者在腹內近臍左右各有一條筋脈急痛大者如臂次者如指因氣而成如弦之狀名曰痃也癖者為僻側在兩肋之間有時而痛故曰癖也二者皆陰陽不和經絡痞隔飲食停滯不得宣流邪冷之氣搏結不散得冷則發作疼痛夫痃癖癥瘕血氣塊硬發作則痛甚則欲死究而言之皆血之所為僕嘗治一婦人血氣刺痛極不可忍甚而死一二日方省醫巫並治數年不愈僕以蔥白散烏雞丸遂安又嘗治一婦人血氣作楚如一小盤樣走注刺痛要一人扶定方少止亦用此二藥而愈尋常小小血氣用此二藥亦有奇效故錄於後論疝瘕大全云婦人疝瘕由飲食不節寒溫不調氣血勞傷臟腑虛弱風冷入腹與血相結所生疝者痛也瘕者假也結聚浮假百痛推移乃動也婦人之病有異於丈夫者或因產後血虛受寒或因經水往來取冷過度非獨因飲食失節多挾於血氣所成也其脈弦急者生虛弱小者死尺脈澀而浮牢為血實氣虛其發腹痛逆氣上行此為胞中有惡血巢氏止言胞門傷而此直指胞中惡血亦本病源來久則結成血瘕也薛氏曰子和云遺溺閉癃陰痿浮痹精滑白淫皆男子之疝也若血涸月事不行行後小腹有塊或時動移前陰突出後陰痔核皆女子之疝也但女子不謂之疝而謂之瘕女子亦有疝男子亦有瘕一婦人小腹痞脹小便時下白帶小水淋瀝此肝經濕熱下注用龍膽瀉肝湯而愈一婦人小腹脹痛小水不利或胸乳作痛或脅肋作脹或氣逆心吻余以為肝火而血傷脾用四物柴胡青皮玄胡索木香而愈一婦人小腹痞悶小便不利內熱體倦懶食用八珍湯加柴胡山梔龍膽草治之而安論腸覃李氏曰腸覃乃寒氣客於大腸與胃相搏大腸為肺傳送肺主氣氣得熱則行得冷則凝凝則清氣散而濁氣結為瘕覃延日久不已息肉乃生始如雞卵久如懷胎按之堅推之移月事時下或多或少氣病而血未病也宜二陳湯加香附以開之或香粉丸論婦人癥瘕並屬血病準繩云古方有五積六聚七癥八瘕之名五臟之氣積名曰積故積有五六腑之氣聚名曰聚故聚有六雜病準繩言之詳矣癥瘕積聚並起於氣故有氣積氣聚之說然謂瘕屬血病者氣聚而後血凝也其夾食夾痰又各隨所積而變見矣夫痰與血食皆賴氣以為之行化故氣行物生氣病物病此百病所以皆生於氣而破血消痰消食之劑必用氣藥者以此若夫七癥八瘕則婦人居多七者火數屬心蓋血生於心八者木數數肝蓋血歸於肝雖曰強分理似不混夫癥者堅也堅則難破瘕者假也假物成形古人將婦人病為痼疾以蛟龍等為生瘕然亦不必如此執泥婦人癥瘕並屬血病龍蛇魚鱉肉發蝨瘕等事皆出偶然但飲食間誤中之留聚腹臟假血而成自有活性亦猶永徽中僧病噎者腹中有一物其狀如魚即生瘕也與夫宿血停凝結為痞塊雖內所感之不同治法當以類相從所謂醫者意也如以敗梳治蝨瘕敗梳敗篦同用蓋取義耳或未必盡善銅屑治龍瘕曲柏治米瘕石灰治酒瘕如此等類學者可以理解也論治積須養正氣薛新甫曰婦人痃癖癥瘕大抵因飲食起居七情失宜虧損臟腑氣血乖違陰絡受傷循行失度所致羅謙甫云養正積自除必先調養使榮衛充實若不消散方可議下但除之不以漸下不可輕漸字極妙則必有顛覆之害若不守禁忌縱情嗜欲其有不喪者鮮矣一婦人內熱作渴飲食少思腹內初如雞卵漸大四寸許非鬱結之脈而謂郁之症何軟經水三月一至肢體消瘦齒頰似瘡脈洪數而虛左關尤甚此肝脾鬱結之證外貼阿魏膏午前用補中益氣湯補中益氣何以能治鬱結意取積氣外散也午後用加味歸脾湯兩月許肝火稍退脾土少健午前補中益氣下六味丸午後逍遙散下歸脾丸又月餘日用蘆薈丸二服蘆薈丸治肝膽之結空心以逍遙散下日晡以歸脾湯下喜其謹疾調理年餘而愈一婦人腹內一塊不時上攻或作痛有聲或吞酸痞悶月經不調小便不利二年餘矣面色青黃余以為肝脾氣滯以六君加芎歸柴胡炒連木香吳茱各少許二劑卻與歸脾湯送下蘆薈丸三月餘肝脾和而諸症退又與調中益氣湯加茯苓牡丹皮中氣健而經自調一婦人性多郁善怒勤於女工小腹內結一塊或作痛或痞悶月經不調恪服伐肝之劑內熱寒熱胸膈不利飲食不甘形體日瘦牙齦蝕爛此脾土不能生肺金肺金不能生腎水腎水不能生肝木當滋化源用補中益氣湯六味丸至仲春而愈一婦人經候過期發熱倦怠或用四物黃連之類反兩月一度且少而成塊又用峻藥通之兩目如帛所蔽余曰脾為諸陰之首目為血脈之宗此脾傷五臟皆為失所不能歸於目也遂用補中益氣濟生歸脾二湯專主脾胃年餘而愈松江太守何恭人性善怒腹結一塊年餘上齶蝕透血氣虛極時季冬肝脈洪數按之弦緊或用伐肝木清胃火之藥余曰真氣虛而邪氣實也恐伐肝木至春不能發生耳用八珍湯以生氣血用地黃丸以滋腎水歷觀數案皆以肝脾腎為主而愈者在立齋則可在他醫則不可肝脈頓退因大怒耳內出血肝脈仍大煩熱作渴此無根之火也仍以前藥加肉桂二劑脈斂熱退復因大怒果卒於季冬辛巳日乃金剋木故也李氏曰善治癥瘕者調其氣而破其血消其食而豁其痰衰其大半而止不可猛攻峻施以傷元氣至論寧扶脾胃正氣待其自化此開鬱正元散之由名也愈後宜大小烏雞丸八珍湯交加散交加地黃丸調之凡攻擊之藥病重病受病輕胃氣受之而傷矣或云待塊消盡而後補養則胃氣之存也幾希論痰積用吐下子和云戴人過譙遇一卒說出妻事戴人問其故答曰吾婦為室女時心下有冷積如覆杯按之如水聲以熱手熨之如冰娶來已十五年矣恐斷我嗣是故棄之戴人曰公勿黜也如用我藥病可除孕可得知脈病相應故病可除子可得卒從之戴人診其脈沉而遲尺脈洪大而有力非無子之候也可不逾年而孕其良人笑曰試之先以三聖散吐涎一斗心下平軟次服白朮調中湯五苓散後以四物湯和之不再月氣血合度數月而娠一子戴人嘗曰用吾此法無不子之婦此言不誣三聖散用防風瓜蒂各三兩黎蘆一兩為粗末以齏汁煎服制煎法詳見儒門事親白朮調中湯用白朮茯苓澤瀉橘紅各半兩甘草一兩乾薑官桂砂仁藿香各二錢半為末白湯化蜜調服二錢無時陽夏張主簿之妻病肥氣初如酒杯大發寒熱十五餘年後因性急悲感病益甚惟心下三指許無病滿腹如石片不能坐臥針灸匝矣徒勞人耳乃邀戴人診之曰此肥氣也得之季夏戊己日在左脅下如覆杯久不愈令人發痎瘧瓜蒂散吐之魚腥黃涎約一二缶魚腥黃涎能發濕熱用法痛快至夜繼用舟車丸通經散投之五更黃涎膿水相半五六行凡有積處皆覺痛後用白朮散當歸散和血流經之藥如斯湧泄凡三次愈瓜蒂散舟車丸方見雜病傷食痰飲二門通經散用橘紅當歸甘遂以麵包不令透水煮百餘沸用冷水浸過去面曬乾三味各等分為細末每服三錢臨臥溫淡酒調下白朮散白朮黃芩當歸各等分為末每服二三錢水煎食前眼當歸散當歸杜蒺藜等分為末米飲調服食前此吐下兼施且甘遂等逐水太峻用者審之脈法脈經曰婦人疝瘕積聚脈弦急者生虛弱者死少陰脈浮而緊緊則疝瘕腹中痛半產而墮傷浮則亡血惡寒絕產通治諸積開鬱正元散治痰飲血氣鬱結食積氣不升降積聚脹痛宜此利氣行血和脾消導白朮陳皮青皮香附山楂海粉桔梗茯苓砂仁玄胡索神麯炒甘草炙各等分上銼加生薑水煎服每服一兩生薑三片水煎服按此諸藥方治氣血痰食平和之劑海粉不入煎若作丸更佳大七氣湯治積聚癥瘕隨氣上下心腹絞痛上氣窒塞小腹脹滿大小便不利此惟病氣形氣俱實者可用總重在隨氣上下句若氣鬱生火者忌之京三稜蓬朮各煨切青皮去白陳皮去白香附炒藿香葉益智仁桔梗肉桂不見火甘草炙各七錢半上㕮咀每服五錢水二盞煎至一盞食前溫服助氣丸治三焦痞閉胸膈滿悶氣不流通蘊結成積痃癖氣塊並皆治之京三稜蓬朮以上二味各用濕紅包灰火中煨透切片各二斤青皮去白陳皮去白白朮各十五兩枳殼麩炒去穰檳榔木香各十兩上為末糊丸桐子大每服五十丸滾水下此方削堅積破滯氣雖用白朮為佐而氣虛者不可輕服勝紅丸治脾積氣滯胸膈滿悶氣促不安嘔吐清水丈夫酒積女人脾血積小兒食積胃寒氣實者可用京三稜莪朮二味同醋煮青皮陳皮乾薑炮良薑炒各一兩香附子淨炒二兩上為末醋糊丸如桐子大每服三十丸生薑湯下虛者以補藥下之用藥巧處一方加神麯麥芽三稜煎治婦人血瘕血癥食積痰滯三稜莪朮各一兩青皮去白半夏湯泡七次麥芽炒各二兩上用好醋六升煮乾為末醋糊丸如桐子大每服五十丸淡醋湯下此在氣行血流痰消食消也妙在用醋之多痰積薑湯下香稜丸治一切積聚破痰癖消癥塊木香丁香各半兩枳殼麵炒三稜酒浸一夕莪朮細銼每一兩用巴豆三十粒去殼同炒待巴豆黃色去巴豆不用青皮制川楝子肉蘹香炒各等分上為末醋煮此溫行之法峻而不猛行而得中妙在用醋麵糊丸如桐子大硃砂為衣每服三十丸姜鹽湯或溫酒下無時大硝石丸治七癥八瘕聚結痞塊及婦人帶下絕產腹中有癥瘕者當先下此藥但去癥瘕令人不困凡消塊俱用熱藥行氣削堅之劑而此方又以補中寓消真千金方也用者試之硝石三兩大黃四兩人參甘草各一兩上為末以三年苦酒三升置銅石器中先用大黃微火熬微沸常攪不息至七分入余藥復熬成膏至可丸即丸如桐子大每服三十丸米飲下三日一服婦人服之或下如雞肝或如米泔赤黑等物二三升後忌風冷阿魏膏治一切痞塊羌活獨活元參官桂赤芍藥穿山甲生地黃大黃白芷天麻兩頭尖各五錢紅花四錢木鱉子十粒去殼槐柳桃枝各三錢亂髮雞子大一團上用香油二斤四兩煎黑去渣入發煎發化仍去渣徐下黃丹煎軟硬得中入芒硝阿魏蘇合油乳香沒藥各五錢麝香三錢調勻即成膏矣攤貼患處鋪平半指厚以紙蓋用熱熨斗熨良久如硝耗再加熨之二時許方貼膏藥分治八瘕皂莢散療黃瘕導方八瘕之由皆自胞門子戶感受故用此方以導之皂莢一兩炙去皮子川椒一兩去汗細辛一兩半上搗散以三角囊大如指長二寸貯之納陰中欲便悶則出之已則復納之惡血畢出乃洗以溫湯三日勿近男子忌生菜等療青瘕坐導方戎鹽一升皂莢半兩炙去皮子細辛一兩上搗散以三角囊大如指長三寸貯之納陰中但臥瘕當下青如葵汁養之如產法療燥瘕方大黃如雞子許乾薑各二兩黃連三兩桂心一兩厚朴炙四兩郁李仁一兩去皮尖炒䗪蟲三枚炒雞肫胵中黃膜一枚炙上搗散早朝空腹以溫酒一盞和三錢頓服瘕當下畢養之如產法三月勿合陰陽無子者當有療血瘕攻刺腹脅時痛導藥方大黃當歸各半兩山茱萸皂莢去皮弦各一兩細辛戎鹽各二錢半上搗以香脂香脂即油胭脂丸如指大每用一丸綿裹納陰中正坐良久瘕當自下養如乳婦法療婦人血瘕痛方乾薑烏賊魚骨炙各一兩桃仁一兩去皮尖上搗散酒服二方寸匕日二一方無桃仁桃仁煎治婦人血瘕血積經候不通桃仁大黃各一兩虻蟲半兩炒黑朴硝另研一兩上為末以醇醋二升半銀石器中慢火煎取一升五合下大黃虻蟲桃仁不住手攪煎至可丸下朴硝攪勻出之丸如桐子大前一日不用吃晚飯五更初用溫酒吞下五丸日午取下如赤豆汁或如雞肝蝦膜衣之狀未下再服如鮮血來即止續以調補氣血藥補之本事方云頃年在毗陵有一貴宦妻患小便不通臍腹脹不可忍眾醫皆作淋治以八正散之類愈甚予診之曰此血瘕也非瞑眩藥不可去用此藥更初服至日午大痛不可忍遂臥少頃下血塊如拳者數枚小便如黑豆汁一二升痛止得愈此藥治病的切然猛烈傷人氣虛血弱者不可輕用療脂瘕方皂莢七錢半去皮子礬石燒二錢半五味子蜀椒去汗細辛乾薑各半兩上搗散以香脂和如豆大納陰中導散方皂莢炙去皮子吳茱萸當歸蜀椒去汗乾薑大黃戎鹽各一兩細辛炒礬石燒五味子各二錢上搗篩為散以輕絹袋如指大長三寸盛藥令滿納陰中坐臥隨意勿行走小便時去之別換新者療狐瘕方取新死鼠一枚裹以新絮塗以黃土穿地坎足沒鼠形置其中桑柴火灼其上一日一夜出之研為末肉桂心末二錢半酒服二方寸匕病當下甚音不過再服愈療蛇瘕方大黃黃芩芒硝各半兩甘草大如指一尺炙烏賊魚骨二枚皂莢六枚去皮弦子酥炙上搗以水六升煮之數沸絞去滓下硝適寒溫服之十日一劑空腹服之瘕當下以上八瘕方有本來但須認症真耳療鱉瘕方大黃一兩五錢乾薑側子各半兩附子人參各三錢七分半䗪蟲一寸匕炒桂心一兩二錢半細辛土䱉各七錢半土䱉不明白朮一兩上搗散以酒服方寸匕日三治癥癖穿山甲散治婦人癥痞及惡血氣攻心腹疼痛面無顏色四肢瘦弱此方散結破血行氣消飲溫行積塊要藥也穿山甲灰炒燥鱉甲醋炙赤芍藥大黃炒乾漆炒令煙盡桂心各一兩川芎芫花醋炒當歸各半兩麝香二錢半另研上為細末入麝和勻每服一錢熱酒調下無時蓬莪朮丸治婦人癥痞腹脅妨痛令人體瘦不思飲食此方破結氣散結血軟堅溫利亦可備用莪朮七錢半當歸焙桂心赤芍藥檳榔昆布琥珀研枳殼木香各半兩桃仁鱉甲大黃各一兩上為末煉蜜丸如桐子大食前米飲下二十丸丁香丸治婦人癥痞結塊不散心腹疼痛猛峻之丸不可妄試雄雀糞炒黃鱉甲各一兩硇砂當歸焙芫花醋炒乾各半兩巴豆去皮心油二分半上為末研勻醋煮麵糊丸如小豆大當歸酒下三丸桃仁散治婦人癥痞心腹脹滿不能飲食體瘦無力桃仁一兩湯浸去皮尖雙仁者麵炒令微黃訶子皮白朮赤芍藥當歸各七錢半京三稜微炒一兩陳皮去白三兩鱉甲醋炙去裙襴一兩半上為散每服二錢水一盞入生薑一錢三分煎至六分去滓食前稍熱服上方皆攻積之藥性多獷悍用者慎之治食癥化積丸治婦人死血食積痰飲成塊在兩脅動作雷鳴嘈雜眩暈身熱時作時止黃連一兩五錢用吳茱萸益智各炒一半去萸智蘿蔔子香附山楂各一兩川芎山梔炒三稜煨切神麯炒桃仁去皮尖各五錢上為末蒸餅丸服此丹溪先生法也緣古方率多香燥溫熱反能助火損氣此方以茱萸制連而治左以益智制連而治右以山梔治塊中之火其餘破氣消食散血誠穩當藥也小三稜煎丸治食癥酒癖血瘕氣塊時發刺痛全不思食及一切積滯不消心腹堅脹痰飲嘔噦噫酸脅肋刺痛脾氣橫泄三稜莪朮各四兩芫花一兩上同入瓷器中用米醋五升浸滿封器口以灰火煨令乾取出稜術將芫花以余醋炒令微焦同稜術焙乾為末醋糊丸如綠豆大一服十五丸生薑湯下婦人血分男子脾氣橫泄腫滿如水桑白皮煎湯下行氣消飲磨積硇砂丸治婦人食癥久不消令人瘦弱食少硇砂青礞石穿山甲炙三稜炒乾漆炒令煙盡硫黃各半兩巴豆三十枚去皮心炒不去油上為末用軟飯丸如小豆大每服五丸生薑橘皮湯下礞石丸治婦人食癥塊久不消攻刺心腹疼痛青礞石巴豆去皮心油硃砂粉霜並研木香各二錢半硇砂半兩上研勻以糯米飲飯和丸如綠豆大每服二丸空心溫酒下取下惡物為度上二方犯硇砂巴豆非胃氣強壯而積氣堅頑勢不兩立者不可輕用也治血癥增味四物湯治婦人血積治血積甚平穩當歸川芎芍藥熟地黃三稜廣朮肉桂乾漆炒煙盡各等分上為粗末每服五錢水煎服余妻曾患小腹積塊每遇寒觸劇痛不可忍諸醫治莫效余用此一服立止六合湯治婦人經事不行腹中結塊腰腿重痛此方恐效遲而腿腰重痛須用行經藥方效當歸川芎白芍藥熟地黃酒洗官桂蓬朮煨切各等分上㕮咀每服四錢水煎空心服血竭散治婦人血瘕作痛臍下脹滿月經不行發熱體倦平正效速當歸八分芍藥炒桂心血竭蒲黃炒各六分玄胡索炒四分上為細末每服二錢空心酒調下牡丹散治婦人久虛羸瘦血塊走注心腹疼痛甚當牡丹皮當歸玄胡索桂心各一兩赤芍藥牛膝莪朮各二兩京三稜一兩半上為粗末每服三錢水酒各半盞煎服當歸丸治婦人月經不調血積證當歸赤芍藥川芎熟地黃廣朮京三稜各半兩神麯炒百草霜各二錢半上為細末酒糊為丸如桐子大溫水下六七十丸大黃散治婦人血癥血瘕食積痰滯川大黃七錢半碎微炒鱉甲醋炙黃去裙襴一兩牛膝去蘆一兩乾漆一兩炒令煙盡上為末用米醋一升煎為膏每服一錢食前溫酒調下大紅花丸治婦人血積癥瘕經絡澀滯川大黃紅花各二兩虻蟲十個去翅足上取大黃七錢醋熬成膏和藥丸如桐子大每服五七丸食後溫酒下日三服治腹中瘀血桃奴散治血蠱及瘀血停積經水不通男子跌撲損傷皆效桃奴炒豭鼠糞炒玄胡索肉桂五靈脂香附炒砂仁桃仁各等分上為末每服三錢酒調服大黃湯治婦人血瘀不消及撲損血瘀大黃生用桃仁湯浸去皮尖雙仁各一兩肉桂去粗皮郁李仁去皮研各半兩生薑地黃各一兩上粗搗篩每服三錢水酒各半盞同煎至七分去滓溫服琥珀散治婦人經絡痞閉腹內瘀血痛不可忍琥珀乳香沒藥各另研細末五錢上每服二錢水酒各半盞煎至七分入地黃自然汁二合再煎數沸去滓入溫酒服不拘時候三物固妙而入地黃汁尤佳地榆散治敗血何首烏肉桂地榆香白芷各等分何首烏白芷有奇處上為粗末每服二錢米泔一盞半沙糖一小塊煎至八分去滓空心食前服治痃癖麝香丸治婦人痃癖冷氣兼疰氣心腹痛不可忍此治氣血痰飲無往不可麝香半兩另研阿魏二錢半麵裹煨令面熟五靈脂三稜各七錢半桃仁七錢芫花醋炒檳榔各一兩莪朮桂心沒藥木香當歸各半兩上為細末入麝香令勻粳米軟飯為丸如桐子大每服十丸淡醋湯下無時治婦人痃癖及血氣等神效方曾有一女人患腹中痞塊攻心作痛服此而愈用豶豬肝一具重十兩者以巴豆五十枚去大皮紮在肝內用釅醋三碗熬肝極爛去巴豆不用入京三稜末和調得所丸如桐子大每服五丸食前溫熱酒下蔥白散專治一切冷氣不和及本臟膀胱氣攻衝疼痛大治婦人胎前後腹痛胎不安或血刺痛者兼能治血臟宿冷百節倦痛肌體怯弱勞傷帶癖久服盡除但婦人一切疾病最宜服此與後烏雞煎丸兼服重在冷氣不和恐非胎前所宜若產後籌辦刺痛或血臟冷者宜之川芎當歸枳殼厚朴桂心乾薑舶上蘹香芍藥青皮木香麥芽三稜莪朮苦楝子茯苓神麯人參熟地黃各等分上為細末每服三錢水一盞連須蔥白二寸拍破鹽半錢煎至七分入大黃訶子宜相度病狀如大便不利入大黃同煎不入鹽如大便自入訶子煎人身以氣血流行為無病此方以四物補血人參助氣枳殼厚朴行上焦之氣蘹香苦楝行下焦之氣木香青皮行肝氣乾薑溫行血中之氣其餘消之削之皆所以溫而行之也氣一行則痛自止矣以鹽引入血分使氣下行而主內以蔥引氣外通而開表如是則內外和而痛愈矣烏雞煎丸治婦人胎前產後諸般疾患並皆治之烏雄雞一隻烏藥蛇床丹皮人參白朮黃耆各一兩蒼朮米泔浸切焙一兩半海桐皮肉桂去粗皮附子炮去皮臍白芍藥川烏炮紅花陳皮蓬莪朮各二兩木香玄胡索肉豆蔻琥珀草果熟地黃洗焙各半兩上細銼用雄烏雞一隻湯撏去毛及腸肚將上件藥安放雞肚中用新瓷瓶以好酒一斗同煮令乾去雞骨以油單盛焙乾為細末煉蜜和丸如桐子大每服三十丸女人體陰而用陽其經行以厥陰為主雞屬巽木性通於肝肝氣壯則血得其養而有生生之功若烏雄雞者具體陰用陽之象有水生木木生火之義蓋女人以陰為體而性多執滯故用此以鼓動肝氣而助其用耳本方用參耆白朮以益三焦之氣紅花熟地白芍以益心胞肝腎之血氣滯而不行者有蒼陳烏藥木香以調之血滯而不行者有玄胡丹皮琥珀以行之因寒而凝者有烏附肉桂以溫之其諸品類或溫中以醒脾或消穀以化積或於血中行氣或於氣中行血或行表或行里皆所以相贊成功總之以氣血為主溫行為用而又以脾胃穀氣為先此其所以為諸病可服也其曰治胎前諸疾則有所未信胎前產後傷寒蜜糖酒下胎前氣悶壯熱炒姜酒下赤白帶下生薑地黃酒下產後敗血注心童子小便炒姜酒下產後血塊填築心腹疼痛玄胡索酒下胎前嘔逆薑湯下催生炒蜀葵子酒下安胎鹽酒下室女經脈當通不通四肢疼痛煎紅花酒下血氣攻刺心腹疼痛煎當歸酒下血暈棕櫚燒灰酒調吞下血悶煎烏梅湯研硃砂下子宮久冷溫酒或棗湯下空心日一服血風勞人參酒吞下小腹絞痛炒茴香鹽酒吞下血散四肢遍身虛浮黃腫赤小豆酒下常服溫酒醋湯任下並空心食前服血邪血邪者邪祟之謂但因血瘀而成故云皆血所為是認塊要訣然有上下左右之分而痰飲食積亦須有辨不可執泥一說即此方所用肉蔻草果意可知矣研硃砂麝香酒下夫痃癖癥瘕血氣塊硬發渴刺痛甚則欲死究而言之皆血之所為僕嘗治一婦人血氣刺痛極不可忍甚而死一二日方省醫巫並治數年不愈僕以蔥白散烏雞丸遂安又嘗治一婦人血氣作楚如一小盤樣走注刺痛要一人扶定方少止亦用此二藥而愈尋常小小血氣用此二藥亦有奇效故錄於此朱先生云此藥大治心氣痹疼用之見效僕嘗以此治浮腫立效陳宜人病血氣作楚痛不可忍服諸藥無效召僕診之兩關脈弱沉為肝脈沉差緊此血氣漸成痃癖也凡脈緊小沉遲皆血凝氣滯之診只以此二藥治之而愈又四明馬朝奉後院亦病此用二藥治之亦愈四等丸治婦人痃癖氣心腹疼痛飲食不消大黃銼碎微炒訶黎勒去核檳榔木香各等分上為細末酒煮麵糊和丸如桐子大每食前以生薑橘皮湯下十五丸溫酒亦可又方鱉甲醋炙黃去裙襴川大黃銼碎微炒京三稜炮製各等分上為末醋煮麵糊丸如桐子大每食前以生薑湯下十丸木香硇砂丸治婦人痃癖積聚血塊刺痛脾胃虛寒宿食不消久不瘥者木香硇砂另研丁香官桂附子炮乾漆炒令煙盡細墨乳香另研廣朮青皮沒藥另研大黃銼碎為末京三稜豬牙皂角乾薑炮各等分巴豆霜減半上除硇砂乳香沒藥外同為末以好醋一升化開硇砂去滓銀器中慢火熬次下巴豆霜大黃熬成膏將前藥末與膏子為丸如麻子大每服三五十丸食後溫酒送下加至大便利為度此服法據丹溪先生意上三方皆攻積之劑全無補性虛人禁用實者亦須以四君子四物湯兼服乃可治疝瘕乾漆散治婦人疝須知女子之疝與男子不同瘕久不消按此疝瘕二字雖相連然以方觀之只重在瘕字蓋女人又有㿉疝一症故耳大抵疝字之義取其如山之高而突起也不然何彼皆連稱焉令人黃瘦尪羸兩脅妨悶心腹疼痛乾漆炒令煙盡木香芫花醋炒赤芍藥桂心當歸川芎琥珀研各半兩大黃炒二兩牛膝七錢半桃仁一兩麝香二錢半上為細末每服一錢溫酒調下無時當歸散治婦人疝瘕血氣攻刺心腹疼痛不可忍者此方治肝經居多鱉甲醋炙二兩當歸銼微炒桂心檳榔大黃銼微炒各一兩川芎吳茱萸湯泡七次木香青皮去白各半兩蓬莪朮赤芍桃仁湯浸去皮尖麩炒微黃各七錢五分上為散每服三錢生薑一錢三分水煎熱服不拘時硇砂丸治婦人疝瘕及積瘀血在臟時攻腹脅疼痛專在瘀血乃涼行之劑是知古人亦不專主於熱矣在人自擇之川芒硝硇砂各一兩當歸雄黃桂心各半兩大黃炮三稜各二兩上為細末米醋一碗熬大黃末為膏次入余藥末和丸如桐子大空心溫酒下十丸漸加至二十丸以利下惡物為度巴豆丸治婦人疝瘕及血氣疼痛氣血痰食皆宜第藥太猛慎之巴豆去皮心醋煮半日二錢半硇砂大黃炒各一兩五靈脂桃仁各七錢半木香半兩以上各另為末上煉蜜丸如綠豆大淡醋湯空心下五丸熱酒亦可黑神丸神麯蘹香各四兩木香椒炒香出汗丁香各半兩檳榔四枚漆六兩半生半用重湯煮半日令香上除椒漆外五物皆半生半炒為細末用前生熟漆和丸如彈子大又用蘹香末十二兩鋪陰地蔭干候乾並蘹香收器中至極干去蘹香治腎氣膀胱痃癖及疝墜五膈血崩產後諸血漏下赤白並一丸分四服死胎一丸皆綿灰酒下難產炒葵子四十九枚搗碎酒煎下諸疾不過三服痃氣十服膈氣癥瘕五服血瘕三丸當瘥一婦人病腹中有大塊如杯每發痛不可忍諸藥莫愈投此丸盡三服杯氣盡消終身不作晞露丸治寒傷於內氣凝不流結於腸外久為癥瘕時作疼痛腰不得伸名曰腸覃廣朮酒浸銼三稜酒浸銼各一兩乾漆洗去腥炒煙盡川烏各五錢硇砂四錢青皮雄黃另研茴香鹽炒穿山甲炮各三錢輕粉一錢另研麝香半錢另研巴豆三十個去皮切開上除研藥外將巴豆炒三稜廣朮二味黃色去巴豆不用共為末入研藥勻生薑汁打糊丸如桐子大每服二十丸至三十丸薑湯或酒下空心食前服烏喙丸治腸覃亦治乳余並男子疝氣烏喙炮去皮一錢半夏湯洗四錢石膏煅藜蘆炒牡蒙茯苓酒浸桂心乾薑炮各一錢巴豆七個研膏上為末煉蜜丸如綠豆大每服三五丸食後酒飲任下見晛丹治寒客於下焦血氣閉塞而成瘕日以益大狀如懷子名曰石瘕附子炮去皮臍四錢鬼箭羽紫石英各三錢澤瀉肉桂玄胡索木香各二錢血竭一錢半另研水蛭檳榔二錢半桃仁三十個另研三稜五錢大黃上為細末用酒糊丸如桐子大每服三十丸醋湯或溫酒下食前服寒者溫之留者行之以病在下焦故多血分藥蘆薈丸治疳瘕肌肉消瘦發熱潮熱飲食少思口乾作渴或肝疳食積口鼻生瘡牙齦蝕爛等證蘆薈胡黃連黃連炒木香白蕪荑炒青皮各五錢當歸茯苓陳皮各一兩半甘草炙七錢上為末米糊丸如桐子大每服七八十丸米飲下此小兒疳積藥也豈婦人亦有之大抵以疳瘕之名故偶類集之耳
