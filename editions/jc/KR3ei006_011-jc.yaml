body:
  text: 卷之十一產後門上論產後調理法大全云凡生產畢飲熱童便一盞不得便臥宜閉目少坐須臾上床宜仰臥不宜側臥宜豎膝未可伸足高倚床頭厚鋪裀褥遮圍四壁使無孔隙免致賊風及以醋塗鼻或用醋炭及燒漆器更以手從心擀至臍下使惡露不滯如此三日以防血暈血逆不問腹痛不痛有病無病以童便和酒半盞溫服五七服酒雖行血亦不可多恐引血人四肢且能昏暈宜頻食白粥少許一月之後宜食羊肉豬蹄少許仍慎言語七情寒暑梳頭洗足以百日為度若氣血素弱者不計日月否則患手足腰腿痠痛等證名曰蓐勞最難治療初產時不可問是男是女恐因言語而泄氣或以愛憎而動氣皆能致病吃緊語不可獨宿恐致虛驚不可刮舌恐傷心氣不可刷齒恐致血逆須血氣平復方可治事犯時微若秋毫成病重如山嶽可不戒哉陳藏器云漬苧汁與產婦服之將苧麻與產婦枕之止血暈產婦腹痛以苧安腹上則止產婦將息如法臟腑調和庶無諸疾苦須先服黑神散四物湯四順理中丸七寶散若壯熱頭痛此乳脈將行用玉露散頭目不清是血暈用清魂散粥食不美是胃氣虛用四順理中丸皆新產切實治法須熟之論產後大補血氣為主丹溪曰產後當大補血氣為主雖有雜證以末治之產後雖當大補亦宜審惡露有無內傷外感虛實何如庶為合理產後補虛用參朮黃耆陳皮歸身尾川芎炙草如發熱輕則加茯苓淡滲之熱輕用淡滲人所易忽卻最妙其熱自除重則加乾薑凡產後有病先固氣血產後一切病多是血虛皆不可發表新產後不可用芍藥以其酸寒能伐生髮之氣故也大抵胎前毋滯產後毋虛法言論產後服熱藥之誤丹溪曰或問新產之婦好血已虧汙血或留彼黑神散非要藥乎答曰至哉坤元萬物資理之常也初產之婦好血未必虧汙血未必積臟腑未必寒何以藥為飲食起居勤加調護何病之有誠有汙血體怯而寒與之數帖亦自簡便或有他病當求病起何因病在何經氣病治氣血病治血此論出局方發揮其血病治血以下尚有寒者溫之熱者清之凝者行之虛者補之血多者止之五句似不可少姑識之以便採擇何用拘執此方例令服餌設有性急者形瘦者本有怒火者夏月坐蓐者時在火令薑桂皆為禁藥至於將護之法尤為悖理肉汁發陰經之火易成內傷之病先哲具在訓戒胡為以羊雞濃汁作糜而又常服當歸建中湯四順理中丸雖是補劑並是偏熱臟腑無寒何處消受若夫兒之初生母腹頓寬便啖雞子且吃火鹽不思雞子難化火鹽發熱展轉生證不知所因率爾用藥寧不誤人予每見產婦之無疾者必教之以卻去黑神散與夫雞子火鹽諸品肉食且與白粥將理間以些少石首鯗煮令甘澹食之半月後方與少肉若雞子亦須豁開澹煮大能養胃卻疾彼當富之家驕恣之婦卒有白帶頭風氣痛膈築痰逆口乾經事不調發禿體熱等證皆是陽盛陰虛之病天生血氣本自和平曰盛曰虛又烏知非此等謬妄有以兆之耶論新產三病仲景云問新產婦人有三病一者病痙二者病鬱冒三者大便難何謂也師曰新產血虛多汗出喜中風故令病痙讀此則知痙症亦有外來不可專主氣血不足而驟用補劑反致不救也亡血復汗寒多故令鬱冒亡津液胃燥故大便難產婦鬱冒即今世所謂血暈也產後諸忌千金云凡產後滿百日乃可會合不爾至死虛羸百疾滋長慎之至言凡婦人患風氣臍下虛冷莫不由此早行房故也產後七日內惡血未盡不可服湯候臍下塊散乃進羊肉湯不可服湯謂不可服補氣之劑故羊肉湯亦俟塊散後服有痛甚切者不在此例候兩三日消息可服澤蘭丸此至滿月丸藥盡為佳不爾虛損不可平復也至極消瘦不可救者服五石澤蘭丸補之服法必七日之外不得早服也凡婦人因暑月產乳取涼太多得風冷腹中積聚百疾競起迄至於死百方療不能瘥桃仁煎主之出蓐後服之婦人總令無病每至秋冬須服一二劑以至年內常將服之佳脈法脈經云診婦人生產之後寸口脈洪疾不調者死沉微附骨不絕者生不調字並附骨不絕字重看婦人新生乳子脈沉小滑者生實大堅弦急者死丹溪曰產前脈細小產後脈洪大者多死又曰產前脈當洪數既產而洪數如故者多主死此亦大概言之今見產後豈無脈洪數而生者洪數中得胃氣者亦生堅強者死亦須審原稟脈何如乃當知胞衣不下大全云夫有產兒出胞衣不落者世謂之息胞由產初時用力比產兒出而體已疲憊不復能用力產胞經停之間而外冷乘之則血道澀故胞之不出須急以方藥救治不妨害於兒所奈者胞系連兒臍胞不出即不得以時斷臍浴洗冷氣傷兒則成病也舊法胞衣不出恐損兒者依法截臍而已產處須順四時方向並避五行禁忌若有觸犯多令產婦難產郭稽中論曰胎衣不下者何答曰母生子訖流血入衣中衣為血所脹故不得下治之稍緩脹滿腹中以次上衝心胸疼痛喘急者難治但服奪命丹以逐去衣中之血血散脹消胎衣自下牛膝湯亦效薛氏曰有因惡露入衣脹而不能出有因元氣虧損而不能送出其惡露流衣中者腹中脹痛用奪命丹或失笑散以消瘀血緩則不救其元氣不能送者腹中不脹痛用保生無憂散以補固元氣分別有餘不足或用蓖麻子肉一兩蓖麻法少驗細研成膏塗母右足心衣下即洗去緩則腸亦出如腸不上仍用此膏塗腦頂則腸自入益母丸亦效家人婦胎衣不落胸腹脹痛手不敢近此瘀血為患用熱酒下失笑散一劑惡露胎衣並下一產婦胎衣不出腹不脹痛手按之痛稍緩此是氣虛而不能送出用無憂散而下前證余詢諸穩婆云宜服益母草丸或就以產婦頭髮入口作嘔胎衣自出作嘔者為借力出也設不能出徒傷氣血其不出者必死授與前法甚效一產婦產後面赤五心煩熱敗血入胞胞衣不下有冷汗思但去其敗血其衣自下遂用黑豆二合炒透然後燒紅鐵秤錘同豆淬酒將豆淋酒化下益母丹二丸胞衣從血而出餘證盡平此方最佳奪命丹治胞衣不下蓋兒之初生惡血流入衣中為血所脹塞故不得下須臾衝上逼心即死急服此藥此郭稽中方配製有神黑附子炮五錢丹皮一兩乾漆炒煙盡二錢五分上為細末用米醋一升大黃末一兩同煮成膏和前藥為丸如桐子大每服五七丸溫酒下奪命丸治胞衣不下並治胎死牡丹皮桃仁茯苓赤芍桂心各等分上為末蜜丸彈子大每一丸醋湯化下或蔥白煎濃湯下尤妙連進兩丸死胎腐爛立出牛膝湯治胞衣不出臍腹堅脹急痛即殺人服此藥胞即爛下死胎亦下牛膝瞿麥各四兩當歸尾通草各六兩滑石八兩葵子五兩一方有桂心二兩上細切以水九升煮取三升分三服牛膝散治胞衣不出腹中脹痛急服此藥腐化而下緩則不救牛膝川芎朴硝蒲黃各七錢半當歸一兩五錢桂心五錢上銼每服五錢加生薑三片生地黃一錢水煎服加桂芎歸湯有胎衣不下因產母元氣虛薄者以此溫之自下川芎當歸各二錢官桂四錢至當之極妙在官桂四錢上銼一服水煎服黑龍丹治難產及胞衣不下血迷血暈不省人事一切危急惡證垂死者但灌藥得下無不全活當歸五靈脂川芎良薑熟地黃各二兩銼碎入砂鍋內紙筋鹽泥固濟火煅過百草霜一兩硫黃乳香各二錢琥珀花蕊石各一錢上為細末醋糊丸如彈子大每用一二丸炭火煅紅投入生薑自然汁浸碎以童便合酒調灌下煅法丸法服法俱奇妙花蕊石散治產後敗血不盡血迷血暈胎死腹中胎衣不下至死心頭暖者急用一錢化下即出其效如神花蕊石一斤土色硫黃四兩各研細上和勻先用紙泥封固瓦罐一個入二藥仍封固陰乾如急用以火籠內炙乾用炭火煅赤去火次日取出研細每服一錢童便熱酒下一方治胞衣不出牛膝一兩葵子一合上銼以水一升煮半升去渣分二服千金備急丸治產後惡血衝心胎衣不下腹中血塊錦紋大黃一兩為細末用釅醋半升同煎如膏丸如桐子大溫醋湯下五丸或七丸須臾惡下即愈胡氏法治產後胞衣不下惟有花蕊石散一件最為要緊若鄉居藥局遠者倉卒無之今有一妙法產訖胞衣不下稍久則血流胞中為血所脹上衝心胸喘急疼痛必致危篤若有此證宜急斷臍帶以小物繫帶必用力牢固系之然後截斷使其子血脈不潮入胞中胞衣自當痿縮而下縱淹延數日亦不害人屢驗治胞衣不下雜方一方五靈脂為細末溫酒調下二錢一方取小麥合小豆煮濃汁飲之立出一方皂角刺燒為末溫酒調下一錢一方蛇蛻燒為細末酒下二錢一方黑豆一合炒熟入醋一盞煎三五沸去豆分三服酒煮亦可一方取灶內黃土一寸研細醋調勻納於臍中續煎甘草湯三四合服之出一方墨三寸為末酒服一方生地黃汁一升苦酒三合暖服之一方灶突墨三指撮許以水苦酒調服立出一方雞子一枚苦酒一合和飲之一方生男吞小豆七枚生女吞十四枚即出一方浸苧水濃煮飲三碗立下一方取產母鞋底炙熱熨大小腹上下二七次一方取初洗兒湯服下一盞勿令產母知一方栝蔞實一個取子研細用酒童便各半盞相和煎至七分去滓溫服如無實根亦得一方紅花一兩酒煮濃汁服一方以鹿角鎊為屑研細三分煮蔥白湯調下一方凡欲產時必先脫常所著衣以籠灶胞衣自下仍易產一方取夫單衣蓋井上立出血暈厥逆附大全云產後血暈者由敗血流入肝經以致眼黑頭旋不能起坐甚至昏悶不省人事謂之血暈以細酒調黑神散最佳若作暗風中風治之誤矣血熱乘虛逆上湊心以致昏迷不省氣閉欲絕者服童便最妙然其由有三有用心使力過多而暈者有下血過多而暈者有下血少而暈者其暈雖同治之則異當審詳之下血多而暈者昏而煩亂而已當以補血清心藥下血少而暈者乃惡露不下上搶於心心下滿急神昏口噤絕不知人當以破血行血藥一條缺用心使力過多作暈治法大都以清心涼血補益為主如後保命集方用童便或麥門烏梅之類皆可而薛氏用補中益氣者為勞力也若用心則硃砂安神丸亦妙或疑內有黃連於產後不宜則存乎用者古法云產婦分娩訖預將秤錘或黃石子硬炭燒令通赤置器中急於床前以醋沃之得醋氣可除血暈產後一月內時作為妙崔氏云凡暈者皆是虛熱血氣奔迸腹中空虛所致欲分娩者第一須先取釅醋以塗口鼻仍置醋於旁使聞其氣兼細細飲之此為上法如覺暈即以醋噀面蘇來即飲醋仍少與解之一云仍少與水解之一法燒乾漆令煙濃熏產母面即醒如無干漆取舊漆器火燒煙燻亦妙醋解法收其神水解法清其熱燒乾漆者散其血迷於上也俱妙郭稽中曰產後血暈者何答曰產後氣血暴虛未得安靜血隨氣上迷亂心神故眼前生花極甚者令人悶絕不知人口噤神昏氣冷醫者不識呼為暗風若作此治證必難愈但服清魂散即省薛氏曰產後元氣虧損惡露乘虛上攻眼花頭暈或心下滿悶神昏口噤或痰壅盛者急用失笑散主之若血下多而暈或神昏煩亂者大劑芎歸湯補之或蕓薹子散或童子小便有痰加二陳湯若因勞心力而致者宜補中益氣湯加香附若因氣血虛極不省人事用清魂散惟以芎歸湯及大補氣血之劑凡產可用醋漆器熏或用半夏末冷水和丸入鼻孔中並無前患丹溪先生云血暈因氣血俱虛痰火泛上宜以二陳導痰或加減硃砂安神丸以麥門冬湯下亦可大凡產後口眼喎斜等證當大補氣血為主而兼以治痰若脾胃虛而不能固者用六君子湯至五個月當服安胎飲至八九個月再加大腹皮黃楊腦如臨產時更宜服保生無憂散保生無憂散見前臨月束胎方上自無前患家人婦產後小腹作痛忽牙關緊急灌以失笑散良久而生又用四物加炮薑白朮陳皮而愈一產婦因產飲酒產婦不宜飲酒惡露甚多患血暈口出酒氣此血得酒熱而妄行虛而作暈也以佛手散加乾葛二錢一劑而痊酒性剽悍入月及產後不宜飲恐致前證產室人眾喧嚷氣熱亦致此證奉化陸嚴治新昌徐氏婦病產後暴死但胸膈微熱陸診之曰此血悶也用紅花數十斤以大鍋煮之候湯沸以木桶盛之將病者寢其上熏之湯氣微復加之有頃婦人指動關日遂蘇此與許胤宗治王太后之意同仲景云產婦鬱冒其脈微弱嘔不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以產婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復所以大便堅嘔不能食也小柴胡湯主之病解能食七八日更發熱者此為胃實大承氣湯主之今按鬱冒即暈也觀此則產後血暈有汗下和解三法當分表裡虛實精而別之清魂散產後血暈者氣血暴虛未得安靜血隨氣上迷亂心神故眼前生花極甚者令人悶絕不知人口噤神昏氣冷宜先取乾漆或漆器燒煙鼻中熏之頻置醋炭房內次進此藥即醒澤蘭葉人參各二錢半川芎半兩荊芥穗一兩甘草二錢上為細末每服二錢用溫酒熱湯各半盞或入童便調急灌之下咽眼即開氣定即醒芎歸湯治產後去血過多昏暈不醒川芎當歸去蘆酒洗焙各等分上㕮咀每服四錢水煎熱服不拘時如腹中刺痛加酒炒白芍藥甚者加桂心口乾煩渴加烏梅麥門冬發寒熱加乾薑白芍藥水停心下微有嘔逆加茯苓生薑虛煩不得眠加人參竹葉保命集方治產後血暈危困此下多血虛也補之當歸炒赤芍藥炒各錢半生地黃汁一大盞上銼水煎三五沸溫服如覺煩熱去當歸當歸辛溫煩熱者恐不投故去之入童便半盞服之以上治去血過多昏暈之疾醋墨才產便服免致昏暈松煙墨或京墨不拘多少用炭火煅紅以米醋淬之再煅再淬如此七次研極細才產畢即用一二錢以童子小便調下淡醋湯溫酒亦可酒不如醋醋不如童便獨行散治產後血暈昏迷不省衝心悶絕五靈脂半生半炒為末每服二錢溫酒調灌入喉即愈不愈更加蒲黃炒等分名失笑散一方加荊芥等分童便調下奪命散治產後血暈血入心經言語顛倒健忘失志及產後百病血竭沒藥各等分上為末才產下便用童便與細酒各半盞煎一二沸調下二錢良久再服其惡血自下行更不衝上或只用白湯調下四味散治產後一切諸疾才方分娩一服尤妙當歸玄胡索血竭沒藥各等分上為細末每服二錢用童子小便一盞煎六分通口服如心膈寒倍當歸氣悶喘急倍玄胡索惡露不快倍血竭心腹撮痛倍沒藥黑神散治產後惡露不盡或胎衣不下血氣攻衝心腹痞滿或臍腹堅脹撮痛及血暈神昏眼黑口噤產後瘀血諸疾當歸芍藥熟地黃乾薑炮桂心蒲黃甘草炙各四兩黑豆炒去皮半升上為細末每服二錢酒童便各半盞同煎調服樓氏曰黑神散寒多及秋冬者宜之若性急形瘦及夏月宜審之紅花散治產後血昏血暈血崩及月事不勻遠年乾血氣乾荷葉乾荷葉善破血牡丹皮川歸紅花蒲黃炒各等分上為細末每服半兩酒煎和渣溫服如胎衣不下榆白皮湯調半兩立效鹿角散治產後血暈此乃虛火載血漸漸暈將上來用鹿角燒灰出火毒研極細用好酒童便調灌下一呷即醒此物行血補方也尤妙在服法鬱金散治產後血上衝心已死並下胎鬱金燒存性為末每二錢釅醋一合調灌之立活治血鬱雜方產後血暈全不省人事極危殆者用韭菜切入有嘴瓶內煎熱醋沃之以瓶口對產婦鼻孔熏之即醒一方如覺暈即以醋噀面醒來仍與醋細細呷之又以醋塗口鼻並置醋於旁使常聞其氣一方麒麟竭一兩細研為末非時溫酒調下二錢匕一方紅花一兩搗為末分作二服酒二盅煎取一盅並服如口噤斡開灌之速效一方用紅花三兩新者無灰酒童便各半升煮取一盞服之一方用蘇木三兩細銼水五升煮取二升分再服瘥無蘇木取緋衣煮汁服之亦得以上俱破血輕劑牡丹散治產後血暈悶絕口噤則斡開口灌之牡丹皮大黃煨芒硝各一兩冬瓜子半合桃仁三十個去皮尖上銼每服五錢水三盅煎至一盅半去滓入硝又煎分二服用到硝黃法亦極矣宜慎之產書一方治產後心煩手腳煩熱氣力欲盡血暈連心頭硬心寒熱不禁接骨木破之如算子大一握以水一升煎至半升分溫二服或小便數惡血不止服之則痊此木煎三遍其力一般此是起死之方以上二方俱重劑點滴不出者宜用以上治惡血攻衝昏暈之劑荊芥散治產後風虛血暈精神昏昧荊芥一兩三錢桃仁炒五錢上為細末溫水調下三錢微喘加杏仁炒甘草各三錢一方治產後血暈用荊芥穗為末童便調下二三錢極妙一方用多年陳荊芥穗燈煙上燎焦黑存性每服三錢童便少酒調下極妙一方治產後血暈身痙直戴眼口角與目外眥向上牽急不知人取雞子一枚去殼取清以荊芥末二錢調服仍依次調治荊芥氣虛人不可服接此乃肝熱生風之候由血虛而肝急也然痙與戴眼俱屬太陽要知之以上治風虛血暈之劑倉公散治產後血厥而冒瓜蒂藜蘆白礬各一分雄黃半分上為末每用少許吹鼻取嚏內服白薇湯取嚏治痰先通其壅後補其血也妙妙白薇湯治產後胃弱不食脈微多汗亡血發厥鬱冒等證白薇當歸各六錢人參三錢甘草一錢半上切分作二帖水煎服以上治血厥之劑惡露不下大全云夫惡露不下者由產後臟腑勞傷氣血虛損或胞絡挾於宿冷或產後當風取涼風冷乘虛而搏於血則壅滯不宣積蓄在內故令惡露不下也薛氏曰前證若惡露不下用失笑散若氣滯血凝用花蕊石散一產婦患前證服峻厲之藥惡露隨下久而昏憒以手護其腹余曰此脾氣復傷作痛故用手護也以人參理中湯加肉桂二劑補之而愈起枕散治產後惡血不行心腹及兒枕作痛甚危當歸白芍藥酒炒各三錢此產後溫行正藥白芍酒炒亦無妨川芎二錢官桂元胡索牡丹皮蒲黃炒五靈脂炒沒藥各一錢白芷上銼水煎入童便空心服荷葉散治產後惡露不下腹中疼痛心神煩悶乾荷葉二兩鬼箭羽桃仁劉寄奴蒲黃各一兩上為粗末每服三錢以童便一大盞此以心神煩悶故不用熱藥而加童便以引下姜二片生地黃一分捶碎同煎至六分熱服通瘀飲治產後惡露不通心慌昏沉寒熱交攻歸尾大黃各三錢白朮木通各一錢紅花五分桃仁三十個搗爛另入上用水一碗酒一小盞煎三沸入桃仁再煎一沸溫服既用大黃復用白朮豈得已之心加酒同煎桃仁後入又治法之妙廣濟方療產後惡露不下川牛膝大黃各一兩牡丹皮當歸各一兩半芍藥蒲黃桂心各一兩上為末以生地黃汁調酒服方寸匕日二服血下愈此方寒熱並用逐瘀而不峻妙在為末調生地黃汁酒服保命集方治婦人惡血不下當歸芫花炒等分芫花大毒用須斟酌上為細末每服三錢酒調下又用好墨醋淬末童便酒下沒藥丸治產後惡露方行而忽然斷絕驟作寒熱臍腹百脈皆痛如錐刺非常此由冷熱不調或思慮動作氣所壅遏血蓄經絡當歸一兩芍藥桂心各半兩桃仁去皮尖炒研沒藥研各二錢半虻蟲去翅足炒水蛭炒焦各三十枚虻蟲水蛭非萬不得已不敢用上為末醋糊丸如碗豆大醋湯下三丸黑龍丹見前胞衣不下治惡血不下雜方一方用蒲黃三兩炒水三升煮取一升頓服一方用益母草搗絞汁每服一小盅入酒一合溫服一方用麻子五升酒一升浸一宿明旦去滓溫服一升不瘥再服一升惡露不絕大全云夫產後惡露不絕者由產後傷於經血虛損不足或分解之時惡血不盡在於腹中而臟腑挾於宿冷致氣血不調故令惡露淋瀝不絕也薛氏曰前證若肝氣熱而不能主血用六味地黃丸若肝氣虛而不能藏血用逍遙散若脾氣虛而不能攝血用六君子湯若胃氣下陷而不能統血用補中益氣湯若脾經鬱熱而血不歸源以下諸方失載當考立齋良方用加味歸脾湯若肝經怒火而血妄行用加味四物湯若氣血俱虛用十全大補湯若肝經風邪而血沸騰用一味防風丸芎歸加芍藥湯治產後血崩眩暈不知人事川芎當歸芍藥各等分產後忌芍藥而此方用之亦血崩者無忌耳上㕮咀每服四錢水煎熱服一方加黃芩白朮加味四物湯治產後血崩如豆汁紫黑過多者有謂如豆汁者濕紫黑者熱又曰寒過多者虛此方不寒不熱不燥故可通用川芎當歸芍藥生地蒲黃阿膠薊根白芷上水煎服一方療產後七八日惡露不止敗醬草敗醬治多年凝血產後諸病腹痛則此亦去故生新藥也當歸各六分芍藥續斷各八分川芎竹茹各四分生地黃炒乾十二分上細銼以水二升煮取八合空心頓服以上補虛之劑加味四物湯治產後月餘經血淋瀝不止此陷下者舉之也當歸川芎白芍熟地白芷升麻各一錢血餘灰另入上銼水煎服族弟婦產後半月離蓐過勞下血傾盆急以求救余用此藥一服立止其效如神千金方治產後惡血不盡或經月或半歲者升麻三兩清酒五升煮取二升半分溫再服以上升提之劑烏金散治產後血迷血暈敗血不止淋瀝不斷臍腹絞痛頭目昏眩多汗無力及崩中下血不止諸症皆從敗血不止來此方之妙不在止而在行行則歸經而止矣治崩者要得此旨麒麟竭男子亂髮灰松墨煅醋淬百草霜當歸肉桂赤芍玄胡索鯉魚鱗燒存性各等分上為末每服二錢空心溫酒調下一方治產後惡血不絕崩血不可禁腹中絞痛氣息急亂髮燒一兩阿膠二兩代赭石乾薑各三兩乾地黃四兩妙在地黃為君馬蹄殼燒一個牛角腮五兩酥炙上為細末煉蜜丸如梧桐子大每服三四十丸空心米飲下日二服豆淋酒治產後猶有餘血水氣者余血瘀血也故用行法黑豆五升熬令煙盡投瓷器內以酒一斗淬之飲蓋豆淋酒治汙血又能發表也蒲醋飲子治新產壓血逐敗滋新此藥治血神效又非黑神散之可比也月內每日一二服尤良及療一切惡露與血積真蒲黃不拘多少熬米醋令稠和藥成膏每服一彈子大食前醋湯化開服二味有且戰且守之能一方用蒲黃二兩水煎頓服一方治產後泄血不止無禁度及治腹痛胸膈悶薑黃為末酒服方寸匕日三四服胡氏曰薑黃治惡露不止以上行汙血之劑牡蠣散治產後惡露淋瀝不斷心悶短氣四肢乏弱頭目昏重五心煩熱面黃體瘦牡蠣粉煅川芎熟地茯苓龍骨各二錢當歸炒續斷艾葉人參五味子地榆各一錢甘草五分上銼分二帖加生薑三片棗一枚水煎食前服此收澀之劑虛脫者宜用血崩不止陳氏曰產後血崩者何答曰產臥傷耗經脈未得平復勞役損動致血暴崩淋瀝不止或因酸鹹不節傷蠹榮衛衰弱亦變崩中若小腹滿痛肝經已壞為難治急服固經丸止之陳無擇評曰血崩不是輕病產後有此是謂重傷恐不止酸鹹不節而能致之多因驚憂恚怒臟氣不平或產後服斷血藥早致惡血不消鬱滿作堅亦成崩中固經丸自難責效不若大料煮川芎湯加芍藥候定續次隨證諸藥治之為得薛氏曰前證若血滯小腹脹滿用失笑散血少小腹虛痞川芎湯肝火血妄行加味逍遙散脾郁不統血加味歸脾湯脾氣虛不攝血補中益氣湯厚味積熱傷血清胃散加槐花風熱相搏傷血四君子加防風枳殼一產婦血崩小腹脹痛用破氣行血之劑其崩如湧四肢不收惡寒嘔吐大便頻瀉余用六君加炮黑乾薑四劑稍愈見症在脾胃故用六君加炮姜又以十全大補三十餘劑而痊一產婦血崩因怒其血如湧仆地口噤目斜手足抽搐此肝經血耗生風余用六味丸料一劑諸證悉退但食少晡熱佐以四君柴胡牡丹皮而愈芎歸加芍藥湯治產後血崩眩暈不知人事方見前惡露不絕加味四物湯治產後血崩如豆汁紫黑過多者方見前惡露不絕奇效四物湯治產後血崩素有熱者方見血崩門干熟地黃散治產後崩中頭目旋暈神思昏迷四肢煩亂不知人事崩久虛脫者宜之干熟地黃黃耆伏龍肝赤石脂各一兩當歸七錢半川芎阿膠艾葉白朮人參甘草各半兩上㕮咀每服四錢生薑三片水煎溫服阿膠丸治產後崩中下血不止虛羸無力阿膠赤石脂各一兩半續斷川芎當歸丹參甘草各一兩龍骨鹿茸酥炙烏賊魚骨鱉甲炙各一兩上為細末煉蜜丸如桐子大空心溫酒二三十丸一派固血不用補氣尤妙在鹿茸謂其能引血上升也瑞蓮散治產後惡血崩漏狀如湧泉瑞蓮一百枚燒灰存性棕櫚燒存性當歸各一兩官桂半兩檳榔二枚川芎鯉魚鱗各七錢半亦燒灰用上為細末每服三錢煨生薑酒調服如未止更進一服或非時血崩無藥可治但進三服即止固經丸治產後血氣未復而有房事及勞役傷損致血暴崩或淋瀝不止溫澀之劑固脫以暖下元艾葉赤石脂煅補骨脂炒木賊各半兩附子一枚炮去皮上為細末糊丸如桐子大每服二十丸溫酒或米飲下千金方治產後崩中下血不止此方惟心氣鬱者宜之菖蒲一兩半銼酒二盅煎一盅去渣分三服食前下心痛大全云產後心痛心痛曰產後則與尋常之病不同矣當於血分求之為陰血虧損隨火上衝心絡名曰心胞絡痛宜大岩蜜湯治之若寒傷心經名曰真心痛朝發夕死夕發朝死無藥可救薛氏曰前證若陽氣虛寒用岩蜜湯溫之瘀血上衝用失笑散散之血既散而痛仍作用八珍湯補之大凡心腹作痛以手按之卻不痛此血虛也須用補養之劑一產婦患前證昏憒口噤冷汗不止手足厥逆用六君子加附子一錢以回其陽二劑頓蘇又以十全大補湯養其血氣而安一產婦患前證手不敢近腹用失笑散一服下瘀血而愈次日復痛亦用前藥而安一產婦患前證用大黃等藥其血雖下復患頭痛發熱惡寒次日昏憒自以兩手堅護其腹不得診脈視其面色青白余謂脾氣虛寒而痛也用六君子湯加薑桂而痛止又用八珍湯加薑桂而安大岩蜜湯一名桂心湯治素有宿寒因產大虛寒搏於血血凝不散上衝心之絡脈故作心痛書病緣明甚熟地黃當歸酒浸獨活吳茱萸炒白芍炒乾薑桂心不見火遠志各一錢細辛甘草各五分上銼水煎服或云熟地泥膈安能去痛合用生乾地黃失笑散治產後惡血上攻心腹絞痛欲死及兒枕痛或牙關緊急一服可愈果驗蒲黃炒五靈脂各一錢上為細末作一服用釅醋調膏入水一盞煎服金黃散治惡血上衝心腹作痛或發熱作渴玄胡索蒲黃各一錢桂心二分上為末酒調服火龍散治產後氣滯心痛茴香炒川楝子炒各一兩艾葉鹽炒半兩上為末水煎服伏龍肝散治產後惡物不出上攻心痛赤伏龍肝研細每服三五錢溫酒調下瀉出惡物立止一方治產後惡血衝心痛氣悶欲絕用桂心三兩搗為細末狗膽汁和丸狗膽能破瘀血同桂心更治絕悶妙如櫻桃大每服二丸熱酒調下不拘時一方治產後血不盡心腹痛荷葉炒令香為末水煎下方寸匕腹痛並小腹痛薛氏曰產後小腹作痛俗名兒枕塊用失笑散行散之按腹痛原文尚有數症曰因氣滯用玄胡索散因外寒用五積散因怒氣用四物加木香柴胡因陽氣虛弱用四君當歸炮姜因脾虛血弱用六君當歸炮姜若惡露既去而仍痛用四神散調之若不應用八珍湯若痛而噁心或欲作嘔用六君子湯若痛而泄瀉用六君子湯送四神丸若泄瀉痛而後或後重用補中益氣湯送四神丸若胸膈飽脹惡食吞酸或腹痛手不可按此是飲食所致用二陳加山楂白朮以消導若食既消而仍痛或按之不痛或更加頭痛煩熱作渴惡寒欲嘔等證此是中氣被傷宜補脾胃為主若發熱腹痛按之痛甚不惡食不吞酸此是瘀血停滯用失笑散消之若止是發熱頭痛或兼腹痛按之卻不痛此屬血虛用四物加炮薑參術以補之如發渴用白虎發渴恐屬血虛用白虎宜慎東垣云血虛忌白虎氣弱用黃耆血刺痛則用當歸腹中痛則加芍藥宜詳察脈證而用之一產婦腹痛發熱氣口脈大余以為飲食停滯不信乃破血補虛因實成虛因虛投補當與勿當醫者病者兩責之幸勿誤也反寒熱頭痛嘔吐涎沫又用降火化痰理氣四肢逆冷泄瀉下墜始悔問余曰何也余曰此脾胃虛之變證也法當溫補遂用六君子加炮姜二錢肉桂木香各一錢四劑諸症悉退再用補中益氣之劑元氣遂復一婦人產後腹痛後重去痢無度形體倦怠飲食不甘懷抱久郁患繭唇繭唇因虛宜以脈症參之寐而盜汗如雨竟夜不敢寐神思消爍余曰氣血虛而有熱用當歸六黃湯納黃芩黃柏炒黑一劑汗頓止再劑全止乃用歸脾湯八珍散兼服元氣漸復而愈一產婦小腹作痛服行氣破血之藥不效其脈洪數此瘀血內潰為膿也以瓜子仁湯二劑痛止更以太乙膏下膿而愈產後多有此病縱非癰用之更效一產婦小腹痛小便不利用薏苡仁湯二劑痛止更以四物加紅花桃仁下瘀血而愈大抵此證皆因榮衛不調或瘀血停滯所致若脈洪數已有膿脈但數微有膿脈遲緊乃有瘀血下之即愈若腹脹大轉側作水聲或膿從臍出或從大便出宜用蠟礬丸太乙膏及托裡散一產婦小腹作痛有塊脈芤而澀以四物加玄胡紅花桃仁牛膝木香治之而愈一婦產後小腹患痛服瓜子仁湯下瘀血而痊凡瘀血停滯宜急治之緩則腐化為膿最難治療若流注關節則患骨疽失治多為敗症一婦人寒月中產後腹大痛覺有塊百方不治一人教以羊肉四兩熟地二兩生薑一兩水煎服之二三次愈曰覺有塊想是寒氣乘虛而聚非真實癥也不然何以羊肉熟地愈哉大全云兒枕者由母胎中宿有血塊因產時其血破散與兒俱下則無患也若產婦臟腑風冷使血凝滯在於小腹不能流通則令結聚疼痛名之曰兒枕全匱云產後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱切脈微實再倍發熱日晡時煩躁者不食食則譫語至夜即愈宜大承氣湯主之熱則里結在膀胱也既曰惡露不盡不大便而躁熱矣然不用桃仁承氣而用大承氣者何蓋熱結在膀胱故宜大承氣也大全云產後惡血雖常通行或因外感五邪內傷七氣致令斬然而止余血壅滯所下不盡故令腹痛當審其因而治之一產婦小腹痛甚牙關緊急此瘀血內停灌以失笑散下血而蘇又用四物加炮薑白朮陳皮而愈一婦人經水來比常度過多不止遂用澀藥止之致腹作痛此乃氣血凝滯也用失笑散二服而愈以上數段言惡露不盡余按金匱所治重在傷寒裡實不重在惡露故其脈證皆指實熱言當以無太陽證句及熱結膀胱句玩之便得其意後案專主惡露言故與前方不同不可一律看也大全云以惡露不盡腹痛及兒枕心腹刺痛小腹疼痛寒疝分為四門寒疝大全云產後臍腹痛乃冷氣乘虛用當歸建中湯無擇曰產當寒月入門臍下痛手不可近者羊肉湯立齋曰前症若脾胃虛寒邪侵者蟠蔥散若肝經濕熱小便不利者瀉肝湯亦所當知毋膠一也由母胎中宿有血塊產後不與兒俱下而仍在腹作痛謂之兒枕其惡露下不快而作痛者胎中原無積聚不為兒枕也若惡露已盡或由他故腹痛如仲景枳實芍藥散證或由血虛腹痛如仲景當歸生薑羊肉湯證自當別論故復臚列諸名方於後若服枳實芍藥散不愈仍當求責瘀血也故下瘀血諸方附焉而補虛諸方終之不復立寒疝條加味四物湯治產後惡露不盡腹痛當歸川芎芍藥熟地各一錢香附炒五靈脂炒二味另為末各一錢臨服調入上銼一服水煎服痛甚者加桃仁泥四分海藏方四物湯加玄胡索沒藥白芷治產後敗血作痛此所加幾種藥少有差等在自擇之一方四和湯加苦楝一方四物湯加玄胡索一方四物湯加蒲黃當歸蒲延散治產後血瘕作痛臍下脹滿或月經不行發熱體倦當歸八分桂心芍藥炒血竭蒲黃炒各六分玄胡索炒四分上為末每服二錢空心酒調下桂心血竭治血瘕妙玄胡索散治產後惡血攻刺腹痛及一切血氣刺痛不論新舊虛實皆可服之當歸酒浸玄胡索赤芍蒲黃隔紙炒桂皮乳香沒藥各等分上研為細末每服三錢溫酒調空心服延胡散治產後兒枕腹痛玄胡索當歸各一兩赤芍五錢肉桂七錢半蒲黃炒琥珀各二錢半紅藍花二錢更加紅藍琥珀治兒枕尤妙上為末每服三錢童便合酒調食前服烏金散治惡露敗血走刺心腹兒枕痛坐臥不得余血不快川芎七錢半燒燃蓋甑中存性黑附子半枚炮去皮臍用燒川芎黑附者溫血海之裡也上為細末每三錢童便和酒調服痛止血下方住服地黃散治產後惡血不盡腹中絞痛生地黃炒當歸炒各一兩生薑五錢切碎新瓦上炒令焦黑上為細末姜酒調下二錢空心服一方加蒲黃為丸四神散治產後瘀血不消積聚不散作塊心腹切痛當歸乾薑炮川芎赤芍炒各等分上為末每服二錢溫酒調下黑神散治產後血塊痛熟地黃一斤陳生薑半斤上二味拌勻同炒乾為末每服二錢烏梅湯調下常服酒調丹溪方治產後血塊痛發熱五靈脂四錢炒牡丹皮沒藥滑石上研細分五帖豆淋酒下之食前服卷荷散治產後血上衝心血刺血暈血氣腹痛惡露不快並皆治之初出卷荷紅花當歸各一錢蒲黃紙炒牡丹皮各半兩上為細末每服三錢空心鹽酒調下荷葉散治產後惡露不下腹中疼痛心神煩悶乾荷葉二兩劉寄奴蒲黃各一兩桃仁去皮尖麩炒半兩上㕮咀每服四錢童子小便一盞生薑三片生地黃一分煎至六分熱服不拘時均是破血藥而治煩悶之症則童便生地尤佳一方有鬼箭羽隱居澤蘭湯治產後惡露腹痛或胸滿少氣澤蘭炒澤蘭理血氣聖藥生地黃當歸芍藥炒生薑各一錢甘草五分大棗四枚上銼水煎服又方治產後下血不盡腹內堅痛不可忍當歸芍藥桂心各三兩桃仁一百二十粒制上水六升煮二升溫分二服未瘥加大黃妙在加大黃然以醋製者佳又方治產後惡露不盡結聚小腹疼痛當歸七錢半香附子制一兩赤芍青皮木香桂心琥珀沒藥各半兩上為細末以烏豆淋酒調服二錢產寶湯治產後余血作痛兼塊者桂心薑黃各等分上為細末酒調方寸匕血下盡妙延胡索散一名三聖散又名如神湯治產後臍下痛並腰疼玄胡索桂心各半兩當歸一兩上為細末熱酒調下二錢香桂散治產後臍下疼痛不止當歸川芎各二錢半桂心半兩上為細末分為三服每服酒一盞煎三五沸更入童便少許煎至七分溫服甚者不過再服即瘥當歸血竭丸治產後惡露不下結聚成塊心胸痞悶及臍下堅痛破血為主當歸血竭芍藥蓬朮炮各二兩五靈脂四兩上為細末醋糊和丸如梧桐子大每服五十丸食前溫酒送下當歸養血丸治產後惡血不散發渴心腹疼痛及惡露不快臍下急痛連及腰足疼痛凡產後腳腰疼痛屬瘀血流注者多今人不知往往誤治而以大補為主遂至日久不治又或有風寒襲之者亦不可驟補也此方行瘀最良去風未善別宜簡擇當歸赤芍牡丹皮玄胡各二兩桂心一兩上為末煉蜜丸如桐子大空心酒下三四十丸痛甚者細嚼下紫金丸治產後惡露不快腰腹小腹如刺時作寒熱頭痛不思飲食亦治久有瘀血月水不調亦可療心痛產後瘀血要藥即失笑散之變五靈脂水淘去土石焙乾炒為末真蒲黃各等分上以好米醋調五靈脂慢火熬成膏次以蒲黃末搜和丸如櫻桃大每服一丸水與童便各半盞煎至七分令藥化溫服之少頃再一服惡露即下久有瘀血成塊月信不利者並用酒磨下玉燭散治產後惡露不盡臍腹疼痛大便燥結時發寒熱當歸川芎赤芍熟地大黃朴硝甘草各一錢半上作一服水煎食前溫服此河間法也四物合大承氣主之蓋咸走血之意諸方治敗血作痛皆是溫劑熱則流通之理惟此一方卻是涼劑蓋為敗血凝滯發熱大便燥結者設也非大便燥結者慎不可用枳實芍藥散金匱云產後腹痛煩滿不得臥此方主之一貴內產後脈沉小如絲腹痛不能食聞藥則嘔以此方三服而愈枳實炒令黑勿太過芍藥各等分上杵為散服方寸匕日三服並主癰膿以麥粥下之下瘀血湯產婦腹痛法當以枳實芍藥散假令不愈者此為腹中有乾血著臍下宜此方此仲景方也又為經水不利要藥大黃二兩桃仁二十枚䗪蟲二十枚炒去足上三味末煉蜜和為四丸以酒一升煎一丸取八合頓服之新血下如豚肝豚肝者即乾血之下也新血二字非保命方治血暈血結或聚於胸中或偏於小腹或連於脅肋四物湯四兩倍當歸川芎加鬼箭羽紅花玄胡各一兩同為粗末加下四味煎調沒藥散服虻蟲二錢去翅足炒水蛭一錢炒麝香少許沒藥上為末入前藥調服血下痛止則服一服千金桃仁芍藥湯治產後腹痛桃仁芍藥川芎當歸桂心乾漆碎炒甘草各二兩上細切水八升煮二升半分三服以上治瘀血腹痛之劑皆重劑宜斟酌用之增損四物湯治產後陰陽不和乍寒乍熱惡露停滯亦令寒熱但看小腹急痛為異當歸酒浸白芍川芎人參各一兩乾薑一兩甘草炙半兩上㕮咀每服四錢姜三片水煎無時熱服獨聖散治產後血虛腹痛當歸一味為細末每服二錢水一盞煎七分溫服此方簡易自有獨見而當歸又能治洒洒寒熱不已當歸散治產後陰血虛弱或氣滯血凝以致發熱腹痛或腹脅脹滿當歸乾薑各等分上銼每服三錢水煎服定痛散治產後惡血不止當歸芍藥炒各二錢肉桂一錢上切作一服水酒各一盞半加生薑五片煎一盞服當歸建中湯治婦人產後虛羸不足腹中刺痛不止吸吸少氣或苦少腹中急痛引腰背不能飲食當歸四兩芍藥炒六兩桂枝三兩甘草炙二兩生薑三兩大棗十二枚上六味以水一斗煮取三升分溫三服一日令盡內衄不止加地黃阿膠似矣但本方有桂枝生薑得無太熱乎請酌之若大虛加飴糖六兩湯成納於火上暖令飴消若去血過多崩傷內衄不止加地黃六兩阿膠二兩合八味湯納阿膠服之羊肉湯治產婦脾虛為寒邪所乘以致腹痛及寒月生產寒氣入於產門臍下脹滿手不可犯精羯羊肉四兩當歸川芎各半兩生薑一兩上以水十盞酒三盞煎至四盞分四次空心服加蔥鹽亦可衍義云一婦人產當寒月寒氣入於產門臍下脹痛手不可犯此寒疝也醫當治之以抵當湯謂其有瘀血耳予教之曰非其治也可服張仲景羊肉湯少減作二服愈千金方治產後余疾腹中絞痛瘦乏不下食與前增損四物湯相上下用者當合觀之當歸黃耆芍藥各六錢乾地黃白朮各八分桂心甘草各四分大棗十四枚上㕮咀水二升煮八合空心服忌生冷以上治虛寒腹痛之劑生料五積散治產後內有餘血外感寒邪相搏而腹痛蒼朮二錢四分麻黃去根節橘紅枳殼各六錢桔梗一錢二分厚朴乾薑炮各四錢當歸白芍川芎白茯苓半夏白芷肉桂甘草炙各三分上加薑蔥水煎服上方治寒邪腹痛之劑非真受寒氣者不可輕用脅脹痛大全云產後兩脅脹滿氣痛由膀胱宿有停水因產後惡露下不盡水壅痞與氣相搏積在膀胱故令脅肋脹滿氣與水相激故令痛也脅脹痛由膀胱停水所致是何見解用何湯藥宜考之薛氏曰前症若肝經血瘀用玄胡索散玄胡索散見前腹痛條若肝經氣滯用四君青皮柴胡若肝經血虛用四物參朮柴胡俱屬肝經而有勝克乘制之異故治不同氣血俱虛用八珍柴胡若腎水不足不能生肝用六味丸若肺金勢盛剋制肝木用瀉白湯仍參前論主之一產婦因怒兩脅脹痛吐血甚多發熱惡寒胸腹脹痛余以為氣血俱虛用八珍加柴胡丹皮炮姜而血頓止又用十全大補湯而寒熱漸退此症苟非用薑桂辛溫助脾肺以行藥勢不惟無以施功而反助其脹矣乾地黃湯治產後兩脅滿脹兼除百病乾地黃芍藥各三兩當歸蒲黃各二兩桂心六兩世謂木得桂而枯故用之以治脅痛然不可不審寒熱虛實也此方以桂心為君而以血藥為鋪用之以溫肝家血寒之痛則可用之以治肝火作痛則不可須詳辨之生薑亦然甘草一兩生薑五兩大棗二十枚上㕮咀以水一斗煮取二分半分服日三經效方治產後肝經氣滯氣滯二字盡之不平脅肋脹痛或寒熱往來內熱晡熱當歸一錢半芍藥炒苦梗檳榔枳殼麩炒各八分桂心青木香柴胡各六分上銼水煎服蘇葛湯療產後惡露不下血氣壅痞脅脹痛不下食蘇木柴葛各十二分芍藥當歸各八分桂心蒲黃各六分生地黃汁三合上㕮咀以水二升煎七合下蒲黃分兩服經效方理血氣煩悶脅肋脹滿及痛行血為主芍藥八分當歸六分玄胡索蒲黃各四分荷葉蒡炙三枚上水二升煎取七合後入蒲黃空心分二服當歸散治產後腹痛脅肋脹滿當歸乾薑各等分上為末酒服三錢水煎入鹽醋少許食前熱服一方酒煎廣濟方療產後腹痛氣脹脅下悶不下食兼微利此方治氣血虛滯脾胃不足者尤宜厚朴八分人參當歸茯苓甘草各六分陳皮生薑各四分上㕮咀以水二升煎取八合去滓分溫服抵聖湯治產後腹脅悶滿或嘔吐者赤芍半夏澤蘭葉陳皮人參甘草各等分上㕮咀每服四錢姜五片水煎溫服以上七方並無川芎豈脅痛者不宜歟要知此竅此理腰痛大全云腎主腰腳產後腰痛者為女人腎位繫於胞產則勞傷腎氣損動胞絡虛未平復而風冷客之冷氣乘腰故令腰痛也若寒冷邪氣連滯背脊則痛久未已後忽有娠必至損動蓋胞絡屬腎腎主腰故也薛氏曰前證真氣虛邪乘之者用當歸黃耆湯或十全大補湯為主佐以寄生湯如不應用十全大補加附子一產婦腰痛腹脹善噫諸藥皆嘔余以為脾虛血弱用白朮一味炒黃每劑一兩米泔煎飲時匙許四劑後漸安百餘劑而愈諸藥皆嘔但用白朮而分兩煎法服法皆妙當歸黃耆湯治產後失血過多腰痛身熱自汗當歸二兩黃耆白芍炒各二兩上㕮咀每服六錢加生薑五片水一盞半煎至一盞溫服不拘時玄胡四物湯治血癖腹痛及血刺腰痛當歸川芎白芍熟地各七錢半玄胡索酒煮二兩上為細末每服三錢酒調下如神湯治產後瘀血腰疼玄胡索當歸桂心各等分上水煎服又如神湯即生料五積散加桃仁逐敗血去風濕五積散方見前腹痛條廣濟方治產後虛冷血氣流入腰腿痛不可轉敗醬血凝者宜之惜敗醬之難覓也當歸各八分川芎芍藥桂心各六分上㕮咀水二升煮取八合分溫二服忌蔥寄生防風湯治產後風邪頭眩腰痛不可轉側四肢沉重行步艱難此方治久痛之因外感者獨活川芎芍藥炒黃桂心續斷生薑桑寄生各六分當歸防風各八分上銼水煎服桃仁湯治產後惡露方行忽然漸少斷續不來腰中重痛或流注兩股痛如錐刺此由血滯於經絡不即通之必作癰疽宜桃仁湯恐作癰者預服五香連翹湯桃仁去皮尖蘇木生地各半兩虻蟲炒去翅足水蛭炒各三十個上每服三錢水煎空心熱服惡露下即住服五香連翹湯治產後瘀血腰痛作癰木香丁香沉香乳香麝香升麻獨活桑寄生連翹木通各二兩上為粗末每服五錢水煎入竹瀝少許服既為瘀血何以只用五香行氣蓋為病血於氣也麝香分兩恐誤頭痛大全云夫頭者諸陽之會也凡產後五臟皆虛胃氣虧弱飲食不充穀氣尚乏則令虛熱陽氣不守上湊於頭陽實陰虛則令頭痛也又有產後敗血頭痛不可不知黑龍丹言之甚詳薛氏曰前證若中氣虛用補中益氣湯加蔓荊子若血虛用四物加參朮血氣俱虛用八珍湯若因風寒所傷用補中益氣湯加川芎以風寒所傷而用補中益氣尚須斟酌一產婦患頭痛日用補中益氣湯不缺已三年矣稍勞則惡寒內熱為陽氣虛以前湯加附子一錢數劑不發一婦人產後頭痛面青二年矣日服四物等藥余謂腎水不能生肝木而血虛用六味丸加五味子兩月而瘥郭茂恂嫂金華君產七日不食始言頭痛頭痛已又心痛作既而目睛痛如割如刺更作更止相去無瞬息間每頭痛甚欲取大石壓良久漸定心痛作則以十指抓臂血流滿掌痛定目復痛又以兩手自剜取之如是十日不已眾醫無計進黑龍丹半粒黑龍丹見胞衣不下條疾少間中夜再服乃瞑目寢如平時至清晨下一行約三升許如蝗蟲子三疾減半巳刻又行如前則頓愈矣此蟲咬痛也不如用殺蟲藥更神效一奇散即芎歸湯治產後血虛頭痛當歸川芎各二錢半上為細末每服二錢水一盞煎七分溫服芎烏散治產後氣滯頭痛天台烏藥大川芎各等分上為細末每服三錢燒紅秤錘淬酒調服服法佳芎附散治產後氣虛頭痛及敗血作梗頭痛諸藥不效者川芎一兩大附子一個去皮臍切四片拌釅醋一碗炙附子蘸醋盡為度上為末每服二錢清茶調服加減四物湯治產後頭痛血虛痰癖寒厥皆令頭痛產後頭痛至於血虛正治也求之瘀血實法也似瘀血而非瘀血反下如蝗蟲子者怪也若痰癖寒厥氣虛則又尋之雜症矣經曰有者求之無者求之豈可執一哉知常知變斯為上工矣蒼朮一兩六錢羌活川芎防風香附炒白芷各一兩石膏二兩半細辛一兩半當歸甘草各五錢上銼每服一兩水煎服無時如有汗者知氣虛頭痛也加芍藥三兩桂一兩半生薑煎如熱痰頭痛加白芷三兩石膏三兩知母一兩如寒厥頭痛加天麻三兩附子一兩半生薑三片煎服遍身疼痛大全云產後遍身疼痛者何答曰產後百節開張血脈流散遇氣弱則經絡肉分之間血多流滯累日不散則骨節不利筋脈急引故腰背不得轉側手足不能動搖身熱頭痛也若醫以為傷寒治之則汗出而筋脈動惕手足厥冷變生他症但服趁痛散除之氣弱血滯之痛不可作傷寒治是矣而血虛風寒之痛乃不論及何耶詳後五積散方即是薛氏曰前證若以手按而痛甚按法甚妙是血滯也用四物炮姜紅花桃仁澤蘭補而散之若按而痛稍緩是血虛也用四物炮姜人參白朮補而養之一產婦身腹作痛發熱不食煩躁不寐盜汗脅痛服解散祛血之藥不時昏憒六脈洪大如無用補中益氣加炮姜半夏一劑頓退二三又劑寢食甘美但背強而痛用八珍散大補湯調理而安一產婦遍身頭項作痛惡寒拘急脈浮緊此風寒之證也用五積散一劑汗出而愈但倦怠發熱此邪風去而真氣虛也用八珍湯調補而痊一婦六月產後多汗人倦不敢袒被故汗出被裡冷則浸漬得風濕疼痛遂以羌活續斷湯數服而愈趁痛散治產後氣弱血滯筋脈拘攣腰背強直遍身疼痛當歸官桂白朮黃耆獨活牛膝生薑各五錢甘草炙韭白各三錢半上㕮咀每服五錢水煎服此方根氣弱來故用耆朮若外感重者不可輕用加桑寄生半兩尤佳五積散治產後身痛兼感寒傷食方見前腹痛條與四物湯各半服之穩當加味四物湯治產後血虛身痛當歸川芎人參芍藥熟地白朮乾薑炮各一錢上銼作一服水煎服大全方治產後遍身青腫疼痛及眾疾此專治血流諸經青腫作痛牛膝大麥蘖各等分上為細末以新瓦罐子中填一重麥蘖一重牛膝如此填滿用鹽泥固濟火煅過赤放冷研為散但是產後諸疾熱酒調下二錢只此四方類集有法目之令人心賞腳氣大全云產後熱悶氣上轉為腳氣者何答曰產臥血虛生熱復因春夏取涼過多地之蒸濕因足履之所以著為腳氣其狀熱悶掣瘲驚悸心煩嘔吐氣上皆其候也可服小續命湯方見後中風條兩三劑必愈若醫者誤以逐敗血藥攻之則血去而疾愈增矣陳無擇評曰腳氣固是常病未聞產後能轉為者往讀千金見產婦多有此疾之語便出是證文辭害意蓋可見矣設是熱悶氣上如何便服續命湯此藥本主少陽經中風非均治諸經腳氣要須依腳氣方論陰陽經絡調之此涉專門未易輕論既非產後要病更不繁引準繩云陳無擇雖有此論然小續命湯加減與之用無不效故百問云寒中三陽所患必冷小續命湯主之加生薑汁更快暑中三陰所患必熱小續命湯去附子減桂一半大煩躁者紫雪最良予取百問中加減法庶使後人均得治療如無紫雪用真薄荷煎冷水嚼下樓云諸方必與四物湯各半服之薛氏曰前證當補氣血為主佐以小續命湯寄生湯如不應用大防風湯一產婦患前證或用獨活寄生湯而痊後復作服前湯其汗如水更加口噤吐痰余用十全大補湯倍養血氣漸愈後飲食日少肌體日瘦吐痰如湧此命門火衰脾土虛寒用八味丸及加味歸脾湯諸症漸退肌肉漸生獨活寄生湯治肝腎虛弱或久履濕冷之地或洗足當風濕毒內攻兩脛緩縱攣痛痹弱或皮肉紫破足膝攣重又專治產後腳氣川獨活三兩桑寄生如無以續斷代杜仲炒牛膝去蘆酒浸細辛官桂不見火白茯苓防風川芎當歸人參熟地黃酒洗芍藥秦艽各二兩甘草炙一兩上㕮咀每服四錢姜五片水煎溫服大防風湯治陰虛邪襲腿膝腫痛等證按二方俱小續命湯變法但去麻黃而佐四物是不捨產後二字防風附子炮牛膝酒浸白朮炒羌活人參肉桂黃耆炒各一錢川芎熟地各一錢芍藥炒杜仲薑汁炒甘草炙各五分上銼水煎服
