body:
  text: 卷之三赤白帶下門論帶下由勞傷衝任嚴氏曰巢氏病源論婦人有三十六疾者七癥八瘕九痛十二帶下也凡巢氏所論不可稽者什九即此言亦無診治之法何可憑也而帶下不顯其證今人唯知赤白二帶耳此由勞傷衝任風冷據於胞絡婦人平居血欲常多氣欲常少百疾不生或氣倍倍字作滯字看於血氣倍生寒血不化赤遂成白帶若氣平血少血少生熱血不化紅遂成赤帶寒熱交併則赤白俱下二句透徹其脈右手尺浮浮為陽陽絕者無子若足冷帶下輕則漏下甚則崩中皆心不榮血肝不藏血所致宗脈經語其脈寸口弦而大弦則為減大則為芤減為寒芤為虛寒虛相搏其脈為革主半產漏下又尺寸脈虛者漏血漏血脈浮者不可治產寶云帶下三十六疾者是十二癥九痛七害五傷三固謂之三十六疾也雖分三十六種總是冷熱微甚所致故後人只以赤白二癥總之十二癥者是所下之物一者如膏二者如青血三者如紫汁四如赤皮五如膿痂六如豆汁七如葵羹八如凝血九如清血似水十如米泔十一如月浣十二如經度不應期也九痛者一陰中痛二陰中淋痛三小便痛四寒冷痛五月來時腹痛六氣滿來時足痛七汗出陰中如蟲齧痛八脅下皮痛九腰痛七害者一害食二害氣三害冷四害勞五害房六害妊七害睡五傷者一竅孔痛二寒冷痛三小腹痛四臟不仁五子門不正引背痛三固者月水閉塞不通其餘二者文缺不載而仲景所說三十六種疾皆由子臟冷熱勞損而夾下起於陰內也論帶下五色因風邪入於胞門良方云婦人帶下其名有五因經行產後風邪入胞門傳於臟腑而致之若傷足厥陰肝經色如青泥傷手少陰心經色如紅津傷手太陰肺經形如白涕傷足太陰脾經黃如爛瓜傷足少陰腎經黑如衃血人有帶脈橫於腰間如束帶之狀病生於此故名為帶胞門子戶即子宮俗所謂兒腸也其傳臟有徵傳腑無症豈二而一歟又曰病生於帶則臟腑之說似屬空文蓋以帶脈管束諸經故總結之究其治一也李氏曰平時陰陽過多及產後亡血下虛風邪乘虛入於胞絡宜暖宮丸加薑附吳茱萸心包絡與胞門不同其曰暖宮即非包絡豈胞門與包絡同也或黃耆建中湯去桂加當歸水煎吞苦楝丸白帶兼痛風者二陳湯加蒼柏南星牛膝川芎兼頭風鼻涕者蒼柏辛芎散白帶痛風以上兩方皆丹溪所定然專主於濕痰並無風邪入胞之治豈前人之言非也亦補未備耳論帶下屬濕熱冤結不散保命集云赤者熱入小腸白者熱入大腸原其本皆濕熱結於脈故津液湧溢是謂赤白帶下本不病結緣五經脈虛結熱屈滯於帶故女子臍下痛陰中綿綿而下也經曰任脈為病男子內結七疝女子帶下瘕聚此指任帶二脈而言其曰熱入大小腸之論無據當從邪入胞門致傳臟腑結於帶脈之說為正王注云任脈自胞上過帶脈貫於臍上故男子內結七疝女子帶下帶脈起於季脅章門似束帶狀今濕熱冤結不散故為病也經曰脾傳之腎名曰疝瘕小腸冤結而痛出白一名曰蠱所以為帶下冤結也冤屈也屈滯而病熱不散先以十棗湯下後服苦楝丸大延胡散調下之熱去濕除病自愈矣潔古云治帶下冤結而痛者先以十棗湯下之次服苦楝丸大延胡索散調之是先攻後補之法也湯見雜病痰飲大延胡索散方見產後腹痛條論帶下痰實宜吐下子和云一婦人病帶下連綿不絕白物或來已三載矣命予脈之診其兩手脈俱滑大而有力得六七至常上熱口乾眩暈時嘔酢水予知其實有寒痰在胸中以瓜蒂散吐出冷痰二三升皆酢水也間如黃涎狀如爛膠次以漿粥養其胃氣又次用導水禹功以瀉其下然後以淡劑滲泄之藥利其水道不數日而愈脈證俱屬實熱而曰寒痰者蓋為敗濁之液既聚成痰則與本氣不相和故痰積之久自成冷物曰寒痰者因病人自覺其冷而言然亦有熱者不可不明如酢水酸水也豈屬寒耶息城李左衙之妻病白帶如水窈漏中綿綿不絕臭穢之氣不可近面黃食減已三年矣諸醫皆云積冷陽起石硫黃薑附之藥重重燥補汙水轉多戴人斷之曰此帶濁水本熱乘太陽經其寒水不禁固故如此也夫水自高而趨下宜先絕其上源腎主秘藏熱乘之則堅凝之性失矣故不能秘藏而帶下絕其上源之法妙甚乃湧痰二三升次日下汙水斗余行三遍汗出周身至明旦病人云汙已不下矣次用寒涼之劑服及半載產一男丹溪云帶與漏俱是胃中痰積流下滲入膀胱積痰恐不能滲入膀胱若言濕熱則可無人知此只宜升提甚者上必用吐以提其氣下用二陳湯加白朮蒼朮仍用丸子肥人有帶多是濕痰用海石半夏南星炒柏青黛蒼朮川芎方中並無升提法惟川芎一味為血分升氣之藥瘦人帶病少如有多是熱用炒柏蛤粉滑石川芎青黛樗皮丹溪治帶與白濁同是男女之濕熱一也羅先生法或十棗湯或神佑丸或玉燭散皆可用之虛者不可峻攻實者可行潔古云治結痰白帶以小胃丹半飢半飽津液下數丸候鬱積行卻服補藥論帶下虛寒宜溫補李氏曰帶下有虛寒帶腥臭者因小水淋瀝不已淋漓不已屬虛寒然亦有虛熱者或崩中暴下或產後去血過多以致陰虧陽竭榮氣不升經脈凝澀衛氣下陷精氣累滯於下焦蘊積而成白滑如涕下流腥臭者黃耆建中湯去桂加當歸水煎吞苦楝丸久不止臍腹引陰冷痛者東垣固真丸虛中有火者補經固真湯大烏雞丸常用氣虛四君子湯血虛四物湯有火加黃柏有寒加桂附寒始因亡血復亡其陽陽氣虛極帶下腥臭多悲不樂陽虛故悲不樂桂附湯腹痛陰冷者四物湯加桂附常用酒煮當歸丸小烏雞丸琥珀調經丸韓氏曰飛霞醫案山妻年三十餘十八胎九殰八夭會先君松潘難作賤兄弟皆西奔妻驚憂過甚遂昏昏不省人事口唇舌皆瘡或至封喉下部虛脫白帶如注如此四十餘日或時少醒至欲自縊自悲不能堪醫或投涼劑解其上則下部疾愈甚或投熱劑及以湯藥熏蒸其下則熱暈欲絕四弟還脈之始知為亡陽證也大哭曰宗嗣未立幾誤殺吾嫂急以鹽煮大附子九錢為君用熱遠熱此從治也非具確見者不能用惜不言脈制以薄荷防風佐以薑桂芎歸之屬水煎入井水冷與之未盡劑鼾鼻熟睡通宵覺即能識人時止一嗣子二女相抱痛哭疏戚皆悲執友趙憲長驚曰君何術也弟曰方書有之假對假真對真爾上乃假熱故以假冷之藥從之下乃真冷故以真熱之藥反之斯上下和而病解矣有產後下瀉上則口舌喉瘡醫以理中丸用紫雪為衣服之兩病皆愈亦真對真假對假之意繼後主以女金丹錯綜以二三方不但去其疾且調治元氣庚午生一子今應襲也壬申生一子去年又患瘧疾十三月亦主以養元氣調生氣元氣是先天真氣生氣是後天穀氣待飲食大進然後劫以毒藥吐下塊物甚多投以附子湯三錢而愈不責效旦暮間其用女金丹即勝金丸也女金丹能令老婦妊娠方古蓋載而賦之得之異人倍加香附而視氣血之偏者又加薑黃條芩倍川芎之屬取效甚多予念無子者往往有之翻思予得子之難其苦何如乃次第錄其方並女金丹以濟人云女金丹即勝金丸方見求子論帶久枯涸宜潤補準繩云帶下久而枯涸者濡之凡大補氣血皆所以濡之血生於氣故有可兼四君者如以四物湯為末煉蜜丸梧子大空心米飲下三四十丸以療年高婦人白帶良驗皆潤劑也論帶下當以壯脾胃升陽氣為主薛氏曰徐用誠先生云帶下白屬氣而赤屬血東垣先生云血崩久則亡陽故白滑之物下流未必全拘於帶脈亦有濕痰流注下焦或腎肝陰淫之濕勝或因驚恐而木乘土位濁液下流或思慕為筋痿戴人以六脈滑大有力用宣導之法此瀉其實也東垣以脈微細沉緊或洪大而虛用補陽調經乃兼責其虛也丹溪用海石南星椿根皮之類乃治其濕痰也三說各主一見凡診治此症當須辯別前論五色分屬五臟而無治法此以五臟之中分治法分虛實尤見的據竊謂前證皆當壯脾胃升陽氣為主佐以各經見證之藥下數方為此翁家法色青者屬肝用小柴胡加山梔防風濕熱壅滯小便赤澀用龍膽瀉肝湯肝血不足或燥熱風熱用六味丸色赤者屬心用小柴胡加黃連山梔當歸思慮過傷用妙香散等藥色白者屬肺用補中益氣加山梔色黃者屬脾用六君子加山梔柴胡不應用歸脾湯色黑者屬腎用六味丸氣血俱虛八珍湯陽氣下陷補中益氣湯濕痰下注前湯加茯苓半夏蒼朮黃柏氣虛痰飲下注四七湯送六味丸不可拘肥人多痰瘦人多火而以燥濕瀉火之藥輕治之也肥痰瘦火之說為丹溪先生認病總訣何嘗教人泥定一方也雖不可輕治而火濕二字終莫能逃若以此穩當之言不可輕則潔古之十棗子和之汗吐下太無之神佑玉燭與小胃丹之類可輕用之歟予不敢為丹溪佞為欲止今之佞口耳一孀婦腹脹脅痛內熱晡熱月經不調肢體痠麻不時吐痰或用清氣化痰喉間不利帶下青黃腹脅膨脹又用行氣之劑胸膈不利肢體如麻此乃鬱怒傷損肝脾朝用歸脾湯以解脾郁生脾氣夕用加味逍遙散以生肝血清肝火百餘劑而愈一婦人久瘧兼帶發熱口乾體倦用七味白朮散加麥門五味大劑煎與恣飲再發稍可乃用補中益氣加茯苓半夏十餘劑而愈一婦人頭暈吐痰胸滿氣喘得食稍緩苦於白帶二十餘年矣諸藥不應此氣虛而痰飲也痰飲愈而帶自愈遂朝用六君子湯夕用六味地黃丸不月而愈立齋得力處在認症確未到處在不言脈惟以二十餘年之痰症故可用六君以補脾治濕用六味以治水泛為痰皆治本而納氣歸原者也但朝夕反用又其獨見也一婦人耳鳴胸痞內熱口乾喉中若有一核吞吐不利月經不調兼之帶下予以為肝脾鬱結用歸脾湯加半夏山梔升麻柴胡間以四七湯下白丸子而愈一婦人吞酸飽滿食少便泄月經不調服清氣化痰丸兩膝漸腫寒熱往來帶下黃白面萎體倦此脾胃俱虛濕痰下注用補中益氣倍用參朮加茯苓半夏炮姜而愈一婦人帶下四肢無力予曰四肢者土也此脾胃虛弱濕痰下注以補中益氣濟生歸脾二藥治之而愈一婦人帶下黃白怒則胸膈不利飲食少思或用消導利氣之藥痰喘胸滿大便下血予曰此因脾氣虧損不能攝血歸源用補中益氣加茯苓半夏炮姜四劑頓減又用八珍加柴胡山梔而痊以上七案內五症皆治濕痰而兼升補者以立齋名盛當時非久病必不延之故每以升補為效學立齋者須得此解不然徒讀甫書矣論帶久不止當補衛厚脾李氏曰凡崩中下帶或用升提如升陽調經湯或用收澀如伏龍肝散白芷散然暫止而終不止者蓋衛司開闔而為榮血之主脾胃為血海水液之會衛氣與胃氣俱虛則血液無所約制格理之言是以古方有用桂枝湯加附子以固衛氣者不善用古方者每非古方苟能解之便自能用四君子湯加草果丁香木香以燥水健脾者或用理中湯加陳皮半夏或單半夏丸用芎歸湯煎下或補中益氣湯平胃散皆補衛厚脾使氣血自循故轍而不專於收澀以劫奪之也收澀劫奪皆是奇兵用奇合宜便是正法此蓋重在正治然亦有可奇者不可偏廢也論帶下濕熱藥用正治從治之異方氏曰婦人赤白帶下多是怒氣傷肝夫肝屬木脾屬土肝邪乘脾木氣剋土則脾受傷而有濕木鬱不伸便以生濕濕而生熱熱則流通所以滑濁之物滲入膀胱從小便而出也闌門既能泌別清濁則滑濁之物未必皆為滲透入膀胱而從溺道出也如絞腸病豈由膀胱來耶丹溪作濕熱而用苦寒之藥治之者是矣雖然古人曾有用辛溫治之而愈者不知苦寒之藥正治之法也辛溫之藥從治之法也蓋濕熱怫鬱於內肚腹疼痛赤白帶下非辛溫從治而能開散之乎然濕熱未曾怫鬱但止赤白帶下不若用苦寒正治之為當也讀此論乃見今古治法不悖則丹溪之言亦補先賢未備之旨論帶下雜治法戴氏曰赤白帶下皆因七情內傷或下元虛冷感非一端元禮為丹溪弟子而相背如此自是一種翻案大率下白帶多間有下赤者並宜順氣散吞震靈丹仍佐艾附丸或米飲調沙參末帶下不止成尪羸者四物湯加煅牡蠣粉半錢吞固腸丸多服取效有帶疾愈後一二月或再發半年一發先血而後下帶來不可遏停蓄未幾又復傾瀉此名漏帶最為難治漏帶之名始此亦或升補可愈也下截之血少腹主之有因血虛而虛熱陷入小腸致小便澀痛色如白泔或成沙粒皆不可作淋治用冷劑宜以四物湯五苓飲各半帖和煎燥濕合煎此元禮獨創不讀此便不知用此論室女帶下產寶云未出女子有三病何也答曰女子一病者經水初下陰中熱或當風臥或扇風二病者太衝脈盛氣盛則內熱以冷水洗之三病者或見帶下驚怖者若三者一有所受後必有帶下之證也方用神仙聚寶丹排膿準繩云帶下並腸有敗膿淋漏不已腥穢殊甚遂至臍腹更增冷痛此蓋敗膿血所致卒無已期須以此排膿用白芷一兩單葉紅蜀葵根二兩白芍藥白礬燒枯各半兩為末同以蠟丸如桐子大空腹或飯前米飲下十丸或十五丸候膿盡仍別以補藥佐之此方白芷葵根排膿散血白芍生肌枯礬燥濕和以蜜蠟此生肌托裡之治也脈經曰婦人腸中有膿為榮衛相干血為敗濁有可下不可下之異宜參考之消瘀血仲景云問婦人年五十所病下利數十日不止暮即發熱小腹裡急腹滿手掌煩熱唇口乾燥何也師曰此病屬帶下何以故曾經半產瘀血在小腹不去何以知之其證唇口乾燥故知之當以溫經湯主之方見調經門問下痢而以半產瘀血在腹又曰屬帶下然非仲景之言不能信如暮熱小腹急滿為瘀血在內則可以掌熱煩燥口乾而用溫經藥則人皆難之況此湯有肉桂半夏吳茱萸誰肯信服論白濁白淫大全云婦人小便白濁白淫者皆由心腎不交養水火不升降或因勞傷於腎腎氣虛冷故也腎主水而開竅在陰陰為溲便之道胞冷腎損故有白濁白淫據此宜屬寒今皆主熱李氏曰白淫蓋緣思想無窮所願不得意淫於外入房太甚發為筋痿久為白淫此素問語以症白淫之所自筋痿者宗筋也惟久為淫縱者有之若婦人則無宗筋豈其竅道一也究其所因似亦不悖故此數方與治久濁同法謂白物淫如白精之狀不可誤作白帶過服熱藥又有日夜流津如清米泔或如黏膠者謂之白崩與白淫大同多憂思過度所致誠難治療用平補鎮心丹因思傷脾胃者四七湯下白丸子或歸脾湯痞悶少食者沉香降氣湯因勞傷腎氣心腎不交者金鎖正元丹小菟絲子丸威喜丸薛氏曰前證若元氣下陷用補中益氣湯脾胃虧損六君子加升麻柴胡脾經鬱結歸脾加黃柏山梔肝經怒火龍膽瀉肝湯虛則用加味逍遙散怒火有虛實實者瀉之故用龍膽虛者補之故用逍遙以逍遙有歸芍養血也宜與帶下參看主治一婦人善怒或小腹痞悶或寒熱往來或小便頻數時下白淫藥久不愈面青口苦予以為積憤而不能發散所致若論積憤當用木鬱達之之法用龍膽瀉肝湯而愈用加味逍遙散八珍湯而安脈法脈經云婦人帶下六極之病脈浮則為腸鳴腹滿緊則為腹中痛數則為陰中癢痛則生瘡弦則陰中掣痛婦人帶下脈浮惡寒者不治帶下不治症治濕熱帶下清白散治白帶得丹溪法然配四物似與瘦人多火者相宜當歸川芎白芍藥炒生地黃黃柏鹽水炒樗根皮酒炒貝母各一錢乾薑炒黑甘草各五分上銼加生薑三片水煎黃柏清下焦之熱樗皮燥下部之濕乾薑從火甘草和中若貝母者必有所兼症也肥白人多濕痰加白朮半夏赤帶加酒炒條芩荊芥久下加熟地黃牡蠣氣虛加人參黃耆腰腿痠痛加鹿角膠或只以二陳湯加蒼白朮如升膀胱之濕加升麻柴胡蒼白朮非升膀胱之濕蓋氣陷之濕也解帶散治血氣不調濕熱白帶四肢倦怠五心煩熱痰鬱嘈雜此大家法當歸身酒洗香附子醋炒各一錢五分白芍藥酒炒白朮土炒各一錢二分蒼朮白茯苓陳皮去白牡丹皮各一錢川芎玄胡索各八分甘草炙四分上銼一劑加生薑水煎空心服樗皮丸治赤白帶有濕熱者以下四方皆丹溪獨造均以清濕熱為主故用椿皮黃柏然芍藥收肝火良薑為從治而燒灰之法獨超於諸方奇哉芍藥五錢良薑三錢燒灰黃柏二錢俱燒成灰椿根皮一兩五錢上為末粥丸桐子大每服四五十丸空心米飲下勝濕丸治赤白帶因濕熱勝而下者蒼朮鹽炒白芍藥滑石炒各一兩椿根皮炒一兩乾薑煨二錢地榆五錢枳殼炒甘草各三錢上為末粥丸桐子大空心米飲下一百丸乾薑一方用二兩似誤此方加蒼朮以燥中宮地榆以溫下部枳殼寬氣於上滑石利濕於下乾薑從而燥濕也用二兩者非蒼曲樗皮丸治帶下主於胃中濕熱故立方如此椿根皮二兩芍藥一兩半蒼朮神麯炒麥皮曲炒黃柏炒各一兩滑石枳殼各半兩上為末粥丸桐子大每服五十丸空心米飲下側柏樗皮丸治白帶因七情所傷而脈數者以脈數為用黃連側柏不用蒼朮為其燥性多也燒白芷入陽明而有澀止之能白朮補中氣而有培土之妙其他不言喻矣椿根皮炒二兩香附子醋炒白芍藥白朮炒各一兩側柏葉酒蒸黃連炒黃柏炒各半兩白芷燒存性三錢上粥丸桐子大米飲下七十丸按椿根皮性涼而燥濕熱盛者宜之後一方有黃連香附木香故可治七情所傷苦楝丸治赤白帶下甚妙下部痛者尤宜苦楝碎酒浸蘹香炒一方大茴香當歸各等分上為末酒和丸如桐子大每服三五十丸空心溫酒下瘀血加桃仁血海寒加桂如腰腿疼四物湯四錢加羌活防風各一錢煎湯送下四神丸治帶下此方溫燥非有熱所宜香附四制八兩蒼朮泔浸牡蠣粉炒椿根皮蜜水炒砂仁炒各二兩上為末黃米煮飯丸桐子大每服五六十丸空心酒下以上諸方俱輕劑萬安散治女人赤白帶下或出白物如脂或有臭濁汙水並神效此利氣溫行之劑與寒濕相宜小茴香炒香木香各二錢半黑牽牛一兩另取頭末上為細末以生薑自然汁調二錢臨臥服取盡惡物為效未盡間日再服二錢後以白粥補之忌熱毒物大聖萬安散治女人癥瘕癖氣腹脹胸滿赤白帶下久患血氣虛弱萎黃無力並休息赤白痢疾並皆治之其效不可具述孕婦不可服天陰晦不可服白朮木香胡椒各二錢半陳皮去白黃耆桑白皮木通各五錢白牽牛炒取頭末二兩上為末每服二錢用生薑五片水一鍾半煎至一鍾去姜調藥臨臥服須臾又用薑湯或溫白湯飲三五口催之平明可行三五次取下惡物及臭汙水為度後以白粥補之服藥不可食晚飯及葷酒等物二方皆燥熱下氣導水之藥惟真寒濕者宜之宣明導水丸治濕熱鬱於下焦之分赤白帶下不止燥熱煩渴清熱滲濕導滯妙在氣血兩分大黃黃芩各二兩牽牛頭末滑石各四兩上為末水丸如桐子大每服四五十丸滾水下隨證加減以上諸方俱重劑治濕痰帶下滲濕消痰飲治濕熱痰積滲入膀胱曰滲入下焦則可曰入膀胱則不可白帶不止總治中州之濕蓋中焦清則無濕下流故帶自止豈有滲入之理白朮蒼朮炒半夏薑湯泡七次橘紅白茯苓白芷香附各一錢甘草炙五分上銼水煎服有熱加黃芩血虛加芎歸氣虛加參耆久不愈加升麻柴胡升提之蒼柏樗皮丸治肥人白帶是濕痰此去中焦之濕清下部之熱亦丹溪方也蒼朮黃柏樗根皮南星半夏海石川芎香附乾薑炮各等分暑月去乾薑加滑石上為末醋和丸如桐子大每服五六十丸白湯下小胃丹上可取胸膈之痰下可利腸胃之痰及濕痰熱痰並治婦人結痰白帶惟胃虛少食者忌用是導水之猛劑古人能用之今則不能也甘遂濕麵裹煨熟一方面裹長流水煮曬乾芫花好醋拌經宿瓦器內燒黑不可焦大戟長流水煮一時再用水洗淨曬乾各半兩黃柏炒一兩大黃濕紙裹煨勿令焦切焙乾再以酒潤炒熱焙乾一兩半上為末以白朮膏丸白朮膏為丸乃今人所制有獨創之妙可法如蘿蔔子大臨臥津液嚥下五七丸或白湯送下取膈上濕痰熱積以意消息之欲利空心服一方加木香檳榔各半兩補藥方治痰結白帶先以小胃丹半飢半飽津液嚥下數丸候郁開卻服此藥補之白朮二兩黃芩五錢紅白葵花二錢五分白芍藥七錢五分上為末蒸餅丸如桐子大每服三五十丸煎四物湯下此亦丹溪方乃扶脾胃養肝陰清熱而葵花之用取其傾心向日之意蓋花性陰而用陽一入氣分一入血分皆使其從陽升帶自止也一方有蒼朮無黃芩治風邪帶下胃風湯治風邪入於胞門或中經脈流傳臟腑帶下五色此方與十全大補湯少甘耆熟地為以其甘緩滯胃生濕故勿用也然無風藥而云治風邪入胞歟名胃風何也人參白朮茯苓當歸川芎芍藥肉桂各等分上銼每服八錢入粟米一撮水煎服腹痛加木香五積散去麻黃亦可用小柴胡湯治風邪帶下五色小柴胡少陽藥其曰治風邪豈肝膽熱而生風耶柴胡二錢黃芩半夏人參甘草各一錢上銼加生薑三片棗二枚水煎服色青屬肝加山梔防風色赤屬心加黃連山梔當歸色白屬肺用補中益氣湯加山梔色黃屬脾用六君子加山梔柴胡不應用歸脾湯色黑屬腎用六味地黃丸蒼柏參芎散治婦人上有頭風鼻涕下有白帶此又丹溪先生方也辛夷川芎蒼朮黃柏南星半夏滑石牡蠣黃芩酒炒上水煎食後服以芩夷川芎而治頭風以蒼柏星半滑牡而治帶平正無奇令人可法地榆散治漏下五色一十二帶此下部澀劑然以三兩醋煎自得單方用法果能治十二癥亦一家病也兼治嘔吐下血地榆三兩銼碎以醋水各半升煮十餘沸去渣食前稍熱服一合本草注云地榆主帶下十二病一曰多赤二曰多白三曰月水不通四曰陰蝕五曰子臟堅六曰子門澼七曰合陰陽患痛八曰小腹寒痛九曰子門閉十曰子宮冷十一曰夢與鬼交十二曰五臟五定治虛損帶下衛生湯治帶下不止脈微弱腹痛以下皆以正氣為本此亦建中法黃耆三兩當歸白芍藥炒各二兩甘草炙一兩上為粗末每服半兩水煎空心服一方下苦楝丸三十粒以腹痛故兼苦楝丸虛者加人參一兩補中益氣湯治勞役過度飲食不節損傷脾胃以致陽氣下陷白帶下久不止讀東垣先生書方知立方之旨讀立齋先生書又知善東垣之方黃耆人參白朮甘草炙各一錢當歸陳皮各七分升麻柴胡各三分上作一服水煎服六君子湯治胃虛有痰飲食減少中氣不和時時帶下人參白朮白茯苓甘草炙陳皮去白半夏湯泡七次各一錢上銼一服加生薑三片水煎服補中湯有升柴以升下陷之氣此方有茯苓半夏以燥中宮之痰歸脾湯治思慮過傷心脾以致健忘怔忡驚悸不寐怠惰嗜臥不思飲食時常白帶不止本方補心血以榮脾補其母也調肝氣以和下去其賊也母補賊去則脾氣健矣故曰歸脾昔真人云補脾不愈當先補心此方其近之方見血崩門勞傷條加味八珍湯治婦人氣血兩虛赤白帶下當歸川芎白芍藥酒炒生地黃人參白朮山藥炒杜仲酒炒白茯苓香附炒各一錢甘草炙五分上加烏梅一個生薑三片棗一枚水煎食前溫服肥人加半夏瘦人加黃柏飽悶去人參加砂仁腹痛去人參加小茴香玄胡冬月加煨乾姜日久元氣下陷加升麻柴胡升提之為總司者也其山藥杜仲烏梅又補帶脈之不足而加減法亦皆得理宜法之當歸澤蘭丸治婦人經脈不調赤白帶下久無子者平而當理亦可為調經聖藥宗之香附子用極大子杵去毛一斤分四分童便浸四兩酒浸四兩醋浸四兩米泔浸四兩各浸一宿取出曬乾當歸酒浸白芍藥川芎熟地黃酒洗生地黃各二兩艾葉澤蘭葉白朮各一兩半黃芩一兩上為末醋糊丸如赤小豆大每服六十丸空心白湯或酒下止帶丸補氣調血強腰益腎溫燥不偏與氣虛白帶相宜乃補塞中正法當歸酒洗川芎白朮人參山藥杜仲薑汁酒炒去絲香附破故紙酒炒牡蠣火煅椿根皮酒炒續斷各等分青黛減半上為細末煉蜜丸如桐子大每服五十丸空心米湯下腹痛加玄胡索小茴香肥人加薑製半夏瘦人加酒炒黃柏冬月加炮乾薑少許夏月加黃柏加法亦正嚴氏當歸煎治赤白帶下腹內疼痛不欲飲食日漸羸瘦當歸酒浸赤芍藥炒白芍藥炒熟地黃酒蒸炒阿膠炒續斷酒浸牡蠣煅各一兩地榆半兩上為末醋糊丸如桐子大每服五十丸空心米飲下要思何以四物中不用川芎又以何物而治腹痛又不欲食而何為不理脾胃豈立方者漫言歟須知用藥當求病原所以為之至治蓯蓉菟絲丸治赤白帶下此藥不熱不寒得其和平助陰生子肉蓯蓉酒浸菟絲子酒蒸覆盆子蛇床子各一兩二錢當歸酒洗白芍藥炒川芎各一兩牡蠣火煅烏賊骨各八錢五味子防風各六錢黃芩五錢艾葉三錢上為末煉蜜丸桐子大每服三四十丸鹽湯下早晚各進一服蓯蓉菟絲覆盆蛇床五味艾葉是溫補下元之藥牡蠣烏賊燥濕治帶防風升肝氣以勝濕黃芩清內熱以除濕歸芍川芎調血脈以滋榮惟下虛者宜之要知古人之方自有獨解不然何以男子藥而補婦人補宮丸治婦人諸虛不足久不妊娠骨熱形瘦崩中帶下並宜治之鹿角霜白芍藥白朮山藥香白芷白茯苓白薇牡蠣煅烏賊魚骨各等分上為末麵糊丸如桐子大每服五十丸空心米飲湯下此方以鹿霜白芍補血以山藥朮苓補氣以芷薇而治崩中淋露以牡賊而燥濕治帶此又別是一種意見然不用芎歸地黃者慮血藥濕潤也變局如此可不因事制宜丹溪方治白帶屬真陰虛者龜板炙枳子各二兩黃柏炒一兩香附子山茱萸苦參樗皮貝母各半兩白芍藥七錢半乾薑炒二錢半上為末酒糊丸如桐子大每服五十丸空心米飲下丹溪治帶主於熱生濕其意以腎主閉藏而下焦者肝腎主之然濕從中焦生故其方如此宜考本草而熟思之應變無窮可為執方者一洗塵千金方治帶下脈數者陰虛有熱也枸杞根一斤生地黃五兩一方五斤上二味以水一斗煮取五升分三服上二方補腎水真陰虛者宜之補真固經湯一婦白帶漏久服諸藥不效診得心胞尺脈極微其白帶流而不止脈訣云崩中日久為白帶漏下多時骨水枯言崩中者始病血崩不已久下則血少復亡其陽故白滑之物下流不止是本經血海將枯津液俱亡枯乾不能滋養筋骨以本經行經藥為引用為使以大辛甘油膩之藥潤其枯燥而滋益津液以大辛熱之氣味補其陽道生其血脈以苦寒之藥泄其肺而救其上熱傷氣以人參補之以微苦溫之藥佐而益元氣名曰補真固經湯人參乾薑各一錢生黃芩另銼郁李仁去皮尖研柴胡甘草炙各一錢橘皮不去白五分白葵花十六朵去萼上除黃芩外以水三大盞煎至一盞七分再入黃芩同煎至一盞去滓空心熱服候少時以早膳壓之凡東垣立方必原脈原證原藥然後沉思審處且又引前言為證故治病多效今不能然何怪乎病之不瘳也此方以用參姜益陽李仁葵花潤燥柴胡升清氣於下陳皮和胃氣於中生芩後煎妙其清涼不滯也非深思者不能主此方名曰補真蓋以真氣為主耳服法亦妙不可不知助陽湯治白帶下陰戶中痛控心而急痛身黃皮緩身重如山陰中如冰一名升陽燥濕湯柴胡一錢二分良薑二錢防風郁李仁乾薑甘草各一錢白葵花七朵陳皮生黃芩各五分上銼散只作一服水二盞煎至一盞食前熱服此治重在陰中如冰痛控於心故用良薑為君乾薑為佐不用參術者痛無補也柴防足以勝濕升陽葵李可以潤枯濕燥甘陳和中生芩涼氣分之熱能與前方參之自有見解上二方用葵花郁李仁之滑以潤燥蓋枯涸滯著者宜之治虛寒帶下元戎四物湯治婦人赤白帶下脈沉微腹痛或陰中痛四物湯四錢桂附子炮各五分上銼水煎食前服前方中多以氣分藥內加溫燥之味此又以血藥中加桂附要知不同之故在脈症上探討蓋人之病有氣血之殊故立方之師亦因事制宜也一方四物加蘹香桂玉仙散治赤白帶下乾薑焙黃白芍炒香附炒焦各一兩生甘草五錢上為細末每服三錢用水白酒調下乾薑用一兩是大劑大法後方止用四分之一又相徑庭矣均宜法之一方只用白芍酒炒二兩乾薑炮半兩為細末米飲調下二錢玄胡苦楝湯治臍下冷撮痛陰冷大寒白帶下玄胡索苦楝子各二分黃柏一分附子肉桂各三分甘草炙五分熟地黃一錢上作一服水煎食前溫服玄胡苦楝以治痛肉桂附子以溫寒熟地治臍下之虛黃柏從其性之所喜桂附湯治白帶腥臭多悲不樂大寒肉桂一錢附子三錢黃柏知母各五分上作一服水煎食遠熱服如少食常飽有時似腹脹加白芍藥半錢如不思飲食加五味子二十個多悲不樂者陰晦之象也故宜桂附以助陽陽和則不悲而有樂矣少以知柏為從治者恐桂附上也亦用熱遠熱之意少食似腹脹何以加白芍不思飲食何以加五味思之如煩惱面上麻木如蟲行乃胃中元氣極虛加黃耆一錢人參七分甘草二分升麻五分此補陽氣極虛用黃柏等為引用又升降陰陽藥也當歸附子湯治臍下冷痛赤白帶下當歸二錢良薑乾薑附子各一錢柴胡七分升麻蠍梢各五分甘草炙六分炒黃鹽三分黃柏少許上為粗末每服五錢水煎溫服為丸亦得良薑乾薑大治臍下冷痛鹽柏引之就下蠍梢直至痛所升柴引左右清氣上升鹽柏引諸濁陰下降東垣回陽丹注云必用炒黃鹽無則不效蓋寒疝之要藥也酒煮當歸丸治㿉疝白帶下注腳氣腰以下如在冰雪中居火炕以厚衣重蓋猶冷小便不止與白帶長流而不禁固肌肉消瘦面白目青目䀮䀮無所見身重如山行步欹側腿膝枯細大便閉結心下痞悶懊憹飲食不下面垢背寒小便遺而不知此上中下三陽真氣俱竭故噦嘔不止胃寒之極也其脈沉緊而澀按之空虛若脈洪大而澀按之無力猶為中寒之證況按之空虛者乎按之不鼓是為陰寒之極也其空虛乃氣血俱虛之極也帶脈為病男子七疝女子瘕聚此以㿉疝在女子豈與男子同歟嘗聞女子㿉形如茄突出陰戶是亦疝也故云然諸症皆寒獨便閉心下痞懊憹似熱凡緊脈不拘浮沉均以為寒按之不鼓無問大小皆以為虛診者當須識此既曰血氣俱虛而本方中曾無一味氣藥而血藥又止一味當歸豈真陽已竭即甘溫之味亦未易為力也芍地能滯陽氣故亦不用當歸一兩蘹香半兩黑附子炮去皮臍良薑各七錢上四味銼如麻豆大以好酒一升半同煎煮至酒盡為度炭火焙乾同為細末入下藥炒黃鹽丁香各半兩全蠍三錢柴胡二錢升麻根木香各一錢苦楝子甘草炙各五分玄胡索四錢上同為細末酒煮麵糊丸如桐子大每服二十丸空心宿食消盡淡醋湯下忌油膩冷物酒面妙在前四味用酒煮又以酒糊丸者峻補其下使真陽之氣生於九淵上於九天也其後九種或引之於降或佐之於升有開結透關之妙非精識病源究心藥石者不能到也然其力量博大非善用者不敢暖宮妙應丸治婦人赤白帶下及子宮虛冷無子者當歸川芎白芍藥熟地黃艾葉茯苓龍骨牡丹皮赤石脂牡蠣各等分上為末麵糊丸如桐子大每服五十丸空心艾醋湯下此方以四物合成劑又以艾葉暖其下茯苓滲其濕牡丹清其瘀宜乎子宮溫而懷妊矣鶴頂丸治帶下之證有三此三十六疾未嫁之女月經初下止而即得或浴之以冷水或熱而扇或當風此室女病帶下之由有嫁之婦陰陽過多即傷胞絡風邪乘虛而入胞經觸冷遂成穢液與血水相連而下產後帶下由亡血失氣傷動胞絡門開而外風襲肌體虛而冷風入冷風與熱氣相連故成液而下冷則多白熱則多赤冷熱相交赤白俱下當歸七錢半酒浸附子炮去皮半兩龍骨鹽泥包煅吳茱萸湯泡去涎赤石脂火煅醋淬乾薑炮各兩半牡蠣一兩二錢鹽泥包煅艾葉一兩以醋半盞煮乾上為細末研勻醋糊和丸如桐子大以赤石脂為衣每服五十丸空心用艾葉食鹽烏梅煎湯下此大熱之劑非真寒者不可服白蘞丸治室女衝任虛寒帶下純白女子二七而天癸至正當氣旺之年豈可輕用溫熱之劑獨以純白二字推之便得虛寒之真故可用鹿茸耳鹿茸酒蒸焙二兩白蘞狗脊燎去毛制各一兩上為細末艾煎醋汁打糊丸如桐子大每服五十丸空心溫酒下神仙聚寶丹一名琥珀硃砂丸治婦人血海虛寒外乘風冷搏結不散積聚成塊經曰氣有是動血為所生病據此所言病癥先由血海虛寒故氣不能溫又為風冷外乘故致血結不能散非溫行不可故此方乃於血中行氣氣中行血所謂氣行血流自無病也或成堅癖及血氣攻注腹脅疼痛小便急脹或虛鳴嘔吐涎沫頭旋眼花腿膝重痛面色萎黃肢體浮腫月候欲行先若重病或多或少帶下赤白崩漏不止驚怖健忘小便頻數或白時見虛熱盜汗羸瘦此藥不問胎前產後室女並皆治之常服安心去邪逐敗血養新血令有子當歸木香琥珀沒藥各一兩滴乳香二錢半麝香辰砂各一錢上各另研為細末合一處研勻水丸如龍眼核大每用一丸溫酒磨下不拘時胎息不順腹內疼痛一切產難酒童便磨下產後血暈敗血奔心口噤舌強或惡露未盡發渴面浮煎烏梅湯和童便磨下室女月候不調溫酒磨下半丸產後血氣不調童便磨下茱萸浴湯治下焦虛冷臍腹疼痛帶下五色月水崩漏淋瀝不斷吳茱萸湯泡杜仲炒去絲蛇床子五味子丁皮各一兩木香丁香各半兩上銼如麻豆大每用半兩以生絹袋盛水三大碗煎數沸乘熱熏下部通手淋浴早晚二次熏洗此茱萸湯至下四方皆外治法於上熱下寒難服溫補之藥者宜之蓋以人功挽回造化今罕知此亦有病者不能言醫者無以應徒自待斃而已坐藥龍鹽膏治帶下玄胡索五錢厚朴三錢當歸茴香炒黃鹽酒防己肉桂紅豆龍骨各二錢川烏頭炮丁香木香各一錢半良薑木通各一錢全蠍五枚枯礬五分上為末煉蜜丸如彈子大綿裹留絲在外納陰戶內勝陰丹為上藥力小再加三錢內加行性熱藥羌活柴胡各二錢大蒜一錢破故紙與蒜同焙一錢三柰子川烏頭大椒各五分甘松三分升麻枯白礬各二分全蠍二個麝香少許上為細末同前法制用回陽丹此東垣先生方全蠍升麻甘松各二分草烏頭羌活各三分大椒三柰子蓽茇枯礬各五分大蒜破故紙各二錢水蛭三條炒焦二錢川烏頭柴胡各七分虻蟲三個去翅足炒炒黃鹽一錢必用之藥去之則不效上為細末依前制如指尖大用綿裹納陰戶中覺臍下暖為效如聖丹治婦人經脈不調赤白帶下枯礬四兩蛇床子二兩上為末醋為丸如彈子大用胭脂為衣綿裹放陰戶中定坐半日熱極再換大抵月水不通赤白帶下多因子宮不潔服藥難效下取易痊且速效而不傷臟氣也一方用枯礬川烏各等分煉蜜丸如彈子大綿裹納陰戶中治帶下絕產治帶下滑脫側柏地榆湯治赤白帶下以致不能成孕黃耆側柏葉地榆烏賊魚骨白殭蠶牡蠣用鹽泥固濟火煨透去泥研各一錢白芷肉蓯蓉酒浸蛇床子各一錢二分上銼加生薑三片水煎半飢時服主閉藏者腎若滑脫者腎氣不固也牡蠣鹹寒而益腎蛇床辛溫而壯氣其清而燥澀者則柏葉地榆烏賊其溫而補氣者則黃耆蓯蓉若白芷行陽明於血海殭蠶散結氣以消痰白芷散治赤白帶下白芷二兩海螵蛸二個煅胎髮一團煅上為細末空心溫酒調下二錢螵蛸澀氣胎髮澀血白芷行陽明之氣而散濕以助溫升之用伏龍肝散治赤白帶下久患不瘥尪悴乏力六脈微濡棕櫚不拘多少燒爛急以盆蓋蔭冷存性伏龍肝於灶直下取赤土炒令煙盡屋梁上懸塵炒令煙盡去火毒上各等分研勻入龍腦麝香各少許每服三錢溫酒或淡醋湯下患十年者半月可安火土之性而生燥燥則足以培土梁上塵得土氣之飛揚而上升升則土氣不陷而濕不生棕櫚為止澀之用腦麝少入取其能散然於久病成尪悴之人恐非補劑不可馬蹄丸治白帶不絕白馬蹄禹餘糧各四兩龍骨三兩烏賊魚骨白殭蠶赤石脂各二兩上為細末煉蜜丸如桐子大每服十丸空心酒下不止加至三十丸馬蹄得乾金在下之健體而入肝殭蠶得燥金之剛氣而制木餘糧赤石脂以固血之脫龍骨烏賊以固氣之脫蓋肝主疏泄而藏血疏泄者氣脫氣脫則血不藏以金平之而健其升以血澀之而固其氣宜其為治漏之要藥也固真丸治白帶大下不止臍腹疼痛其寒捫之如冰陰中亦然目中溜火上壅視物䀮䀮無所見齒皆惡熱飲痛須得黃連末擦之其痛乃止惟喜干食大惡湯飲此病皆寒濕乘其胞內故喜干而惡濕肝經陰火上溢走於標故上壅而目中溜火腎水侵肝而上溢故目中䀮䀮無所見齒惡熱飲者是少陽陽明經中伏火也當大瀉寒濕以丸藥治之故曰寒在下焦治主宜緩大忌湯散以酒製白石脂白龍骨以枯其濕以炮乾薑大辛熱瀉寒水以黃柏之大寒為因用又為嚮導故云古者雖有重罪不絕人之後又為之伏其所主先其所因之意又瀉齒中惡熱飲也以柴胡為本經之使以芍藥半錢導之恐辛熱之藥太甚損其肝經故微瀉之以當歸身之辛溫大和其血脈用藥之法備矣白石脂燒赤水飛研細焙乾柴胡各一錢白龍骨二錢酒煮曬乾水飛為末當歸酒洗三錢乾薑炮四錢黃柏酒洗白芍藥各五分上為細末水煮稀糊為丸如雞頭大每服三十丸空心宿食消盡煎白沸湯放溫送下無令胃中停住待少時以早膳壓之是不令熱藥犯胃忌生冷硬物與酒濕面服藥有法亦有期讀此又得一種經緯一方治赤白帶下不問遠年近日並皆治之龍骨半兩舶上硫黃三錢上為細末每服半錢空心無灰酒下大溫下元之寒濕惟久病虛寒者宜之若為丸服之更佳恐其僭上也茅花散治婦人血崩不止赤白帶下此方自是血崩藥當入血崩證茅花一握棕櫚皮三寸嫩荷葉三張甘草節二寸上為細末空心酒調半匙服雙白丸治白帶如神燥濕滲濕石灰一兩白茯苓二兩上為末水丸如桐子大每服三十丸空心白水下白附子丸有婦經年崩漏不止諸藥不效脈濡微此與前伏龍肝散兼服愈白附子四兩附子二兩黃狗骨頭四兩燒灰妙在狗骨頭灰蓋有溫澀之能耳上為細末粥丸如桐子大每服三十丸地榆膏治赤白帶下骨立者此澀血涼劑濕熱勝而滑脫者宜之地榆一斤用水三升煎至一半去渣再煎如稠餳絞淨空心服三合日二服治白濁白淫加味四七湯治婦女小便不順甚者陰戶疼痛半夏湯洗七次一兩厚朴薑汁製赤茯苓香附子炒各半兩紫蘇甘草各二錢上㕮咀分四帖每服水二鍾姜三片煎至八分去滓加琥珀末一錢調服此方治四氣七情故以為名然以半夏為君則知內外二因皆能令氣鬱而生濕生痰也香附治內紫蘇治外其餘又兼內外以佐其成功然不有琥珀為之通竅燥濕則亦不能為效也鎖精丸治小便白濁或白帶淋瀝破故紙炒青鹽白茯苓五味子上為末酒糊丸如梧桐子大空心鹽湯或酒下三十丸固精丸治下虛胞寒小便白濁或如泔或如凝脂或小便無度腰重等證牡蠣煅粉桑螵蛸酒炙龍骨白石脂白茯苓五味子菟絲子酒蒸焙韭子炒各等分上為末酒糊丸桐子大每服七十丸空心鹽湯下夫坎者水也腎主之而坎中之一陽乃腎中之真氣氣固則水旺水旺則氣溫氣溫則下元暖而先天不虛若白濁久而如泔如脂或小便無度皆氣脫也氣脫則下焦無火而水不溫矣安得水升而火降哉此方能固脫溫氣斂藏真火誠治虛寒要藥於男子亦宜用內金鹿茸丸治婦人勞傷血脈胞絡受寒小便白濁日夜無度臍腹疼痛腰膝無力鹿茸黃耆雞內金肉蓯蓉五味子龍骨牡蠣遠志肉桑螵蛸附子各等分上為末煉蜜丸如桐子大每服五十丸食前溫酒或米飲任下按鹿茸蓯蓉黃耆附子有益精益氣溫腎之功內金牡蠣螵蛸龍骨有固澀禁便之用五味遠志生津液而入腎以補正氣其為補下無疑男女俱可服金鎖正元丹治真氣不足吸吸短氣四肢倦怠腳膝痠軟目暗耳鳴遺精盜汗及婦人白濁白淫等證肉蓯蓉洗焙紫巴戟去心葫蘆巴炒各一斤補骨脂酒浸炒十兩五倍子半斤茯苓去皮六兩硃砂三兩另研龍骨二兩上為末入藥研令勻酒和丸如桐子大每服二十丸空心溫酒或鹽湯任下肉蓯蓉男得之而助陽女得之而孕育巴戟補髓添精葫蘆巴治虛冷補骨脂起陽衰五倍子燥陰濕茯苓陽中之陰硃砂鎮心之主寓降火升水之妙龍骨固脫故為下元真氣不足者所服也威喜丸治丈夫元陽虛憊精氣不固餘瀝常流小便濁夢寐頻泄及婦人血海久冷白帶白濁白淫下部常濕小便如米泔或無子息黃蠟四兩白茯苓去皮四兩作塊用豬苓二錢半同於瓷器內煮二十餘沸出日乾不用豬苓上以茯苓為末熔黃蠟杵為丸如彈子大空心細嚼滿口生津徐徐咽服以小便清為度忌米醋只吃糠醋尤忌使性氣味之淡者莫過於蠟而淡之滲者莫過於茯苓蓋淡者天之陰天氣降則水生水生則火有制而又以豬苓煮茯苓者欲其滲之速以蠟為丸者欲其降之深也亦忌使性之句戒助肝氣也烏金散治身熱口燥氣塊築痛下黃水如葵汁百草霜炒紫金皮米泔浸煮炒黃粉草炙各等分上為末每服二錢艾湯或醋湯空心調下心嘈豬血入鹽酒下白帶用鯉魚一尾去腸不去鱗將油發一團入魚肚內黃泥固濟炭火內煅存性去泥研魚為末每用一錢以陳酒調同前藥服紫金皮通血中之氣而散血百草霜止葵汁之水而除黃氣通血行塊痛自止妙在甘草等分不然何以能治身熱口燥也一方治婦人久積虛寒小便白濁滑數不禁鹿茸屑炒黃為細末每服二錢空心溫酒調服此方簡切久服彌佳
