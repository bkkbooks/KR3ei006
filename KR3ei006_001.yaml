可用而不食不可用處方者須得其本養榮湯治婦人血海虛弱心中恍惚時多驚悸或發虛熱經候不利此方只重不利二字與恍惚驚悸絕無相干若因不利而致者則可當歸川芎白芍藥熟地黃青橘皮薑黃川薑五加皮牡丹皮海桐皮白芷各等分上銼每服五錢水一盞半生薑五片烏梅一個煎至一盞溫服不拘時玄歸散治月經壅滯臍腹絞痛當歸玄胡索各等分簡當妙在等分上為粗末每服三錢加生薑三片水煎稍熱服歸漆丸治月經不利臍下憋逆氣脹滿當歸四錢乾漆三錢炒令煙盡上為細末煉蜜丸如桐子大每服十五丸溫酒下治月水不斷止經湯治婦人困倦多睡少食經水時時淋瀝或成片或下赤白黃水面色青黃頭眩目花四肢痠疼此證急宜調理免致崩漏據此證俱屬脾胃元氣不足當用人參養榮歸脾補中十全之類而此亦穩當如加參耆更佳當歸川芎白芍藥炒熟地黃各一錢白朮黃芩阿膠炒蒲黃炒柏葉鹽水炒各七分香附一錢砂仁甘草各五分上作一服加生薑三片水煎空心服蒲黃散治經血不止黃芩五分當歸柏葉蒲黃各四分生薑二分艾葉一分生地黃二十四分伏龍肝十二分上㕮咀用水二升煎取八合分二服此方以生地為主而艾葉止用一分又無補氣之藥讀者要知此意固經丸治經水過多不止乃陰虛挾熱所致法當補陰清熱黃柏白芍藥各三兩黃芩二兩龜板炙四兩樗根皮香附子童便制各一兩半上為細末酒糊丸桐子大每服五七十丸白湯下此丹溪先生法也以肝腎之陰為主四物中止用一物豈尋常所知治過期不止芩心丸治婦人四十九歲以後天癸當住每月卻行或過多不止黃芩心枝條二兩米泔浸七日炙乾又浸又炙如此七次用米泔入陽明經胃氣也上為末醋糊丸如桐子大每服七十丸空心溫酒下日進二服補中芎藭湯治風虛冷熱勞傷衝任月水不調崩中暴下產後失血過多虛羸腹痛或妊娠胎動下血當歸乾薑炮各三兩川芎蜜炙熟地黃黃耆人參杜仲炒吳茱萸泡甘草炙各一兩上每服三錢水一鍾半煎至一鍾空心服茸附湯補衝任調血氣乾薑四兩鹿茸三兩酒炙當歸牡蠣煅各二兩附子肉桂龍骨生用防風各一兩上每服半兩水二鍾煎八分溫服止澀之藥不難於澀而難於溫熱尤妙於補血中之氣舉下陷之用上二方寒者宜之蓋亦有血海虛寒而不禁者治經病疼痛越痛散治血氣虛寒身體作痛此身痛故其立法如此要知身痛腹痛自是不同虎骨五錢當歸芍藥白朮茯苓甘草續斷防風白芷藁本附子各三錢上為粗末每服五錢水二鍾生薑五片棗三枚煎至一盞不拘時服此治身痛之劑八物湯治經事將行臍腹絞痛者氣滯血澀故也當歸川芎芍藥熟地黃玄胡索苦楝碎炒各一錢木香檳榔各五分上作一服水煎食前服前四味是血後四味是氣而川芎血中有氣玄胡氣中有血不可不知加味四物湯治經水將來作疼不止此方又有破血破氣活血行氣藥凡將來作痛均可服當歸酒洗川芎各一錢半芍藥炒熟地黃玄胡索蓬朮醋煮香附醋煮各一錢砂仁八分桃仁去皮尖七分紅花酒炒五分上銼水煎服烏藥湯治血海疼痛此方治氣多烏藥二錢半香附二錢當歸一錢木香甘草炙各五分上銼水煎服加味烏藥湯治婦人經水欲來臍腹絞痛烏藥縮砂木香玄胡索各一兩香附炒去毛二兩甘草炙一兩半上細銼每服七錢生薑三片水煎溫服此全是氣藥惟血實者宜之妙在不用血藥澹寮煮附丸治經候不調血氣刺痛腹脅膨脹頭暈噁心並宜服之香附子擦去毛不拘多少米醋浸一日用瓦銚煮令醋盡妙在用醋以入肝行氣也上為末醋糊丸如桐子大曬乾每服五十丸淡醋湯下以上諸方行滯氣之劑薑黃散治血臟久冷月水不調及瘀血凝滯臍腹刺痛薑黃白芍藥炒三兩當歸牡丹皮玄胡索各二兩川芎蓬朮煨切官桂紅花各一兩此與加味四物小異其妙又在去地黃而加官桂薑黃上銼每服一兩水二盞酒少許同煎食前服琥珀散治婦人月經壅滯每發心腹臍絞痛不可忍及治產後惡露不快血上搶心迷悶不省氣絕欲死者別方琥珀散有琥珀本方無之亦贊其功而借名耳京三稜蓬莪朮赤芍藥劉寄奴牡丹皮熟地黃真蒲黃炒當歸官桂菊花各一兩上前五味用烏豆一升生薑半斤切片米醋四升同煮至豆爛為度焙乾入後五味同為細末每服二錢溫酒調下空心食前服本事云一方不用菊花蒲黃用烏藥玄胡索亦佳予家之秘方也若是尋常血氣痛只一服產後血衝心二服便下常服尤佳予前後救人急切不少亦宜多合以濟人玄胡索散治血氣攻刺疼痛及新舊虛實腹痛當歸酒浸赤芍藥炒玄胡索蒲黃隔紙炒桂皮乳香水研沒藥各一錢用乳沒以通氣血之滯亦更進一步法也上為細末每服三錢溫酒空心服當歸散治婦人久積血氣絞痛小便刺痛四肢無力當歸赤芍藥酒炒劉寄奴枳殼麩炒玄胡索沒藥各等分上為末熱酒調下二錢不拘時服經驗方治婦人臍腹疼痛不省人事只一服立止人不知者云是心氣痛誤矣木通去皮芍藥炒五靈脂炒各等分上㕮咀每服五錢醋水各半盞煎七分溫服三神丸治室女血氣相搏腹中刺痛痛引心端經行澀少或經事不調以致疼痛橘紅二兩玄胡索去皮醋煮當歸酒浸略炒各一兩上為細末酒煮米糊為丸如梧桐子大每服七十丸加至百丸空心艾湯送下米飲亦可交加散治婦人榮衛不通經脈不調腹中撮痛氣多血少結聚為瘕及產後中風生地黃生薑各五兩各研取汁上交互取汁浸渣一夕汁盡為度各炒黃末之尋常腹痛酒調下三錢產後尤不可缺交加散治榮衛不和月事湛濁逐散惡血治臍腹撮痛腰腿重墜此方與琥珀散不相上下而此有白芍似可常服生薑二斤搗取汁存滓用生地黃二斤搗取汁存滓用白芍藥當歸玄胡索醋紙包煨熟用布擦去皮蒲黃隔紙炒各一兩桂心一兩紅花炒無惡血不用沒藥另研各半兩上將地黃汁炒生薑滓生薑汁炒地黃滓各焙乾同諸藥為細末每服三錢溫酒調下若月經不依常蘇木煎酒調下若腰痛糖球子煎酒調下交加地黃丸治婦人經不調血塊氣痞肚腹疼生地黃老生薑各一斤俱另搗取汁存滓玄胡索當歸川芎芍藥各二兩明乳香木香各一兩桃仁去皮尖人參各半兩香附半斤一方而有三變矣此又變而為丸而沒藥肉桂為一家此以三香人參桃仁為一家亦不甚相違閱古人方須得古人變法乃妙上為末先以生薑汁浸地黃滓以地黃汁浸生薑滓曬乾皆以汁盡為度共十一味合一處曬乾研為末醋糊為丸空心薑湯下五七十丸瓦楞丸治瘀血作痛香附醋煮四兩當歸牡丹皮桃仁去皮尖大黃蒸各一兩川芎紅花各半兩瓦楞子煅醋煮一晝夜二兩丹溪治血塊多用瓦楞子古方治血塊多用薑桂熱藥而此用大黃寒藥宜寒宜熱智者別之上為末炊餅丸空心溫酒下三四丸以上諸方行瘀血之劑桂枝桃仁湯治經候前偶感風寒腹痛不可忍桂枝芍藥生地黃各二錢桃仁去皮尖七錢甘草炙一錢上為粗末生薑三片棗一枚水煎溫服一婦冬月經行偶值歸寧途中傷冷遂經止不行腹痛不可忍予用此藥一劑而痛止經復行其效如神柴胡丁香湯治婦人年三十歲臨經預先腰臍痛甚則腹中亦痛經縮二三日柴胡一錢半羌活當歸各一錢生地黃一分丁香四分全蠍一個洗上銼作一服水四盞煎至一盞去渣稍熱食前服小溫經湯治經候不調臟腑冷痛重在冷痛當歸附子炮各等分上㕮咀每服三錢水煎空心服沒藥除痛散逐寒邪療腹痛蓬朮煨一兩當歸玄胡索五靈脂炒肉桂去粗皮良薑炒蒲黃炒甘草炙沒藥各半兩上為末每服五錢溫酒服以上諸方祛風冷之劑治經病發熱逍遙散治血虛煩熱口燥咽乾減食嗜臥月水不調又主榮衛不和痰嗽潮熱肢體羸瘦漸成骨蒸此方重在脾胃及行肝膽鬱滯故不用生地恐傷胃也當歸酒洗白芍炒白朮白茯苓柴胡各一錢甘草炙五分上加生薑三片麥門冬二十粒去心水煎服不拘時一方加牡丹皮梔子炒名加味逍遙散一方加知母地骨皮有嗽加桑白皮貝母桔梗知母麥冬咳血加生地黃山梔牡丹皮嘔吐加陳皮半夏旋覆花嘈雜加姜炒黃連或芩連二陳湯加味四物湯治衝任虛損月水不行肌膚髮熱如勞瘵狀陽勝則熱如肝陰不足而肝火獨甚者宜之脾胃壯者可加胡黃連當歸川芎白芍藥生地黃各一兩柴胡半兩黃芩二錢半上㕮咀每服八錢水煎服如骨蒸四物湯加地骨皮牡丹皮一方四物湯加胡黃連極效六神湯治血氣不足肌體煩熱四肢倦怠不進飲食此治血虛而氣分有虛熱者當歸川芎白芍藥熟地黃黃耆地骨皮各一錢上㕮咀水煎空心服治往來寒熱本事方治婦人血脈不調往來寒熱狀如勞倦當歸川芎黃耆甘草官桂各一兩熟地黃白芍藥白朮各二兩柴胡阿膠碎炒各半兩上為細末每服五錢棗一枚水煎空心服白湯點服亦得當永不生帶下調血脈養子宮終身無病陽虛則惡寒陰虛則發熱此方氣血並補與十全大補湯同乃獨無人參而柴胡阿膠是肝經中藥亦治寒熱之要訣也地骨皮散治血風氣虛時作寒熱或晡熱內熱地骨皮柴胡各一兩桑白皮炒枳殼麩炒前胡黃耆炒各七錢五分人參白茯苓白芍藥甘草五加皮桂心各半兩上㕮咀每服三五錢水一盞半生薑三片煎七分服按黃耆人參桂心是補肺溫氣藥桑皮枳殼地骨皮是瀉肺清熱藥白芍茯苓是降收之味五加前胡是行散之味而乃並用之重在氣虛有火當以分兩中求之疾苦中審之則巧妙自得柴胡散治婦人寒熱體瘦肢節疼痛口乾心煩不欲飲食北柴胡赤茯苓黃耆白朮各一錢麥門冬去心三錢鱉甲醋炙二錢人參地骨皮枳殼麩炒生地黃桑白皮赤芍藥桔梗甘草各五分上作一服水二鍾生薑三片煎至一鍾不拘時服參耆白朮益肺脾三焦元氣而治不欲食麥冬生地清心與包絡中火而生血以治口乾心煩柴胡鱉甲解骨節中熱而外散赤茯苓赤芍導心火散血熱而下行枳桔地骨桑皮瀉肺火散結氣於胸中亦補中有瀉之方也要知不用芎歸之旨乃妙七寶湯治寒熱往來防風去蘆知母生地黃各半兩柴胡去蘆前胡去蘆秦艽甘草炙各二錢半上㕮咀每服五錢水一盞半加人參三寸煎七分服邪在表而寒者宜防風邪在裡而熱者宜知母胸中熱結宜前胡經絡熱結宜秦艽柴胡解表裡陰陽不分之寒熱甘草人參益氣以防解散之虞生地涼血以為陽氣之守是方以邪結而氣血未虛者宜之柴胡四物湯治婦人日久虛勞微有寒熱此四物湯與小柴胡湯合方也曰微有寒熱則似病未甚當歸川芎芍藥熟地黃各一兩半柴胡八錢人參黃芩半夏甘草各三錢上銼每服一兩生薑三片水煎服柴胡抑肝散治寡居獨陰無陽欲心萌而多不遂是以惡寒發熱類瘧證柴胡二錢半青皮二錢赤芍藥炒牡丹皮各一錢半蒼朮米泔浸炒山梔子炒地骨皮香附子各一錢神麯八分川芎七分生地黃連翹各五分甘草三分上銼加生薑水煎服一服空心臨臥服此方疏肝開鬱散結氣結血涼心啟脾自是一種心印乃越鞠丸之套方也分兩妙生地黃丸治師尼寡婦寒熱如瘧欲男子不得者生地黃二兩赤芍藥一兩柴胡黃芩秦艽各五錢上為末煉蜜丸如桐子大每服三十丸煎烏梅湯吞下日三服此方減當歸為厥陰肝經鬱火結血之劑治熱入血室小柴胡加地黃湯治婦人中風發熱惡寒經水適來晝則明瞭夜則譫語如見鬼狀發作有時此名熱入血室亦治產後惡露方來忽然斷絕柴胡三錢半夏黃芩各二錢人參一錢半甘草五分生地黃一錢半上作一服水二鍾生薑五片棗二枚煎一鍾不拘時服四物湯用生地黃加柴胡煎服亦可按此乃治太陽傳經病蓋經血適來則血室虛邪乘虛入而為越經癥然血室與胃府有氣血之分故譫語有晝夜之別日如見鬼者以肝藏邪客而魂不安本神自病也用少柴胡以解表裡之邪用生地黃以涼血中之熱設有不愈則又有期門之刺矣其加桃仁紅花及承氣抵當等湯者各因其微甚而瀉之也乾薑柴胡湯治婦人傷寒經脈方來熱入血室寒熱如瘧或狂言見鬼柴胡一錢桂枝三分栝蔞根五分牡蠣煅乾薑炮甘草炒各三分上水煎服汗出而愈牛黃膏治熱入血室發狂不認人者牛黃二錢半硃砂鬱金牡丹皮各三錢腦子甘草各一錢上為細末煉蜜丸如皂角子大每服一丸新水化下同一熱入血室寒熱也而此有用前方反用薑桂牡蠣何歟又與柴胡薑桂湯不相上下此但少知母黃芩耳可見古方增減一味自有脈絡不可輕視然其竅要在如瘧並汗出而愈上探討便知與前方不同真活法也可發人之智慧此真是心經藥要知子母相傳之理海蛤散治婦人傷寒血結胸膈宜服此藥及針期門穴海蛤滑石煅水飛甘草各五錢芒硝一兩上為末每服二錢用雞子清調下小腸通利其結血自散更用桂枝紅花湯發其汗則愈此非熱入血室證乃是血結胸膈方今集入此者要以肝脈布脅循喉嚨也針法俱妙發汗尤妙
