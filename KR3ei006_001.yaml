body:
  text: 卷之一調經門論經主衝任二脈良方論曰岐伯云女子七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下天謂天真之氣癸謂壬癸之水故云天癸也然沖為血海任主胞胎二脈流通經血漸盈應時而下常以三旬一見以象月盈則虧也若遇經行最宜謹慎否則與產後症相類若被驚恐勞役則血氣錯亂經脈不行多致勞瘵等疾若逆於頭面肢體之間則重痛不寧若怒氣傷肝則頭暈脅痛嘔血瘰癧癰瘍若經血內滲則竅穴淋瀝無已凡此六淫外侵而變症百出犯時微若秋毫成患重於山嶽可不畏哉任脈主任一身之陰血太衝屬陽明為血之海故穀氣盛則血海滿而月事以時下天真天一也天一之氣升而為壬陽降而為癸陰也三旬一見者為一小會之周天此其常也然有大會中會之不同故又有三月一行一年一行之變異究其盈虧之義則一也甚有數年不行而一行即受娠者又超於理之外矣豈醫藥能為哉論心脾為經血主統薛立齋曰經云飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行東垣先生所謂脾為生化之源心統諸經之血誠哉是言也心脾平和則經候如常苟或七情內傷六淫外侵飲食失節起居失宜脾胃虛損心火妄動則月經不調矣大抵血生於脾土故云脾統血凡血病當用苦甘之藥以助陽氣而生陰血也脾氣化液而生血即水入於經其血乃生之意此榮出中焦也故曰生化之源心統血者脾氣化液入心而變見為血也故雖心之所主亦借脾氣化生故不可不知論脾胃生血薛立齋曰血者水穀之精氣也和調五臟灑陳六腑在男子則化為精在婦人則上為乳汁下為月水故雖心主血肝藏血亦皆統攝於脾補脾和胃血自生矣凡經行之際禁用苦寒辛散之藥飲食亦然知水穀之精氣是生血之本則知脾胃是生血之源故脾胃不健而血不生者不可專主四物矣論經不調由風邪客於胞中陳氏曰婦人月水不調由風邪乘虛客於胞中而傷衝任之脈損手太陽少陰之經蓋衝任之脈皆起於胞中為經絡之海與手太陽小腸手少陰心經為表裡上為乳汁下為月水然月水乃經絡之餘苟能調攝得宜則經應以時矣千金云婦人經行如斯亦有為風所客者可不知謹與經云二陽之病發心脾男子少精女子不月此則又兼小腸而言然小腸不過與心相合豈可混解故當以素問為是論三月一來為居經脈經云師曰脈微血氣俱虛年少者亡血也乳子下利為可否者此為居經此言脈微氣血兩虛之居經三月一來曰寸口脈微而澀微則衛氣不足澀則血氣無餘衛不足其息短其形躁血不足其形逆榮衛俱虛言語謬誤趺陽脈浮而澀澀則衛氣虛虛則短氣咽燥而口苦胃氣澀則失液少陰脈微而遲微則無精遲則陰中寒澀則血不來此為居經三月一來此言寸脈微澀及胃脈浮澀陽下生陰之居經問曰婦人妊娠三月師脈之言此婦人非軀今月經當下其脈何類何以別之師曰寸口脈衛浮而大榮反而弱浮大則氣強反弱則少血孤陽獨呼陰不能吸二氣不停衛降榮竭陰為積寒陽為聚熱陽盛不潤經絡不足陰虛陽往一作實故令少血時發灑淅咽燥汗出或溲稠數多唾涎沫此令重虛津液漏泄故知非軀畜煩滿血月稟一經三月一來陰盛則瀉名曰居經謂右脈浮大左脈反弱也蓋女子尺脈宜盛今反見弱是榮不足於下也寸口衛脈浮大者衛氣盛於上也經曰至陽盛地氣不足故曰反也舉寸以該尺耳此言陽脈浮大陰脈反弱之居經論師尼寡婦異乎妻妾之治羅謙甫曰宋褚澄療師尼寡婦別制方者蓋有謂也此二種寡居獨陰無陽欲心萌而多不遂是以陰陽交爭乍寒乍熱全類溫瘧久則為勞嘗讀史記倉公傳載濟北王侍人韓女病腰背寒熱眾醫皆以為寒熱病倉公曰病得之欲男子不得也何以知診其脈肝脈弦出寸口是以知之蓋男子以精為主婦人以血為主男子精盛以思室女人血盛以懷胎也夫肝攝血者也吳厥陰肝脈弦出寸口上魚際則陰盛可知故知褚氏之言信有謂矣此專主肝經而言以相火寄於肝也男女之欲皆從此出觀天地之氣始於春則知欲之義必由於肝也鳥獸孳尾亦然故治此者當以柴胡湯為法論調經當抑氣濟生方論曰內經云百病皆生於氣經有所謂七氣有所謂九氣喜怒憂思悲恐驚者七氣也七情之外益之以寒熱二證而為九氣也氣之為病男子婦人皆有之惟婦人血氣為患尤甚蓋人身血隨氣行氣一壅滯則血與氣並或月事不調心腹作痛或月事將行預先作痛或月事已行淋漓不斷心腹作痛或遵腰脅或引背脊上下攻刺吐逆不食甚則手足搐搦狀類驚癇或作寒熱或為癥瘕肌肉消瘦非特不能受孕久而不治轉而為瘵疾者多矣其抑氣治法須隨證採後方治之故此不備列論調經先去病李氏曰月水循環纖疴不作而有子若兼潮熱腹痛重則加之咳嗽汗嘔或瀉有潮汗則血愈消耗有咳嘔則氣往上行瀉則津偏於後痛則積結於中是以必先去病而後可以滋血調經就中潮熱疼痛尤為婦女常病蓋血滯積入骨髓便為骨蒸血滯積瘀於中與日生新血相搏則為疼痛血枯不能滋養百骸則蒸熱於外血枯胞絡火盛或挾痰氣食積寒冷外邪則為疼痛論調經大法方氏曰婦人經病有月候不調者有月候不通者然不調不通之中有兼疼痛者有兼發熱者此分而為四也然四者若細推之不調之中有趨前者有退後者則趨前為熱退後為虛也不通之中有血滯者有血枯者則血滯宜破血枯宜補也疼痛之中有常時作痛者有經前經後作痛者則常時與經前為血積經後為血虛也發熱之中有常時發熱者有經行發熱者則常時為血虛有積經行為血虛有熱也此又分而為八焉大抵婦人經病內因憂思忿怒外因飲冷形寒蓋人之氣血周流忽因憂思忿怒所觸則鬱結不行人之經前產後忽遇飲冷形寒則惡露不盡此經候不調不通作痛發熱之所由也大抵氣行血行氣止血止故治血病以行氣為先香附之類是也熱則流通寒則凝結故治血病以熱藥為佐肉桂之類是也以類字推之則所該者廣幸毋執也而為先為佐尤所當知論經水異色丹溪曰經水者陰血也陰必從陽故其色紅稟火色也血為氣之配氣熱則熱氣寒則寒氣升則升氣降則降氣凝則凝氣滯則滯氣清則清氣濁則濁上應於月其行有常名之曰經為氣之配因氣而行成塊者氣之凝也將行而痛者氣之滯也來後作痛者氣血俱虛也色淡者亦虛也而有水混之也錯經妄行者氣之亂也紫者氣之熱也黑者熱之甚也今人但見其紫者黑者作痛者成塊者率指為風冷而行溫熱之劑則禍不旋踵矣良由病源論月水諸病皆曰風冷乘之宜其相習而成俗也或曰黑者北方水色也紫淡於黑非冷而何予曰經云亢則害承乃制熱甚者必兼水化所以熱則紫甚則黑也況婦人性執而見鄙嗜欲加倍臟腑厥陽之火無日不起非熱而何若曰風冷必須外得設或有之蓋千百而一二也準繩云冷症外邪初感入經必痛或不痛者久則鬱而變熱矣且寒則凝即行而紫黑故非寒也二公之說甚明葉氏曰血黑屬熱丹溪之論善矣然風寒外乘者十中常見一二何以辨之蓋寒主引澀小腹內必時常冷痛經行之際或手足厥冷唇青面白尺脈或遲或微或虛或雖大而必無力熱則尺脈或洪或數或實或雖小而必有力於此審之可以得其情矣脈症相參尤為的確李氏曰心主血故以色紅為正雖不對期而色正者易調其色紫者風也黑者熱甚也淡白者虛也或挾痰停水以混之也如煙塵水如屋漏水如豆汁或帶黃混濁模糊者濕痰也成塊作片血不變者氣滯也或風冷乘之也色變紫黑者血熱也大概紫者四物湯加防風白芷荊芥黑者四物湯加芩連香附淡白者芎歸湯加參耆白芍藥香附有痰者二陳湯加芎歸如煙塵者二陳湯加秦艽防風蒼朮如豆汁者四物湯加芩連成塊者四物湯加香附玄胡索枳殼陳皮隨症選用論經候愆期王子亨曰經者常候也謂候其一身之陰陽愆伏知其安危故每月一至太過不及皆為不調陽太過則先期而至陰不及則後時而來其有乍多乍少斷絕不行崩漏不止皆由陰陽衰盛所致丹溪云經水不及期而來者血熱也四物湯加芩連香附肥人不及日數而多者痰多血虛有熱南星白朮蒼朮黃連香附川芎作丸薛氏曰先期而至有因脾經血燥者宜加味逍遙散有因脾經鬱滯者宜歸脾湯有因肝經怒火者宜小柴胡湯加生地黃有因血分有熱者宜四物湯加柴胡牡丹皮山梔子有因勞役火動者宜補中益氣湯丹溪翁只主一熱字而熱症內又用蒼朮南星等誰其信之立齋又分肝脾血分勞役五種尤為詳明愚謂脾虛氣鬱宜歸脾湯脾實氣鬱宜越鞠丸之類為當丹溪云經水過期血少也用川芎當歸人參白朮兼痰藥治之過期色淡者痰多也二陳湯加芎歸過期紫黑有塊血熱也必作痛四物湯加香附黃連薛氏曰過期而至有因脾經血虛者宜人參養榮湯有因肝經血少者宜六味地黃丸有因氣虛血弱者宜八珍湯血生天脾故色淡者宜補脾胃此參術所必用也而丹溪以芎歸為配不用地黃芍藥者豈無深意焉如立齋養榮八珍等湯俱本於此其用六味丸者又為補母之法宜詳之論月水多少準繩云婦人病多是月經乍多乍少或前或後將發疼痛醫者不審一例呼為經病不知陽勝陰陰勝陽所以服藥無效蓋陰氣乘陽則包藏寒氣血不運行經所謂天寒地凍水凝成冰故令乍少而在月後若陽氣乘陰則血流散溢經所謂天暑地熱經水沸溢故令乍多而在月前當和血氣平陰陽斯為福也陽勝陰月候多者當歸飲陰勝陽月候少者七沸湯又云經水過多為虛熱為氣虛不能攝血經水澀少為虛為澀虛則補之澀則濡之脈經曰有一婦人來診言經水少不如前者何也師曰曾更下利若汗出小便利者可何以故師曰亡其津液故令經水少設經下反多於前者當所苦困當言恐大便難身無復汗也津液者水穀之陰氣也亡之則血失所養矣故不如前焉論月水不利良方云婦人月水不利者由勞傷氣血體虛而風冷客於胞內傷於衝任之脈故也若寸脈弦關脈沉是肝病也兼主腹痛孔竅生瘡尺脈滑血氣實經絡不利或尺脈絕不至兼主小腹引腰痛氣攻胸膈也弦與沉主氣病滑為實絕為虛薛氏曰前證屬肝膽二經蓋肝膽相為表裡多因恚怒所傷若本經風熱用補肝散方見脅痛門血虛用四物加酸棗仁若腎水不足用六味丸若患諸瘡瘍治見後論月水不斷準繩云婦人月水不斷淋瀝無時或因勞損氣血而傷衝任或因經行而合陰陽皆令氣虛不能攝血若時止時行腹痛脈沉細此寒熱邪氣客於胞中非因虛弱也薛氏曰前證若鬱結傷脾用歸脾湯恚怒傷肝用逍遙散肝火妄動用加味四物湯脾氣虛弱用六君子湯元氣下陷用補中益氣湯熱傷元氣前湯加五味麥門冬炒黑黃柏論過期不止產寶云男子生於寅寅屬木陽中有陰故男子得八數女子生於申申屬金陰中有陽故女子得七數男以氣為主八八則卦數已盡女以血為主七七則卦數已終終則經水絕衝任脈虛衰天癸絕地道不通而無子矣或勞傷過度喜怒不時經脈衰微之際又為邪氣攻衝所以當止不止而崩下也許學士云婦人經脈過期不止腰腹疼痛或七七數盡而月經下者宜用當歸散治之論經病疼痛產寶云經水者行血氣通陰陽以榮於身者也氣血盛陰陽和則形體通或外虧衛氣之充養內乏榮血之灌溉血氣不足經候欲行身體先痛也此論身痛良方云婦人經來腹痛由風冷客於胞絡衝任或傷於太陽少陰經用溫經湯桂枝桃仁湯若憂思氣鬱而血滯用桂枝桃仁湯地黃通經丸若血結而成塊用萬病丸丹溪云經水將來作痛者血實也一雲氣滯四物湯加桃仁香附黃連臨行時腰疼腹痛乃是鬱滯有瘀血四物湯加紅花桃仁莪朮玄胡索木香有熱加黃芩柴胡有加香附青皮桃仁烏藥丹皮小茴五靈脂者經行後作痛者血氣俱虛也以八珍湯加減服戴氏曰經事來而腹痛者經事不來而腹亦痛者皆血之不調故也欲調其血先調其氣四物湯加吳茱萸半錢香附子一錢和氣飲加吳茱萸半錢亦可痛甚者玄胡索湯格致工夫更進一層然又恐感外邪傷飲食致痛痛不因血尤宜詳審和氣飲卻能兼治因冷而積因積而痛宜大溫經湯冷甚者去麥門冬不用汪石山治一婦人瘦小年二十餘經水紫色或前或後臨行腹痛惡寒喜熱或時感寒腹亦作痛脈皆細濡近滑兩尺重按略洪而滑此血熱也或謂惡寒如此何謂為熱曰熱極似寒也遂用酒煮黃連四兩香附歸身尾各二兩五靈脂一兩為末粥丸空腹吞之而愈此全以脈為主不然亦非此藥可愈一婦年二十一歲六月經行腹痛如刮難忍求死脈得細軟而快尺則沉弱而近快汪曰細軟屬濕數則為熱尺沉屬鬱滯也以酒煮黃連半斤炒香附六兩五靈脂半炒半生三兩歸身尾二兩為末粥丸空心湯下三四錢服至五六料越九年得一子後屢服屢效歷十五年後前藥罔效中病則止不盡劑豈可久服經曰毋使過之傷其正也汪復診之脈皆洪滑無力幸其尚有精神汪曰此非舊日比矣舊乃鬱熱今則虛寒東垣曰始為熱中終為寒中是也經曰脈至而從按之不鼓乃陰盛格陽當作寒治且始病時而形斂小今則形肥大矣書曰瘦人血熱肥人血虛豈可同一治也所可慮者汗大泄而脈不為汗衰血大崩而脈不為血減耳二句俱欠妥惟傷寒有邪故不為汗衰者不治此惟血脫陽無所附故脈無力不當言不為血減其痛日重夜輕知由陽虛不能健運故亦凝滯而作痛以證參脈宜用助陽若得脈減痛輕方為佳兆遂投參耆歸術大劑加桂附一帖來早再診脈皆稍寧服至二三十帖病且愈亦是寒涼太過所謂以藥醫藥也故可服此溫補之劑三十帖愈蓋病有始終寒熱之異藥有前後用舍不同形有肥瘦壯少不等豈可以一方而通治哉論經病發熱附客熱李氏曰潮熱有時為內傷為虛無時為外感為實虛者大溫經湯熱者四物湯加柴胡黃芩經閉者滋血湯骨蒸者大胡連丸大烏雞丸五心潮者四物湯加黃連胡黃連無汗者茯苓補心湯有汗者逍遙散經前潮者血虛有滯逍遙散加牡丹皮桃仁玄胡索經後潮者血虛有熱逍遙散去柴胡換地骨皮加生地黃此藥加減為退熱聖藥逍遙散為退熱聖藥須善加減尋常潮熱者腎氣丸大造丸或四物湯料加便炒黃芩一兩四制香附一斤蜜丸服三方更妙吳茭山治一婦經血過多五心煩熱日晡潮熱諸藥無效以四物加胡黃連三服而愈薛新甫治一婦人經候過期發熱倦怠或用四物黃連之類反兩月一度且少而成塊又用峻藥通之兩目如帛所蔽薛曰脾為諸陰之首目為血脈之宗此脾傷五臟皆為失所不能歸於目矣遂用補中益氣濟生歸脾二湯專主脾胃年餘尋愈大全云客熱者因體虛而將溫過度外熱加之非臟腑自生故云客熱其狀上焦胸膈之間虛熱口燥心煩手足壯熱者是也薛氏曰前證若客邪所侵補中益氣加川芎防風客邪而補中益氣須細心體認證脈相參肝虛血少六味地黃丸胃火飲冷錢氏瀉黃散胃虛飲湯七味白朮散必真虛者方可不然恐罹實實之害潮熱時熱八珍湯晡熱內熱逍遙散發熱體倦補中益氣湯恚怒發熱小柴胡湯寅卯酉戌時熱升陽益陰湯論往來寒熱經水適來適斷或有往來寒熱者先服小柴胡以去其寒熱後以四物湯和之薛新甫治一婦人耳內或耳後項側作痛寒熱口苦月經不調此肝火氣滯而血凝用小柴胡加山梔川芎丹皮治之諸病悉退諸症皆見在少陽經故用此湯此經多氣少血何為不用當歸赤芍生地大全云師尼寡婦與室女出嫁愆期者多因欲心萌而不遂懨懨成病乍寒乍熱久則為勞又有經閉白淫痰逆頭風膈氣痞悶面皯瘦瘠等證皆寡婦之病也此倉公治欲男子不得之法也薛氏曰前證若肝脈弦出魚際用小柴胡加生地黃送下生地黃丸久而血虛佐以四物湯此婦遍身欲火降火涼血亦是正法大約寒涼過度又須治本也若兼怒動肝火而寒熱者佐以加味逍遙散一婦人因夫經商久不歸發寒熱月經旬日方止服降火涼血藥反潮熱內熱自汗盜汗月經頻數余曰熱汗氣血虛也經頻肝脾虛也用歸脾湯六味丸而愈論熱入血室良方云婦人傷寒傷風發熱經水適來晝則安靜暮則譫語有如瘧狀此為熱入血室治者無犯胃氣及上二焦宜服小柴胡湯邪入血分故發在暮且譫語屬胃經者多恐誤犯之故云然若脈遲身涼當刺期門穴下針病人五吸停針良久徐徐出針凡針期門穴必瀉勿補肥人二寸瘦人寸半也許學士治一婦病傷寒發寒熱遇夜則如見鬼狀經六七日忽然昏塞涎響如引鋸牙關緊急暝目不知人病勢危困許視之曰得病之初曾值月經來否其家云經水方來病作而經遂止得一二日發寒熱晝雖靜夜則有鬼祟從昨日不省人事許曰此乃熱入血室證仲景云婦人中風發熱惡寒經水適來晝則明瞭暮則譫語如見鬼狀發作有時此名熱入血室醫者不曉以剛劑與之遂致胸膈不利涎潮上脘喘急息高昏冒不知人當先化其痰後除其熱乃急以一呷散投之兩時頃涎下得睡省人事次授以小柴胡湯加生地黃三服而熱除不汗而自解矣明知熱入血室乃因症而小治也所謂急則治標後治其本也一婦人患熱入血室證醫者不識用補血調氣藥治之數日遂成血結胸或勸用前藥許公曰小柴胡已遲不可行也無已用期門穴斯可矣予不能針請善針者治之如言而愈便不能針或用桃仁承氣合小柴胡亦可或問熱入血室何為而成結胸也許曰邪氣傳入經絡與正氣相搏上下流行遇經水適來適斷邪氣乘虛入於血室血為邪所迫上入肝經肝受邪則譫語而見鬼復入膻中則血結於胸中矣何以言之婦人平居水養木血養肝方未受孕則下行之為月水既孕則中畜之以養胎及已產則上壅之以為乳皆血也今邪逐血並歸於肝經聚於膻中結於乳下故手觸之則痛非藥可及故當刺期門也虞恆德治一少婦夏月行經得傷寒似瘧譫語狂亂凡診婦人先問經候有無此是關竅凡經行後似瘧譫語便是熱入血室諸醫皆以傷寒內熱投雙解散解毒湯服之大汗如雨反如風狀次以牛黃丸金石之藥愈投愈劇一日延虞診視脈弦而大虞思傷寒內熱狂亂六陽俱病豈不口乾舌黑況脈不數病體捫之或熱或靜其腹急痛病根在腹急痛意必有內傷在前傷寒在後今傷寒得汗雖已內傷則尚存故也因細問之患者曰正行經時因飲食後多汗用冷水抹身因得此證方知冷水外閉其汗內阻其血邪熱入室經血未盡血得邪熱乍靜乍亂寒熱譫語掉眩類風須得玉燭散下之而愈下後譫語已定次以四物小柴胡湯調理五日熱退身涼患遂瘳衍義云一婦人溫病已十二日診之其脈六七至而澀寸稍大尺稍小發寒熱頰赤口乾不了了耳聾問之病數日經水乃行此屬少陽熱入血室也若治不對病則必死乃按其證與小柴胡湯服之二日又與小柴胡湯加官桂乾薑一日寒熱遂止以脈六七至明知是熱澀則知其為有瘀血寸大尺小上焦有熱此亦兼陽明胃腑病以頰赤口乾不了了而用薑桂亦人所難須慎之又云臍下急痛又與抵當丸微利臍下痛痊身漸涼脈漸勻尚不了了乃復與小柴胡湯次日但胸中熱躁口鼻乾又少與調胃承氣湯不得利次日心下痛又與大陷胸湯半服利三行次日虛煩不寧時妄有所見復狂言雖知其尚有燥屎以其極虛不敢攻之遂與竹葉湯去其煩熱其夜大便自通至晚兩次中有燥屎數枚而狂言虛煩盡解但咳嗽唾此肺虛也若不治恐成肺痿遂與小柴胡湯去人參大棗生薑加乾薑五味子湯一日咳減二日而病悉愈以上皆用仲景方五味乾薑以治咳嗽以未成痿故可加否則誤矣薛立齋治一婦人懷抱素郁感冒經行譫語服發散之劑不應用寒涼降火前證益甚更加月經不止肚腹作痛嘔吐不食痰涎自出此脾胃虛寒用香砂六君子脾胃漸健諸證漸退又用歸脾湯而痊愈以感冒故發散以譫語故清涼然云前症益甚而復用香砂歸脾人所難信其意重在嘔吐痰涎自出上耳然終有疑當以脈評學者不可以是而造次也慎之論經行泄瀉汪石山治一婦經行必瀉三日然後行診其脈皆濡弱此脾虛也脾屬血屬濕經水將動脾血先已流注血海然後下流為經脾血既虧則虛而不能運行其濕濡弱二字足徵脾虛此脾氣虛而非脾血虛也用藥當矣而血虧不運之說欠妥今作參苓白朮散每服一錢一日米飲調下二三次月餘經不瀉矣一婦年逾四十形長色脆病經不行右脈浮軟而大左脈虛軟而小近快常時經前作泄今年四月感風咳嗽用湯洗浴汗多因泄一月六月復因洗浴發瘧六七次瘧雖止而神思不爽至八月盡而經水過多白帶時下瀉泄覺右腳疼痛舊曾閃肭腳跟今則假此延痛臀腿腰脅尻骨頸項右邊筋脈皆掣痛或咳嗽一聲則腰眼痛如腰札日輕夜重叫號不已幸痛稍止飲食如常今詳月水過多白帶時下日輕夜重瀉泄無時亦屬下多亡陰宜作血虛論治服四物止痛之劑益甚據脈審證明是脾虛下陷豈得謂亡陰而補血乎大謬大謬九月汪復診視始悟此病乃合仲景所謂陽生則陰長之法矣夫經水多白帶下常泄瀉皆由陽虛陷下而然命曰陽脫是也日輕夜重蓋日陽旺而得健運之職故血亦無凝滯之患而日故輕夜則陰旺而陽不得其任失其健運之常血亦隨滯故夜重遂以參術助陽之藥據愚意當用補中益氣加續斷杜仲茯苓煎服五七帖痛減此亦病證之變治法殊常故記之脈法脈經曰尺脈滑血氣實婦人經脈不利滑為氣血有餘故曰實少陰脈弱而微微則少血微弱為血不足浮弱亦然寸口脈浮而弱浮則為虛弱則無血脈來至狀如琴絃苦少腹痛主月水不利孔竅生瘡肝脈沉主月水不利腰腹痛尺脈來而斷續者月水不利當患小腹引腰痛氣滯上攻胸臆也弦也沉也斷續也皆主痛而不利而孔竅生瘡上攻胸臆當別之經不通繞臍寒疝痛其脈沉緊此由寒氣客於血室血凝不行結積血為氣所沖新血與故血相搏故痛沉緊為寒在血分調經通用諸方四物湯治婦人衝任虛損月水不調經病或前或後或多或少或臍腹㽲痛或腰足中痛或崩中漏下及胎前產後諸證常服益榮衛滋氣血若有他病隨證加減當歸和血如血刺痛如刀割非此不能除川芎治風泄肝木如血虛頭痛非此不能除芍藥和血理脾如腹中虛痛非此不能除酒炒熟地黃補血如臍痛非此不能除酒洗用上銼各等分每服四錢水煎服春倍川芎夏倍芍藥秋倍地黃冬倍當歸夫春生夏長秋收冬藏者四時生物之功也物順四時而為生長則人身之氣血亦順四時而為升沉矣若四物湯者豈無精意於其間哉如當歸之甘辛溫潤可喻春日之和融川芎之辛溫而散可喻夏令之敷榮此生長之用也有生長而不為收藏則何以成物故用白芍之酸收以成秋熟地之味厚以成冬此又收藏之妙矣然四時之中以甘為土德之用故歸地之甘以和之此又五行之不離乎土也昔海藏云如用血藥當於四物湯中擇其一二可也又豈無意哉故如行血則用芎歸以行春夏之令如欲止血則用地芍以行秋冬之令此又升沉之道也觀佛手散犀角地黃湯止用四物中之二物蓋可想矣雖然物自物矣物其物者苟無主宰於其間則物無物矣即四物奚為哉故元神胃氣尤為吃緊者也若春則防風四物加防風倍川芎若夏則黃芩四物加黃芩倍芍藥若秋則門冬四物加天門冬倍地黃若冬則桂枝四物加桂枝倍當歸此倍加法便是四時妙理倍當歸以迎春氣倍川芎以迎夏氣倍芍藥以迎秋倍地黃以迎冬用當歸以生一陽用芍藥以生一陰皆升降之妙也識之識之若血虛而腹痛微汗而惡風四物加朮桂謂之腹痛六合若風眩暈加秦艽羌活謂之風六合若氣虛弱起則無力尪然而倒加厚朴陳皮謂之氣六合氣不足而用泄氣之藥加乎當以參耆易之若發熱而煩不能睡臥者加黃連梔子謂之熱六合若虛寒脈微自汗氣難布息清便自調加乾薑附子謂之寒六合若中濕身沉重無力身涼微汗加白朮茯苓謂之濕六合若婦人筋骨肢節疼及頭痛脈弦憎寒如瘧宜治風六合四物湯加羌活防風若血氣上衝心腹脅下滿悶宜治氣六合四物加木香檳榔若臍下虛冷腹痛及腰脊間悶痛宜玄胡六合四物加玄胡索苦楝若氣衝經脈月事頻並臍下多痛宜倍芍藥加黃耆若經事欲行臍腹絞痛臨經痛者血澀也加玄胡苦楝碎炒焦木香檳榔若婦人血虛心腹絞痛不可忍者去地黃加乾薑名四神湯補下元加乾薑甘草氣築小腹痛加玄胡索若腹中刺痛惡物不下倍加當歸芍藥若腹痛作聲經脈不快加熟地黃一倍添桂心半倍經行腹痛腰背痛加蕓薹牛膝紅花吳茱萸菴䕡甘草銀器燈心熱服若經水澀少加葵花煎又加紅花血見愁若經水少而色和者倍加熟地黃當歸若經水暴下加黃芩若腹痛加黃連如夏月不去黃芩若經水如黑豆汁者加黃芩黃連經水過多別無餘證宜黃芩六合湯四物湯黃芩白朮等分經血淋漓不斷加干瑞蓮房炒入藥陰陽交合經脈行加赤石脂黃耆肉桂百草霜藕節敗棕灰肉豆蔻當歸木香龍骨白茯苓白朮地榆若經水適來適斷或有寒熱往來者先服小柴胡湯以去其寒熱後以四物湯和之如寒熱不退勿服四物是謂變證表邪猶在不能效也須識表證更有次序可法依前論中變證隨證用藥調治若血崩者加生地黃蒲黃補血住崩加百草霜棕灰首綿灰蒲黃炒過龍骨白姜血成片加地黃藕節血黑片加人參白朮若血臟虛冷崩中去血過多加阿膠艾以虛冷而崩中故加艾今人不問冷熱而皆用膠艾殊可笑也月水不調血崩或多少或前後嘔逆心膨加陳艾黃耆心膨宜審若赤白帶下宜香桂六合四物湯加桂枝香附各減半四物湯為細末蜜煉丸梧子大空心米飲湯下三四十丸治高年婦人白帶良驗如白淫濁加龍骨地黃當歸如漏下五色研麝香好酒下如鮮紅溫酒鹽湯下如帶下加肉桂蒲黃百草霜甘草黑豆白朮玄胡索白薑龍骨空心鹽酒下如白帶加白龍骨酒下此皆古法宜體認的確方可遵若婦人血積者加廣朮京三稜桂乾漆炒煙盡各等分若經血凝滯腹內血氣作疼加廣朮官桂等分王石膚云熟地黃滯血安能止痛不若以五靈脂代之血滯不通加桃仁紅花經閉加枳殼大黃荊芥黃芩青皮滑石木通瞿麥海金沙山梔子車前子以經閉而用利水之藥何也豈非以下焦氣滯而道之耶血寒加甘草烏梅柴胡桃柳枝月水久閉加肉桂甘草黃耆薑黃棗子木通紅花月水不通加野苧根牛膝紅花蘇木舊酒水同煎血氣不調加吳茱萸等分甘草減半諸虛不足加香附子四物湯加甘草半兩為細末煉蜜丸每兩作八丸酒醋共半盞煎湯同化調下名當歸煎去敗血生好血如人行五里再進一服無時以甘能和氣生液養血也惟氣不足者宜之如要調氣宜倍香附最妙若虛熱病四物湯與參蘇飲相合名補心湯主之添柴胡名五神湯大能補虛退虛熱潮熱加黃芩地骨皮柴胡一方加柴胡乾葛黃耆人參虛熱口乾加麥門冬黃芩虛渴加人參乾葛烏梅栝蔞根虛而多汗加煅牡蠣麻黃根虛寒潮熱加柴胡地骨皮白朮茯苓甘草秦艽知母黃芩麥芽貝母人參烏梅棗子若四肢腫痛不能舉動宜以蒼朮各半湯主之與蒼朮對配意見自超然必有濕者宜之若大便燥結四物湯與調胃承氣湯各半名玉燭散主之若流濕潤燥宜四物理中各半湯若氣血俱虛四物與四君子湯各半名八珍湯主之加縮砂仁保胎氣令人有子有熱加黃芩若因熱生風者加川芎柴胡防風若謂熱生風當清熱茲不清熱而散鬱熱當以意逆之血氣勞加荊芥柴胡非治勞乃行肝膽之氣血結滯生熱也與用青蒿同下三節俱治血風而變證不同用藥亦異自當心悟血風兩脅築痛或盤腸成塊加大黃蓽茇乳香血弱生風四肢痹疼行步艱難加人參乳香沒藥麝香甘草五靈脂羌獨活防風荊芥地龍南星附子澤蘭為末蜜丸木瓜鹽湯下乃治痹疼妙藥血風膨脹加甘草木香枳殼馬兜鈴葶藶紫蘇藿香地黃空心服臟腑秘加大黃桃仁滑泄加官桂附子以四物治瀉人所未信學者當知嘔加白朮人參一方有生薑嘔吐不止加藿香白朮減半人參再減半嘔逆飲食不入加白朮丁香甘草人參縮砂益智仁胡椒以嘔吐嘔逆而所加藥固是矣然與四物同用然乎否乎若咳嗽加桑白皮半夏人參生薑北五味子甘草古人治嗽多用人參五味然審察虛實不可據信也若發寒熱加乾生薑牡丹皮柴胡若寒熱往來加炮乾薑牡丹皮各二分半若平常些少虛眩肢體瘦倦月信不通只用生薑薄荷此是婦人常服之藥蓋味寡而性緩效遲而功深逍遙散以薄荷為引即此意若大渴加知母石膏若水停心下微吐逆者加豬苓茯苓防己若心腹脹滿加枳殼青皮虛汗加麻黃根汗多加浮麥腸風下血加槐角槐花枳殼荊芥黃芩大腹皮茜草地榆石楠葉白雞冠花為散煎一半為末空心鹽湯舊酒調下新酒有毒故用陳者鼻衄吐血加竹青蒲黃藕節半夏丁香訶子桂花紅棗飛羅面白茅根蚌粉桂花桂心也桂與丁半以治吐衄今人難之古法多用亦須識之以備參考若頭昏項強加人參黃芩若虛寒似傷寒者加人參柴胡防風若虛煩不得睡加竹葉人參若諸痛有濕者四物與白朮相半前以四肢腫痛用蒼朮此以諸痛有濕用白朮相半宜思之加天麻茯苓穿山甲用酒煎服治老人風秘加青皮等分老人風秘加青皮人所未知產後亦有用治瘡疾加荊芥酒煎常服奶癰加連翹慈菇子茜草白芷茭白荊芥牛膝山蜈蚣乳香沒藥漏蘆生地黃赤眼頭風疾加薄荷清茶赤眼生風加防風黃芩風瘡赤腫加荊芥牛蒡子何首烏甘草防風羌活地黃鹽酒腳腫加大腹皮赤小豆茯苓皮生薑皮若婦人傷寒汗下後飲食減少血虛者加黃耆白朮茯苓甘草宜八物湯若妊娠傷寒中風表虛自汗頭痛項強身熱惡寒脈浮而弱太陽經病宜表虛六合湯四物湯四兩桂枝地骨皮各七錢若妊娠傷寒頭痛身熱無汗脈浮緊太陽經病宜表實六合四物湯四兩麻黃細辛各半兩若妊娠傷寒中風濕之氣肢節煩疼脈浮而熱頭痛此太陽標病也宜風濕六合湯四物湯四兩防風蒼朮各七錢若妊娠傷寒下後過經不愈溫毒發斑如錦紋宜升麻六合四物湯四兩柴胡黃芩各七錢若妊娠傷寒胸脅滿痛脈弦少陽頭昏項強宜柴胡六合四物湯四兩柴胡黃芩各七錢若妊娠傷寒大便硬小便赤氣滿而脈沉數陽明太陽本病也急下之宜大黃六合四物湯四兩大黃半兩桃仁十個去皮尖麩炒若妊娠傷寒汗下後咳嗽不止宜人參六合四物湯四兩人參五味子各半兩若妊娠傷寒汗下後虛痞脹滿者陽明本虛也宜厚朴六合亦治咳嗽喘滿四物湯四兩厚朴枳實麩炒各半兩若妊娠傷寒汗下後不得眠者宜梔子六合四物湯四兩梔子黃芩各半兩若妊娠傷寒身熱大渴蒸蒸而煩脈長而大者宜石膏六合四物湯四兩石膏知母各半兩若妊娠傷寒小便不利太陽本病宜茯苓六合四物湯四兩茯苓澤瀉各半兩若妊娠傷寒小便不利太陽本病小便赤如血狀者宜琥珀六合四物湯四兩琥珀茯苓各半兩若妊娠傷寒汗下後血漏不止胎氣損者宜膠艾六合四物湯四兩阿膠艾各半兩一方加甘草同上一方加乾薑甘草黃耆若妊娠傷寒四肢拘急身涼微汗腹中痛脈沉而遲少陰病也宜附子六合四物湯四兩附子炮去臍皮桂各半兩若妊娠傷寒蓄血證不宜墮胎藥下之宜四物大黃湯四物湯四兩生地黃大黃酒浸各半兩四物與麻黃桂枝白虎柴胡理中四逆茱萸承氣涼膈等皆可作各半湯不能闡述此易老用藥大略也安胎及漏下血加阿膠大艾甘草蒲黃炒過若胎動不安下血不止每服加艾葉五七片更加蔥白阿膠末黃耆減四味之半當歸只用小半如疾勢甚者以四味各半兩細銼以水四盞熟艾六塊如雞子大阿膠五七片煎至二盞半去滓分作四服一日令盡一方加粉草乾薑黃耆日二三服至二臘以一七日為一臘加阿膠艾葉水煎服名六物湯胎前產後每日可一二服亦治血痢不止腹痛難忍一方加黃耆柏葉阿膠甘草續斷治平常經血淋漓不斷或多或少或赤或白非時漏下多服有效受胎小腸氣痛加木香蘹香胎前嗽加枳殼甘草款冬馬兜鈴半夏木通葶藶子人參桔梗麥門冬胎氣衝肝腰腳痹行步艱難加枳殼木通連翹荊芥地黃羌獨山梔甘草燈心空心服妊娠心煩加竹茹一塊如有敗血則用當歸近上節易白芍藥以赤熟地黃以生妊娠作惡生寒面青不思飲食憔悴加陳皮枳殼白朮茯苓甘草損孕下血不止頭痛寒熱耳鳴氣血勞傷所致加黃芩荊芥生地黃赤芍藥生薑臨產小腹緊痛加紅花滑石甘草燈心葵子產後惡露腹痛不止加桃仁蘇木牛膝產後腹痛血塊攻腸加大艾沒藥好酒若因產後欲推陳致新補血海治諸疾加生薑煎若產後被驚氣滯種種積滯敗血一月內惡物微少敗血作病或脹或疼胸膈痞悶或發寒熱四肢疼痛加玄胡沒藥香白芷與四物等分為細末淡醋湯或用童便酒調下如血風於產後乘虛發作或產後傷風頭疼發熱百骨節痛每四物湯五兩加荊芥穗天麻香附子石膏藿香各二錢五分每服三錢水一盞煎至七分服產後傷風頭痛加石膏等分甘草減半若產後虛勞日久而脈浮疾者宜柴胡四物湯乃本方與小柴胡湯合用也若產後諸症各隨六經以四物與仲景藥各半服之甚效產後虛憊發熱煩悶加生地黃產後腹脹加枳殼肉桂產後寒熱往來加柴胡麥門冬產後敗血築心加地骨皮芍藥產後潮熱加白朮北柴胡甘草牡丹皮地骨皮產後病眼加北細辛羌活荊芥菊花甘草木賊石決明草決明產後浮腫氣急腹大喉中水雞聲加牡丹皮荊芥白朮桑白皮赤小豆大腹皮杏仁半夏馬兜鈴生薑蔥白薄荷產後失音不語加訶子人參沙蜜百藥煎產後悶亂加茯神遠志胎前產後痢後風加乳香龍骨茱萸木香肉桂蒼朮牡丹皮白薇人參甘草澤蘭大椒蘹香煉蜜為丸木瓜酒下以痢風而用龍骨何也諸熱藥亦未善簡易當歸散治經脈不勻或三四月不行或一月再至或腰腿疼痛不依時而行此方不用地黃而補肝脾清金制水又是四物湯之一變局以此推之應變無窮矣當歸川芎白芍藥炒黃芩炒各一兩白朮山茱萸肉各一兩半上為細末空心溫酒調下二錢日三服或銼每服七錢加生薑水煎服如冷去黃芩加肉桂一方有熟地黃增損四物湯治月事不調心腹疼痛補血溫經駐顏又一變也白朮雖溫而丹皮地骨卻清肌骨之熱故溫字恐誤當歸川芎芍藥炒熟地黃白朮牡丹皮各一錢半地骨皮一錢上㕮咀作一服用水二鍾煎至一鍾食前服大溫經湯治衝任虛損月候不調或來多不已或過期不行或崩中去血過多或損娠瘀血停留小腹急痛五心煩熱並皆治之此溫劑內冷者宜之既曰溫經何為又治諸熱證也請詳之不如無書蓋有為矣當歸去蘆川芎人參阿膠碎炒肉桂去粗皮白芍藥炒吳茱萸湯泡牡丹皮甘草炙各一