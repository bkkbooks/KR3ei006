body:
  text: 卷之十臨產門論臨產調理法原有產圖此不載錄亦祝由法也大全云凡妊娠至臨月當安神定慮時常步履不可多睡飽食過飲酒醴雜藥宜先貼產圖依位密鋪床帳預請老練穩婆備辦湯藥器物欲產時不可多人喧鬨愴惶但用老婦二人扶行及憑物站立若見漿水腰腹痛甚是胎離其經令產母仰臥令兒轉身若兒頭向產門方可用藥催生坐草催生藥切不可早若兒未轉身宜以補血為主而寬氣佐之若心煩用水調服白蜜一匙覺飢吃糜粥少許勿令飢渴恐乏其力不可強服催藥早於坐草慎之薛氏曰欲產之時覺腹內轉動即當正身仰臥待兒轉身向下時作痛試捏產母手中指中節中指屬心胞絡也或本節跳動方與臨盆即產矣若初覺不仰臥以待轉胞或未產而水頻下此胞衣已破血水先干必有逆生難產之患若胎衣破而不得分娩者保生無憂散以固其血固血之說宜玩自然生息如血已耗損用八珍湯料一斤益母草半斤八珍益母配法服法俱佳水數十碗煎熟不時飲之亦有得生者凡孕婦只腹痛未產也若連腰痛甚者將產也蓋腎候於腰胞系於腎故也凡孕家宜預請有仁心知事穩婆當以恩結其心先與說知倘有生息不順只說未產或遇雙胎只說胎衣未下恐驚則氣散愈難生息余家親驗之大抵難產多患於鬱悶安逸富貴之家治法雖云胎前清氣產後補血不可專執若脾胃不實氣血不充宜預調補不然臨產必有患難論臨產催生法大全云大凡生產自有時候未見時候切不可強服催生滑胎等藥或勢不得已則服之又云切不可坐早及令穩婆亂動手凡催生藥必候腰痛甚胎轉向下漿水破方可服大法滑以流通澀滯苦以驅逐閉塞香以開竅逐血氣滯者行氣胞漿先破疾困者固血固血如閘水放舟最穩當丹溪云催生只用佛手散最穩當又效捷論難產由於安逸氣滯大全云婦人以血為主惟氣順則血和胎安則產順今富貴之家過於安逸以致氣滯而胎不轉或為交合使精血聚於胞中皆致產難若腹或痛或止名元胎穩婆不悟入手試水致胞破漿干兒難轉身亦難生矣凡產直候痛極兒逼產門方可坐草時當盛暑倘或血暈血溢當飲清水解之血暈血溢以水解之在暑月尤宜余月亦無害惟少與之冬末春初產室用火和暖下部衣服尤當溫厚方免胎寒血結若臨月洗頭濯足亦致產難論難產由於氣虛不運丹溪曰世之難產者往往見於鬱悶安逸之人富貴奉養之家若貧賤辛苦者無有也古方書止有瘦胎飲一論而其方為湖陽公主作也實非極至之言何也見有用此方者其難自若予表妹苦於難產後遇胎孕則觸而去之予甚憫焉視其形肥勤於針黹尋思旬日忽自悟曰此正與湖陽公主相反彼奉養之人其氣必實耗其氣使平和故易產今形肥知其氣虛久坐知其不運必氣愈弱兒在胞胎用母氣不能自運耳當補其母之氣則兒健易產矣令其有孕至六七個月來告遂以大全方紫蘇飲主紫蘇飲最穩當可法加補氣藥與數十帖因得兒而甚快後遂以此方隨母形色性稟參時令加減與之無不應者因名其方曰達生散論難產由於血滯血乾郭稽中曰產難者因兒轉身將兒枕血塊破碎與胞中敗血壅滯兒身不能便利是以難產急服勝金散消其血使兒自易生陳無擇云多因兒未轉順坐草太早或努力太過以致胞衣破而血水乾產路澀而兒難下宜先服催生如神散以固其血設或逆生橫產當用前法針刺之大全云治胞漿先破惡水來多胎幹不得下須先與四物湯補養血氣次煎濃蔥湯放冷令穩婆洗產戶須是款曲洗令氣上下通暢更用酥油滑石末塗產口裡次服神妙乳朱丹或葵子如聖散楊子建十產論一曰正產者婦人懷胎十月滿足忽腰腹作陣疼痛相似胎氣頓陷至於臍腹痛極乃至腰間重痛穀道挺迸繼之漿破血出兒自遂生二曰傷產者蓋因人之生陰注陽定各有時日不可改易今有未產一月以前忽然臍腹疼痛有如欲產仍卻無事是名試月非正產也但一切產母未有正產之候即不可令人抱腰緊抱則兒不能轉身故不可產母亦不可妄亂用力蓋欲產之婦臍腹疼痛兒身未順收生之婦卻教產母虛亂用力兒身才方轉動卻被產母用力一逼使兒錯路忽橫忽倒不能正生皆緣產母用力未當之所致也凡產母用力須待兒子順身臨逼門戶方始用力一送令兒下生此方是產母之用力當也此學養子法可於平日令兒女子熟聞之若未有正產之候而用力傷早並妄服藥餌令兒下生譬如揠苗助長無益而有害矣三曰催產者言婦人慾產漿破血下臍腹作陣疼痛極甚腰重穀道挺迸已見是正產之候但兒卻未生即可服藥以催之或有經及數日產母困苦已分明見得是正產之候但兒子難生亦可服藥以助產母之正氣令兒速得下生補正氣確是良工有用人參五錢催生最妙四曰凍產者冬月天冷產母經血得冷則凝以致兒子不能生下此害最深若冬月產者下部不可脫去綿衣並不可坐臥寒處當滿房著火常有暖氣令產母背身向火令臍下腿膝間常暖血得熱則流散使兒易生五曰熱產者盛夏之月產婦要溫涼得所不可恣意取涼傷損胎氣亦不可人多熱氣逼襲產母使產母血沸而有發熱頭疼面赤昏昏如醉乃至不知人事六曰橫產者兒先露手或先露臂此由產母未當用力而用之過也兒身未順用力一逼遂至身橫不能生下當令產母安然仰臥後令看生之人先推其手令入直上漸漸逼身以中指摩其肩推上而正之或以指攀其耳而正之須是產母仰臥然後推兒直上徐徐正之候其身正煎催生藥一盞吃了方可用力令兒下生七曰倒產者產母胎氣不足關鍵不牢用力太早母氣弱而倒產者當服補劑若用力早者又當別論致令兒子不能迴轉便直下先露其足當令產母仰臥令看生之人推其足入去不可令產母用分毫力亦不得驚恐使兒自順八曰偏產者兒身未正產母用力一逼至令兒頭偏在左腿或偏在右腿故頭雖露偏在一畔不能生下當令產母仰臥次令看生之人輕輕推兒近上以手正其頭令兒頭頂端正然後令產母用力一送即便生下若是小兒頭後骨偏在穀道只露其額當令看生之人以綿衣炙溫裹手於穀道外方輕輕推兒頭正便令產母用力送兒生也立頂三法九曰礙產者兒身已順而露正頂不能生下蓋因兒身迴轉肚帶攀其肩以此露正頂而不能生當令產母仰臥令看生之人輕推兒近上徐徐引手以中指按兒肩下撥其肚帶仍須候兒身正順方令產母用力一送使兒生下十曰坐產者兒將欲生其母疲倦久坐椅褥抵其生路急於高處系一手巾令產母以手攀之輕輕屈足坐身令兒生下非坐在物上也十一曰盤腸產者臨產母腸先出然後兒生趙都運恭人每產則大腸先出然後產子產後其腸不收甚以為苦醫不能療偶在建昌得坐婆一法而收之其法以醋半盞新汲水七分調停噀產母面每噀一縮三噀盡收此良法也收腸法妙絕產難治驗淳于意治淄州王美人懷子而不乳召於意往飲以莨菪藥一撮以酒飲之旋乳意復診其脈而脈躁躁者有餘病即飲以硝石一劑出血血如豆比五六枚不乳不產也莨菪是迷藥其根惡毒考之本草並無催生語然是毒藥亦或感其毒氣而胎下也滑伯仁治一婦難產七日而不乳且食甚少伯仁視之以涼粥一盂粥用涼者以其煩也又涼則性降搗楓葉煎湯調啖之旋乳或詰其理滑曰此婦食甚少未有無穀氣而生者夫楓葉先生先落後生後落故以作湯飲也本草楓葉亦能催生今村婦亦每用之臨月洗浴第不知胃氣不足者亦可用否耳龐安常治一婦產七日而子不下百治不效龐視之令其家人以湯溫其腰腹自為上下拊摩孕者覺腸胃微痛呻吟間生一男其家驚喜而不知所以龐曰兒已出胞但一手誤執母腸不能脫非符藥所能為吾隔腹捫兒手所在針其虎口痛即縮手所以遽生法術神奇罕聞見耳無他術也取兒視之右手虎口針痕存焉一婦累日產不下服催生藥不效龐曰此必坐草太早心下懷懼氣結而不行非不順也素問曰恐則氣下蓋恐則精神怯怯則上焦閉閉則氣逆逆則下焦脹氣乃不行矣以紫蘇飲一服便產及治婦人子懸證紫蘇飲見胎前脹滿吳茭山治一婦產難三日不下服破血行經之藥俱罔效吳因制一方以車前子為君芣芣苢即車前或用草亦可性最溫利故君之冬葵子為臣白芷枳殼為佐使巳服午產眾醫異之吳曰本草謂催生以此為君毛詩採芣苢以防產難是也劉復真遇府判女產不利已斂劉取紅花濃煎扶女於凳上以綿帛蘸湯罨之連以澆帛上以器盛水又暖又淋久而甦醒遂生男子蓋遇嚴冬血冷凝滯不行溫即產見亦神矣凍產治驗法奇而正妙妙一醫宿客店值店婦產數日不下下體已冷無藥甚窘以椒橙茱萸等煎湯可下手則和臍腹產門處皆淋洗之氣溫血行遂產論交骨不開薛氏曰交骨不開產門不閉皆由元氣素弱胎前失於調攝以致血氣不能運達而然也交骨不開陰氣虛也用加味芎歸湯補中益氣湯產門不閉氣血虛也用十全大補湯地官李孟卿娶三十五歲女為繼室妊娠慮其產難索加味芎歸湯四帖備用至期果產門不開止服一帖頓然分娩上舍費懷德之室產門不開兩日未生服前藥一劑即時而產上舍傳此方用之者無有不驗一婦人分娩最易至四十妊娠下血甚多產門不開與前湯一劑又以無憂散斤許煎熟時時飲之以助其血而產論胎死腹中準繩云產難子死腹中者多因驚動太早或觸犯禁忌致令產難胞漿已破無血養胎枯涸而死故也須驗產母舌若青黑其胎死矣當下之大法寒者熱以行之熱者涼以行之燥者滑以潤之危急者毒藥下之一穩婆之女勤苦負重妊娠腹中陰冷重墜口中甚穢余意其胎必死令視其舌果青黑與朴硝半兩許服之隨下穢水而愈其有用攻擊之藥而無益者以產母之本氣竭而神不使也宜補之一婦胎死服朴硝而下穢水肢體倦怠氣息奄奄用四君為主佐以四物薑桂調補而愈愚意虛劇者朴硝同補劑下之何如臨產脈法附驗看生死法脈經云懷妊六七月脈實大牢強弦緊者生沉細者死脈勻細易產大浮緩氣散難產脈訣云欲產之婦脈離經沉細而滑也同名夜半覺痛應分誕來朝日午定知生身重體熱寒又頻舌下之脈黑復青反舌上冷子當死腹中須遺母歸冥面赤舌青細尋看母活子死定應難唇口俱青沫又出母子俱死總教棄面青舌赤沫出頻母死子活定知真不信若能看應驗尋之賢哲不虛陳臨月束胎束胎丸胎瘦易生服至產則已白朮枳殼去穰麩炒各等分上為末燒飯丸如桐子大入月一日食前服三五十丸溫水下燒飯用荷葉煎湯更妙達生散孕至八九個月內服十數帖甚好易產大腹皮三錢人參陳皮紫蘇莖葉各五分歸身尾白朮各一錢白芍藥炙一錢甘草炙二錢上切作一服入青蔥五葉黃楊腦七個即黃楊樹葉梢見食少胎瘦者不須用水煎服或加枳殼砂仁春加川芎夏加黃芩秋加澤瀉冬加砂仁氣虛倍參術氣實加香附陳皮血虛加當歸地黃形實倍紫蘇性急多怒加黃連柴胡熱甚加黃芩濕痰加滑石半夏食積加山楂食後易飢倍黃楊腦腹痛加木香官桂加法俱妙甚又方第九個月服即束胎丸變法也若氣血不足者當再酌之酒芩酒炒一兩虛弱人不宜涼藥者減半白朮一兩枳殼麩炒滑石各七錢半臨月十日前用小便多者減此一味上為末粥丸桐子大每服五十丸空心熱湯下氣實人宜服多則恐損元氣滑胎枳殼散妊孕七八個月常宜服滑胎易產湖陽公主每產累日不下南山道人進此方商州枳殼麩炒二兩粉甘草炙一兩上為細末每服三錢百沸湯點服日三服兩方兼服固妙然與氣虛者非宜溫隱居加當歸廣木香各等分許學士云枳殼性苦寒若單服之恐有胎寒胎痛之疾以地黃當歸蜜丸佐之可也名內補丸蓋枳殼散破氣有餘而內補丸補血不足也內補丸治妊娠衝任脈虛補血安胎與枳殼散間服熟地黃二兩當歸一兩微炒上為末煉蜜丸如桐子大每服三四十丸溫酒或滾湯下張氏方治妊娠胎肥壅隘動止艱辛臨月服之縮胎易產兼治腸中諸疾下氣寬膈氣實者宜之枳殼五兩甘草一兩半香附子三兩炒去毛上為末薑湯點服如丈夫婦人冷氣攻刺脅肋疼痛者用蔥白三寸同煎服婦人脾寒血氣成塊作刺熱酒調服大小便不通白牽牛湯調服牽牛太峻恐非胎產所宜保生無憂散治妊娠身居安逸口厭甘肥憂樂不常食物不節致胞胎肥厚根蒂堅牢或瘦人血少胎弱臨蓐難產入月服之則易生也當歸川芎白芍藥枳殼麩炒木香甘草炙各一錢半乳香另研血餘燒存性另研各五分上作一服水煎入乳香血餘和勻不拘時服神寢丸瘦胎滑利易產臨入月服之神效惟宜氣盛者故臨月可服通明乳香半兩另研枳殼麩炒一兩上為末煉蜜丸如桐子大每服三十丸空心酒下難產催生三合濟生湯以枳殼芎歸達生三方抽其精粹而成合此湯治臨產艱難雖一二日不下者服此自然轉動下生當歸三錢川芎枳殼麩炒各二錢香附子炒大腹皮薑汁洗各一錢半蘇葉八分粉草七分上用水煎待腰腹痛甚服之即產一方加白芷一錢加白芷行血海之氣也佛手散即芎歸湯治妊娠因事僕跌子死腹中惡露妄行疼痛不已口噤欲絕用此藥探之若子死腹中立使逐下若腹痛隨止子母俱安又治臨產艱難胞衣不下及產後血暈不省人事狀如中風血崩惡露不止腹中血刺絞痛血滯浮腫血入心經語言顛倒如見鬼神血風相搏身熱頭痛或似瘧非瘧一切胎前產後危急狼狽垂死等證並皆治之丹溪云催生只用佛手散最穩當又效捷當歸酒洗去蘆一兩川芎七錢一方各等分上細銼分作四服每服先用水一盞煎將干投酒一盞半煎五七沸溫服投酒之法更妙然看緩急用如口噤斡開灌之如人行五里許再灌一服盡此四服便立產神驗如產難倒橫子死腹中先用黑豆炒熱入白水童便各一盞用藥四錢煎服如胞產五七日不下垂死及矮石女子交骨不開者加龜板立齋以交骨不開為陰氣虛龜為至陰板則交錯相解故用之並生育過婦人頭髮燒灰為末每三錢酒調服來蘇散治臨產用力太過氣脈衰微精神困倦頭眩目暈口噤面青發直不省人事木香神麯陳皮去白麥蘖炒黃耆阿膠珠白芍藥苧根甘草各三錢糯米一合半生薑切碎炒黑一錢上銼細水煎拗口灌之連進為妙症亦危矣而不用人參當歸等藥且以神麯麥芽陳皮苧根者何蓋用力太過則胃氣乏矣故亟佐之救其胃氣又一活法也黑神散一名催生如神散治橫生逆產其功甚大並治胎前產後虛損月水不止崩漏等證百草霜白芷不見火各等分上為末每服二錢以童便米醋和如膏加沸湯調下或童便酒煎進二服然血得黑則止此藥大能固血又免血涸甚妙一方加白滑石煎芎歸湯調下催生立應散治難產及橫生逆產車前子當歸各一兩冬葵子白芷各三錢牛膝大腹皮枳殼川芎各二錢白芍藥一錢上銼水煎熱入酒少許服立產榆白皮散治妊娠滑胎易生榆白皮甘草各二兩葵子一兩上為末每服五錢水煎服一方單用榆白皮焙乾為末臨月日三服方寸匕令產極易如聖散專治孕婦難產紫蘇葉當歸各等分上㕮咀每服三五錢用長流水煎服無長流水以水順攪動煎催生散治難產並胞衣不下白芷滑石伏龍肝百草霜各一錢甘草五分上為細末用芎歸湯入酒童便各少許調服二次立效催生飲治臨產生育艱難當歸川芎大腹皮洗枳殼麩炒白芷各等分上銼水煎溫服一方無大腹皮有益母草火麻仁催生湯候產母腹痛腰痛見胞漿水下方服此以破血為主血實氣盛者宜之若今人不辨氣血虛實一概混用可笑桃仁炒去皮赤芍藥牡丹皮官桂白茯苓去皮各一錢上銼一劑水煎熱服活水無憂散專治十月已滿多因恣情及多吃熱毒之物瘀血相搏臨產橫逆之厄愴忙不謹觸死胎兒在腹服此一二帖加烏金丸二顆效如神烏金丸失載查附益母草二兩急性子當歸各四兩陳枳殼一兩生地黃蘇葉赤芍藥各二錢肉桂川芎陳艾各一錢甘草八分活鯉魚一個上分作二服每服用水三碗先將魚入水坐火上略溫急取魚出魚死則難取效矣後下藥煎至二碗臨服之時加入好醋一茶匙每一碗和調烏金丸一顆如死胎不下急取無根水再煎藥渣連服二次七聖散一名七寶散臨產腰痛方可服當歸玄胡索香白芷焙白礬白礬固腎亦固血之意耶薑黃沒藥桂心各等分上為細末每服三錢燒犁頭令紅淬酒調下臨陣疼時一二服立產一方治難產累日氣力乏盡不得生此是宿有病者宜此方不益氣力治宿病而單用大劑催生此急因急用法也妙妙阿膠二兩赤小豆二升上以水九升煮豆令熟去滓納膠令烊每服五合不覺更服不過三服即出勝金散產難蓋因兒枕破與破血裹其子故難產但服此藥逐其敗血即自生逆生橫生並治之麝香末一錢研鹽豉一兩以青布裹了燒紅急研細上每服一錢用秤錘燒赤淬酒下一方治橫生先露手足即非橫生亦可服阿膠炒滑石各一兩冬葵子一合上每服四錢水煎連進二三服一方有酥油一兩油蜜煎治難產瀝漿胞干胎不得下用香油蜂蜜小便各一碗此方簡當小便取其破血又有濁陰下降之理而摩法更妙和勻銅鍋內慢火煎一二滾掠去沫調白滑石末一兩或益母草末攪勻頓服外以油蜂蜜於母腹臍止下摩之或油煎一盞服之亦可一方止用油蜜小便能下難產兔腦丸一名催生丹治難產及橫生逆產兔腦臘月者去皮膜研如膏明乳香二錢半細研母丁香為末一錢麝香一字另研細上研勻用兔腦髓和為丸如雞頭大陰乾油紙封裹每一丸破水後溫水下即產柞木飲子治產難或橫或倒胎爛腹中脹悶服之生柞木一大握長一尺洗淨寸銼生用甘草大者五寸銼五段上用新汲水三升半入新瓷瓶內以紙三重封緊文武火煎至一升半候產婦腰重痛欲坐草時溫飲一小盞便覺心下開豁如覺渴再飲一盞至三四盞覺下重便生此方最驗催生如聖散黃蜀葵子不拘多少焙乾為末熱酒調下二錢神效如無子花亦可若胎漏血乾難產痛極者並進三服良久腹中氣寬胎滑即產須見正產候方可服之如打撲死胎紅花酒下歌曰黃葵子炒七十粒細研酒調濟君急若還臨危產難時免得全傢俱哭泣催生如意散治橫生倒產人參乳香各一錢辰砂二錢一方只用五分上為末臨產時急用雞子清一個調藥末再用薑汁調開冷服即時順產子母無恙催生鉛丹治橫逆難產此墜藥也未敢輕試用黑鉛一錢將小銚子火上熔化投入水銀一錢急攪結成砂子傾出以熟絹衣角紐成丸子如綠豆大臨產時麝香水吞下二丸立下三蛻散治橫逆難產子死腹中蛇蛻一條蟬蛻十四枚人蛻即男子頭髮加雞蛋大一團上俱燒灰為末分三服酒調下滑胎散催生神效益元散一兩蛇蛻一條燒灰存性蟬蛻全者五個燒灰穿山甲一片燒灰存性男子亂髮一團香油熬化上為細末用齏水一碗和藥煎二沸入發灰拌勻冷定服之立下一方治產不順蛇蛻一條全者蠶蛻一張上入新瓦瓶內鹽泥固濟火燒存性為末煎榆白皮湯調下一錢三服覺痛便生一方用蛇蛻一條全者燒灰入麝香一字酒調二錢面東服如橫生逆產以余渣塗所出手足即順也神效乳炒丹治難產明乳香為末以豬心血為丸如桐子大硃砂為衣日乾每服一丸嚼碎冷酒下良久未生再服或以蓮葉蒂七個水煎化服二丸良久未生再服如胞漿先干胎不得下急服大料四物湯滋其血氣並濃煎蔥湯熏洗產戶更用油燭塗產戶內卻服前藥如胎死不下用朴硝五錢滾湯調下此急用方不得已也或平胃散一服送下如胞衣未下酒水服一丸即下產門不開用加味芎歸湯仍服二丸此藥靈驗如神合時須五月五日千時極妙或七月七日三月三日及月初上辰日亦可又方乳香硃砂等分為末麝香酒調下又方通明乳香一塊如皂子大為末腰痛時用冷水醋少許調服扶立令兩手拿石燕子二個遍行數步坐草便生更無痛楚又方乳香研細五月五日滴水丸如雞頭大每服一粒無灰酒下名開骨膏又方用大硃砂於端午曬起以百日為度研為細末取臘月兔腦髓即兔腦丸意丸如綠豆大欲產時粥飲下一丸良久便生曬硃砂不得著雨如神散催生累效靈驗於理固難通於事實殊效妙方用路上草鞋一雙取鼻梁上繩洗淨燒灰童便和酒調下三錢一名千里馬此藥委是神奇小品方治橫生倒產手足先出用粗針刺兒手足入二分許兒得痛驚轉即縮自當回順而生一方用鹽塗兒足底又可急搔抓之並以鹽摩產婦腹上即產黃金散治生產一二日難分娩者服之如神奇方蓋以鎮墜為主能產能安信非虛也真金箔大者五片小者七片以小瓷盅將水少許去紙入金在內用指研勻後再添水至半盅一面先令一人扶產婦虛坐又令一婦人用兩手大指按定產母兩肩上肩井穴前藥溫服其胎即下此催生聖藥如產月未足又能安之勝金丹治難產神效敗兔毫筆頭一枝燒為灰研細搗生藕汁一盞下之立產若產母虛弱及素有冷疾者恐藕冷動氣即於銀器內重湯暖過後服催生萬金不傳遇仙丹蓖麻子十四粒去殼硃砂雄黃各一錢半蛇蛻一尺燒灰存性上為末漿水飯和丸如彈子大臨產時先用椒湯尤妙在椒湯法淋渫臍下次安藥一丸於臍中用蠟紙數重覆上以闊帛束之須臾生下急取去藥一丸可用三次如聖膏治產難並治胞衣不下兼治死胎蓖麻子七粒去殼細研成膏塗腳心胞即下速洗去不洗腸出卻用此膏塗頂上腸自縮入此法用之不驗何歟一方蓖麻子百粒雄黃一錢細研如上法塗之一方蓖麻子三粒巴豆四粒巴豆恐傷臍各去殼入麝香研細貼在臍中歌曰三麻四粒脫衣裳研碎將來入麝香若有婦人遭產難貼在臍中兩分張立聖丹治產難橫逆惡候死胎不下並治神驗寒石四兩內二兩生二兩煅赤研細以寒激之亦是一法然須因人而施毋妄試也硃砂上同研如深桃花色每用三分井華水調如薄糊以紙花剪如杏葉大攤上貼臍心候乾再易不過三上便產治難產雜方益母草方益母草搗取汁七合煎半頓服立下益母不惟催生抑且心痛有驗無新者以乾者一大把水七合煎服一方令產婦兩手各握石燕一枚須臾即下一方雲母粉半兩溫酒調服入口即產萬不失一一方桂心為末童便酒調服一錢神效名救苦散一方用伏龍肝研末每服一錢酒調下一方臘月兔頭煅為末蔥白煎湯調服二錢立生一方燒銅錢通紅放酒中飲之一方皂子二枚研末酒調下一方用魚膠一尺新瓦上煅灰陳醋調服立下魚膠方嘗試果驗一方好墨新汲水濃磨服之一方取弓弩弦以縛腰及燒弩牙令赤納酒中飲之皆取法於快速之義也一方神麯末水服方寸匕一方赤小豆為末東流水服方寸匕一方當歸末酒調一錢服良久再服一方車軸脂吞大豆許兩丸一方紅莧菜與馬齒莧同煮熟臨產食之即下一方車前子為末酒服二錢一方取本夫裩帶五寸燒存性酒調服下一方取槐樹東枝令產婦把之易產一方用紫蘇煎湯調益元散服之即產一方吞槐子十四粒即下一方取槐子十四枚蒲黃一合納酒中溫服須臾不生再服之水服亦得一方生薑汁生地黃汁各半升合煎熟頓服之凡產婦藥性不同胎氣各異諸方種種俱云神效然用者必詳症體選之方驗不然恐漫嘗無益治交骨不開龜殼散治交骨不開不能生產當歸川芎各一兩敗龜板一個酥炙婦人頭髮生男女多者一握燒存性上為散每服五錢水煎服約人行五里即生如胎死亦下灼過龜板亦可治胎死腹中烏金散治難產或熱病胎死腹中或因顛仆或從高墜下或房室驚搐或臨產驚動太早觸犯禁忌或產時未到經行先下惡露已盡致胎乾子死身冷不能自出但視產母面赤舌青是其候也面青舌赤母死子活唇青吐沫子母俱斃又有雙胎或一死一活其侯難知臨時觀變可也熟地黃洗切焙乾酒焙真蒲黃大當歸交趾桂楊芍藥軍姜去皮粉草各一兩小黑豆四兩百草霜五錢上為末每用二錢米醋半合許沸湯六七分浸起溫服疑貳之際且進佛手散酒水合煎二三服探之若未死子母俱安若胎已死立便逐下的知其胎死進此藥後更進香桂散須臾如手推下常用催生更加好滑石末半兩葵子五十粒捶碎黃柞葉七八皮蔥白二寸順流水煎湯調下蓋滑石能利小便柞葉行氣逐血蔥白內通陽氣氣盛血行即產矣香桂散下死胎麝香五分另研一方用當門子一個官桂三錢為末一方用桂枝二錢上和勻作一服溫童便酒或蔥湯調服服法妙須臾如手推下此方比之用水銀等不損血氣一方加白芷三錢一方單用桂末一錢童便調下名救苦散平胃散治死胎不下指甲青舌青脹悶口中作屎臭蒼朮米泔浸陳皮厚朴薑汁炒各一錢甘草炙五分上銼一劑酒水各一盞煎至一盞投朴硝半兩再煎三五沸溫服其胎化血水下或只用朴硝半兩研細以童便調溫服亦妙或用二錢以順流水調下一平胃散也而用以下死胎可見用法之不窮如此蓋胃行則死胎自行更投樸硝則無不下矣妙妙一方治妊娠三五個月胎死在腹中不出大腹子赤芍藥榆白皮各三兩當歸炒一兩滑石七錢半瞿麥葵子炒茯苓粉草黃芩各半兩上為粗末每服四錢水煎服千金神造湯治動胎及產難子死腹中並妊娠兩兒一死一生服之令死者出生者安神驗蟹爪一升甘草一兩阿膠三兩藥妙分兩尤奇上三味以東流水一斗先煮蟹爪甘草東流取其順下先煮取其力全得三升去滓次納膠令烊頓服之不能分再服若人困拗口納藥藥入即活煎藥作東向灶用葦薪煮之煮葦薪取輕虛之意一方治胎死腹中乾燥著背葵子一升要知葵子多用方妙阿膠二兩上以水五升煮取二升頓服之未出再煮服一方治子死腹中或半生不下或半著脊骨在草不產血氣上蕩母心面無顏色氣欲絕及治胞水早干胎澀不下豬脂一斤白蜜一升淳酒二升上三味共煎至二升服分溫二服不能服者隨多少緩緩服之一方治胎死腹中或半產不下官桂五錢牡丹皮川芎葵子各一錢二分上為細末每服三錢蔥白湯下半夏湯治胎衣不下或子死腹中或血衝上昏悶或血暴下及胞干而不能產者半夏曲一兩半桂去皮七錢半大黃五錢桃仁三十個去皮尖炒上為粗末先服四物湯一二服妙在先服四物次用此藥三錢生薑三片水煎服如未效次服下胎丸下胎丸治產難胞衣不出橫倒者及兒死腹中母氣欲絕者半夏生白蘞各半兩上為細末滴水丸如桐子大食後用半夏湯下三二丸續續加至五七丸一方下三十丸漸加至五十丸治肥胖痰多難產者妙一方治生產不順胎死腹中胎衣不下臨產危急妙蛇蛻一條全者香油燈上燒研麝香少許上為末童便酒各半盞調下一服即生效霹靂奪命丹治臨產驀然氣痿目翻口噤面黑唇青沫出口中子母俱損兩臉微紅子死母活蛇蛻一條瓦罐內煅蠶蛻燒二錢男子發燒灰一錢乳香五分黑鉛二錢半水銀七分半依前法作千里馬即路上左腳舊草鞋一隻取鞋鼻洗淨燒灰一錢上為末以獖豬心血丸如桐子大金銀箔七片為衣每服二丸用倒流水灌下或入伏龍肝調下危症極矣必黑鉛水銀方妙然症少緩者切不可用之宣明硇砂散治胎死腹中不下硇砂研細當歸各一兩上研極細只分作二服溫酒調下如重車行五里不下再服牛膝丸下死胎杜牛膝三兩紫金藤紫金藤即紫木香蜀葵根各七錢當歸四錢肉桂三錢麝香五分上為末米糊為丸如桐子大硃砂為衣每服五十丸乳香湯送下一方治產難數日子死腹中不出母氣欲絕瞿麥六兩通草桂心各三兩牛膝榆白皮各四兩上細切用水九升煮取三升去渣分三服頓飲即下一方無榆白皮有天花粉四兩大能墮胎天花粉亦能墜胎一字神散治子死腹中胞衣不下胞破不生累有神驗鬼臼亦可治鬼胎不拘多少黃色者去毛研為末以手指捻之如粉極細為度此藥不用羅每服三錢用無灰酒一盞煎至八分通口服立生如神治死胎雜方以下二十餘方隨人取便用之一方用辰砂一兩以水煮數沸為末取酒服之立出一方真珠二兩為末酒調服盡立出一方葵子為末酒服方寸匕若口噤不開格口灌之藥下即活一方鹿角屑一兩蔥五莖豆豉半合水煎服一方鹿角燒灰存性為末每服三錢溫酒調下一方水銀半兩桂末三錢溫酒調下粥飲亦得一方錫粉水銀各一錢棗肉丸如大豆大水吞下立出一方用雞子黃一個生薑自然汁一合調勻頓服分娩後用蕓薹子粥補之一方瞿麥二兩銼碎水八盞煎一盞服未出再服一方灶心黃土為末酒調服二錢一方鍋底墨酒調服一方米麥赤小豆同煮濃汁服立出一方紅花酒煮汁服二三盞一方以利斧煅赤置酒中待溫飲之其子自下一方用雌雞糞二十一枚水二升五合下米作粥食即下一方用三家雞卵各一枚三家鹽各一撮三家水合一升合煮令產婦東向飲之立出一方取夫尿二升煮令沸飲之一方以黃牯牛糞塗母腹上立出一方以牛糞炒令大熱入醋半盞以青布包裹於母臍上下熨之立下一方用烏雞一隻去毛細切水煎三二升候湯通手用衣帛蘸摩腹中胎自出一方榆白皮煮汁服二升一方治有孕月數未足子死腹中母欲悶絕取大豆三升醋煮濃汁三升頓服一方用栝簍根一味焙為末每服二錢取順流水下
