body:
  text: 卷之二經閉門論經閉由二陽之病治宜瀉心火養脾血潔古曰女子月事不來者先瀉心火血自下也內經曰二陽之病發心脾有不得隱曲故女子不月其傳為風消王啓玄注曰大腸胃熱也心脾受之心主血心病則血不流脾主味脾病則味不化味不化則精不足故其病則不能隱曲脾土已虧則風邪勝而氣愈消也又經曰月事不來者胞脈閉也胞脈屬於心絡於胞中今氣上迫肺心氣不得下通故月事不來先服降心火之劑後服局方中五補丸後以衛生湯治脾養血也瀉心火養脾血是從本文之義愚謂當原隱曲推解蓋人有隱情曲意難以舒其衷者則氣鬱而不暢不暢則心氣不開脾氣不化水穀日少不能變見氣血以入二陽之血海矣血海無餘所以不月也傳為風消者陽明主肌肉血不足則肌肉不榮其不消瘦乎風之名火之化也故當根不得隱曲上看乃有本論經閉不行有三治宜補血瀉火東垣曰經閉不行有三婦人脾胃久虛形體羸弱氣血俱衰而致經水斷絶不行或病中消胃熱善食漸瘦津液不生夫經者血脈津液所化津液既絶為熱所爍肌肉漸瘦時見渴燥血海枯竭病名曰血枯經絶宜瀉胃之燥熱補益氣血經自行矣立方固有法然不必太泥因人易轍可也此病或經適行而有子子亦不成而為胎病者有矣此中焦胃熱結也或心包絡脈洪數躁作時見大便祕澀小便雖清不利而經水閉絶不行此乃血海乾枯宜調血脈除包絡中火邪而經自行矣此下焦胞脈熱結也或因勞心心火上行月事不來者胞脈閉也胞脈者屬於心而絡於胞中今氣上迫肺心氣不得下通故月事不來宜安心補血瀉火經自行矣此上焦心肺熱結也樓氏曰上東垣潔古治血枯之法皆主於補血瀉火也補血者四物之類瀉火者東垣分上中下故火在中則善食消渴治以調胃承氣之類火在下則大小便祕澀治以玉燭之類玉燭者四物與調胃承氣等分也火在上則得於勞心治以芩連及三和之類三和者四物涼膈等分也潔古先服降心火之劑者蓋亦芩連三和玉燭之類後服五補衛生者亦補氣之劑也據此論當有四證如胃熱包絡熱勞心熱三證皆有餘宜瀉火養胃是矣而所言脾胃久虛致經水斷絶一症又當以補脾胃為主豈得舍而勿論耶蓋水入於經其血乃生谷入於胃脈道乃行水去榮散谷消衛亡況脾統諸經之血而以久虛之脾胃以致氣血俱衰者可不為之補益乎即此以分虛實明是四證無疑而樓全善乃遺補虛一證何歟論經閉因肝勞血傷駱氏曰經云有病胸脅支滿妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名曰血枯此病機也宜知此年少時因大脫血或醉而入房虧損腎肝蓋肝藏血受天一之氣以為滋榮其經上貫膈布脅肋若脫血失精肝氣已傷肝血枯涸不榮而胸脅滿妨於食則肝病傳脾而聞腥臊臭出清液若以肝病而肺乘之則唾血四肢清目眩時時前後血出皆肝血傷之症也胸脅滿證人皆伐肝豈知血枯之故宜養肝血也當須識此論經閉因勞傷當大補脾胃良方云婦人月水不通或因醉飽入房或因勞役過度或因吐血失血傷損肝脾但滋其化源其經自通若小便不利苦頭眩痛腰背作痛足寒時痛久而血結於內變為癥瘕若血水相併脾胃虛弱壅滯不通變為水腫若脾氣衰弱不能制水漸漬肌肉變為腫滿當益其津液大補脾胃方可保生王節齋曰婦人女子經脈不行多有脾胃損傷而致者不可便認作經閉死血輕用通經破血之藥發所未發極是但有肝氣鬱滯以致脾土失運不能化血者又須和肝氣為要醫者知之遇有此證便須審其脾胃如何若因飲食勞倦損傷脾胃少食惡食泄瀉疼痛或因誤服汗下攻克藥傷其中氣以致血少而不行者只宜補養脾胃用白朮為君茯苓芍藥為臣佐以黃耆甘草陳皮麥芽川芎當歸柴胡等分脾肝藥能生血而經自行矣又有飲食積滯致損脾胃者亦宜消積補脾若脾胃無病果有血塊凝結方宜行血通經論室女經閉成勞因思慮傷心寇宗奭曰夫人之生以氣血為本人之病未有不先傷其血氣者若室女童男積想在心思慮過度多致勞損男子則神色消散女子則月水先閉蓋憂愁思慮則傷心而血逆竭神色先散月水先閉且心病則不能養脾故不嗜食脾虛則金虧故發嗽腎水絶則木氣不榮而四肢干痿故多怒鬢髮焦筋骨痿若五臟傳遍則死自能改易心志用藥扶持庶可保生切不可用青蒿此用青蒿者亦不妨以其清氣中熱也虻蟲等涼血行血宜用柏子仁丸澤蘭湯益陰血制虛火暗室一炬薛氏曰經云五穀入於胃其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心肺而行呼吸榮氣者泌其津液注之於脈化以為血以榮四末內養五臟六腑亦須兼脾盡胃陽脾陰主治有異也若服苦寒之劑復傷胃氣必致不起一室女年十七癧久不愈天癸未通發熱咳嗽飲食少思欲用通經丸余曰此蓋因稟氣不足陰血未充故耳但養氣血益津液其經自行彼惑於速效仍用之余曰非其治也此乃剽悍之劑大助陽火陰血得之則妄行脾胃得之則愈虛後果經血妄行飲食愈少遂致不救脈經云有一婦將一女子年十五所來診言女子年十四時經水自下今經反斷其母言恐怖師曰若是夫人親女必夫人年十四時亦以經水下所以斷此為避年既有避年之名不必強求其治勿怪後當自下此真氣猶怯稟賦素弱而然也宜固天元真氣使水升火降則五臟自和而經脈通矣論經閉因積冷結氣要略曰婦人之病因虛積冷結氣為證經水斷絶至有歷年血寒積結胞門寒傷經絡分耗也凝堅在上嘔吐涎唾久成肺癰形體損分在中盤結繞臍寒疝或兩脅疼痛與臟相連或結熱中病在關元脈數無瘡肌若魚鱗時著男子非止女身在下未多經候不勻令陰掣痛少腹惡寒或引腰脊下根氣衝氣衝急痛膝脛疼煩奄忽眩冒狀是厥癲或有憂慘悲傷多嗔此皆帶下非有鬼神久則羸瘦脈虛多寒三十六病千變萬端審脈陰陽虛實緊弦行其針藥治危得安其雖同病脈各異源子當辨記勿謂不然論經閉因痰飲所隔張子和云凡婦人月事不來用茶調散吐之據此吐法能學子和者則可在他人則不可用吐固是一法然體虛者不宜次用玉燭散芎歸湯三和湯桂苓白朮散之類降心火益腎水開胃進食分陰陽利水道之藥也一婦人月事不行寒熱往來口乾頰赤飲食少旦暮間咳一二聲諸醫皆用虻蟲水蛭乾漆硇砂芫青紅娘子沒藥血竭之類惟戴人不然曰古方雖有此法奈病人服之必臍腹發痛飲食不進乃命止藥飲食少進內經曰二陽之病發心脾心受之則血不流故女子不月既心受積熱宜抑火升水流濕潤燥開胃誘食乃湧出痰一二升惟有痰者可用亦須形病俱實下泄水五六行濕水上下皆去血氣自然湍流月事不為水濕所隔自依期而至矣亦不用虻蟲水蛭之類有毒之藥如用之則月經總來小溲反閉他證生矣凡精血不足宜補之以食大忌有毒之藥偏勝而致夭閼多矣一婦人年三十四歲經水不行寒熱往來面色萎黃唇焦頰赤時咳二三聲問其所服之藥黑神散烏金丸四物湯燒肝散鱉甲散建中湯寧肺散針艾千百轉劇家人意倦不欲求治戴人憫之先湧痰五六升午前湧畢午後進食飲證悉除形盛氣實病其藥當然非輕試之法慎之後三日復輕湧之又去痰一二升食益進不數日又下通經散瀉訖一二升數日去死皮數重小者如麩片大者如葦膜不月餘經水自行神氣大康矣論下利經斷利止經來脈經曰婦人下利而經水反斷者何也師曰但當止利經當自下勿怪所以利不止而經斷者但下利亡津液故經斷利止津液復經當自下若婦人血下咽乾而不渴其經必斷此榮不足本自有微寒故不引飲渴而引飲者津液得通榮衛自和其經必復下論經閉總因血滯血枯李氏曰婦人以血為主天真氣降壬癸水合腎氣全盛血脈流行當以三旬一見以象月盈則虧故曰月經經行與産後一般若其時余血一點未淨或外被風寒及濕冷暑熱邪氣或內傷生冷七情鬱結為痰為瘀凝積於中曰血滯或經止後用力太過入房太甚及服食燥熱以致火動邪氣盛而津液衰曰血枯良方云經後被驚則血氣錯亂妄行驚則氣亂故錯經妄行逆於上則從口鼻而出怒則氣逆上衝甚則嘔血逆於身則血水相搏變為水腫恚怒則氣血逆於腰腿心腹背脅手足之間重痛經行則發過期則止怒極傷肝則有眩暈嘔血瘰癧血風瘡瘍等病加之經血滲漏於其間遂成竅血生瘡淋瀝不斷濕熱相搏遂為崩帶血結於內變為癥瘕凡此變證百出不過血滯與枯而已總結但血滯亦有虛熱血枯亦有虛熱故重則經閉不通以滯枯分言輕則經水不調止言虛與熱而已血滯經閉宜破者原因飲食毒熱或暴怒凝瘀積痰直須大黃乾漆之類推陳致新俾舊血消而新血生也若氣旺血枯起於勞役憂思卻宜溫和滋補或兼有痰火濕熱尤宜清之涼之每以肉桂為佐者熱則血行也但不可純用峻藥以虧陰道至於耗氣益血之説雖女科要法但血為氣配氣熱則熱氣寒則寒氣升則升氣降則降氣行則行氣滯則滯如果鬱火氣盛於血者方可單用香附丸散抑氣散當加木香檳榔枳殼以開鬱行氣若氣亂則調氣冷則溫氣虛則補男女一般陽生則陰自長氣衰則血亦涸豈可專耗其氣耶論者多泥叔和血旺氣衰不知叔和論肝肺二脈以肝藏血肺主氣也則宜肝旺於肺其實氣血平和有孕故繼曰兩臟通和但婦人見偏性鄙婢妾志不得伸鬱怒無時不起故香附為女人仙藥經曰邪氣勝則實正氣奪則虛可不悟諸大概只虛熱痰氣四證而已不調亦大相同隨證調治飲食調和自然血氣流通更有凝滯然後可用紅花當歸散紫葳散通經丸導經丸之類虛者只用當歸散以通之通後又須養血益陰使津液流通苟不務氣血充和而惟以毒藥攻逼是求千金於乞丐必死而後已論經閉大法丹溪云經不通或因墮胎及多産傷血或因久患潮熱銷血或因久發盜汗耗血或因脾胃不和飲食少進而不生血或因痢疾失血治宜生血補血除熱調和之劑隨證用之或因七情傷心心氣停結故血閉而不行宜調心氣通心經使血生而經自行矣生血在補脾胃調飲食適寒溫所謂脾旺則能生血也至於心氣結者宜調心又為心主血也脈法脈經曰腎脈微澀為不月經閉脈法備前調經門當參看治血枯經閉玉燭散治胃熱消渴善食漸瘦津液為熱燥竭以致血海乾枯此即四物湯與調胃承氣湯合方也當歸川芎白芍藥地黃大黃芒硝甘草各等分上銼每服八錢水煎食前服三和散治勞心心火上行以致胞脈閉塞月事不來此即四物湯與涼膈散合方也此治勞心之實熱者也如心虛而熱收於內與夫心虛而土衰者不宜妄用當歸川芎白芍藥地黃大黃朴硝黃芩梔子連翹薄荷甘草各等分上銼每服八錢水煎服二黃散治婦人室女經脈不通服之如神大黃燒存性二錢生地黃三錢上為末作一服空心好酒調下二氣丸治月水不調斷絶不産面黃肌瘦憔悴不美食有燥熱以柴胡引子相參服之大黃四兩另為末醋一升慢火熬為膏子當歸白芍藥各二兩上為末以膏子和丸如桐子大每服二十丸淡醋湯下食前服日進三服四方俱用大黃而配合不離四物自有輕重緩急不同宜加詳之五補丸補諸虛安五臟堅骨髓養精神凡胞脈閉先服降心火之劑後服此丸及衛生湯以治脾養血也熟地黃人參牛膝酒浸去蘆焙乾白茯苓地骨皮各等分上為細末煉蜜丸如桐子大每服三五十丸空心溫酒下熟地以補天一之水人參以生天一之氣所謂水生於氣也然氣不降則水不生故用白茯苓以降天氣地骨皮以清氣中之火牛膝引之下行此立方之大意也衛生湯當歸白芍藥各二兩黃耆三兩甘草一兩上為末每服半兩水二盞煎至一盞空心溫服如虛者加人參一兩五補丸補水之源衛生湯行已生之血蓋地黃茯苓人參俱補裡氣之不足而黃耆甘草又益表氣之不足當歸芍藥行肝血之不足有先後天之意焉潔古先服降心火之劑者蓋亦芩連三和玉燭之類後服五補衛生者亦補氣之劑也柏子仁丸治血虛有火月經耗損漸至不通日漸羸瘦而生潮熱並治室女思慮成勞經閉慎勿以毒藥通之宜此兼服澤蘭湯柏子仁炒另研牛膝酒洗卷柏各半兩澤蘭葉續斷各二兩熟地黃三兩酒浸半日石臼內杵成膏上為細末煉蜜丸如桐子大空心米飲下三十丸夫血生於心心火旺則津枯而血不化故用柏子仁以潤心而生津火位之下水氣承之故用熟地黃以滋水其四種皆通血脈而續絶有也澤蘭湯治證同前澤蘭葉三兩當歸酒洗芍藥炒各一兩甘草五錢上為粗末每服五錢水二盞煎一盞溫服加味補中益氣湯治飲食勞倦損傷脾胃氣弱體倦發熱作渴飲食減少而不生血者黃耆人參甘草炙白朮當歸陳皮各一錢升麻柴胡各三分生地黃天花粉各八分上銼加生薑作一服水煎服若胃寒而色不華者去生地花粉有虛火者宜加十全大補湯治墮胎及多産育傷血或誤服汗下克伐之藥以致血衰氣乏而經不行者此方溫補氣血為主所謂勞者溫之損者溫之是也人參白朮白茯苓甘草炙當歸川芎白芍藥熟地黃黃耆肉桂各二錢上銼作一服水煎服養真湯治婦人經閉不通臍下有塊已經三載百藥無效服此數劑經行又投數劑而塊消矣以上十一方重在血枯二字當歸酒洗川芎白芍藥酒炒熟地黃薑汁炒白茯苓陳皮梔子炒山茱萸去核益母草小茴香酒炒香附子醋浸炒各等分上銼每服一兩水煎服五六劑後經通作丸服凡通經消塊俱用破氣削堅大熱大毒之類而此方俱以行氣調氣血散結氣暖下元之藥等分而又以山梔涼藥佐之何也但聞山梔能治塊中之火未聞能治三年之塊而通經也在善用之治血澀經閉溫經湯治經道不行繞臍寒疝痛徹其脈沉緊此由寒氣客於血室血凝不行為氣所沖新血與故血相搏所以作痛宜此湯與桂枝桃仁湯當歸川芎芍藥官桂牡丹皮蓬朮各一錢人參牛膝各一錢甘草炙五分上㕮咀水二鍾煎至一鍾不拘時服此溫行之劑也以四物去地黃恐凝滯耳人參得官桂則能溫行故加之然諸痛忌參術亦有不必用者在去取之有法焉桂枝桃仁湯治證同前方見調經門疼痛條紅花當歸散治婦人經候不行或積瘀血腰腹疼痛及室女月經不通紅花當歸尾紫葳牛膝蘇木細銼甘草各二兩赤芍藥九兩劉寄奴五兩桂心白芷各一兩半上為細末空心熱酒調下三錢食前臨臥再服此皆破血之藥然不用川芎以行血海之血而用白芷以行陽明之經者以血海隸乎陽明也若久血不行濃煎紅花酒下孕婦勿服一名凌霄花即紫葳行經紅花湯治婦人室女經候不行時作脹痛當歸尾赤芍藥紫葳劉寄奴牛膝玄胡索紅花蘇木桃仁炒各一錢青皮香附各八分桂心五分上作一服水煎空心服此與前方不相連而青皮桃仁乃厥陰肝經藥要分別此義凌霄花散治婦人月水不行發熱腹痛當歸赤芍藥凌霄花劉寄奴牡丹皮酒洗玄胡索官桂白芷紅花酒浸各等分上㕮咀每服四錢水一盞酒半盞煎服總是破血行經藥而發熱二字實略之即丹皮涼血而官桂白芷非溫熱之味乎蓋重在不行而不重在熱也竊觀酒洗酒浸酒煎之法然乎否乎瑞金散治婦人血氣撮痛月經不行片薑黃四兩當歸赤芍藥川芎牡丹皮蓬莪朮玄胡索官桂紅花各二兩上㕮咀每服八錢水一盞酒三分煎八分食前服薑黃莪朮又兼在氣在肝之理土牛膝散治婦人室女血閉不通五心煩熱專主血閉曾藉此以治婦人血塊作痛有效土牛膝當歸尾各一兩桃仁去皮麩炒紅花各半兩上為細末每服二錢空心溫酒下當歸散治血脈不通專主在脈絡當歸穿山甲微炒蒲黃炒各半兩辰砂另研一錢麝香少許上為細末研勻每服二錢食前熱酒調下琥珀散治心膈迷悶腹臟撮痛氣急氣悶此專在氣月信不通等疾天台烏藥二兩當歸蓬朮煨切各一兩上為細末每服二錢溫酒調下後以食壓之忌生冷油膩産後諸疾炒薑酒調下桃奴飲子治婦人室女月經不通漸成脹滿及治男子墜馬跌撲損傷以致瘀血停積欲成血蠱病者悉皆治之桃奴桃樹上嫩桃干朽不落者冬月及正月收鼠糞即雄鼠糞也兩頭尖者是玄胡索五靈脂肉桂香附子砂仁桃仁去皮尖另研各等分上為細末每服三錢空心溫酒調下類濁陰之物以破汙積之血佐溫熱之味以行停滯血氣蓋為氣血流也萬病丸治經事不來繞臍寒疝痛乾漆杵碎炒煙盡須青白如此一時牛膝去苗酒浸一宿焙乾各一兩上為末以生地黃汁一升入二藥末銀器內慢火熬妙在以生地汁熬破血藥大有見解可丸即丸如桐子大每服二丸空心米飲或酒下以上諸方俱輕劑隨寒熱選用通經丸治經閉不通及血塊疼痛不用虻蟲水蛭斑蝥之類是重劑中之輕者最穩歸尾桃仁去皮尖大黃煨牡丹皮乾漆炒煙盡肉桂牛膝莪朮各一兩三稜醋炒五錢麝香八分上為末皂角五錢芫花二錢水煎糊為丸如桐子大每服五十丸米湯下産寶方治月經不通腹中痛牛膝六分大黃桃仁去皮尖炒細辛各五分川芎當歸各四分水蛭三分糯米炒黃水蛭須炒十分焦蓋生則害人也上為細末煉蜜丸桐子大每服二十丸空心溫酒下千金桃仁煎治血積癥瘕月水不行此涼行之劑血因熱結者宜之大黃濕紙裹煨桃仁去皮尖炒朴硝各二兩虻蟲一兩去足翅炒黑上為細末醋二升半銀石器中慢火熬膏卻入大黃虻蟲桃仁末不住攪度可丸卻入朴硝再攪良久出之丸如桐子大五更初溫酒下五丸至日午取下如赤豆汁雞肝蝦蟆衣樣候鮮紅住仍以調氣藥補之和血通經丸治婦人經水凝滯不行腰背臍腹疼痛漸成血塊按方廣云月候不通有血滯者血枯者此方用之於血滯則可用之於血枯是求千金於乞丐矣審之芍藥一兩當歸木香肉桂乾漆炒煙盡五靈脂大黃廣朮煨各半兩水蛭炒二錢半虻蟲三十四個去頭足翅焙蛭虻皆蝕血故用之以破堅苟非血塊不宜用桃仁二十七個湯浸去皮尖上為末醋糊丸如桐子大食前醋湯或酒下二十丸斑蝥通經丸治經候閉塞亦治乾血氣班蝥二十個糯米炒斑蝥大毒之物服之能令小便祕澀不通以木香滑石解之然云乾血氣則當先以血藥潤之不宜輕服此類致乾澀桃仁四十九個炒大黃錦紋者五錢上為細末酒糊為丸如桐子大空心酒下五丸甚者十丸如血枯經閉者用四物湯送下一方加虻蟲半錢水蛭一錢大黃膏一名將軍丸治婦人乾血氣川大黃四兩為末用釅醋熬成膏子丸如雞頭大每服一丸酒化開臨臥溫服大便利一二行紅脈自下是調經之仙藥也乾血氣者熱也故用大黃一味解熱通經其加當歸頭香附者一榮血一調氣也在人自擇之一方加當歸頭一方加香附二兩童便浸炒為末入膏丸桐子大熱酒下四十丸聖惠方治婦人月水澀滯不快結成瘕塊脹大欲死單行血脈最穩當馬鞭草根苗五斤銼細水五斗煎至一斗去渣別以淨器盛熬成膏食前溫酒調下半匙通經丸治婦人室女月候不通或成血瘕當歸桂心青皮乾薑炒川椒炒去汗川烏炮蓬莪朮乾漆炒煙盡大黃炮桃仁去皮尖炒各等分上為末先將四分用米醋熬成膏和餘六分成劑臼中杵丸如桐子大曬乾每服二十丸用淡醋湯下加至三十丸溫酒亦得空心食前服此方類聚大熱之藥非因寒凝氣滯血結成瘕者不可服濟生方去川烏加紅花本草入雞子清同丸畏漆入腸胃生瘡也以上諸方俱重劑隨寒熱斟酌用治痰結經閉丹溪方治積痰傷經不行夜則妄語此方平中有奇認疾之法從妄語來栝蔞子一兩黃連半兩吳茱萸十粒桃仁五十枚紅曲二錢縮砂三兩山楂末一兩上為末生薑汁研炊餅為丸每服百丸空心滾白水下一方治月水不通屢試有驗形實氣盛者宜之據言屢驗大抵由胃氣實也厚朴不拘多少薑汁炙香細切濃煎去渣空心服不過三四劑瘥加味導痰湯治軀脂經閉半夏陳皮白茯苓甘草枳實黃連川芎上加生薑水煎服此治胃實痰盛之藥非為降心火也其通經止取四物湯中一味之最當者思之思之經云氣上迫肺氣上迫肺是言心火上炎迫金金不降而生水宜降心火為主或壯水之主以制陽光亦是則心氣不得下通故月事不來今用連朴之類導痰降火使不上迫於肺故心氣下通而月事來也掌中金丸治婦人乾血氣穿山甲炮甘草苦丁香川椒苦葶藶白附子豬牙皂角草烏頭各三錢巴豆一錢全用研巴豆大毒能無傷乎上為細末以生蔥絞汁和丸彈子大每用一丸新綿包之納陰中一日即白二日即赤三日即血神效礬石丸治婦人經水閉不利臟堅癖不止中有乾血下白物礬石三錢燒杏仁一分上二味末之煉蜜丸棗核大納陰中劇者再納之一粒仙丹治婦人乾血勞並赤白帶下種子如神巴豆一百二十個去殼用新磚一個將豆紙包放磚上捶去油令淨如面白方好用斑蝥六十個去翅足穿山甲五錢油煎過大黃苦葶藶各一兩皂角一兩刮去粗皮火炮上各為末合一處以棗煮去皮核丸如彈子大用綿繭張開裹藥在內穿入三寸竹筒上頭後仍留二三寸余挽一轉不令藥氣在外用時先以溫水洗陰內令潔淨拭乾卻以蔥汁浸濕藥頭送入子宮極深處整一日一夜取出藥不用少間耳冷氣下發寒發熱如傷寒狀不怕飲食任意食用無妨半日即通或鮮血或死血一切惡物悉下忌生冷發物自此子宮和暖而交媾則有孕矣法固巧然必果有乾血在子宮者可用通經下取方曾試驗神效海蛤粉五錢苦葶藶牙皂各二錢半巴豆略去油天花粉五錢苦丁香紅娘子各一錢半麝香少許上為細末每用一錢蔥汁同搗為丸薄綿裹以五寸竹管納陰戶中候熱時先通黃水次則經行血崩門論崩中由傷損衝任良方論曰婦人崩中由臟腑傷損衝任血氣俱虛故也衝任為經脈之海血氣之行外循經絡內榮臟腑若無傷損則陰陽和平而氣血調適若勞動過多致臟腑俱虛而衝任之氣亦虛不能約制其經血故忽然暴下或由陰陽相搏為熱所乘攻傷衝任血得熱則流散甚者至於昏悶其脈數疾小為順洪大為逆大法當調補脾胃為主據言氣虛不能約制則宜補氣其為熱所乘者則宜涼血不當混言調脾胃為主觀東垣法便得其竅論血崩因虛熱東垣曰陰虛陽搏謂之崩婦人脾胃虛損致命門脈沉細而數疾陰虛陽搏是陰中有火也故以尺脈為診或沉弦而洪大有力寸關脈亦然皆由脾胃有虧下陷於腎與相火相合濕熱下迫此言脾氣下陷為熱宜用升補瀉火經漏不止其色紫黑如夏月腐肉之臭中有白帶者脈必弦細寒作於中東垣以白帶為寒脈以弦細為診固是而後人率以為濕熱須辨之有赤帶者其脈洪數病熱明矣必腰痛或臍下痛臨經欲行而先發寒熱往來兩脅急縮兼脾胃證出見或四肢困熱心煩悶不得眠臥心下急此雖點出脾胃症而煩心心下急又有虛火矣宜大補脾胃而升降氣血可一服而愈或先貴而後賤或先富而後貧病名脫營者心氣不足其火大熾旺於血脈之中又致脾胃飲食失節火乘其中形質肌肉顏似不病者此心病也心主以營故曰心病不形於脈故脾胃飲食不調其證顯矣而經水不時而下或適來適斷暴下不止治當先説惡死之言勸論令懼死而心不動以大補氣血之藥補養脾胃微加鎮墜心火之藥治其心補陰瀉陽經自止矣痿論云悲哀太甚則胞絡絶胞絡絶則陽氣內動陽氣內動便是胞絡中有火發則心下崩數溲血也故本病曰大經空虛發則肌痹傳為脈痿此之謂也薛氏曰經云陰虛陽搏謂之崩又云陽絡傷血外溢陰絡傷血內溢又云脾統血肝藏血其為患因脾胃虛損不能攝血歸源或因肝經有熱血得熱而下行或因肝經有風何以知肝經有風血得風而妄行或因怒動肝火血熱而沸騰或因脾經鬱熱血傷而不歸經或因悲哀太過胞絡傷而下崩治療之法脾胃虛弱者六君子湯加當歸川芎柴胡脾胃虛陷者補中益氣湯加酒炒芍藥山梔肝經血熱者四物湯加柴胡山梔蒼朮肝經風熱者加味逍遙散或小柴胡湯加山梔芍藥牡丹皮若怒動肝火亦用前藥脾經鬱火者歸脾湯加山梔柴胡牡丹皮哀傷胞絡者四君子湯加柴胡升麻山梔故東垣丹溪諸先生云凡下血證須用四君子以收功斯言厥有旨哉薛氏所論凡七條而脾胃三條肝經三條胞絡一條皆不捨柴胡及梔芍丹皮者以厥陰手足二經為多血藏血之所血為熱迫則不能從陽亟起故以引起肝氣而梔芍等收陰抑陽也如東垣升陽舉經之意尤得其妙所定脾胃方藥必是久病又顯出脾胃證者宜之蓋立齋先生治久病者多故其立言如此且謂四君為血證收功須用則非初治之法可知立齋一生得力處在此若大去血後毋以脈診當急用獨參湯救之其發熱潮熱咳嗽脈數乃是元氣虛弱假熱之脈也尤當用人參之類此等證候無不由脾胃先損而患故脈洪大察其中有胃氣受補則可救設用寒涼之藥復傷脾胃生氣反不能攝血歸源是速其危也方氏曰血屬陰也靜則循經榮內動則錯經妄行蓋人之七情過極則動五志之火五志之火亢甚則經血暴下失期而來久而不止謂之崩中如風動木搖火燃水沸類也治崩次第初用止血以塞其流中用清熱涼血以澄其源末用補血以還其舊愚謂止澀之中須寓清涼而清涼之中又須破瘀解結至於補血還舊又須調脾其間兼證或有不同又當得其所以而處治焉似難盡一也若止塞其流而不澄其源則滔天之勢不能遏若止澄其源而不復其舊則孤孑之陽無以立開口便得經旨自是不凡故本末勿遺前後不紊方可言治也張子和云孟官人母五十餘血崩一載僉用澤蘭丸黑神散保安丸白薇散補之不效戴人見之曰天癸已盡本不當下血蓋血得熱而流散非寒也夫女子血崩多因大悲哭悲甚則肺葉布心系為之急血不禁而下崩內經曰陰虛陽搏謂之崩陰脈不足陽脈有餘數則內崩血乃下流舉世以虛損治之莫有知其非者可服大劑大劑者黃連解毒湯是也此大寒之劑非實熱症不可非前藥之誤不可次以香附二兩炒白芍藥二兩焙當歸二兩焙三味同為細末水調下又服檳榔丸不旬日而安西園公治一婦人年六十二歲血崩不止投黃連解毒湯四帖後服涼膈散合四物湯六帖即愈即陰虛陽搏之治此婦因悲哀太過則心悶急肺布葉舉而上焦不通熱氣在中血走而崩故效薛氏曰一婦人年將七十素有肝脾之證所見證俱屬肝脾宜審之每作則飲食脾不進或胸膈肝不利或中脘作痛胃或大便脾作瀉或小便肝不利余用逍遙散加山梔茯神遠志以脾症而用茯神遠志何也豈所謂補脾不愈而當補心歟若然則棗仁亦不可少木香而愈後憂女孀居不時吐紫血其病每作先倦怠脾而後發熱肝經曰積憂傷肺積思傷脾肺布葉舉是令子母俱病不能攝血歸經而致前證遂以前藥加炒黑黃連三分吳茱萸二分頓愈此左金丸法復因怒吐赤血甚多躁渴垂死此血脫也法當補氣乃用人參一兩芩朮當歸各三錢陳皮炮黑乾薑各二錢炙草木香各一錢一劑頓止一婦人年六十四久鬱怒頭痛寒熱春間乳內作痛服流氣飲之類益甚不時有血如經行又大驚恐飲食不進夜寐不寧乳腫及兩脅焮痛如炙午後色赤余以為肝脾鬱火血燥先以逍遙散加酒炒黑龍膽一錢山梔一錢半二劑腫痛頓退又二劑而全消方證合宜而以四劑全消恐無是速再用歸脾加炒黑梔貝母諸證悉愈一婦人因怒崩血久不已面青黃而或赤此肝木製脾土而血虛也用小柴胡合四物湯以清肝火生肝血又用歸脾補中二湯以益脾氣生肝血而瘥此證若因肝經有風熱而血不寧者用防風一味為丸當云肝熱生風而下陷者宜用防風以兼證之藥煎送或肝經火動而血不寧者用條芩炒為丸條芩是大腸經藥用柴胡則治厥陰以兼證之藥煎送無有不效一婦人性急每怒非太陽耳項喉齒胸乳作痛則胸滿吞酸吐瀉少食經行不止此皆肝火之證肝自病則外證見土受克則內證作若自病見用四物加白朮茯苓柴胡炒梔炒龍膽芍柴梔膽是厥陰藥白茯是平肝藥若內證作用四君子加柴胡芍藥神麯吳茱萸炒過黃連諸證漸愈脾病兼肝故用法如此惟月經不止是血分有熱若血分有熱當加丹皮山梔脾氣尚虛以逍遙散倍用白朮茯苓陳皮又以補中益氣加酒炒芍藥兼服而調論氣陷血脫法當升舉東垣云一婦人經候黑血凝結成塊左廂有血瘕水瀉不止穀食有時化有時不化至今歲四月血塊暴下並水注俱作是前後二陰有形之血脫竭於下既久經候尤不調水瀉日見三兩行食罷心煩不快飲食減少甚至瘦弱東垣先生曰夫聖人治病必本四時升降沉浮之理權變之宜若不本四時以順為逆非其治也且治之大法必先歲氣無伐天和無盛盛無虛虛遺人夭殃無致邪無失正絶人長命故聖人云陽盛陰虛下之則愈汗之則死陰盛陽虛汗之則愈下之則死陽盛是言陽邪盛於內故可下陰盛是言寒邪盛於外故可汗大抵聖人立法各自有義且如升陽或發散之劑是助春夏之陽氣令其上升乃瀉秋冬收藏殞殺寒冰之氣此病是也當用此法治之乃升降浮沉之至理也夫天地之氣以升降浮沉乃從四時如治病逆之則殺人矣故經云順天者昌逆天者亡可不畏哉夫人之身亦有天地四時之氣不可止認在外人體亦同天地也今經漏不止是前陰之氣血已下脫矣水瀉數年不愈是後陰之氣血又下陷矣後陰者主有形之物也前陰者精氣之門戶俱下竭是病人周身之氣常行秋冬之令陰主殺此等收藏之病是也陽生陰長春夏是也在人身之中令氣升浮者穀氣上行是也既病則周身血氣皆不生長穀氣又不升其肌肉消少是兩儀之氣俱將絶矣既下元二陰俱脫血氣消竭假令當日元是熱證今下焦久脫已化為寒矣此病久沉久降寒濕大勝當急救之瀉寒以熱降濕以燥大升大舉以助生長補養氣血不致偏竭聖人立治之法既濕氣大勝以所勝治之助甲甲膽也風木上升是也故經云風勝濕風勝濕正是舉下陷之氣今人以為風來則干之意非也是以所勝平之也當先調和胃氣次用白朮之類以燥其濕而滋元氣如其不止後用風藥以勝濕此之謂也此便是大舉大升以助春夏二濕久陷下之至治也又一本云此病次用四物隨濕證加減論血瘀腹痛法當收止戴氏曰血大至曰崩中或清或濁或純下瘀血成腐勢不可止證狀非一所感亦異甚則頭目昏暈四肢厥冷並宜膠艾湯咽震靈丹震靈丹能止能行非元禮不能道不能用佐以三灰散或以童子小便煎理中湯或以沉香降氣湯加入百草霜米飲調下血崩甚而腹痛人多疑惡血未盡有此特見又見血色瘀黑愈信惡血之説不敢止截大凡血之為患欲出未出之際停在腹中即成瘀色難盡以瘀為惡妙論又焉知瘀之不為虛冷乎若必待見瘀血之後截之恐並與人無之矣此腹痛更有説瘀而腹痛血通而痛止崩而腹痛血住則痛止宜芎歸湯加乾薑熟附一錢非久崩氣脫者不可用止其血而痛自止以下皆止澀之法而蟹殼黃麻又有破血之能仍以刺花繡拭黑片燒灰研末米飲調下一方以毛蟹殼燒存性米飲下亦有以早黃麻根燒灰為末米飲下論過服寒涼法當溫補薛氏曰表弟方健甫內五十歲辛丑患血崩諸藥罔效壬寅八月身熱體痛頭暈涕出吐痰少食衆作火治展轉發熱絶粒數日余診之曰脾胃久虛過服寒藥中病未已寒病復起遂用八味丸料一服翌早遂索粥數匙再服食倍熱減痛止乃服八味丸而愈癸卯秋因勞役憂怒甲辰夏病復作胸飽發熱脊痛腰疼神氣怫鬱或作中暑崩血便血煩渴引飲粒米不進昏憒時作脈洪大按之微弱此無根之火內虛寒而外假熱也以十全大補加附子一劑遂食粥三四匙崩血漸減日服八味丸始得痊愈種種得竅如此大法自有知者大尹王天成之內久患崩自服四物涼血之劑或作或輟因怒發熱其血不止服前藥不應乃主降火更加腹脅大痛手足俱冷余曰此脾胃虛寒所致先用附子理中湯體熱痛止又用濟生歸脾補中益氣二湯崩血頓愈若泥痛無補法則誤矣因怒發熱不主於肝而專溫補脾胃此得治本之道然與前中寒之症方藥迥別又孰是耶錦衣楊永興之內患前證過服寒涼之劑其證益甚更加肚腹痞悶飲食不入發熱煩躁脈洪大而虛余曰此脾經氣血虛而發躁也當急用八珍湯加炮薑以溫補之緩則不救不信乃服止血降火之劑虛證蜂起始信余言緩不及治矣均一寒涼過劑而方藥應用不同然皆不捨薑附是必有道又兩服之而愈一不聽而歿可不知所集之意哉論補中去積東垣云丁未年冬郭大方來説其妻經水暴崩不止先曾損身失血自後一次經數日而來今次不止其人心窄性急多驚以豫料之必因心氣不足飲食失節得之大方曰容到彼診得掌中寒脈沉細而緩間有沉數九竅微不利四肢無力上喘氣短促口鼻氣皆不調果有心氣不足飲食失節審證細密自是老手脾胃虛弱之證胃脘當心而痛在脅下急縮有積前是虛此是實當臍有動氣腹中鳴下氣大便難諸虛證極多不能盡録擬先治其本餘證可以皆去與安心定志鎮墜其驚調和脾胃大益元氣補其血脈養其心神此節尤妙尤難以大熱之劑去其冬寒凝在皮膚少加生地黃去命門相火不令四肢痿弱制黃耆當歸人參湯論開痰行氣丹溪云涎郁胸中清氣不升故經脈壅遏而降下非開涎不足以行氣又得一種見解人嘗謂丹溪先生善治痰然哉非氣升則血不能歸隧道此論血泄之義甚明蓋開胸膈濁涎則清氣升清氣升則血歸隧道不崩矣故其症或腹滿如孕或臍腹絞痛或血結成片或血出則快止則悶或臍上動其治法宜開結痰行滯氣消汙血論殺血心痛良方云婦人血崩而心痛甚名曰殺血心痛由心脾血虛也若小産去血過多而心痛甚者亦然用烏賊魚骨炒為末醋湯調下失笑散亦效既云心脾血虛自當並補乃不為治本即用烏賊失笑以治標何耶薛氏曰前證若陰血耗散用烏賊丸收斂之若瘀血不散用失笑散行散之若心血虛弱用芎歸湯補養之若鬱結傷血用歸脾湯調補之論解得當至云心血虛止用芎歸似未盡善觀後案便得要旨一婦人血崩兼心痛三年矣諸藥不應每痛甚虛證悉具面色萎黃余曰心主血蓋由去血過多心無所養以致作痛宜用十全大補湯參朮倍之三十餘劑稍愈百餘劑痊愈論崩漏雜治法丹溪云崩漏有虛有熱虛則下溜熱則通流氣虛血虛者皆以四物湯加參耆因勞者用參耆加升補藥因寒者用乾薑因熱者用黃芩漏下乃熱而虛四物湯加黃連崩過多者先用五靈脂末一服當分寒熱蓋五靈脂能行能止紫色成塊者血熱四物湯加黃連柴胡之類急則治其標用白芷湯調百草霜末甚者棕櫚灰後用四物湯加炒黑薑調理經驗簡要治崩中等證冷者脈緊細手足寒紅去淡黑或五色當歸建中加白龍骨血竭附子下紫石英丸震靈丹灸火熱者脈洪四肢溫心煩口苦燥熱血沸而成用黃芩湯荊芥散或清心蓮子飲加竹瀝生地黃汁甚者生地黃汁磨京墨百草霜冷服虛者膠艾湯加麥門冬鹿茸龍骨酸棗仁或養榮湯加龍骨血竭送震靈丹實者腹中痛煮附丸四物湯加香附子心虛者恍惚多夢健忘舌強小便多面紅盜汗柏子仁湯酸棗仁湯加龍骨京墨百草霜吞靈砂丹又靈砂當歸蓮肉龍骨棗肉丸參湯送下崩中麝香當歸崩者心氣已散急服龍骨靈砂等有田婦崩中斷下者用大蕪根酒煎清早服生麥中如蓬蒿花或云即薊根也産寶分陰崩陽崩受熱而赤謂之陽崩受冷而白謂之陰崩按赤者血熱白者氣虛脈法脈經曰問五崩何等類師曰白崩者形如涕赤崩者形如絳津黃崩者形如爛瓜青崩者形如藍色黑崩者形如衄血也寸口弦而大弦則為減減即小也大則為芤減則為寒芤則為虛寒虛相搏脈則為革婦人則半産漏下尺脈急而弦大風邪入少陰之經女子漏下赤白漏血下赤白不止脈小虛滑者生大緊實數者死漏下赤白日下血數升脈急疾者死遲者生治血熱崩漏荊芥四物湯治崩漏初起不問虛實服之立止當歸川芎白芍藥炒生地黃荊芥穗條芩炒香附子炒各一錢上銼水煎服血藏於肝肝氣不升則熱迫於下故血不能藏而崩也況厥陰之經環陰器而庭孔前陰皆屬之荊芥升肝氣香附理肝氣條芩除內熱四物生地芍藥養血涼血故皆取效如不止加防風升麻白朮蒲黃一方加地榆尤效一方四物加芩連梔子黃柏一方並加膠艾奇效四物湯治肝經虛熱血沸騰而久不止當歸酒洗川芎白芍藥炒熟地黃阿膠炒成珠艾葉黃芩炒各一錢上銼水煎服此方用熟地以補肝之母以阿膠黃芩益肝之氣艾葉溫下元以助真氣之升所謂陰從陽起也河間生地黃散治經漏下血脈虛洪經水紫黑生地黃熟地黃白芍藥黃耆枸杞子天門冬去心地骨皮柴胡上㕮咀水煎服洪虛者氣不足紫黑者血之熱黃耆所以補氣然氣盛則生火又加天冬地骨以清氣中之火熟地所以生血血生而不涼尤虛妄行故以生地黃連以涼心芍藥甘草緩肝益脾柴胡黃芩清肝升舉枸杞熟地又肝腎同歸者也便血者加地榆涼血地黃湯治婦人血崩不止腎水陰虛不能鎮守胞絡相火故血走而崩也生地黃當歸尾各五分黃連黃柏知母藁本川芎升麻各二分柴胡防風羌活黃芩細辛荊芥蔓荊子甘草炙各一分紅花少許上㕮咀作一服水煎空心稍熱服經曰陰者從陽而亟起也血屬陰陰不自升故諸經之血必隨諸經之氣而後升若氣有所陷則熱迫血而內崩矣故用黃柏以清下焦胞絡之火心者火之主也故又以生地黃連以治火之源知母黃芩滋水之母歸尾破瘀紅花生血所謂去故生新也川芎行血海之餘蔓荊涼諸經之血而風藥者皆所以升諸經之氣也諸經氣升則陰血不得不隨之而起矣故曰從陽亟起也有是症者法之小薊湯治崩漏不止色明如水得溫則煩悶者此陽傷於陰令人下血當補其陰脈數疾小者順大者逆小薊莖葉搗取汁生地黃搗取汁各一盞白朮半兩銼上三件入水一盞煎減一半去渣溫服芎藭酒治崩中晝夜不止醫不能治者川芎一兩生地黃汁一盞上用酒五盞煮川一盞去滓下地黃汁再煎二三沸分為三服此方以酒煎川芎配生地汁自有妙用甚奇甚奇治崩中去血不止大小薊根五兩白茅根三兩上二味細切用酒五斤煮取四斤去渣分四服用酒之意便是升法一方治婦人血崩槐花半兩炒黃芩二兩去皮上二味共為細末每服五錢好酒一碗用銅稱錘一枚桑柴火燒紅浸入酒內調服不拘時忌生冷油膩之物金華散治血室有熱崩下不止服溫藥不效者玄胡索當歸瞿麥穗牡丹皮乾薑各一兩石膏二兩桂心另研威靈仙各七錢蒲黃半兩上為細末每服三錢水煎空心溫服日二次此方用石膏以陽明為血海也而乾薑桂心為之從治威靈仙去腸中宿膿惡水惟敗腐不清熱結血凝者可用簡易黃芩湯治崩中下血今人多用止血補血之藥惟此方治陽乘陰所謂天暑地熱經水沸溢者黃芩一味研為細末每服三錢霹靂酒調下即燒稱錘淬酒一方荊芥湯煎下治勞傷崩漏膠艾四物湯治勞傷血氣月水過多或崩漏不止及妊娠胎氣不安或因損動漏血傷胎者亦宜當歸川芎白芍藥熟地黃阿膠炒成珠艾葉各一錢甘草炙五分上銼水酒各半煎空心服與奇效四物少異彼用黃芩此用甘草彼以水煎此又半酒其溫涼不同如此當歸芍藥湯治婦人經脈漏下不止其色鮮紅先因勞役脾胃虛弱氣短氣逆自汗不止身熱悶亂惡見飲食四肢倦怠大便時泄黃耆一錢半白朮蒼朮泔浸去皮當歸身白芍藥各一錢陳皮熟地黃各五分生地黃甘草炙各三分柴胡二分據見證悉屬脾胃氣虛當用補中益氣為主今此方不用人參升麻何也蒼朮氣悍燥散其色鮮紅又何用之況與地黃同用豈不為時人所笑要知古人皆因證立方但求至理所在而不必拘方以試病也上作一服水煎空心熱服東垣為一婦人制此方一服之後諸證悉去豫族一婦因勞役下血每來兩旬不止醫者拘血熱之説用四物加芩連纍治不愈一日血大下昏迷不醒急以問豫豫用此藥一劑少頃頓醒過兩時血遂止後常用此藥其病遂不復作蓋血虛須兼補氣嘗譬之血猶水也氣猶堤也堤堅則水不橫決氣固則血不妄行自然之理也此藥黃耆最多白朮次之所以神效俗醫不達此理專用涼藥不知涼藥傷胃服久則正氣愈弱血安得固故特為表而出之也歸脾湯治婦人思慮傷脾不能攝血以致妄行或健忘怔忡驚悸不寐或心脾傷痛怠惰嗜臥不思飲食此為氣猶夫也血猶妻也血隨氣升夫唱婦隨之道耳夫營出中焦脾胃氣虛則中氣下陷是營血失其夫矣此方益營助脾而以氣藥為君者正此意人參黃耆炒白朮白茯苓當歸遠志去心酸棗仁炒各一錢木香甘草炙各五分龍眼肉上銼加生薑三片棗一枚水煎服心脾氣虛氣結者宜之加柴胡山梔名加味歸脾湯柏子仁湯治婦人憂思過度勞傷心經不能藏血遂致崩中下血不止柏子仁炒香附子炒芎藭鹿茸燎去毛酒蒸焙茯神去木當歸各一錢半川續斷二錢阿膠炒遠志去心各一錢甘草炙五分上作一服生薑五片水煎空心服此濟生方也而立齋加柴梔以清厥陰之火以升甲膽之氣鹿茸乃陰中至陽陰體而陽用也非血脫氣衰者不用養血平肝散治大怒經血暴下當歸酒浸白芍藥炒香附炒黑各二錢青皮醋炒柴胡川芎生地黃各八分甘草五分上銼水煎食前服以大怒而用是故曰平肝香附青皮柴胡芍藥甘草川芎緩肝疏肝升提肝氣當歸生地養血榮肝然所重在大怒故立方如此治崩漏氣陷益胃升陽湯血脫益氣古人之法也先補胃氣以助生長故曰陽生陰長諸甘藥為之先務舉世皆以為補氣殊不知甘能生血此陽生陰長之理也故先理胃氣人之一身內谷為寶黃耆二錢人參有嗽去之神麯炒各一錢半白朮三錢當歸身酒浸陳皮甘草炙各一錢升麻柴胡各五分生黃芩二錢瀉盛暑之伏熱刑金肺逆秋涼不用上為粗末每服三錢或五錢如食添再加之如食減已定三錢內更減之不可多服每服二錢水煎去滓熱服如腹痛每服加白芍藥二分中桂少許如渴口乾加乾葛二分如嗽去人參如服此不止卻服後方柴胡調經湯大舉大升之也柴胡調經湯治經水不止鮮血項筋急腦痛脊骨強痛不思飲食要知鮮血不用清涼而用升舉當在不思飲食上揣摩羌活獨活藁本升麻各五分蒼朮一錢柴胡七分葛根當歸身甘草炙各三分紅花少許上㕮咀作一服水煎去渣稍熱空心服微汗立止外症屬太陽者多半而方藥又兼少陽陽明太陰厥陰且君以蒼朮少加當歸紅花引入血分以升陽氣乃為之大舉大升此從陰用陽之義也調經升陽除濕湯治女子漏下惡血前曰鮮此曰惡二字有別當細思之月事不調或暴崩不止多下水漿之物皆由飲食不節或勞傷形體或素有心氣不足因飲酒勞倦致令心火乘脾其人必怠惰嗜臥四肢不收困倦乏力無氣以動氣短上氣逆急上衝其脈緩而弦急按之洪大皆中之下得之脾土受邪也脾主滋榮周身者也心主血血主脈二者受邪病皆在脈脈者血之府也脈者人之神也心不主令胞絡代之故曰心之脈主屬心系心系者胞絡命門之脈也主月事皆由脾胃虛而心胞乘之故漏下血水不調也況脾胃為血氣陰陽之根蒂當除濕去熱益風氣上升以勝其濕又云火鬱則發之黃耆蒼朮羌活各一錢半防風藁本升麻柴胡甘草炙各一錢當歸酒浸獨活各五分蔓荊子七分上㕮咀水五大盞煎至一大盞去滓稍熱服空心服藥畢待少時以早膳壓之可一服而已土陷則濕故怠惰嗜臥木鬱則熱故氣逆上衝緩為濕之徵弦為木之象鬱而不伸則熱此心火乘脾之意也其脈按之洪大者火在下也見中之下者土之位也胞絡為相火寄於命門為多血之經病從火治心火以藏德為神相火聽命於心三焦主氣胞絡主血故血分之火專主胞絡氣分之火專主三焦鬱則火不得遂炎上之性迫於血分故陰絡傷也此方以蒼朮升麻發太陰陽明之濕柴胡防風達厥陰少陽之本羌活藁本以升舉少陰太陽下部之郁所謂下者舉之也是皆升散之物過則氣耗而傷金故又以黃耆以保肺當歸引血使各有所歸甘草和氣蔓荊涼血此四種者又制亢害之法也其曰可一服已何其神哉讀者當得此意如灸足太陰脾經中血海穴二七壯或三七壯立已此藥乃從權衡之法用風勝濕為胃氣下陷而氣迫於下以救其血之暴崩也若病愈經血惡物已盡主病雖除後必須以黃耆甘草人參當歸之類數服以補之於補氣升陽湯中加和血藥是也若經血惡物下之不絶尤宜救其根源治其本經只益脾胃退心火之亢乃治其根蒂也若遇夏月白帶下脫漏不止宜用此湯一服立止以升舉主治者以標為本也以退心火為治者以本為主也以益脾胃為法者標本不捨也東垣專主脾胃之意蓋如此白帶主濕故一服立止夏月二字亦宜死治崩漏血瘀昏暈疼痛五靈脂散治血崩不止及昏不省五靈脂不拘多少炒令煙盡研末上為末每服一錢溫酒調下一方治血崩不止五靈脂二錢炒熱加當歸酒同煎或水酒童便各半盞同煎服五靈脂行汙濁之血如神童便降火亦行穢濁而同煎尤妙一方五靈脂半生半熟為末酒調服一方水煎五靈脂半乾去渣澄清再煎成膏入神麯末為丸神麯丸法原用醋煎丹溪先生嘗言之如桐子大空心溫酒下二三十丸便止一方每服三錢水酒童便各半盞煎至八分通口服名抽刀散治産後有病服三服散惡血或心腹脅肋腳痛不可忍者或止用童子小便尤佳或中風即入草烏頭半錢同煎亦治腸風下血如不飲酒者煎烏梅柏葉湯調下如心煩口乾渴者加蒲黃炒減半一方同蒲黃各炒等分名失笑散治失血及産後半産惡血攻心昏迷不省産後瘀血必崩不論久近服之如神及心腹絞痛欲死者其效如神真救急之良方也人家不可不備此藥兼能解毒及蛇蠍蜈蚣咬塗傷處立愈香附子散治血崩不止或成五色亦治産後腹痛及小産血不止大是婦人仙藥常服益血調氣香附子不拘多少舂去毛中斷之略炒上為細末每服二錢清米飲調下能止血好酒調下能破積冷氣薑湯下帶下艾湯入醋少許下四法俱良煮附丸治崩漏帶下積聚癥瘕臍腹絞痛方見調經門疼痛條氣寒則凝而癥瘕腹痛皆氣凝之故香附體重氣溫味苦辛苦以入血分辛以散結氣氣行血流故痛自止備金散治婦人血崩不止崩而內有瘀者宜之香附子炒四兩當歸尾一兩二錢五靈脂炒一兩上為細末每服五錢醋湯調下空心服立效如神散治血崩不止赤白帶下香附子炒赤芍藥炒各等分上為末入鹽一捻水煎食前溫服一方用香附白芷為丸立效散治婦人血崩臍腹痛數方皆用破血之劑香附炒三兩當歸一兩赤芍藥良薑炒五靈脂各半兩上為細末每服三錢酒一盞童便少許同煎服一方治血崩臍腹痛當歸赤芍藥熟地黃香附子牡丹皮木賊去節各二兩沒藥丁香桂去皮各三錢上為細末酒調三錢溫服縮砂散治血崩縮砂不拘多少於新瓦上炒香為細末米飲調下三錢加減四物湯治室女二七天癸至亦有當時未至而後至者亦有卒然暴下淋瀝不止有若崩漏者失血過多變生諸證悉宜服之四物湯四錢香附子炒去毛一錢半上加生薑五片水煎食前服如血色鮮而不止者去熟地黃加生地黃去熟加生可不思之治崩漏虛寒丁香膠艾湯治崩漏不止蓋心氣不足勞役及飲食不節所得經隔少時其脈兩尺俱弦緊而洪按之無力東垣所論脈證必析宜宗之其證自覺臍下如冰求厚衣被以御其寒白帶白滑之物雖多間下如屋漏水下時有鮮血不多右尺脈時微洪屋漏水多暴下者是急弦脈為寒多而洪脈時見乃熱少合而言之急弦者北方寒水多也洪脈時出者命門包絡之火也黑物多赤物少合成屋漏水之狀也當歸一錢二分白芍藥熟地黃各三分川芎丁香各四分阿膠炒六分另後入生艾葉一錢後入上為細末作一服水二盞煎至五沸去滓入膠艾再上火煎至一大盞空心宿食消盡帶熱服三服效服藥有法有時芎藭湯治帶下漏血不止及風寒冷熱勞損衝任月水不調崩中暴下腰重裡急淋瀝不斷及産後失血過多虛羸腹痛或妊娠胎動不安下血連日小便頻數肢體煩倦頭暈目暗不欲飲食川芎黃耆芍藥乾地黃吳茱萸甘草炙各二兩當歸乾薑各一兩上㕮咀以水一斗煮取三升分三服若月經後因有赤白不止者除地黃茱萸加杜仲人參各二兩好加減斷下湯治衝任氣虛重在氣虛二字崩中漏下經脈不調每遇月候將來臍腹腰腳先痛漸減飲食四肢乏力及帶下三十六疾悉能療之人參去蘆熟地黃艾葉醋炒各一兩烏賊骨燒灰當歸酒洗各二兩阿膠蛤粉炒成珠川芎各七錢乾薑炮半兩上㕮咀水煎食前服烏賊骨即海螵蛸此即膠艾四物之變局也彼有芍藥此有人參烏賊乾薑大概崩在肝氣不斂者宜芍藥之酸寒以收之氣脫而不溫者宜參薑烏賊之類溫補而澀之阿膠者益金水以成收藏之用也加味四物湯治崩漏四物湯一兩人參二錢吳茱萸一錢上銼碎每服半兩薑棗煎食前服五六服寒熱腹痛皆退崩漏未止續服後熟附丸熟附丸熟附子木賊去節龍骨煅赤石脂煅各半兩川芎當歸各一兩上為細末醋糊為丸如桐子大每服五六十丸食前米飲下陽虛則寒陰虛則熱故以此主之而腹痛一症人皆以為瘀血者多而此以為漏不止者服熟附丸正元禮所謂崩而腹痛者崩止而痛除也鹿茸丸治經候過多其色瘀黑甚者崩下呼吸少氣臍腹冷極則汗出如雨尺脈微小由衝任虛衰為風冷客乘胞中氣不能固此溫澀之劑也久崩漏脫者宜之可灸關元百壯在臍下正中三寸鹿茸燎去毛酥炙赤石脂制禹餘糧制各一兩當歸熟地黃續斷各二兩附子炮艾葉一方無柏葉各半兩上為細末酒糊丸如桐子大每服三十丸空心溫酒下煉蜜丸亦可丹溪以紫黑為熱而此言瘀黑者乃下焦氣寒血凝而黑各有治法然女子氣海在上血海在下故下焦溫而後氣升血行如鹿茸者以血成形由氣而長血隨氣上而成角故入血分以生焉又以附子艾葉佐而溫之以石脂餘糧鎮而固之柏葉清之歸地續斷補而續之誠下元虛寒之全方也不加人參豈無意焉而灸關元之意蓋可想矣治崩漏虛脫大全方治崩中下血不止小腹痛芍藥一兩炒黃柏葉六兩微炒丹溪云柏性多燥上用水一升煎至六合入酒五合煎取七合空心分為二服一方為細末酒調二錢以柏葉為君芍藥為佐俱清涼之物可治肝熱血脫不治氣虛血脫即小腹痛亦是血虛妙在用酒此亦殺邪有生機也一方有鹿角膠等酒調治白帶臍腹痛柏黃散療經血不止黃芩一兩二錢半側柏葉蒲黃各一兩伏龍肝二兩即灶心對月土上㕮咀水二升煎取八合分為二服又方治患崩中不止結作血片如雞肝色碎爛血片雞肝色是血不足而瘀故其色淡黯此川芎所以為君也川芎十二分生地黃伏龍肝各十一分本清肝熱更培土元阿膠青竹茹各八分當歸六分續斷地榆小薊根各二分上用水九盞煮取三盞去滓分三服伏龍肝散治氣血勞傷衝任脈虛經云非時忽然崩下或如豆汁或成血片或五色相雜或赤白相兼臍腹冷痛經久未止令人黃瘦口乾飲食減少四肢無力虛煩驚悸伏龍肝赤石脂各一兩川芎三兩熟地黃艾葉微炒各二兩麥門冬去心半兩當歸乾薑各七錢半肉桂甘草各半兩上為粗末每服四錢棗一枚水同煎地榆散治婦人崩中漏下不止地榆蒲黃白芍藥白茯苓柏葉微炒蟹爪微炒熟地黃鹿角膠碎炒令黃漏蘆各一兩川芎藭當歸各七錢半伏龍肝一兩半乾薑炮桂心甘草炙赤各半兩上銼碎每服三錢水一中盞入竹茹一分煎至七分去渣食前溫服此方有溫有涼其破瘀止痛莫如蟹爪而補血上行莫如角膠其餘可三反矣漏蘆入陽明最妙按伏龍肝為止血之聖藥蓋燥可去濕也先賢治崩用旋覆花半夏治膈間濕痰而崩止者亦此意旋覆半夏之治崩與治痰瀉之法等若果因痰而崩不知用此則徒尤血藥之不靈也蒲黃散治崩中不能止此亦溫涼燥澀止血破血之劫劑也又可治白帶蒲黃炒破故紙炒千年古石灰炒過各等分上為細末每服二三錢淡酒或醋湯調下霹靂散治經脈妄行香附子三兩川芎石灰油炒各一兩上為細末燒稱錘淬酒調服二錢匕前方溫下元以止血此方調血氣以燥澀自是不同此又無千年二字而用油炒仍慮燥熱也霹靂之名乃燒稱錘投酒中之聲亦或取其聲應之速耳鹿茸散治崩中漏下不止虛損羸瘦鹿茸二兩去毛塗酥炙微黃白龍骨鱉甲塗酥炙令黃去裙熟地黃白芍藥白石脂烏賊魚骨炙黃續斷各一兩肉蓯蓉一兩半酒浸去皮炙乾上為細末每服二錢食前粥飲調下鱉甲是下部陰藥而通腎脈之陽自脊膂節節而下以至於陰肉蓯蓉是下部陽藥有益坎中之陽而補真火故曰黑司命石其餘可類而推矣若骨脂蓯蓉又為艾葉之助云爾補宮丸治婦人諸虛不足久不妊娠骨熱形羸崩中帶下白薇牡蠣白芍藥鹿角霜山藥白朮白茯苓烏賊魚骨白芷各等分上為細末麵糊和丸如桐子大每服五十丸空心米飲送下牡蠣丸治月水不止衆藥不愈者牡蠣火煅研細用醋調成丸再煅過通紅候冷研細出火毒卻用醋調艾末熬成膏和丸如桐子大每服五十丸醋艾湯下一方治婦人血崩蠶砂炒一兩蠶食桑而糞砂有清香涼燥之能單服之亦驗以頭二蠶者佳為有生生之妙也伏龍肝半兩阿膠一兩上為末空心溫酒調服二三錢大全名無比散無阿膠血見黑則止黑金散治婦人血氣虛損經候不調崩中漏下鯉魚皮棕櫚皮黃牛角䚡破故紙亂髮各一兩烏賊魚骨乾薑木賊當歸熟地黃各半兩上銼碎拌勻入瓷罐內鹽泥固濟候乾以炭火五斤煅令通赤煙盡取放土內埋令冷取出研細每服三錢入麝香少許空心米飲調下五灰散治下血不止成血崩五灰十灰皆取其黑如百草霜黑墨之意如前方中所未備而此又出之以成方若令人知有所取也蓮蓬殼黃絹血餘百草霜棕皮以上共燒灰山梔炒黑蒲黃炒黑墨血竭上為細末調服或煉蜜丸桐子大清米飲下五十丸十灰散治下血不止錦片木賊棕櫚柏葉艾葉乾漆鯽魚鱗鯉魚鱗血餘當歸以上逐味火燒存性各等分研末麝香少許研上研勻每服二錢空心溫酒調服十灰丸治崩中下血不止錦灰一云綿黃絹灰馬尾灰艾葉灰藕節灰蓮房灰油發灰赤松皮灰棕櫚灰蒲黃灰各等分上研勻用醋煮糯米糊和丸如桐子大每服七十丸加至一百丸空心米飲下蓮房藕節藕通血脈而散血其節與房皆斂虛就實而味澀且房成於升氣而清類木之象有收陽歸陰之理故用之以澀血黃絹錦片皆蠶絲所成蠶食桑而吐絲扶桑之木受青陽之氣稟少陽升生之性能和甲膽之陽以養厥陰之血故神仙一切服食藥不得桑柴煎不食以其火不文不武而具溫生之氣也蠶砂治崩桑鮮止血豈漫言哉百草霜乃百草之煙墨亦鬆煙所造草體乙木之陰味多苦松有清苦之操味多澀取之以煙則上升取之以黑則制火松皮灰亦此意諸魚屬火而生居水中是水中之火惟鯽魚生於四季故得土之多其臭腥腥先入肝以助肝氣之升鱗甲者金之用也水中有火水中有金金主收澀火土生金水並之意馬尾赤馬者乾之陽尾者血之尾血潤下而生尾尾生於陽體之盡處是陽中之陰也以陰血之餘生於純陽之體又有陰中有陽之義凡血脫於下乃陰無陽以升此借陽中之陰以鼓陽升陰又借其灰以為止澀之用皆良法也如聖散治血止崩棕櫚烏梅肉乾薑一兩五錢並燒存性上為細末每服二錢烏梅酒調下空心食前服久患不過三服愈一方去乾薑用甘草二寸半生半熟共為末二三錢淡醋湯調服當歸散治婦人血崩不止理氣血而又澀血者也當歸龍骨燒赤香附子炒各一錢棕毛灰五錢上為末每服四錢米飲調空心服忌油膩豬魚雞等物一方治血崩屢效當歸白芍藥乾薑棕櫚各等分上各煅存性研為細末醋調食前服此方以血藥入乾薑有從治之妙琥珀散一名為烏紗帽散治暴崩不止赤芍藥當歸香附子乾荷葉男子發皂莢水洗棕櫚烏紗帽是漆紗頭巾取陽氣上衝故也上各等分並於新瓦上煅成黑灰存性三分為細末每服五錢空心童便調下如人行十里久再進一服即止荷葉清芬可以升甲膽之氣而清血烏紗染五倍故能止血又有生漆可以破瘀取常用者陽升之意若産後血去多加米醋京墨麝香少許一法先以五積散加醋煎投一二服次服五靈脂散立應散治婦人血海崩敗又治腸風下血香附三兩一半生一半炒棕皮一兩燒存性上為細末每服五錢酒與童便各半盞煎七分溫服無時如腸風不用童便腸風不用童便似有前後之分立效散治婦人血崩不止當歸蓮花心蓮花心性澀而香可以通心氣之和而澀血白綿子紅花茅花各一兩上銼如豆大白紙包裹泥固火煅存性為末每服三錢溫酒調服必效散治婦人月經不調及崩漏不止棕皮燒木賊去節燒存性各二兩麝香一錢另研上為末酒服二錢空心服烏金散治血崩不止棕櫚毛燒存性一兩龍骨煅過二錢上為細末研勻每三錢空心好酒調服二服立止香礬散治血崩香附子醋浸一宿炒焦存性為末一兩白礬末二錢上研勻米飲調空心服神效一方用荷葉調尤妙一方治婦人血崩不止槐花一兩棕毛灰五錢上為末水二盞鹽少許煎至七分去滓溫服一方用陳槐花一兩百草霜半兩稱錘燒紅淬酒下一二錢一方槐花萼燒灰溫酒調下二錢匕一方槐木耳燒作灰酒服方寸匕止崩雜方一方荊芥荊芥入肝清而升舉乃血中要藥蓮房各等分燒灰存性為細末空心米飲調下二錢一方荊芥穗燈火燒焦為末每服三錢用童便調下一方葫蘆去子穰實荊芥穗燒存性米飲調服葫蘆未解一方香附子去毛炒焦黑存性為末熱酒調服二錢不過兩服立止一方砂仁新瓦炒黑為末米飲調服一方益智仁炒黑為末鹽米飲調下一方檳榔燒灰存性碾末溫酒調下甚妙一方亂髮皂角水洗淨為末空心酒調下二錢一方棕櫚白礬煅為末酒調二錢一方棕櫚燒成性淡酒調下三錢一方烏梅燒灰存性為末烏梅湯調下一方桂心燒存性為末米飲或酒調下一二錢一方桃仁燒灰存性研細食前溫酒調下二錢一方五靈脂炒令煙盡為末溫酒調下一錢一方黃牛角䚡用尖燒為黑灰微存性研末調服一方鹿角燒灰細研食前溫酒調下二錢一方烏賊魚骨燒存性為細末每二錢煎木賊湯下一方鹽白梅燒灰存性為末空心米飲調下一方用夏枯草燒存性為末米飲調下一方百草霜二錢狗膽汁拌定分作二服當歸酒調下用狗膽汁甚奇然亦陽中陰藥也同百草霜必妙必妙一方京墨為末二錢匕同燒露蜂房為末三指撮酒調服一方新綿一口燒研末空心酒調下立止名一笑散一方蓮蓬燒灰存性為細末酒調下二錢一方棉子花銅器炒煙盡為末空心溫酒調下二錢棉子暖下元而止血一方用大薊俗呼為馬茨芥連根去土勿洗以瓷石器搗爛仍入冷水半盞取汁服之立止千金方治婦人無故尿血龍骨二兩為末以酒調服方寸匕孫真人方治九竅出血九竅一竅總是理荊葉搗取汁酒和服之
