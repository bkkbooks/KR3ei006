body:
  text: 卷之四虛勞門論婦女虛勞與男子不同準繩云勞倦所傷用補中益氣湯調治補中益氣是治勞倦內傷之劑乃初治法非久病勞瘵骨蒸所宜乃暴病也失治而有發熱潮熱盜汗咳嗽諸證出焉謂之虛勞又復失治而有皮聚毛落飲食不為肌膚骨髓中熱經閉不行諸證出焉謂之瘵骨蒸熱至於傳屍之疾別自一種其源不起於勞欲其流或至於滅門余於雜病首冊則既條分而備列矣然男以精為主女以血為主其致病既殊其施治亦異故應別著方法精血雖殊而虛勞形症不遠治亦不異宜與雜症參看而陳氏良方分勞瘵骨蒸勞血風勞氣虛勞風勞冷勞熱勞客熱等門未免惑亂後人靡所適從今釐正如左醫者更參雜病虛勞傳屍勞二門而用之則無道少之患矣按血風勞者肝血虛而風熱成勞也風勞冷勞因虛乘襲日久變成勞熱氣虛者氣不足熱勞者血不足至骨蒸勞瘵大都難治矣論初病大法保命集云治婦人虛勞局方中謂首尾六合如大聖散熟地黃丸是治無熱虛勞也中道藥牡丹煎丸空心食前人參荊芥散臨臥食後是治有熱虛也戴氏曰有病後血虛者有本體血虛者其人往來寒熱或五心發熱言語無力面色萎黃頭目昏暈變生諸疾芎歸湯加羊肉少許或十全大補湯四物湯養榮湯服之血虛而氣旺者宜抑氣湯即香附末論無熱虛勞無熱虛勞乃陽虛症其病自上而下損之脈也法宜溫補惟東垣元禮立齋先生獨得其治宜宗之氣虛易補宜早為妙不比有熱虛勞之難療理也大全云婦人冷勞屬血氣不足臟腑虛寒以致臍下冷痛手足時寒月經失常飲食不消或時嘔吐惡寒發熱骨節痠疼肌膚羸瘦面色萎黃也薛氏曰前證有內外真寒有內外真熱有內真熱而外假寒有內真寒而外假熱者若飲食難化大便不實腸鳴腹痛飲食畏寒手足逆冷面黃嘔吐畏見風寒此內外真寒之證也宜用附子理中湯以回陽八味地黃丸以壯火若飲食如常大便堅實胸腹痞脹飲食喜冷手足煩熱面赤嘔吐不畏風寒此內外真熱之證也有熱無熱可以占氣血虛實矣立齋證治方法可補前論不足宜用黃連解毒湯以消陽六味地黃丸以壯水若飲食如常大便堅實胸腹痞脹飲食喜寒手足逆冷面黃嘔吐畏見風寒此內真熱而外假寒也亦用解毒湯六味丸若飲食少思大便不實吞酸噯氣胸腹痞滿手足逆冷面赤嘔吐畏見風寒此內真寒而外假熱也亦用附子理中湯與八味丸當求其屬而治之經曰益火之源以消陰翳壯水之主以制陽光使不知真水火之不足泛以寒熱藥治之則舊疾未去新病復生矣夫所謂屬者猶主也謂心腎也求其屬也者言水火不足而求之於心腎也火之源者陽氣之根即心是也水之主者陰氣之根即腎是也非謂火為心源為肝水為腎主為肺也一婦食少作嘔口吐痰涎面黃腹痛月經不調手足逆冷此內外俱寒之證以內外俱寒而不用附子理中何也以六君加香附木香治之而愈一婦忽嘔吐酸水內熱作渴飲食不進惟喜冷水面色青赤投之以藥入口即吐此內外真熱之症積十餘日以黃連一味煎湯飲之徐加白朮茯苓仍加陳皮當歸炙草至月餘始進米飲稀粥調理而愈以內外真熱不用三黃解毒而以一味黃連者瀉火之源也其餘加白朮等藥者抑恐苦寒傷胃耳一婦內熱作渴大便秘結畏惡風寒手足逆冷此內真熱而外假寒先用黃連解毒湯後用六味丸而愈有熱渴便秘二症故雖逆冷亦是假寒然亦有可下者後用六味丸求其屬也然須以脈有力無力分虛實一婦初患痰喘熱渴醫以降火散氣治之肌日削而氣日索延至甲辰木旺痰盛身熱口腐腹脹神昏絕食幾死此虛熱無火投以壯火生土之劑隨服隨效越數歲夏初坐則頭墜不能起視臥則背冷覺風透體煩熱暈眩咳嘔痰湧手足麻冷此內真寒而外假熱之證也遂以大補姜附之劑投之不三四服而大勢已平仍以前藥加減而愈此得熱因寒用之法從之韓懋治其嫂年三十餘此案系重出然不刪去者存之以備遺亡也十八胎九殰八夭會家難作驚憂過甚遂昏昏不省人事口唇舌皆瘡或至封喉下部虛脫白帶如注如此四十餘日或時少蘇至欲自縊悲不能堪醫或投涼劑解其上則下部疾愈甚或投熱劑及以湯藥熏蒸其下則熱暈欲絕此亡陽證也明是上實下虛得熱因寒用急以鹽煮大附子九錢為君制以薄荷防風佐以芎歸薑桂之屬水煎入井水冷與之未盡劑鼾睡通宵覺即能識人或曰此何謂也曰方書有之假對假真對真爾上乃假熱故以假冷之藥從之下乃真冷故以真熱之藥反之斯上下和而病解矣繼以女金丹錯綜以三二方不但去其疾且調治元氣無何連生二子以上論及治驗有無當於虛勞者而實治寒與熱變通之大法爾不可不察也論有熱虛勞此屬陰虛乃自下而上至脈之病也宜以丹溪節齋古庵諸公之方參用然陰虛難治以血生於氣先無形而後有形也且滋陰之劑有害脾胃脾傷則氣損氣損則血無以生氣盛則火有所助誠難調治惟審胃氣有無以決治則此為良法耳大全云婦人熱勞由心肺壅熱傷於氣血以致心神煩躁頰赤頭疼眼澀唇乾口舌生瘡神思昏倦四肢壯熱飲食無味肢體痠疼心忪盜汗肌膚日瘦或寒熱往來當審其所因調補氣血其病自愈矣薛氏曰熱勞乃壯火食氣壯火食氣是言實火非同勞熱之火可補虛火煎熬真陰之所致也王太僕云如大寒而甚熱之不熱是無火也太僕所論乃真水真火此根有生中來故當求屬以衰之熱來復去晝見夜伏夜發晝止是無火也當治其心如大熱而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也當助其腎心盛則生熱腎盛則生寒腎虛則寒動於中心虛則熱收於內竊謂竊謂以下諸症或肝或脾或肺而心腎者甚少總以分氣分血主治卻與求屬之意不同前證此下二十節分經症虛實定方確有見解若肝脾血虛用四物參朮肝脾鬱怒小柴胡合四物湯脾胃氣虛補中益氣湯肝脾血虛加味逍遙散肝經風熱加味小柴胡湯心經血虛天王補心丹肺經氣虛人參補肺湯肝經血虛加味四物湯大抵午前熱屬氣分用清心蓮子飲方見雜病赤白濁午後熱屬血分用四物湯參朮牡丹皮熱從左邊起肝火也實則四物湯龍膽山梔虛則四物參朮黃耆熱從臍下起陰火也四物參朮黃柏知母酒拌炒黑五味子麥門冬肉桂如不應急用加減八味丸不時而熱或無定處或從腳心起此無根虛火也用加減八味丸及十全大補湯加麥冬五味主之一婦經行不調飲食少思日晡熱甚此肝脾氣血俱虛用十全大補加山茱萸山藥壯丹皮麥冬五味而愈次年秋寒熱如瘧仍用前藥而愈一婦生育多胎月經不調兩足發熱年餘其身亦熱勞則足痠痛又年許唇腫裂痛又半年唇裂見血形體瘦倦飲食無味月水不行此氣血俱衰之證彼誤用通經丸等藥復傷氣血遂致不起論瘵骨蒸熱準繩云五勞六極七傷諸證治已見雜病虛勞門茲不贅敘婦人致此多因經行胎產或飲食起居七情重傷肝脾之所致又或失於調攝或過於攻伐而成與男子治法稍有不同故彙集古禁方專治婦人者於此若欲究其源流更當稽之彼籍良方云骨蒸勞者由積熱附於骨而然也此至脈之病也夫腎主骨骨至於蒸真陰竭矣陽何以依亦曰傳屍殗殜伏連無辜其名不一此病皆由脾胃虧損所致其形羸瘦腹脹泄痢肢體無力傳於腎則盜汗不止腰膝冷痛夢鬼交侵小便赤黃傳於心則心神忪悸喜怒不時頰唇赤色乍熱乍寒傳於肺則胸滿短氣咳嗽吐痰皮膚甲錯傳於肝則兩目昏暗脅下妨痛閉戶忿怒五臟既病則難治療論血風勞大全云婦人血風勞證肝熱生風故病名血風曰勞者病久血虛月候不行而發熱不止也因氣血素虛經候不調或外傷風邪內挾宿冷致使陰陽不和經絡痞澀腹中堅痛四肢痠疼月水或斷或來面色萎黃羸瘦又有因產後未滿百日不謹將護臟腑虛腫百脈枯竭遂致勞損此是肝腎之陰不足當從至脈主治久不瘥則變寒熱休作有時飲食減少肌膚瘦瘁遇經水當至即頭目昏眩胸背拘急四肢疼痛身體煩熱足重面浮或經水不通故謂之血風勞氣也薛氏曰東垣云喜怒不節起居不時有所勞傷皆損其氣氣衰則火旺火旺則乘其脾土脾主四肢故因熱懶言動作喘乏表熱自汗心煩不安當病之時宜安心靜坐存養其氣以甘寒瀉其熱氣以酸味收其散氣以甘溫補其中氣經言勞者溫之損者溫之要略云平人脈大為勞以黃耆建中湯治之一婦人勞則足跟熱痛此足三陰血虛用聖愈湯而痊後遍身瘙癢誤服風藥發熱抽搐肝脈洪數此肝家血虛火盛而生風以天竺黃膽星為丸用四物麥冬五味芩連炙草山梔柴胡煎送而愈一婦素清苦勤於女工因感風邪此所謂風勞也當從損脈治自用表散之劑反朝寒暮熱自汗盜汗形氣虛甚其脈或浮洪或微細其面或青白或萎黃此邪去而氣血愈虛也用十全大補湯三十餘劑漸愈又用加味逍遙散兼治半載而痊治虛勞平補諸方此下諸方於虛損初病者宜酌用之增損四物湯治婦人氣血不足四肢怠惰乏力少氣兼治產後下血過多榮衛虛損陰陽不和乍寒乍熱當歸川芎白芍人參乾薑炮甘草炙各等分上㕮咀每服四錢水一盞煎至六分去滓熱服夫血病治血氣病治氣人所易也而血病補氣氣病補血人未盡知故四物復有增損之法蓋以地黃滯氣而損脾非四肢怠惰乏力少氣者所宜故當損而人參甘草所以益脾也故當增若炮姜既能溫中又能引血以歸氣此增損之妙也六神湯治脾氣不和榮衛不足怠惰困倦不嗜飲食服之補養真氣進美飲食充澤肌膚當歸川芎白芍藥熟地黃黃耆地骨皮各等分上為粗末每服五錢水煎空心溫服按充肌澤膚者衛氣也氣不可熱此方以黃耆益衛氣而又以地骨皮清衛熱則無壯火食氣之虞又以四物引衛氣以歸四臟而主血則又有少火生氣之用如是則榮衛足而困倦去矣其曰脾不和不嗜食亦為氣不足之病氣足則愈也宜知之聖愈湯治血虛心煩睡臥不寧或五心煩熱黃耆當歸酒洗各一錢人參川芎熟地酒洗生地酒洗各五分上水煎服聖愈湯重在血虛心煩四字然去白芍而用生地者所以涼心生血也川芎之用豈為火鬱宜散歟不若以麥門冬易之加減大建中湯治婦人胎前產後一切虛損月水不調臍腹絞痛往來寒熱自汗口乾煩渴芍藥二兩當歸川芎黃耆肉桂各一兩白朮炙草各七錢上為末每服二錢五分加薑棗水煎食前服按前三方一用參姜以溫中一用黃耆地骨以益衛清熱一以參耆並用而中外兩補均以四物加減為血分居多此名建中又重在氣也然桂之色可以通榮血桂之氣味可以通衛氣故本經以之通血脈又同耆朮甘草薑棗等則建中之功尤大矣以其兼中土也當歸建中湯治婦人一切血氣不足虛損羸乏當歸四兩白芍炒六兩肉桂去皮甘草炙各二兩上㕮咀每服三錢加生薑三片棗一枚水煎空心服此方以歸芍為主而無耆術雖薑棗和中然在血分建業知配合之妙則知古人之心雙和散治一切大病之後虛勞乏力補血益氣雙和者專和榮衛而非建中意也然即大建中湯以白朮易熟地而分兩亦殊要知古人不執方不泥法讀之令人有言外之意黃耆熟地黃當歸川芎白芍藥炒各一錢肉桂甘草炙各五分上㕮咀每服四錢加生薑三片棗二枚水煎服補中益氣湯治形神勞倦或飲食失節以致脾胃虛損清氣下陷發熱頭痛四肢倦怠心煩肌瘦日漸羸弱黃耆人參有嗽去之白朮各一錢甘草炙五分當歸陳皮各七分升麻柴胡各三分上作一服水煎食遠稍熱服夫形勞者氣傷於外神勞者氣傷於內飲食不節者中氣受傷傷則水穀衰少後天氣病而上下二焦亦無所養故以甘溫之劑以益上中之氣而又妙在升榮以舉下陷之陽使榮衛和而氣自益也氣益則何病之有故東垣先生一生得力盡在於此其本方加減法更妙詳之八珍湯治脾胃虧損氣血俱傷蓋人之生以脾胃為主脾胃一虛諸臟失所百病生焉即四君子合四物湯加薑棗煎服歸脾湯治脾經失血少寐發熱盜汗或思慮傷脾不能攝血妄行或健忘怔忡驚悸或心脾傷痛怠惰嗜臥飲食不思方見血崩門勞傷條黃耆散治勞氣食後身疼倦夜間盜汗此因失血榮衛損也黃耆一兩防風當歸白芍乾地黃各七錢半甘草炙半兩上每服五錢姜三片棗一枚水煎食前溫服夫腎液入心為汗而汗者陽之氣也陽氣者衛氣也衛氣晝行陽則為氣為汗行陰則為液為血若盜汗者為行陰之氣反竊而外出以行陽也此方用黃耆益陽氣而固表防風為之使歸芍地黃引氣藥以歸陰甘草從中以和榮衛故諸症愈矣桔梗引子治心不足解勞倦益血黃耆人參麥門冬去心桔梗甘草炙各一兩青皮半兩上為末每服三錢水一盞煎七分溫服桔梗飲治氣不足也故以參耆甘草為君加麥門者所以通心而清火苦梗載諸藥以益上焦之氣青皮利膈氣以制諸藥之壅所謂血生於氣劫勞散治心腎俱虛勞嗽二三聲無痰遇夜發熱熱過即冷時有盜汗四肢倦怠體劣黃瘦飲食減少夜臥恍惚神氣不寧睡多異夢此藥能治微嗽有唾中有紅線名曰肺痿失治便成羸劣之疾白芍藥六兩黃耆蜜炙四兩人參去蘆白茯苓半夏湯泡七次甘草炙當歸去蘆酒洗五味子阿膠炒熟地黃洗淨焙乾各二兩上㕮咀每服三錢生薑七片棗三枚水煎溫服日三人身以氣血為用五臟以心腎為主心腎者氣血之父母此方以三物補氣以三物補血以三物止嗽消痰斂肺似矣然半夏性燥損血用之何居蓋氣以黃耆為君血以白芍為君而又以熟地阿膠潤燥五味人參生津則又何害於燥然以之治微嗽有唾則可若以之治紅線則非今人所敢及也幸斟酌之況同人參黃耆尤未敢輕用補肺湯治勞嗽五臟虧損晡熱發熱盜汗自汗唾痰喘嗽人參黃耆炒紫菀五味子炒各五分熟地黃桑白皮炒各一錢上銼水煎入蜜少許食後服有謂嗽忌參耆痰忌熟地而此方概用之非得知也補方丸治婦人虛損諸疾白朮熟地各一兩當歸白芍藥炒川芎黃耆人參陳皮各半兩上為細末煉蜜丸如桐子大每服五七十丸溫水下此即八珍意而陳皮茯苓之取捨當思之人參丸養陰生血補虛人參白朮鹿角膠炒當歸芍藥川芎熟地黃各等分上為末煉蜜丸如桐子大每服三十丸空心米飲下此亦八珍意也以為丸故去甘草以淡滲故去茯苓而鹿角膠之用非以其為氣血之屬而補督脈充腦髓乎七補丸治婦人氣血虛弱衝任不和腹中經結狀若懷孕月候尚來未分經脈宜服此方當歸川芎芍藥各三錢熟地白朮白芷阿膠炒各二分上為細末煉蜜丸桐子大每服五六十丸空心米飲下四物阿膠可以補任脈之虛白朮白芷可以調衝脈之氣以其經結如孕經脈未分故制方如此十補丸治婦人諸虛百損榮衛不調形體羸瘦面黃背倦口苦舌乾心忪多汗血衰氣盛寒熱往來一切血崩帶下墮胎落孕此藥皆治孕婦服之尤有神效熟地黃淨洗酒浸蒸過焙於稱重四兩肉蓯蓉灑浸焙乾人參黃耆去蘆蜜炙當歸酒浸川芎白芍藥洗白茯苓白朮去蘆炒各二兩肉桂去皮一兩甘草半兩上為細末用好酒調山藥末打糊丸如桐子大每服六七十丸食前米湯或溫酒下此即十全大補湯加肉蓯蓉也本草以蓯蓉為黑司命能治男子絕陽不興婦人絕陰不產故加之然丸方用甘草者甚少而此乃如方用之又不以蜜丸而以酒調山藥為糊者欲使丸無太緩之能功有十全之驗也滋陰百補丸治婦人勞傷氣血諸虛百損五勞七傷陰陽不和乍寒乍熱心腹疼痛不思飲食尪羸乏力香附一斤用酒醋鹽湯童便各浸四兩焙乾益母草半斤當歸酒洗六兩川芎熟地黃薑汁炒白朮各四兩白芍藥炒三兩玄胡索炒人參白茯苓各二兩甘草炙一兩上為細末煉蜜丸如桐子大每服五六十丸砂仁湯或酒或醋湯白滾水任下空心服此方不惟理氣補虛而且善調經種子然有甘草而又以蜜為丸者為以香附益母為君故無傷於甘丸而緩也羊乳丸治虛勞羸瘦黃耆蜜炙地黃酒浸蒸秦艽山茱萸肉柴胡地骨皮等分上為末煉蜜丸如桐子大每服五十丸煎人參湯下不拘時候日進一服此方以黃耆補上焦元氣而配以地骨之苦寒是補氣不補火以熟地補下焦之水而配以山茱之溫澀是補水而又生肝柴胡散結熱之氣秦艽利一身之機方以羊乳名者以參耆有羊肉之功也六味丸一名地黃丸一名腎氣丸治腎經不足發熱作渴小便淋閉氣壅痰嗽頭目眩暈眼花耳聾咽燥舌痛齒牙不固腰腿痿軟自汗盜汗便血諸血失音水泛為痰血虛發熱等證其功不能盡述熟地黃半斤杵膏山茱萸肉乾山藥各四兩牡丹皮白茯苓澤瀉各三兩上各另為末和地黃膏加煉蜜丸如桐子大每服七八十丸空心食前滾湯下八味丸治命門火衰不能生土以致脾胃虛弱飲食少思大便不實臍腹疼痛夜多漩溺等症即六味丸加肉桂附子各一兩此方原名腎氣丸為以腎中有生氣也腎為坎命門同之命門之氣宜藏而不宜泄故日慳臟以其受五臟六腑之精而藏之也本方以地黃滋腎陰以山茱山藥茯苓澤瀉補四臟之氣降而歸腎而丹皮以瀉陰中伏火火去而氣生精長所以四臟皆有廩而生生不窮也名曰腎氣豈無謂乎若八味者又溫生氣於陰之中以補火生土也故下元虛而腹痛漩溺者宜之益陰腎氣丸治諸臟虧損發熱晡熱潮熱盜汗或寒熱往來五心煩熱或口乾作渴月經不調或筋骨酸倦飲食少思或頭目不清痰氣上壅咳嗽晡甚胸膈痞悶或小便赤數兩足熱痛或腳足痿軟肢體作痛等症此壯水之主以制陽光之劑熟地黃八兩杵膏山茱萸肉山藥各四兩白茯苓牡丹皮澤瀉各三兩當歸五味子炒各二兩生地黃酒浸杵膏上為末入二膏加煉蜜丸如桐子大硃砂為衣每服五十丸空心淡鹽湯下按腎氣丸立自仲景主作納氣歸元故名之今加益陰二字乃添蛇足也豈立方之旨哉若五味猶能斂氣生津生地尚可涼血瀉火或少佐之庶幾近理而當歸之用殊失之矣或曰當歸味辛可以潤腎燥殊不知辛溫之味乃流行之物非所以納氣也蓋腎為水藏而陰生所謂水深土厚也動則氣散而水溢所謂失藏其用也觀水歸冬旺而反涸長夏火旺而水行可想命名之義矣辛溫之物加於納氣丸中宜乎否乎烏雞煎丸治婦人百病血氣虛勞赤白帶下等證黃耆當歸各六兩香附子四兩白茯苓三兩人參官桂熟地黃生地黃地骨皮各二兩上為烏骨白雞一隻男用雌女用雄籠住將黃耆末和暖面丸雞頭實大餵雞眼生眵吊死去腸肚及毛洗淨捶碎骨入前藥並納雞腹內用酒醋各一瓶煮一宿取骨焙乾並研為末用汁打糊丸如桐子大每服五十丸鹽湯下雞巽木也烏骨白毛金水相生木無火燥之義於婦人所宜者肝木為用而陰生陽長也但此方所配諸藥雖以氣血為主然參耆同官桂則溫補太過苟非血虛氣弱者不可人參鱉甲丸治婦人一切虛損肌肉瘦瘁盜汗心忪咳嗽上氣經脈不調或作寒熱不思飲食人參當歸赤芍藥杏仁湯浸去皮尖炒甘草炙桔梗去蘆柴胡各一兩地骨皮宣黃連胡黃連各七錢半肉桂去粗皮木香各半兩麝香另研五分鱉甲一枚重二兩者醋炙黃色上為細末用青蒿一斤研爛絞汁童子小便五升酒五升同熬至二升次入真酥三兩白沙蜜三兩再熬成膏冷方下眾藥末搜和令勻丸如桐子大每服五十丸溫酒送下無時此方謂治虛損者為氣血不足也故用參歸惟不足則津液枯而肌肉瘦故用酥蜜以潤之且酥蜜同杏仁甘桔又可潤肺下氣而除嗽也然氣不足則寒而心忪血不足則熱而盜汗故又於補氣血之中一加柴胡地骨黃連以除熱一加肉桂木香以溫寒赤芍散血中之瘀杏仁破氣中之滯胡連鱉甲青蒿童便搜骨蒸之熱而以麝香為引者是欲內外通而結熱散也又何不足之有艾煎丸治婦人諸虛杜艾葉大當歸各二兩香附子四兩上醋煮半日焙乾為末再用醋煮糊丸艾醋湯下此方調氣調經行血養血凡艾附丸可以此作祖耆味丸補虛敗黃耆四兩鹽水浸火炙北五味二兩上為末秫米糊丸空心鹽酒下此補氣秘方也妙在用黃耆以鹽水浸炙用秫米以作糊丸以其能開胃也五味為佐惟虛而吸吸短氣者宜之治無熱虛勞附子理中湯治真陽不足飲食難化大便不實腸鳴腹痛飲食畏寒手足逆冷白朮人參乾薑炮甘草炙附子炮去皮臍各等分上銼加生薑水煎服每服四錢加生薑十片水煎服此方只在理中二字上體認仲景原作大丸為煎和渣同服理中妙處全在於此今失其意深可惜也如大便不實者還宜遵之黃耆建中湯治男子婦人諸虛不足羸乏少力此藥大生氣血補益榮衛黃耆三錢白芍藥炒四錢肉桂一錢半甘草炙二錢上㕮咀作一服加薑棗水煎食前服理中者理土中之寒建中者溫血中之寒當歸建中則溫榮以行血黃耆建中則溫衛以行血曰大建中則氣血俱溫俱行矣用者須得此意加味黃耆湯治陽虛惡寒黃耆二錢人參白朮甘草炙各一錢肉桂五分上銼水煎服甚者加附子十全大補湯治婦人冷勞最妙裡氣足則外氣充外氣固則內氣足此方內外相長而以肉桂通經脈於表裡之間則陽虛之寒釋矣其加附子又兼溫內也方見經閉血枯條渾身碎痛引子治婦人勞倦虎骨五錢防風藁本白芷茯苓甘草炙白朮當歸白芍炒續斷附子各二錢上為粗末加薑棗煎不拘時服主渾身之經絡者肝也而肝所以藏血以榮周身之筋則一身之碎痛當以肝為主而生血之本以脾為主為脾統諸經之血也防風行肝氣於周身白芷行陽明於血海甘術益中土以生血歸芍榮肝木於周身附子溫內而通所不通藁本行上而散至巔頂茯苓滲下而內達九淵虎骨續斷其搜筋骨諸邪而定痛者歟其曰治勞倦者必每因勞倦而常身痛者也木香丸治婦人冷勞經脈不調臟腑氣滯四肢疼痛飲食無味漸加羸瘦木香琥珀吳茱萸泡當歸牡丹皮赤芍藥三稜附子炮玄胡索川芎各七錢半乾薑人參桂心各半兩北柴胡鱉甲醋炙去裙襴白朮厚朴熟地黃陳橘皮各一兩上為末煉蜜丸如桐子大每服三十丸空心溫酒下戊己丸治新婚男子女人素稟虛寒滑泄飲食無味肌肉不生多睡少寐終日昏蒙夜多異夢畏寒喜熱吃食嘔吐清水狀如翻胃此藥養脾開胃滋血氣長肌肉添精益髓補暖丹田此方補氣補血破氣破血溫氣行血通氣養血非真冷勞氣滯血寒血凝者不可妄服茴香白茯苓香附子炒各三兩胡椒五兩人參甘草炙各一兩白朮二兩硃砂半兩研細上為細末生薑汁打糊丸如桐子大每服二三十丸空心食前白湯下日三服硇砂丸治婦人冷勞心腹積聚腹脅疼痛四肢羸瘦不食此方全在破血散結雖曰治冷勞然實為心腹積聚日久以致瘦瘁也大概病根於冷而至於瘦故云然若非真確安敢妄用鱉甲醋炙桃仁去皮尖麩炒木香五靈脂炒當歸各一兩硇砂二兩醋一升熬成膏上為細末用硇砂膏為丸如桐子大每服二十丸空心溫酒下此方硇砂太多不宜輕用治有熱虛勞逍遙散治血虛勞倦五心煩熱肢體疼痛頭目昏重心忪頰赤口燥咽乾發熱盜汗減食嗜臥及血熱相搏月水不調臍腹脹痛寒熱如瘧又主室女血弱陰虛榮衛不和痰嗽潮熱肢體羸瘦漸成骨蒸當歸酒洗白芍藥酒炒白朮白茯苓柴胡各一錢甘草炙五分一方用一錢半者上銼散水一盞半生薑三片麥門冬二十粒去心煎七分不拘時服一方用薄荷少許無麥冬此治肝脾血虛木鬱不達而發熱者最當引用門冬所以除五心之煩引用薄荷清肌骨之熱一開表一清裡具見不同皆因病而藥之也熱甚加牡丹皮梔子炒骨蒸加知母地骨皮咳嗽加五味子紫菀吐痰加半夏貝母栝蔞仁飲食不消加山楂神麯發渴加麥門冬天花粉胸中作熱加黃連梔子心慌加遠志酸棗仁吐血加阿膠生地黃牡丹皮自汗加黃耆酸棗仁久瀉加炒黑乾薑遍身痛加羌活防風川芎以利關節手足顫掉加防風荊芥薄荷氣惱胸膈痞悶加枳實青皮香附怒氣傷肝眼目昏花加龍膽草黃連梔子小腹痛加玄胡索香附子經閉不通加桃仁紅花蘇木左腹血塊加三稜蓬朮桃仁紅花右腹氣塊加木香檳榔加法俱平正亦可法黃耆散治婦人勞熱羸瘦四肢煩疼心躁口乾不欲飲食人參黃芩當歸各七錢半赤茯苓赤芍藥炒黃耆麥門冬去心生地黃地骨皮各一兩柴胡一兩半甘草炙一錢半上㕮咀每服四錢水一盞生薑五片煎六分去滓溫服無時子芩散涼心肺解勞除熱使榮衛順血不絕黃耆一兩人參白芍藥白茯苓子芩麥門冬去心生地黃各半兩苦梗二錢半上為粗末先用竹葉一握小麥七十粒水三盞姜三片煎至一盞半入藥末三錢重煎至七分去滓溫服較前方少四味而赤芍又不同即可以得其補瀉之意矣以竹葉小麥為引者重在心肺之意知母散治婦人勞熱體瘦壯熱四肢煩疼咽喉不利少思飲食柴胡生地黃各一兩知母黃芩炒赤芍藥炒射干麥門冬去心升麻各七錢半甘草炙微赤半兩上為粗散每服四錢水一中盞入生薑半分淡竹葉二十七張同煎至六分去滓不拘時溫服此方較前黃耆散無參耆歸茯地骨而加知母射干升麻其重在咽喉不利也然參耆有肺熱還傷肺之戒故不用而知母射干又瀉火動大便亦宜思之若少思飲食從咽喉不利來則可用從脾胃不足來則不可輕用臨症自考半夏散治婦人熱勞煩渴口乾體瘦無力四肢疼痛或時寒熱痰逆嘔吐不思飲食黃耆北柴胡鱉甲醋炙各一兩大腹皮七錢半半夏知母苦梗人參赤茯苓秦艽赤芍藥麥門冬烏梅肉各半兩甘草炙二錢半上為粗末每服四錢生薑三片水煎溫服今人以半夏大腹之類性燥為勞熱大忌而古方乃以半夏立名以治熱勞豈非異哉且曰治煩渴口乾尤異也如秦艽可治肢節之疼半夏可治痰逆之嘔鱉甲同柴胡以治寒熱烏梅同參麥以治口乾若大腹皮者又監製參耆之滯氣也雖異何疑轉而思之又怪夫今之不古者多矣秦艽散治心經有熱血脈凝滯五心煩倦秦艽麥門冬各一兩當歸生地黃各半兩地骨皮鬱金蘇木各二錢半上為細末每服一錢半水一盞紅花少許同煎至七分溫服若經脈調不用紅花忌酒與熱物此方可服一年此方以生地麥冬涼血熱秦艽地骨除骨熱其三味皆治血脈凝滯之物也少加紅花以見生血之功專忌酒熱以免助熱之累然非真鬱金不能服一年也鱉甲地黃湯治熱勞手足煩心怔忡悸悶婦人血室有乾血身體羸瘦不為肌肉鱉甲醋炙熟地黃酒浸當歸柴胡白朮茯苓麥門冬去心石斛秦艽各一兩人參肉桂不見火甘草炙上銼每服四錢生薑四片烏梅半個水煎溫服此方以地黃當歸麥門以滋榮血脈以四君石斛以清胃補脾柴胡鱉甲秦艽以治骨蒸勞熱亦八物湯之加減者然以肉桂為佐我不敢信以為熱勞法也即以為法須審其脈症何如胡黃連散治婦人熱勞體瘦經脈不通四肢疼痛口乾煩渴不得眠臥飲食減少鱉甲一兩半醋炙黃去裙天靈蓋酥炙黃柴胡生地黃地骨皮黃耆大黃微炒犀角屑各一兩當歸胡黃連青蒿黃芩各七錢半赤芍藥木香麝香細研各半兩上為粗末每服四錢以水一中盞入生薑一錢三分桃柳心各七莖煎至六分去滓不拘時溫服犀角散治婦人熱勞心胸煩熱不思飲食四肢多疼經脈澀滯此較前方大同小異而力量自是懸別犀角屑黃芩甘草炙各半兩赤芍藥虎杖茯苓地骨皮麥門冬去心枳殼麩炒微黃當歸各七錢半柴胡紅藍花鱉甲醋炙黃去襴裙各一兩上為粗末每服三錢以水一中盞入生薑半分煎至六分去滓溫服無時紅藍花散治婦人熱勞四肢羸瘦經脈不通柴胡一兩半紅藍花生地黃赤芍藥當歸鬼箭羽虎杖大腹皮麥門冬去心土瓜根地骨皮枳殼麩炒各一兩甘草炙半兩上為粗散每服四錢以水一中盞入生薑半分煎至六分去滓溫服無時赤芍虎杖土瓜根皆破血通經腹皮枳殼寬胸理氣其他不過清心涼血解熱而已鱉甲散治婦人熱勞發渴壯熱四肢煩疼漸漸黃瘦心胸躁悶鱉甲醋炙黃去裙襴柴胡各一兩半麥門冬去心一兩知母川大黃微炒地骨皮赤芍藥黃耆人參黃芩桑白皮各七錢半甘草炙微赤半兩上為粗末每服四錢以水一中盞入生薑半分蔥白五寸豆豉五十粒煎至六分去滓溫服無時按此四方大同小異而柴胡赤芍地骨鱉甲則常同而參耆大黃枳殼大腹之類則互有去取斫輪者自有運斤之妙臨症之際宜審症阿膠丸治勞嗽出血咯血發熱晡熱口渴盜汗阿膠炒生地黃卷柏葉山藥炒大薊根五味子炒雞蘇各一兩柏子仁炒人參防風麥冬去心各半兩上為末煉蜜丸如彈子大每服一丸細嚼麥門冬煎湯下豬肚丸治婦人熱勞羸瘦北柴胡赤茯苓人參黃耆各一兩黃連三兩地骨皮木香各半兩桃仁去皮尖鱉甲各一兩半上為細末用好豬肚一枚淨洗將藥末入豬肚內以線縫合蒸令爛熟於瓷器內研如膏丸如梧桐子大食前粥飲下三十丸午食前再服治骨蒸勞瘵加味四物湯治婦人骨蒸當歸白芍藥炒川芎生地地骨皮牡丹皮各等分上㕮咀每服六錢水煎服一方加白朮此方以四物生四臟之陰以地骨牡丹解骨蒸之熱其加白朮者以土為萬物之母也大意如此黃連散治婦人骨蒸勞熱四肢昏沉背膊疼痛面色萎黃漸漸無力黃連去須知母各一兩鱉甲醋炙二兩柴胡木通各一兩半麥門冬去心白朮地骨皮黃芩犀角屑各七錢半龍膽草去蘆甘草炙微赤各半兩上為粗散每服四錢以水一中盞生薑一錢淡竹葉二七片煎至六分去滓溫服無時夫腎之餘氣結而成骨心火上爍久則為蒸此方以黃連木通犀角麥門導心熱柴鱉地骨清骨熱知芩救腎之母龍膽瀉心知母白朮甘草和諸藥而保脾如是則壯火去而少火生水日旺而骨蒸去矣又何勞熱之有青蒿散治婦人骨蒸勞熱四肢煩疼日漸羸瘦青蒿鱉甲醋炙各二兩柴胡一兩半黃連去須黃耆桑白皮白朮各一兩梔子仁知母各七錢半地骨皮甘草炙各半兩龍膽草二錢半上為粗散每服四錢以水一中盞入生薑一錢三分煎至六分去滓溫服前方有芩通犀麥此方有耆蒿桑梔此又何也然梔連龍膽所以清水火之熱桑地知母所以瀉肺金之熱柴胡鱉甲青蒿解骨蒸勞熱然肺瀉則氣傷於上火去則土無以生故用黃耆白朮甘草者所以發巨橋之粟以保赤子於干戈之地也柴胡散治婦人骨蒸勞熱咳嗽胸膈痰壅腹脅妨悶不欲飲食柴胡桑白皮麥門冬去心赤茯苓各一兩川大黃銼碎微炒枳殼去穰麩炒百合秦艽紫菀洗黃芩赤芍藥知母木通各七錢半半夏湯洗七次去滑甘草炙各半兩鱉甲醋炙二兩上為粗末每服三錢以水一中盞入生薑一錢三分煎至六分去滓溫服無時此方重在咳嗽痰壅腹脅妨悶上故用大黃半夏然大黃半夏為今人所擯豈古人之不如今人歟善用者當自得之嗟乎閱古人之方我於今人之病深有慨焉河車丸治勞嗽一切勞瘵虛蒸等疾紫河車一枚初生男胎者尤良長流水中蕩洗血淨入瓷器內重湯煮極爛汁入藥揀參一兩白茯苓雪白者半兩乾山藥二兩上為細末入河車汁加麵糊為丸如桐子大以少麝香末為衣每服三五十丸米飲溫酒鹽湯任下空心服嗽甚者五味子煎湯下黃耆丸治婦人骨蒸煩熱四肢羸瘦疼痛口乾心躁不得眠臥黃耆麥門冬去心茯神去木北柴胡生地黃甘草各一兩酸棗仁炒郁李仁枸杞子杏仁去皮尖麩炒黃人參去蘆黃芩各七錢半百合枳殼去穰麩炒赤芍藥知母秦艽各半兩鱉甲制二兩上為細末煉蜜丸如桐子大清粥吞下三十丸無時此方補氣益精養血安神清肺熱解勞熱寬胸膈為主而鬱李杏仁雖能潤燥然大便滑者不宜地黃煎丸解勞生肌進食活血養心生地黃汁杏仁汁生薑汁藕汁各五升薄荷汁鵝梨汁各一升法酒二升沙蜜四升上共合一處慢火熬成膏入後藥北柴胡三兩木香人參茯苓柏子仁去皮尖研山藥遠志肉枳實麩炒白朮各一兩秦艽苦梗各二兩麝香半兩研熟地黃洗焙酒蒸四兩上為細末以前膏和丸如桐子大食後甘草湯下二三十丸按骨蒸方中未有不用柴胡鱉甲者而此方以諸汁熬膏以潤肺除熱消痰為主然恐滯膈損脾故又佐以參朮山藥茯苓麝香之類以疏啟中氣而柏子遠志又所以養脾之母而潤心也如肌膚燥澀而氣血兩虛者請嘗試之何如治傳屍勞天靈蓋散治婦人傳屍骨蒸勞四肢無力每至晚間即熱兩頰紅色飲食不下心神煩躁天靈蓋酥炙安息香地骨皮當歸人參去蘆山梔子仁貝母去心黃連桃仁去皮尖麩炒黃檳榔各一兩生乾地黃鱉甲醋炙北柴胡赤茯苓麥門冬各一兩半阿魏半兩上為粗末每服四錢以童子小便一大盞柳桃枝各七寸生薑五片蔥白五寸煎至七分去滓溫服傳屍者彼此傳染相續而亡其症亦大相類然以為傳屍有蟲形變不一故多難治此方以天靈蓋祛伏屍安息香逐邪祟阿魏桃仁檳榔祛蟲其餘諸藥則補氣血清骨熱消痰而已別無所奇而其妙則在童便桃柳枝蔥姜而已益母草丸治婦人骨蒸勞瘦月候不通心神煩熱四肢疼痛不能飲食益母草青蒿各二斤桃枝柳枝各一握長一尺以上四味銼細用童子小便一斗於銀鍋內煎至三升絞去滓煎成膏柴胡赤芍藥犀角屑各一兩鱉甲制三兩桃仁制淨五兩天靈蓋酥炙微黃硃砂細研水飛過木香甘草炙各一兩麝香半兩細研上為末用前膏和搗五七百杵丸如桐子大每服三十丸煎烏梅甘草湯下無時獺肝丸治婦人骨蒸勞熱體瘦煩疼不欲飲食與前方小異而此重在獺肝獺肝一貝鱉甲醋炙北柴胡各一兩半川升麻桃仁制天靈蓋酥炙犀角屑梔子仁地骨皮知母各一兩黃耆七錢半甘草半兩麝香二錢半研硃砂一兩細研水飛上為細末煉蜜丸如桐子大每服三十丸溫水下無時治婦人骨蒸傳屍勞瘦方麝香七錢半犀角屑木香白朮鬼箭羽各一兩虎頭骨酥炙黃色天靈蓋醋炙黃色雄黃另研桃仁去皮尖麩炒黃硃砂光明者另研各一兩半上為細末入研藥和勻煉蜜丸如桐子大每服二十丸溫水下此藥闢溫疫亦可帶治血風勞人參荊芥散治婦人血風發熱身體疼痛頭昏目澀心忪煩倦寒熱盜汗頰赤口乾痰嗽胸滿精神不爽血風勞者若血虛肝熱生風而成勞者乃內熱勞症其有外邪乘者又為外致之病當兩分看人參荊芥穗生地黃北柴胡鱉甲醋炙酸棗仁炒枳殼制羚羊角別鎊白朮各七錢半當歸川芎防風桂心甘草各半兩上為粗末每服五錢生薑三片水煎熱服此方以十全大補去黃耆白芍而加荊芥防風蓋荊芥乃行散肝中結血即火鬱發之之意而桂心之用乃古方之常當自斟酌地骨皮散治婦人血風氣體虛弱寒熱發渴地骨皮桑白皮枳殼前胡黃耆各一錢半人參白茯苓白芍藥五加皮各一錢柴胡二錢官桂甘草各五分上作一服水二盅生薑三片煎至一盅不拘時服前方兼治心此方兼治肺而官桂之用意非氣熱所宜於血風二字不知將何以解大效油煎散治血風勞氣攻注四肢腰背疼痛嘔逆醋心不思飲食日漸羸瘦面色萎黃手足麻痹血海冷敗神效五加皮川烏炮芍藥海桐皮牡丹皮各一兩川芎桂心乾薑各半兩上為細末每服二錢水一盞生麻油浸錢一文同煎至六分溫服常服以油浸二錢煎藥時不可攪吃藥時不可吹此方以川烏薑桂等藥為主是真治血中有風也故其出症皆屬膈之風冷攻注等病也其煎法以生麻油浸錢豈非入肝潤燥歟若謂煎不可攪吃不可吹又不知其深意也治血風勞方此又治在風熱清而血自旺也可為良法第恐人不自悟耳荊芥穗二兩白芍藥牡丹皮防風地骨皮白芷黑豆甘草各一兩川芎二錢半上為細末每服二錢水一中盞姜三片棗一枚蔥白一寸煎至八分溫服無時萬全逍遙散治血風勞五心煩躁心多怔忡恍惚憂懼頭目昏重夜多盜汗人參黃耆白朮白茯苓去皮柴胡去苗各等分上為散每服三錢入甘草一寸同煎溫服既治血風何為盡用氣藥況以氣藥而欲治以下諸症似亦不能愚謂此方非治血風勞乃治氣虛症也用者審之熟乾地黃散治婦人血風勞冷氣攻心心腹疼痛四肢不和飲食減少日漸羸瘦熟乾地黃柴胡黃耆蒼朮牛膝各一兩鱉甲醋炙黃二兩白芍藥當歸薑黃琥珀厚朴薑汁塗炙川芎陳皮去白各七錢半木香羌活桂心各半兩上為散每服四錢加生薑半分水煎熱服既治冷氣當同前方入無虛熱各條內然以風名而有風藥以冷名而有熱藥以勞名而治勞藥以血藥補血散血以氣藥補氣行氣用平胃以和脾胃而除心腹之疼用羌桂以能經而除四肢之病蓋以錯雜之邪而用錯雜之藥今之所謂良醫概如此
