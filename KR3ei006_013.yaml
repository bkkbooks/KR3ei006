body:
  text: 卷之十三産後門下虛煩大全云余血奔心蓋是分娩了不便與童子小便凡産後血虛氣無所附則逆而為火火上逆而瘀血迫之則心煩矣童便濁陰也其味苦鹹寒其性就下降火消瘀故宜服之所謂濁陰出下竅也並擀心下及臥太速兼食不相宜之物所致但能依方療之無不痊可薛氏曰四物湯加茯神遠志治産後虛煩十全大補湯尤效論見發熱條陳氏曰尋常治諸虛煩熱者以竹葉石膏湯溫膽湯殊不知産後與尋常不同如石膏等藥不宜輕用用之必死金黃散治産後惡血衝心時發煩躁玄胡索蒲黃各半兩桂心二錢半上為細末烏梅煎湯調下二錢蒲黃生用性涼逐瘀桂心去皮性熱行血烏梅酸收滌汙用此方不可忘此法前方以熱行血此方以涼行血集方者涇渭自分用方者毋得朱紫不辨荷葉散療産後七日內宿血不散時時衝心迷悶荷葉一兩七錢半玄胡索二兩地黃汁二合上用水二升煮二味取六合下玄胡索分三服空心服忌肉食一日川芎散療産後余血不盡奔上衝心煩悶腹痛此方行氣行血不熱不寒較前方是一天霽色令人心曠神怡川芎生乾地黃白芍枳殼各等分上為末酒調方寸匕日二服集驗方産後血氣煩悶此方清新簡切生地黃汁清酒各一升上二味相和煎一沸分為兩服以上四方看一方有一方妙用細玩之真如山陰道上行令人不忍捨去經效方療産後氣虛冷搏於血血氣結滯上衝心腹脹滿讀治症語便知用藥宜溫所謂寒者熱之留者行之也當歸川芎桂心吳茱萸陳皮生薑各一兩白芍二兩上㕮咀以水三升煮取一升去滓空心服沒藥丸治産後心胸煩躁惡血不快以煩躁二字似不宜用熱藥問到惡血不快便是瘀血衝心而如此溫行破血之藥必不可少者也又烏論其煩而不用熱藥哉沒藥蠻姜玄胡索當歸乾漆炒桂心牛膝牡丹皮乾薑各等分上為細末醋煮麵糊丸如桐子大煎曲湯下十丸至十五丸治血氣煩悶雜方生藕汁飲二升效竹瀝亦得連讀數方各呈妙相如化工天巧有難描畫一方陳白梅槌碎煎湯飲此數方又有淡妝濃抹之致一方蒲黃隔紙炒每服一錢東流水煎湯下用失笑散亦佳一方療産後余血攻心或下血不止心悶面青冷氣欲絶用羊血一盞頓服若不定更服立效藕汁竹瀝雖俱治煩然清火則同而破血消痰則異宜別之如陳白梅蒲黃失笑散人皆能之而羊血之用誠有奪天之力造方者集方者均種德無涯矣以上治余血奔心之劑人參當歸湯治産後去血過多血虛則陰虛陰虛生內熱以致心煩短氣自汗頭痛人參當歸熟地黃門冬去心肉桂各二錢白芍藥炒二錢半上用水二盅粳米一合竹葉十片煎至一盅食遠服此方以四物去川芎惡其散氣也用肉桂助其止汗也但與衆藥等分亦須斟酌而以粳米竹葉加之治心煩短氣之良法矣血熱加生地尤佳如肉桂所當去也血熱甚者加生地黃二錢竹葉湯治産後短氣欲絶心口煩悶竹葉切細麥門冬去心小麥各一升甘草一兩生薑二兩大棗十二枚上切以水一斗煮竹葉小麥至八升去渣納余藥煮取三升去渣溫服此方以小麥補心麥門竹葉除煩甘草大棗益氣安其子並培其母亦良法也生薑佐之更有贊襄之力而曰虛悸加參多多益善糯米用之為少力之助又養陰也虛悸加人參二兩少氣力加糯米五合甘竹茄湯治産後內虛煩熱短氣甘竹茹一升人參麥門冬去心茯苓甘草各一兩黃芩三兩上㕮咀以水六升煮取二升去渣分三服日三此治虛煩短氣神方雖品味數少而藥力精專可法可法如黃芩又可去取者也薤白湯治産後胸中煩熱逆氣此治胸痹法之變也原方出自仲景薤白半夏所以治逆氣栝蔞根麥門所以治煩熱人參甘草補虛知母石膏之加非熱甚不用蓋為血虛所忌故也薤白半夏人參甘草各一兩栝蔞根二兩麥門冬半斤熱甚加知母石膏上㕮咀以水一斗三升煮取四升去滓分五服日三夜二芍藥梔豉湯治産後虛煩不得眠白芍當歸梔子各五錢香豉半合上用水二盅半先煮前三味得二盅納香豉煮取一盅半去滓分二服溫服此雖云岐法不若仲景酸棗湯穩當仲景治傷寒虛煩不眠有梔子豉湯而此加白芍當歸者乃云岐變傷寒法以治産後也人常謂傷寒方可通於雜症有是哉以上治血氣虛煩之劑仲景二物黃芩湯婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者此湯主之要在風字上看以頭痛不痛為法黃芩一兩苦參二兩此大苦寒之劑與産後非宜意者熱病成煩歟要以但煩二字上體貼乾地黃四兩上三味以水八升煮取二升溫服一升多吐下蟲竹皮大丸治婦人産後中虛煩亂嘔逆安中益氣生竹茹石膏各二分桂枝白薇各一分甘草上五味為末棗肉和丸如彈子大以飲服一丸日三夜二服中虛症不可用石膏煩亂癥不可用桂枝而此方以甘草七分配衆藥六分又以棗而為丸仍以一丸飲下可想見其立方之微用藥之難審虛實之不易也仍飲服者尤慮夫虛虛之禍耳用是方者亦當深省有熱倍白薇煩喘加柏實一分以上治中風煩熱之劑經驗方治産後煩躁此重可去怯之義禹餘糧一枚狀如酸餡者入地埋一半四面緊築用炭一稱發頂火一斤煅去火三分耗二為度用濕土罨一宿方取出打去外面一層只用里內細研水淘澄五七度將紙襯干再研數千遍用甘草湯調二錢匕只一服立效發渴熊氏曰産後心煩發渴宜清心蓮子飲薛氏曰前證若出血過多虛火上炎用童子小便或四物白朮麥門丹皮若胃氣虛而有熱用竹葉歸耆湯若血虛發熱用八珍加麥門五味若血脫髮熱煩躁用當歸補血湯若胃氣虛弱用補中益氣湯或七味白朮散若謂去血過多而用童便以治虛火是矣而以四物治虛則川芎之物能不升散乎以胃氣虛而渴用白朮宜矣而以血虛用白朮亦難信也必血虛胃氣弱者乃可審證用藥幸毋執一一産婦患前證朝寒暮熱肚腹作痛以手按之不痛余以為血氣俱虛用八珍之類治之彼反行逐血更加發熱煩躁余用當歸補血湯熱躁漸止用八珍麥門五味氣血漸復李氏曰産後煩渴氣虛者生脈散血虛者四物湯加天花粉麥門冬氣血俱虛作渴頭眩腳弱飲食無味者用人參二錢麥門冬一錢半熟地黃七分天花粉三錢甘草五分糯米薑棗煎服此方分兩有法讀者不可輕放過千金竹葉湯療産後虛渴少氣力竹葉三升人參茯苓甘草各一兩小麥五合麥門冬五兩半夏生薑各三兩大棗十五枚上㕮咀以水九升先煮竹葉小麥薑棗取七升去滓入余藥再煎取二升每服五合日三夜一真人以天地之心為心故為方亦以雲行雨施之道為教此方以治渴補虛之藥十分為君而又以淡滲燥血生渴之藥十之一分為使佐此何為也蓋以茯苓能降天之陰氣半夏發地之陽氣脾者土也天氣通於地地承天氣而施生故佐薑棗發脾氣以通壅滯而生津經曰氣和而生津液相成神乃自生此大意也真人素有一體同仁之教豈不知半夏茯苓之過而反用之歟後之學者效之去之各存乎其人焉竹葉歸耆湯治胃氣虛熱口乾作渴惡冷飲食者竹葉一錢半黃耆二錢人參白朮當歸各一錢麥門冬去心七分甘草炙五分上銼水煎服熟地黃湯治産後虛渴不止少氣腳弱眼眩飲食無味熟地黃酒洗一錢半人參麥門冬去心各二錢栝蔞根四錢甘草炙五分上㕮咀作一服加糯米一撮生薑三片棗二枚水煎服少用地黃多用人參便是妙法糯米養陰七味白朮散治中風虛弱津液短少口乾作渴或因吐瀉所致人參白朮炒白茯苓甘草炙藿香木香乾葛各一錢上銼一服水煎服白朮治中氣虛弱以致津液短少者宜之蓋為胃氣不能致津液於脾也乾葛木香藿香皆發脾氣而木香於小兒更宜於産後須量用清心蓮子飲治産後心煩發渴麥門冬去心黃芩地骨皮車前子甘草炙各一錢半人參黃耆蜜炙白茯苓石蓮肉各七分半一方加遠志石菖蒲各一錢方名清心理宜保肺以生水導赤以瀉火也考諸藥性能知其理用遠志石菖蒲以治煩恐有未當處上另用麥門冬二十粒水二盅煎一盞水中沉冷空心溫服發熱加柴胡薄荷産寶方療産後大渴不止大渴妙藥亦有補土生金之理蘆根切一升麥門冬生四兩栝蔞根人參茯苓甘草各三兩大棗二十枚上以水九升煮取三升分三服頓服四劑即瘥忌菘菜栝蔞根湯療産後血渴栝蔞根四兩麥門冬去心人參各三兩生乾地黃甘草各二兩土瓜根五兩大棗二十枚上㕮咀以水八升煮取二升半分三服血渴者血虛而渴也故加生地此二方不惟産後宜服與消渴證亦相宜黃芩散治産後血渴飲水不止黃芩麥門冬各等分上㕮咀每服三錢水一盞煎八分溫服無時當歸補血湯治産後血脫煩躁引飲晝夜不息脈洪大而虛重按全無者原東垣治脫血方也移之以治産後煩渴非有見者不能當歸二錢黃耆炙一兩上銼作一服水煎服一方療血渴及産後渴以下三方一清心一涼血一生血如一山一水一琴一鶴各得其趣用蓮子心取為細末米飲調下二錢效一方治産後出血太多虛煩發渴用真正蒲黃末二錢白湯調下如渴燥甚井華水下一方治産後中風煩渴用紅花子五合微炒研碎以水煎濃徐徐呷之桃花散治産後不煩而渴新石灰一兩黃丹五錢上為細末渴時用井水調下一錢丹出於鉛內含真水且以鎮墜浮火故能止渴而石灰最為燥烈之物何以用之而況以産後乎曰不煩而渴時用井水調下一錢須當窮其故也自汗大全云産後虛汗不止者由陰氣虛而陽氣加之裡虛表實陽氣獨發於外故汗出也血為陰産則傷血是為陰氣虛也氣為陽其氣實者陽加於陰故令汗出而陰氣虛弱不復者則汗出不止也凡産後血氣皆虛故多汗因之遇風則變成痙縱不成痙亦虛乏短氣身體柴瘦唇口乾燥久則經水斷絶由津液竭故也夫汗者陽之氣陰氣不復則陽無所歸以入於陰故虛陽上浮於外而為汗耳世常謂汗多成痙而失言因而遇風變痙之理又不成痙而短氣柴瘦者此變熱也省之省之薛氏曰按前證屬血氣俱虛急用十全大補湯如不應用參附耆附等湯若汗多亡陽發痙尤當用前藥王海藏先生云頭汗出至頸而還額上偏多蓋額為六陽之所會也由虛熱熏蒸而出竊謂前證當以部位分之額左屬肝額右屬肺鼻屬脾頤屬腎額屬心治者審之亡陽發痙用十全大補參附耆附之類必審其所以而用毋泛泛執以為是也而額汗當分部位似近於迂臨症尤宜詳悉蓋腎液入心為汗於理須究一産婦略聞音響其汗如雨而昏憒諸藥到口即嘔余以為脾氣虛敗用參附末為細丸時含三五粒隨液咽下乃漸加至錢許卻服參附湯而痊其始也妙在為丸少其繼也宜大劑湯煎服一産婦盜汗不止遂致廢寢神思疲甚口乾引飲余謂血虛有熱用當歸補血湯以代茶又以當歸六黃湯納黃芩連柏炒黑代茶炒黑之理可法倍加人參五味子二劑而愈大全云凡産後忽冒悶汗出不識人治用雞子及竹瀝二法見前血暈薛氏曰前證屬大虛宜固元氣為主其汗不止必變柔痙前論汗出因風變痙之說居優不然即謂之脫陽矣此大補法所當施也東垣先生云婦人分娩及半産漏下昏冒目瞑蓋因血暴亡而火上熾但補其血則神自昌若常時血下當補而升舉其氣陽得血而神安則目明矣今立一方以補手足厥陰之血兼益陽氣名曰全生活血湯黃耆湯治産後虛汗不止黃耆二錢白朮防風熟地黃牡蠣煅為粉白茯苓麥門冬去心甘草炙各五分上切作二服加大棗一枚水煎服黃耆得防風其功愈大為易於固表也而黃耆二錢防風五分大約足矣牡蠣腎家藥也以腎液入心為汗故止汗又宜固腎其他可意解矣麻黃根散治産後虛汗不止當歸黃耆炒麻黃根牡蠣粉人參甘草炙各等分上銼每服四錢水煎服麻黃氣悍而輕陽藥也用其根用其陽中之陰耳非從陽引陰歸根之意乎要知用藥自有至理止汗散治産後盜汗不止一應汗多者皆可服牡蠣煅成粉小麥麩炒令黃色碾成粉各等分上和勻煮生豬肉汁調下二錢無時小麥生於陽至成於陰至內陽而外陰也今用其麩亦用其陽中陰耳且汗為心液而小麥養心用其麩斂心液也又腎之液入心為汗而豬水畜也調以肉汁能不又歸之腎乎服無時者以此藥力緩功遲宜頻服多服耳當歸二黃湯治産後自汗盜汗胃氣虛弱服別藥則嘔吐不能入當歸黃耆各一兩麻黃根半兩上㕮咀每服三錢水煎服麻黃根引陽歸陰因其性也白芍藥抑肝斂陰用其酸也當歸黃耆原有補血湯之變據愚見從本方立法以黃耆為君者得正也陽加於陰謂之汗陰加於陽之藥而反治之則汗自止矣立方大意如此所謂逆者正治也一方無麻黃根用白芍藥當歸六黃湯治血氣虛熱盜汗不止當歸黃耆炒熟地黃各二錢生地黃黃柏炒黑黃芩炒黑黃連炒黑各一錢上水煎服不應加人參白朮心血不足加酸棗仁人參湯治産後諸虛不足發熱盜汗人參當歸各等分上為末以豬腰子一隻去脂膜切小片子以水三升糯米半合蔥白兩條煮米熟取清汁一盞入藥二錢煎至八分溫服不拘時此方以氣血為主而引經之妙在豬腎然糯米養陰蔥白髮散何為用之然汗不以奇下不以耦故蔥白不單用而又熟之於米又非引陰意乎噫有深思焉參附湯治陽氣虛寒自汗惡寒或手足逆冷大便自利或臍腹疼痛吃逆不食或汗多發痙等證人參一兩附子炮五錢上作一服加薑棗水煎徐徐服此無上救急神方乃回陽返本之道惟四肢厥冷汗出如雨者宜之耆附湯治陽氣虛脫惡寒自汗或口噤痰湧四肢逆冷或吐瀉腹痛飲食不入及一切虛寒等證黃耆一兩附子炮五錢上作一劑加薑棗水煎服如不應倍加附子方得全濟二方一用參一用耆一固表氣一補裡氣自是不同用藥者當於此際審其內外有無而求責焉庶近道矣所謂有者求之無者求之也至哉言乎千金方療産後風虛汗出小便短少四肢拘急難以屈伸甘草炙一兩附子炮桂心芍藥炒各一兩半上銼每服三錢加生薑四片棗一枚水煎服忌豬肉冷水生蔥等物用桂枝湯以治風加附子以治虛即桂枝加附子湯也乃仲景法以四肢拘急故用此方不然胡為用此全生活血湯治産後冒悶發熱自汗盜汗目䀮䀮四肢無力口乾頭暈行步欹側升麻芍藥炒各三錢當歸柴胡防風羌活獨活葛根甘草炒各一錢川芎藁本各一錢五分生地黃熟地黃各一錢細辛蔓荊子各五分紅花三分上銼每服五錢水煎熱服此方以風升之劑而治自汗盜汗誰其信之然東垣主此湯者益陽焉素問曰陰者從陽而亟起也陰不從陽則陽外散故多汗也而升麻葛根升陽明之氣柴胡防風升厥陰之氣羌活藁本升太陽之氣於背細辛獨活升少陰之氣於前蔓荊子涼諸經之血甘草和諸陽之氣四物養血於諸陰之經紅花活血於諸陽之絡然則升而不斂非所以藏陰故用白芍為君升而太過非所以益氣故用甘草為佐言雖如此誰敢用也觀其曰冒悶發熱口乾頭暈行步欹側皆邪客經絡也以邪客經絡兩者不和故為自汗盜汗之症以此方和之則外者得入內者得出使經絡通邪氣散陰陽和筋骨用矣而安有以上諸症也發熱薛氏曰産後虛煩發熱乃陽隨陰散氣血俱虛若惡寒發熱煩躁作渴急用十全大補湯若熱愈甚急加桂附若作渴面赤宜用當歸補血湯若誤認為火證投以涼劑禍在反掌王太僕先生云如大寒而甚熱之不熱是無火也熱來復去晝見夜伏夜發晝止不時而熱是無火也當治其心如大熱而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也當助其腎故心盛則生熱腎盛則生寒腎虛則寒動於中心虛則熱收於內又熱不勝寒是無火也寒不勝熱是無水也治法無水者六味丸無火者八味丸氣血俱虛者八珍湯與十全大補湯大尹俞君之內産後發熱晡熱吐血便血兼盜汗小便頻數胸脅脹痛肚腹痞悶余曰此諸臟虛損也治當固本為善自恃知醫用降火之劑更加瀉痢腸鳴嘔吐不食腹痛足冷始信余言診其脈或浮洪或沉細或如無其面或青黃或赤白此虛寒假熱之狀時值仲夏當舍時從證先用六君子湯加炮姜肉桂數劑胃氣漸復妙在以胃氣為主諸證漸退更佐以十全大補湯半載痊愈儒者楊敬之內人所患同前但唾痰涎或用溫補化痰之劑不應面色黧黑兩尺浮大按之微細此因命門火虛不能生脾土脾土不能生諸臟而為患也用八味丸補土之母而痊一婦産後三日起早況氣血未定遂感身熱目暗如風狀即以清魂散二服清魂散乃散風之補劑得微汗而愈滑伯仁治一産婦惡露不行臍腹痛頭疼寒熱衆皆以為感寒溫以姜附益大熱手足搐搦語譫目攛診其脈弦而洪數面赤目閉語喃喃不可辨舌黑如炲燥無津潤胸腹按之不勝手蓋燥劑搏其血內熱而風生血蓄而為痛也曰此産後熱入血室因而生風即先為清熱降火治風涼血之劑兩服頗爽繼以琥珀牛黃等稍解人事後以張從正三和散行血破瘀三四服惡露大下如初時産已十日矣於是諸證悉平以此觀之原有外感既知內熱生風只宜治熱不必治風所謂求標取本也即用三和散或桃仁承氣湯俱妙三和散有大黃一婦盛暑月中産三日發熱其脈虛疾而大惡露不行敗血攻心狂言叫呼奔走拿捉不住以乾荷葉生地黃牡丹皮濃煎湯調下生蒲黃二錢此敗血之劑其不用大黃者以脈虛大也一服即定惡露旋下而安一婦産後時發昏瞀身熱汗多眩暈口渴或時頭痛惡心醫用四物涼血之劑病不減又用小柴胡病益甚石山至診得脈浮洪搏指汪曰産後而得是脈又且汗多而脈不為汗衰法在不治所幸者不喘不泄耳其脈如是蓋涼藥所激也用人參三錢黃耆二錢甘草當歸各六分白朮門冬各一錢乾薑陳皮黃芩各五分煎服五劑脈斂病漸安以此脈認到涼藥所致而致以陰盛格陽也以搏指之脈用參耆薑朮必其脈堅強搏手而無陽以和之也甚有用附子者不可不知王僉憲宜人産後因沐浴發熱嘔惡渴欲飲冷水瓜果譫語若狂飲食不進體素豐厚不受補醫用清涼之劑熱增甚診得六脈浮大洪數汪曰産後暴損氣血孤陽外浮內真寒而外假熱宜大補氣血石山先生長厚君子而老於醫者也其言必不誣然初學不知實難下手而況素厚不受補之人乎須要膽大心小乃能濟事不然弗妄為也與八珍湯加炮姜八分熱減大半病人自以素不宜參耆不宜再服過一日復大熱如火復與前劑潛加參耆炮姜連進二三服熱退身涼而愈快甚快甚丹溪曰産後發熱用參朮黃耆陳皮當歸川芎炙甘草補虛輕則加茯苓淡滲之其熱自除重則加乾薑古人於血證中每每用乾薑而今人率用炮姜則孰是而孰非也若謂入肺則宜乾薑入肝則宜生薑入脾溫中則宜炮姜以其有守有走有從之不同也今用炮姜須炮得十分極黑乃妙或云大熱而用乾薑何也曰此熱非有餘之邪熱乃陰虛生內熱耳蓋乾薑能入肺分利肺氣又能入肝分引衆藥生血然不可獨用必與補陰血藥同用此造化自然之妙非天下之至神其孰能與於此耶王節齊云凡婦人産後陰血虛陽無所依而浮散於外故多發熱治法用四物湯補陰血而以炙乾姜之苦溫從治收其浮散使歸依於陰然産後脾胃虛多有過食飲食傷滯而發熱誤作血虛則不效矣要訣但遇産後發熱者須審問食何飲食有無傷積若有胸膈飽悶噯氣惡食泄瀉等證只作傷食治之若發熱而飲食自調者方用補血正法丹溪方治産後發熱當歸川芎黃耆人參白朮白茯苓各一錢甘草炙五分上銼水煎服此以佛手散合四君加黃耆而不用芍藥地黃者以新産之後宜用血脫益氣之法不宜斂降以伐生氣也此方於氣血俱虛及氣虛者皆宜之熱甚加乾薑加味四物湯治産後陰虛血弱發熱當歸川芎白芍熟地黃白茯苓各一錢上水煎服此方全不用氣藥是血虛而氣不虛飲食善用者也加茯苓者使天氣降而陰自生陰生熱自退也熱甚者加炒姜則不惟從陽引陰亦可從陰引陽也微乎微乎熱甚加炒乾姜虛煩加茯神遠志抽薪散治産後血虛發熱當歸熟地黃各四錢乾薑炒黑二錢上銼一劑水煎服此又前方之變內不用芎芍又是一竅當在肝腎上求之人參散治産後諸虛不足發熱盜汗方見前自汗人參當歸湯治産後去血過多血虛則陰虛陰虛生內熱令人心煩短氣自汗頭痛方見前虛煩此方用參歸為氣血之主而作以熟地麥門肉桂白芍粳米竹葉煎服如血熱甚者加生地加味逍遙散治産後發熱口乾作渴唇裂生瘡當歸白芍乾葛各二錢生地黃川芎黃芩各一錢半柴胡一錢人參麥門冬各九分烏梅二個甘草六分上銼散分作二服用水一鍾煎七分空心服此與原方逍遙散不同又與立齊所用加味逍遙散亦不同此則以小柴胡湯合四物生脈散去半夏五味而加烏梅葛根者也若原方之用薄荷為引而此用葛根又各有妙處豫常去川芎葛根薄荷而加青蒿鱉甲以治骨蒸亦尊古而法令耳犀角飲子治産後亡津液虛損時自汗出發熱困倦唇口乾燥清心涼血益氣寬胸開胃健脾坐穩正方犀角麥門冬白朮各半兩柴胡一兩枳殼麩炒地骨皮生地黃黃歸人參茯苓黃耆黃芩甘草炒各七錢上㕮咀每服四錢入生薑三片浮麥七十粒生薑發汗浮麥止汗而同用之者內以養心外以和表也同水煎三合散治産後日久虛勞發熱即四物四君子小柴胡三方合平正之劑可法當歸川芎白芍熟地黃白朮白茯苓黃耆各一錢人參柴胡各錢半黃芩半夏甘草各五分上作一服加生薑三片紅棗一枚水煎食前服往來寒熱郭稽中曰産後乍寒乍熱者何答曰陰陽不和敗血不散能令乍寒乍熱産後血氣虛損陰勝則乍寒陽勝則乍熱陰陽相乘則或寒或熱若因産勞傷臟腑血弱不得宣越故令敗血不散入於肺則熱入於脾則寒何為敗血入肺則熱人脾則寒也豈以肺主氣氣不和而熱脾統血血不榮而寒乎抑脾陰肺陽而自為寒熱也然總以逐瘀為主而溫涼之法有不同焉若誤作瘧疾治之則謬矣陰陽不和宜增損四物湯敗血不散宜奪命丹又問二者何以別之時有刺痛者敗血也但寒熱無他證者陰陽不和也增損四物湯不一皆隨病加減陳無擇評曰乍寒乍熱榮衛不和難以輕議若其敗血不散豈止入脾肺二臟耶大抵一陰閉一陽即作寒熱陰勝故寒陽勝故熱只可云敗血循經流入閉諸陰則寒閉諸陽則熱血氣與衛氣解則休遇再會而復作大調經散五積散入醋煎佳閉陰閉陽之說卒難理解以敗血閉陰則寒閉陽則熱而有解休會作之時則似瘧矣若瘀血為有形之物閉則壅矣而安有解會之所也愚謂血閉於陽經而榮衛行之不通則寒閉於陰經而榮衛行之不通則熱故必其瘀通而寒熱自已也又就大調經散而言行瘀於內也五積散行瘀於外也又意為外經或為寒客則肺為之病肺病則肌表瘀而榮衛不通則熱內腑或為冷物所傷則脾病脾病而榮衛不通則為寒故所用之方一主裡一主表也亦或內外俱瘀則寒熱並作而其藥又均不可廢也粗淺之言伏惟裁之薛氏曰産後寒熱因氣血虛弱或脾胃虧損乃不足之證經云陰虛則發熱陽虛則惡寒若兼大便不通尤屬氣血虛弱切不可用發表降火若寸口脈微名陽氣不足陰氣上入於陽中則惡寒須用補中益氣湯尺部脈弱名陰氣不足陽氣下陷於陰中則發熱用六味地黃丸大抵陰不足陽往從之則陽內陷而發熱陽不足陰往從之則陰上入而惡寒此陰陽不歸其分以致寒熱交爭故惡寒而發熱也當用八珍湯若病後四肢發熱或形氣倦怠此元氣未復濕熱乘之故耳宜補中益氣湯若肌熱大渴引飲目赤面紅此血虛發熱用當歸補血湯若認為實則誤矣誤矣指白虎湯而言一産婦惡寒發熱用十全大補加炮姜治之而愈但飲食不甘肢體倦怠用補中益氣而安又飲食後犯怒惡寒發熱抽搐咬牙難候其脈視其面色青中隱黃欲按其腹以手護之此肝木侮脾土飲食停滯而作用六君加木香一劑而安以欲按腹手護中虛也以犯怒抽搐面青肝木也六君補中木香調肝以治肝木侮土是矣然亦有不受補者又以疏肝為急所謂標而本之亦有之焉一産婦惡露發熱余欲用八珍加炮姜治之其家知醫以為風寒用小柴胡湯余曰寒熱不時乃氣血虛乏不信仍服一劑汗出不止譫語不絶煩熱作渴肢體抽搐余用十全大補湯二劑益甚脈洪大重按如無仍以前湯加附子四劑稍緩數劑而安吳茭山治一婦人産後去血過多食後著惱頭疼身痛寒熱如瘧左手弦大微有寒邪右手弦滑不勻食飲痰火也二者因虛而得宜養正祛邪遂以茯苓補心湯去地黃加羌活青皮蔥棗三服汗出身涼其患漸瘥然後以八物湯調理半月後痊愈此翁善補然亦認症的確故可用設不的即敗乃事矣慎之一婦産後惡露未盡瘀血入絡又感寒邪身熱如瘧即以生料五積散五帖惡露自下而寒熱除此正治常法此法宜知又一婦産後惡露未盡因起抹身寒氣客於經絡乍寒乍熱脈緊而弦弦緊為寒審症法尤宜如是察識以蔥白散二帖安一少婦初産四日冷物傷脾胃冷物是病根故諸症皆從瘀血變怪但覺身分不快嘔逆飲食少心腹滿悶時或腹脅刺痛晨惡寒晚潮熱夜則恍惚譫語晝則抽搐頗類風狀變異多端諸醫莫測或作虛風或云血凝實熱用甘溫而行血以寒涼退實熱如此半月不效汪至見醫滿座亦局縮診其脈弦而緊遂令按之小腹急痛知瘀血未盡也思患者大勢惡露已下未必還有餘血偶因寒涼所傷瘀血停滯下焦日久客於經絡所以變生諸證須得大調經散倍入琥珀重在琥珀豈大豆有如是之神也化諸惡血成水其患方愈遂合前藥服之五日後行惡水鬥許臭不可近患人覺倦病勢漸減然後以人參養榮湯數十帖月餘如初柴胡四物湯治産後往來寒熱及日久虛勞微有寒熱脈沉而數當歸川芎白芍熟地黃各一錢半柴胡一錢人參黃芩半夏甘草各三錢上銼每服一兩水煎服以小柴胡合四物一名三之一氣湯其參耆甘半各用三錢為重在補氣也而甘草芩半何為亦倍之似可損益也原方有薑陳亦不可少增損柴胡湯治産後虛弱寒熱如瘧飲食少腹脹柴胡人參甘草半夏炒陳皮川芎白芍炒各等分上㕮咀每服八錢加生薑五片棗二枚水煎服此亦小柴變法而去黃芩加陳皮者所以益胃除脹也加芍藥川芎者所以和血也本草以當歸治灑灑寒熱不已則産後寒熱正宜加之何為不用宜思之增損四物湯治産後陰陽不和乍寒乍熱如有惡露未盡停滯胞絡亦能令人寒熱按往來寒熱者寒往熱來熱往寒來也寒熱如瘧者寒熱有時也乍寒乍熱者時乎寒時乎熱也發熱憎寒者身發熱而又惡寒也治各有法不能備録但小腹急痛為異當歸芍藥川芎人參乾薑各一兩甘草炙半兩上㕮咀每服四錢加生薑三片水煎服釋曰此方治陰陽不和乍寒乍熱之寒熱不治惡露未盡血滯胞絡小腹急痛之寒熱宜詳之更生散治産後去血過多或不止或眩暈眼暗口噤發熱憎寒人參當歸熟地黃薑汁炒各一兩川芎荊芥穗香油燈上燒過乾薑炒黑各三錢上銼水煎空心服此方前三味各一兩何其多後三味各三錢何其少非有大智慧大力量大見解者不能處此方治此病名之曰更生能不於危急時用乎下三味乃固澀急藥非血大下不止者不用如血大下不止加龍骨赤石脂各火煅等分每二錢同前藥調服外以五倍子末津調納臍中即止大調經散治産後血虛惡露未消氣為敗濁凝滯榮衛不調陰陽相乘憎寒發熱或自汗或腫滿皆氣血未平之所為也大豆一兩半炒去皮茯神一兩真琥珀一錢上為細末每服二錢濃煎烏豆紫蘇湯下此方重在惡露未消而茯神之用所以和陰陽也有謂此方如神者功在琥珀大豆湯飲間也黃龍湯治産後傷風熱入胞室寒熱如瘧及病後勞復餘熱不解柴胡四錢八分黃芩人參甘草各一錢八分上作一服水煎服此方重在傷風二字故以柴胡為君蓋風邪陷入胞中則發熱故宜柴胡為君少陽氣陷入厥陰而寒熱如瘧者氣不得條達也故亦以柴胡為君勞復餘熱者亦為餘邪熱陷也故亦用柴胡小柴胡加生地黃湯治産後往來寒熱而脈弦者少陽也柴胡二兩黃芩五錢人參三錢半夏制兩半生地黃梔子枳殼麩炒各半兩大棗三枚上銼加薑棗水煎服此方以治少陽等症似矣然以弦脈而加生地山梔者傷寒家以弦脈為陽也故以柴胡為君加減烏金散治産後寒熱似瘧此治錯雜之邪厚朴柴胡黃芩麻黃羌活草果半夏各二錢當歸川芎白芍熟地陳皮茯苓桔梗各一錢半桂枝蒼朮白芷枳殼各一錢甘草九分上銼為散分作兩服每服用水一鍾半姜三片蔥三莖煎至一鍾不拘時服此方治表裡風寒食積氣血痰飲無不賅括故曰治錯雜之邪蓋此方也與五積散相為伯仲苦藉此以治三陰瘧之有錯雜之邪者必臻至效語云醫者意也請嘗試之有汗多當歸川芎白芍藥熟地黃有脹多厚朴陳皮有熱多柴胡黃芩有寒多蒼朮草果桂枝有痰多半夏桔梗茯苓有頭痛多川芎白芷羌活有瀉去枳殼甘草不用有餘血塊在腹作潮熱疼痛加三稜莪朮多用玄胡索八角茴香遍身痛加羌活獨活寒熱往來加黃芩柴胡加減法切中不可不法産寶方療産後惡寒壯熱一夜三五度發惡語口中生瘡時時乾嘔困乏悶絶人參獨活白鮮皮葛根防風青竹茹遠志各一兩半茯神二兩白蘞二兩半元參三兩竹瀝一升上取銀一斤水一斗五升煮取七升納諸藥重煮取三升分溫三服忌魚酒濕面等此方雖出産寶然閲其癥考其藥皆治産後外邪乘虛傳入之熱症也如惡寒壯熱一夜三五度發惡語者即熱入血室類也故用防獨葛根以散之口瘡乾嘔者熱傳胸中也故用玄參二竹以清之白鮮皮苦寒治産後百病白蘞白銀人參遠志茯神為邪散熱清故用之治困乏也知母湯治産後乍寒乍熱通身溫壯脅心煩悶知母三兩芍藥黃芩各二兩桂心甘草各一兩上㕮咀用水五升煮取二升半分三服一方不用桂心用生地黃按自黃龍湯以下皆集外感治法至於錯雜之邪時熱之症罔不備載而次第有節真如網之有綱也今人但知産後寒熱以補氣血為主者其不誤盡世人乎瘧疾樓氏曰産後瘧疾多由汙血挾寒熱而作大法宜柴胡四物湯調之熱多者草果飲子寒多者生熟飲子草果飲生熟飲是截法柴胡四物是調理法而暑瘧虛瘧久瘧未備者當與雜症同補遺云産後瘧疾熱多寒少者清脾飲寒多熱少者養胃湯久而不已者七寶飲截之薛氏曰産後瘧疾因脾胃虛弱飲食停滯或因外邪所感或鬱怒傷脾或暑邪所伏審系飲食用六君加桔梗蒼朮藿香如外邪多而飲食少用藿香正氣散如外邪少而飲食多用人參養胃湯飲食勞役用補中益氣湯氣血虛弱用十全大補加炮姜虛寒用六君加薑桂元氣脫陷急加附子此數條俱屬溫補大與時宜可備前方之未備而暑邪所伏之方不載為以治暑方用石膏也蓋薛翁喜溫補而産後尤忌寒涼血虛又忌白虎故不言耳臨症又宜分別亦有不必拘此方者須因人勇怯而施如清脾飲草果飲之類是也大凡久瘧多屬元氣虛寒蓋氣虛則寒血虛則熱胃虛則惡寒陰火下流則寒熱交作或吐瀉不食腹痛煩渴發熱譫語或手足逆冷寒戰如栗雖見百證當補其病自退若誤用清脾截瘧之類多致不起一産婦患瘧發熱作渴胸膈脹滿遍身作痛三日不食咽酸噯氣此是飲食所傷脾胃不能消化用六君加神麯山楂四劑而不作酸乃去神麯山楂又數劑而飲食進其大便不通至三十五日計進飲食七十餘碗腹始悶令用豬膽汁導而通之其糞且不甚燥以氣虛故可至三十五日而便猶不燥若以日久大下之誤矣六脈不恆宜乎用此然非醫工之良者不能非主人之專任者不用各宜自省一産婦患瘧久不愈百病蜂起其脈或洪大或微細或弦緊或沉伏難以名狀用六君加炮姜二十餘劑脈證稍得又用參朮煎膏佐以歸脾湯百餘劑而瘥以一瘧而用百餘劑真為可笑然病有如是者不得不然也幸勿以迂而勿信蓋目擊時事故敢贅及一産婦朝寒暮熱或不時寒熱久不愈用六君子補中益氣兼服百餘劑而尋愈一瘧用藥百餘劑世間豈有此治法此非藥之效乃病久自息耳丹溪立齊用藥多如此殊為可笑草果飲子治産後瘧疾寒熱相半者或多熱者此治外感風寒內傷飲食之瘧也若暑瘧服之則自誤矣以暑言然清暑之劑非産後所宜亦須防慎半夏泡赤茯苓甘草炙草果炮去皮川芎陳皮白芷各二錢青皮去白良薑紫蘇各二錢半乾葛四錢上㕮咀每服三錢加生薑三片棗一枚水煎當發日侵早連服二服無有不安者生熟飲子治産後瘧疾多寒者所謂脾寒作瘧也非多寒者勿用肉豆蔻草果仁厚朴生用去皮半夏陳皮甘草大棗去核生薑各等分上八味銼碎和勻一半用生一半用濕紙裹煨令香熟去紙與生者和勻每服五錢水煎食前一服食後一服清脾飲治産後瘧疾熱多寒少者人參養胃湯治産後瘧疾寒多熱少者七寶飲治産後瘧疾久而不已者以此截之雖日久而不已者宜截然此方有常山於痰瘧則可若果虛症大非所宜方俱見胎前瘧疾蓐勞大全云産後蓐勞者此由生産日淺血氣虛弱飲食未平復不滿日月氣血虛羸將養失所蓐勞二說總起於産蓐然一挾外感一由七情其或兼內傷飲食泄瀉與夫瘀血未淨者皆有之不可不別也而風冷客之風冷搏於氣血則不能溫於肌膚使人虛乏勞倦乍臥乍起顏色憔悴食飲不消風冷邪氣兩感於肺肺受微寒故咳嗽口乾遂覺頭昏百節疼痛榮衛受於風邪流注臟腑須臾頻發時有盜汗寒熱如瘧背膊煩悶四肢不舉沉重著床此則蓐勞之候也又曰婦人因産理不順疲極筋力憂勞思慮致令虛羸喘乏寒熱如瘧頭疼自汗肢體倦怠咳嗽痰逆腹中絞刺名曰蓐勞薛氏曰按前證當扶養正氣為主大主意用六君子湯加當歸若脾肺氣虛而咳嗽口乾用補中益氣加麥門五味若因中氣虛而口乾頭暈用補中益氣加蔓荊子若肝經血虛而肢體作痛用四物參術若因肝腎虛弱而自汗盜汗寒熱往來者用六味丸加五味子若因脾虛血弱肚腹作痛月經不調用八珍湯倍加白朮若因脾虛血燥皮膚瘙癢用加味逍遙散大抵此證多因脾胃虛弱飲食減少以致諸經疲憊而作當補脾胃數語盡之飲食一進精氣生化諸臟有所倚賴其病自愈矣仍參虛損發熱方論主治汪氏治一婦産未滿月因怒氣血流如水三日方止隨又勞若四肢無力睡而汗出日晡潮熱口乾五心如炙諸醫皆用柴芩薄荷之類其熱愈熾診其脈弦大無力此蓐勞也以四物湯一兩入胡黃連秦艽青蒿各半錢數服熱退身涼後以黃連八珍丸一料而安按弦大無力則似於革矣革屬於虛非胡連所治如果胡連能治必非無力也請詳之白茯苓散治産後蓐勞頭目四肢疼痛寒熱如瘧白茯苓一兩當歸川芎熟地黃白芍炒黃耆人參桂心各半兩上先以水三盞入豬腰一雙姜三片棗三枚煎至二盞去三物入前藥半兩煎一盞去滓食前分溫三服即十全大補之變所少者白朮甘草然以茯苓為君豬腰為佐者心腎交寒熱愈也黃耆建中散治産後諸虛不足發熱或惡寒腹痛黃耆炒肉桂各一兩白芍炒二兩甘草炒七錢上銼每服五錢用棗姜水煎服日二三次虛甚加附子所謂建中者建中土也芍藥甘草易老為有甲己化土之象加肉桂以治脈弦虛寒腹痛加黃耆益表氣以助中氣之虛當歸建中散治産後勞傷虛羸不足腹中疼痛呼吸少氣小腹拘急痛連腰背時自汗出不思飲食産訖直至月滿一日三服令人身壯強健此方專治氣血虛寒所生諸症加之飴糖乃建中之良法當歸四兩白芍六兩桂心三兩黃耆一兩半上銼每服四錢加薑棗水煎入飴糖一塊再煎稍熱服如崩中衄血加阿膠地黃加味佛手散治産後血虛勞倦盜汗多困少力咳嗽有痰當歸川芎黃耆蜜炙各一兩柴胡前胡各一錢半上㕮咀每服五錢水一大盞桃柳枝各三寸棗子烏梅各一枚生薑一片煎服以盜汗而用柴前川芎似非宜矣以咳嗽有痰而用黃耆又似難用然以之為君而柴前僅用錢許何多寡之相懸也要之産後當以氣血為主故用之耳惟無邪者宜之如有痰不用烏梅柴胡四物湯治産後日久虛勞而脈浮大者方見前往來寒熱三合散治産後日久虛勞針灸服藥俱無效者四物四君內去朮加耆合小柴胡湯者是也會三方之意方得其理之真方見前發熱云岐熟地黃散治産後蓐勞皆由體虛氣力未壯勞復所起四肢煩疼時發寒熱不思飲食熟地黃人參白芍白茯苓白朮續斷各一兩黃耆當歸川芎五味子桂心各七錢半上㕮咀每服四錢生薑三片棗一枚水煎服蓐勞一症總屬氣血兩虛故主於十全大補為法加續斷治諸不足婦人內漏五味生津斂神加麥門更妙所去三所加三又三合也大全方有麥門冬七錢半一方無桂心五味續斷有柴胡黃芩半夏各七錢半黃耆丸治産後蓐勞寒熱進退頭目眩痛骨節痠疼氣力羸乏黃耆鱉甲當歸炒各一兩川芎白芍桂心續斷牛膝蓯蓉柏子仁沉香枳殼各七錢半五味子熟地黃各半兩上為細末煉蜜丸如桐子大每服四五十丸食後粥飲下按此不離四物黃耆續斷桂心五味而鱉甲除骨節之勞熱柏子潤心中之津液牛膝除足膝之苦沉香通天徹地蓯蓉為司命枳殼利胸膈細閲前後諸方總以補氣血為主或溫或清或斂或散或破血或行氣各隨兼症而佐使之妙諸用者不必膠柱而調瑟石子湯療産後虛羸喘乏乍寒乍熱如瘧四肢疼痛面色萎黃名曰蓐勞豬石子一雙去脂膜四破香豉一方無此有知母蔥切粳米當歸白芍各二兩上㕮咀分兩劑每劑用米三合煮取一小碗去滓分三服石子即豬腎用以佐諸湯者得本來面目也然觀蔥豉似有外邪易知母又有內熱不可不辨廣濟方無白芍有人參許仁則方無香豉有生薑二兩桂心一兩蔥白止一兩人參鱉甲散治蓐勞皆由在産內未滿百日體中虛損血氣尚弱失於將理或勞動作傷致成蓐勞其狀虛羸乍起乍臥飲食不消時有咳嗽頭中昏痛發歇無常夜有盜汗寒熱如瘧背膊拘急沉困在床服此大效黃耆鱉甲各一兩牛膝七錢半人參用人參更佳白茯苓當歸白芍桑寄生麥門冬去心熟地黃桃仁桂心甘草各半兩續斷二錢半上為細末每服先以豬腎一對去筋膜以水兩大盞生薑半分棗三枚煎至一盞去豬腎薑棗然後入藥末二錢蔥白三寸烏梅一個荊芥五穗煎至七分去滓空心晚食前溫服神效此十全大補湯去川芎白朮加鱉甲牛膝寄生續斷桃仁麥冬六味以治蓐勞有去舊生新之意而寄生主産後余疾用豬腎者以胎繫於腰故皆借之以為補助耳胡氏牡丹散治産後虛羸發熱自汗欲變蓐勞或血氣所搏經候不調或寒熱羸瘦當歸白芍人參五加皮五加皮去賊風惡血腰脊痛地骨皮各半兩牡丹皮三錢桂心沒藥各二錢上為細末每服二錢水酒各半盞如不飲酒只用水一盞開元錢一枚麻油蘸之開元錢麻油莫解同煎七分去滓通口服煎不得攪吃不得吹黃耆煮散治産後蓐勞肌膚黃瘦面無顏色或憎寒壯熱四肢痠疼心煩頭痛鱉甲醋炙黃耆各一兩牛膝七錢半當歸白芍熟地黃人參白茯苓麥門冬去心桑寄生桂心甘草炙各半兩上為細末每服豬石子一對去脂膜切破先以水一盞入姜半分棗三枚煎至七分去石子薑棗卻下藥五錢更煎至四分去滓空心晚食前溫服二滓並煎此方較前人參鱉甲散少桃仁續斷於煎法又少蔥白烏梅荊芥要知有瘀則兼破瘀有風則兼治風寒則兼寒熱則兼熱無定一也豬腰子粥治産後蓐勞發熱此不藥之藥所謂穀肉果菜食養盡之也豬腰子一個去白膜切作柳葉片用鹽酒拌先用粳米一合入蔥椒煮粥鹽醋調和將腰子鋪碗底以熱粥蓋之如作盫狀空心服之虛羸産寶云産後虛羸者皆由産後虧損血氣所致須當慎起居節飲食六淫七情調養百日庶保無疾若中年及難産者毋論日期必須調養平復方可涉喧否則氣血復傷虛羸之證作矣薛氏曰前證産傷氣血者用八珍湯飲食傷胃者用四君子湯停食傷脾者用六君子湯勞傷元氣者用補中益氣湯若暖氣覺有藥味者此藥復傷胃也但用四君子湯徐徐少飲以調脾胃若胃氣一健血氣自生諸證自愈矣大全云冷勞者産則血氣勞傷臟腑虛弱而風冷客之若為氣血虛則為本氣虛而寒即無風冷客之而亦寒也治者須知不足有餘冷搏於血氣血氣不能溫於肌膚使人虛乏疲頓致羸損不平復若久不平復風冷入於子臟則胞臟冷使人無子初感為寒久則為熱若果胞冷即本氣虛熱者即血虛薛氏曰前證若血氣虛弱用八珍湯血氣虛寒用十全大補湯胃氣虛弱用補中益氣湯脾氣虛弱用六君子湯命門火衰用八味湯肝脾血虛用加味逍遙散肝脾鬱怒用加味歸脾湯補虛湯治産後一切雜病只大補氣血為主人參白朮各一錢黃耆川芎陳皮各五分甘草炙三分上銼加生薑三片水煎服此方以中氣元氣為主而無血藥者必脾胃虛而本元不足也其血藥只用川芎又於補氣中以行肝血抑血脫益氣補脾生血之良方也誤矣指白虎湯而言熱輕倍加茯苓熱甚加炒黑乾薑三分黃耆四物湯新産不可用芍藥以其酸寒能伐生髮之氣只以黃耆易芍藥為補虛之要藥黃耆當歸川芎熟地黃各等分上銼每服四錢水煎服氣虛加參朮茯苓甘草發熱加乾薑自汗多者少用川芎勿用茯苓倍加蜜炙黃耆口渴加五味子麥門冬腹痛者非白芍不可雖新産亦用但以酒炒不妨黃耆易芍藥者即補血湯以黃耆為君之義所謂氣能生血血不能生氣而芍藥有殺伐之性無生長之能故去之加減法妙多用酒炒助生氣也乃丹溪法十全大補湯治産後血氣未復形體虛弱發熱惡寒不能飲食人參白朮茯苓黃耆當歸川芎白芍炒熟地黃各一錢肉桂甘草各五分上銼加生薑五片棗三枚水煎服惡寒者陽虛發熱者陰虛此八物之用也肉桂能通榮衛而和陰陽猶諸侯之命圭使通兩家之好也當歸羊肉湯治産後雖無疾但覺虛弱兼心腹痛即宜服之肥羊肉一斤去脂當歸五兩黃耆四兩生薑六兩上先以水一斗煮羊肉取汁八升後下三味煮取二升五合分為四服本草云人參黃耆與羊肉同功又謂羊肉補形蓋有形之物者血而參耆益氣羊肉補形似有懸殊烏可同語然有形生於無形故曰形不足者溫之以氣則羊肉參耆二而一者也而四味有氣有血能補能行故無疾亦宜服也若覺惡露不盡加桂三兩惡露下多加川芎三兩有寒加茱萸一兩有氣加細辛二兩有熱加生地黃汁二合釋曰所加五法分兩多寡皆有意義若川芎之治惡露下多陰中升陽也有氣之加細辛辛以散肝也余可類推黃雌雞湯治産後虛羸腹痛小黃雌雞一隻去翅足頭羽腸肚細切當歸白朮熟地黃桂心黃耆炒各半兩上先以水七盅煮雞至三盅每用汁一盅藥四錢煎日三服肝屬巽木雞屬巽畜雌雞者陽中之陰黃色者己土之正産後肝虛血弱故取以補之色之正脾之宜也其所配藥總以血氣為主故曰補虛羸也其治腹痛全在桂心産寶方治産後虛羸不生肌肉黃耆炒當歸白芍炒人參各三分桂心甘草炙川芎生薑各四分大棗十二枚上九味用水七升煮三升分溫三服此即十全大補湯之變其去地黃白朮茯苓者意恐滯痰滯氣淡滲泄氣耳一方治産後虛勞骨節疼痛頭痛汗不止黃耆三兩當歸人參生薑各二兩淡豉三合豬腎二枚粳米三合薤白三合上以水一斗五升先煮豬腎取六升下諸藥煮取二升分為三服此方與前羊肉湯相為表裡而後四味尤佳以其能助胃氣內通榮衛三焦外達頭目皮毛也夫先天之氣生於腎後天之氣生於脾元神生於二氣之先為不可名之物其德藏而不用是方以人參回元氣於無何有之鄉以歸耆生氣血於元氣之戶豬腎粳米益脾腎之氣於先後生薑豆豉薤白通神明於內外散邪穢於天壤周行血脈而無所不通宜養百骸而無病不治以是骨痛頭疼自汗諸症有邪則散無邪則補所謂妙用無方隨感隨應者也於治産後虛勞者宜識思焉又方豬腎一雙煮入蔥豉作臛如常食之痞悶郭稽中曰問産後口乾痞悶者何答曰産後榮衛大虛血氣未定食麵太早胃不能消化面毒結聚於胃脘上熏胸中是以口乾燥渴心下痞悶醫者不識認為胸膈壅滯以藥下之萬不得一但服見晛丸則愈釋曰為食麵者之戒南人甚少於諸飲食皆能致疾不必拘於一面也陳無擇評曰産後口乾痞悶未必只因食麵或産母內積憂煩外傷燥熱飲食甘肥使口乾痞悶當隨其所因調之可也心煩宜四物湯去地黃加人參烏梅煎隨因調治極是但治煩以四物去地黃尤不如去川芎也若外傷燥熱者屬何經當隨經焉治難以備舉飲食所傷見晛丸卻能作湯薛氏曰前證若宿食停滯用六君枳實神麯若因肉食所致更加山楂若因魚鱠之類再加陳皮其物既消而仍痞或反作痛作嘔此脾胃受傷用六君子湯或咽酸噯腐加炮姜作瀉更加升麻如不應佐以四神丸或間用補中益氣湯一婦人食角黍煩渴痞悶腹痛大便欲去不去服消導之藥不應飲食日減肌體日瘦半年矣余謂此食積為患用大酒麴炒為末溫酒調服二錢俄而腹鳴良久仍下粽而愈一婦人食魚胙腹痛患痢諸藥不應用陳皮白朮等分為末以陳皮湯送下數劑而愈見晛丸治産後血氣虛弱飲食停積口乾煩悶心下痞痛薑黃炒蓽澄茄良薑三稜醋煨蓬朮醋煨人參陳皮去白各等分上為細末用蘿蔔按見晛丸有三稜莪朮良薑溫滑之味加以人參丸以蘿蔔汁亦巧於治面矣而立齊純於用補亦為膏梁久用消導者設也如藜藿新病未曾用消導而氣實者豈可泥於立齊之說乎法當臨時消息蘿蔔湯為治面也慢火煮令極熟研爛取余汁煮麵糊丸如桐子大每服三五十丸蘿蔔湯或白湯下腹脹郭稽中曰産後腹滿悶嘔吐不定者何答曰敗血散於脾胃脾受之則不能運化精微而成腹脹胃受之則不能受納水穀而生吐逆醫者不識若以尋常治脹止吐藥治之病與藥不相於更傷正氣疾愈難治但服抵聖湯則愈稽中之言雖泥於敗血而其方亦加參立齊之言純於補氣似近於偏臨症似宜斟酌薛氏曰前證若敗血傷於脾胃宜用前方若飲食停於脾宜用六君加厚朴若飲食傷於胃宜用六君子湯大凡損其脾者當節其飲食為善節飲食者損谷自愈之理一産婦患前證或用抵當湯抵當湯太峻似非産後所宜即參用之亦不得已也如下後重墜即不用抵當亦宜升補敗血已下前證益甚小腹重墜似欲去後余謂此脾氣虛而下陷用補中益氣湯加炮姜溫補脾氣重墜如故又用六君子湯而安抵聖湯治産後腹脹滿悶嘔吐不定蓋敗血入於脾胃而脾不能運化故胃不能納穀是法家語簡當以致嘔吐腹脹等症薛氏曰此方最宜用此方亦穩當即半夏能破血立齊曰最宜以其有和胃益氣之物也赤芍藥半夏湯泡澤蘭葉陳皮去白人參各一錢甘草炙五分上作一服加生薑三片水煎溫服惡露過多者去澤蘭赤芍藥倍加陳皮生薑香砂養胃湯治産後嘔吐飲食不下腹脹者此敗血攻於脾胃之間日久成反胃之症敗血日久成反胃者理實有之而古方六丁丸可治此方不能治瘀血也半夏一錢白朮陳皮茯苓厚朴香附子各八分人參藿香砂仁檳榔草果各五分甘草四分上銼加生薑三片烏梅一個水煎服與人參養胃湯少有差別而香附檳榔砂仁白朮皆得治法之要加味六君子湯治飲食停滯於脾以致腹脹嘔吐人參白朮茯苓甘草炙減半陳皮去白半夏湯泡七次厚朴薑製各一錢上銼加生薑三片水煎服此立齊方也如果有飲食停滯者不妨另為加減加味平胃散治産後腹脹以平胃加人參總是慮産後氣虛之故卻為醫家作一法眼厚朴姜炒蒼朮米泔浸炒陳皮甘草炙人參各一錢上銼水煎服紫金丹治産後沖脹胸中有物狀如噎氣代赭石磋礪石各等分上為細末醋糊丸如桐子大每服三五十丸酒下胸中痛加當歸湯下久服治血癖丹溪云上升之氣自肝出産後肝血虛而肝氣盛以是衝上作脹用代赭者鎮子氣之上逆也醋丸更妙磋礪石即磨刀石亦為肝而設又方此兼血脹代赭石一兩桃仁三錢炒去皮尖大黃半兩上為末薄荷水打糊丸如桐子大每服三五十丸溫水下無時白聖散治産後腹大堅滿喘不能臥此治水法惟有餘者可服曰治喘者因水逆而上喘也水下則喘自止矣樟柳根三兩大戟一兩半甘遂一兩炒上為極細末每服二三錢熱湯調下取大便宜利為度此主水氣之聖藥也此藥峻利不可輕用浮腫郭稽中曰産後四肢浮腫者敗血乘虛停積循經流入四肢留淫日深卻還不得腐壞如水故令面黃四肢浮腫醫人不識便作水氣治之投以甘遂大戟等藥以導其水夫産後必虛又以藥虛之是謂重虛往往多致夭枉但服小調經散血行腫消則愈陳無擇曰産後浮腫多端有自懷妊腫至産後不退者亦有産後失於將理外感寒暑風濕內則喜怒憂驚血與氣搏留滯經絡氣分血分不可不辨氣分者先腫而後經血不行血分者先經血不行而後腫也故治法不同要當隨所因脈證治之小調經散治血分固效但力淺難憑不若吳茱萸湯枳朮湯奪魂散大調經散皆要藥也又論曰夫産後勞傷血氣腠理虛則為風邪所乘邪搏於氣不得宣越故令虛腫輕浮是邪搏於氣氣腫也若皮膚如熟李狀則變為水腫氣腫者發汗即愈水腫者利小便瘥也潔古云如産後風寒在表面目四肢浮腫宜局方七聖丸白湯下日加以利為度如浮腫至膝喘嗽加木香檳榔倍之謂氣多也如浮腫又頭痛昏冒加羌活川芎謂風多也如只浮腫止七聖丸本方服東垣云中滿分消丸見腫滿門用四物湯吞之丹溪云産後腫必用大補氣血為主少佐以蒼朮茯苓使水自利薛氏曰前證若寒水侮土宜養脾肺若氣虛浮腫宜益脾胃若水氣浮腫宜補中益氣當參雜證本門主治一産婦飲食少思服消導之劑四肢浮腫余謂中氣不足朝用補中益氣湯夕用六君子湯而愈後因怒腹脹誤服沉香化氣丸吐瀉不止飲食不進小便不利肚腹四肢浮腫用金匱加減腎氣丸而愈以中氣虛誤服消克藥所致故宜補土為主金匱丸者以補火生土而有水鬱折之之法存焉一産婦泄瀉四肢面目浮腫喘促惡寒余謂脾肺虛寒用六君加薑桂而泄瀉愈用補中益氣而脾胃健杜氏治張宣徽侍寵産後半月忽患浮腫急召産科醫治經半月不瘥病勢轉劇召杜治之杜至曰諸醫作何病張曰皆雲水氣浮腫杜曰非也且水氣發咳嗽小便澀是也審水氣法如咳嗽小便澀者乃因失降下之令今愛寵小便不澀不作咳嗽惟手足寒乃血臟虛氣塞不通流面生浮腫遂用益血和氣藥治之旬日病去七八經半月痊愈所用之藥乃靈苑方牡丹散也其方云治血臟風虛冷今産科家多用此藥治産後諸病如神更名捐金湯者是也牡丹散見血暈一婦産後四肢浮腫寒熱往來蓋因敗血流入經絡滲入四肢氣喘咳嗽胸膈不利口吐酸水兩脅疼痛遂用旋覆花湯微汗漸解頻服小調經散用澤蘭根煎湯調下腫氣漸消大調經散治産後腫滿喘急煩渴小便不利方見前往來寒熱小調經散治敗血乘虛停積流入經絡四肢浮腫沒藥琥珀桂心芍藥當歸各一錢細辛麝香各五分上為細末每服五分薑汁溫酒各少許調服經驗方治産後遍身青腫疼痛及産後血水疾青腫者血瘀也以血化為水故用此乃簡便良法乾漆大麥芽各等分上各為細末以新瓦罐子中鋪一重麥蘖一重乾漆如此填滿用鹽泥固濟火煅通赤放冷研為散但是産後諸疾熱酒調下二錢白朮湯治心腹堅大如盤邊如旋盤水飲所作名曰氣分此仲景方也易老變而為丸枳實一兩半白朮三兩上㕮咀每服四錢水一盞半煎至七分去滓溫服腹中軟即當散也正脾散治産後通身浮腫及治婦人大病後脾氣虛弱中滿腹脹等症此行氣法謂之正脾者氣行而脾得運也蓬莪朮香附子童便浸茴香甘草炙陳皮各等分上為細末每服二錢燈心草木通湯下小調中湯治産後一切浮腫但用此藥無不效者補脾胃行瘀血妙在調服法茯苓當歸白芍藥陳皮各一錢白朮一錢半上切作一劑煎湯調後藥未沒藥琥珀桂心各一錢細辛麝香各五分橘皮酒治産後肌浮以此行氣橘皮為末每服二錢酒調服丹溪方婦人産後浮腫小便少口渴惡寒無力脈皆沉此體虛而有濕熱之積必上焦滿悶宜補中導水行氣可也白朮二兩半陳皮一兩川芎半兩木通六錢茯苓三錢上用水煎下與點丸二十五丸黃芩為末糊丸名與點丸亦名清金丸此方以白朮為君陳皮為佐川芎調血通苓利水與點丸清金奪魂散治産後虛腫滿促利小便則愈此方甚奇大概中宮有濕痰留積致小便不利者宜之猶服二陳湯能使大便潤而小便長也生薑三兩取汁白麵三兩大半夏七枚上以生薑汁溲麵裹半夏為七餅子煨焦熟為末水調一盞小便利為效張氏方治産後血虛風腫水腫澤蘭葉防己各等分上為末每服二錢溫酒調下不飲者醋湯調亦可澤蘭之性能通瘀血利水道同防己則又為利水絶藥矣漢防己散治産後風虛氣壅上攻頭面浮腫此藥虛人戒服瀉肺利水之急劑也漢防己豬苓枳殼桑白皮各一兩商陸甘草各七錢半上為粗末每服四錢生薑三片水煎空心溫服七聖丸治産後風氣壅盛面目四肢浮腫涕唾稠黏咽乾口燥心脅脹滿大便祕小便赤睡臥不安此方為實熱者設肉桂去皮川芎大黃酒蒸檳榔木香各半兩羌活郁李仁去皮各一兩上為末煉蜜丸如桐子大每服十五丸食後溫湯下山嵐瘴地最宜服量虛實加減如浮腫又頭痛昏冒加羌活川芎謂風多也如只浮腫止用本方加味吳茱萸湯治婦人臟氣本虛宿挾風冷胸膈滿痛腹脅絞刺嘔吐噁心飲食減少身面虛浮惡寒戰栗或泄瀉不止少氣羸困及因生産臟氣暴虛邪冷內勝宿疾轉增此治風寒之劑本虛便是寒氣故用溫劑吳茱萸一兩半乾薑桂心防風細辛當歸牡丹皮赤茯苓半夏桔梗麥門冬甘草各半兩上為粗末每服四錢水煎食前熱服加味八物湯治産後遍身浮腫氣急潮熱人參白茯苓熟地黃小茴香各三錢白朮川芎各四錢當歸白芍香附子各五錢柴胡黃芩甘草各一錢上銼散分作六七服每服加生薑三片水煎空心熱服盡此藥方服調經丸若肚痛加玄胡索乾漆枳殼各三錢若嘔吐噁心加良薑砂仁各二錢若手足麻痹加肉桂一錢半若咳嗽加五味子款冬花杏仁加減金匱腎氣丸治肺腎虛腰重腳腫小便不利或肚腹腫脹四肢浮腫或喘急痰盛已成蠱證其效如神此證多因脾胃虛弱治失其宜元氣復傷而變證者非此藥不能救夫土為防水之堤腎為置水之器腎為胃之關而開竅於二陰土惡濕腎惡燥而命門之氣藏於腎為生土之母主化津液以利膀胱故腎氣盛則土旺而水有所堤自無泛溢之患若火衰則氣不化而水溢溢則濕土卑濫而妄行矣故有水脹之病此方既能益火以生土又能化氣以利水此其所以為治腫之聖藥也若於熱脹又非所宜熟地黃四兩酒拌搗膏白茯苓三兩山藥山茱萸澤瀉牡丹皮牛膝車前子官桂各一兩附子半兩上為末和地黃煉蜜丸如桐子大每服七八十丸空心白湯下積聚大全云夫積者陰氣也五臟所生聚者陽氣也六腑所成皆由飲食不節寒熱不調致五臟之氣積六腑之氣聚積者痛不離其部聚者其痛無有常處所以然者積為陰氣陰性沉伏故痛不離其部聚兼陽氣陽性浮動故痛無常處産後血氣傷於臟腑臟腑虛弱為風冷所乘搏於臟腑與血氣相結故成積聚癥塊也薛氏曰前證乃真氣虧損邪氣乘之況産後得之尤當固真氣為主若求旦夕之效而攻其邪則速其危矣當參前雜證積聚諸方論治之一産婦腹中似有一塊或時作痛而轉動按之不痛面色萎黃痛則皎白似字是眼按不痛是虛萎黃皎白浮澀為血虛脈浮而澀余謂此肝氣虛而血弱也不信乃用破血行氣痛益甚轉動無常又認以為血鱉專用破血馳逐之藥痛攻兩脅肚腹尤甚益信為血鱉妄言妄聽可笑確服下血等藥去血甚多形氣愈虛肢節間各結小核隱於肉裡以為鱉子畏藥而走於外余曰肝藏血而養諸筋此因肝血復損筋涸而攣結耳血涸筋攣之說自立齊始大概發在肝膽部分者當補金水然而難愈惟善守者得效蓋肢節胸項皆屬肝膽部分養其脾土補金水以滋肝血則筋自舒遂用八珍湯逍遙散歸脾湯加減調治而愈一婦月經不調兩拗腫脹小便澀滯腹中一塊作痛或上攻脅腹或下攻小腹發熱晡熱惡寒肌膚消瘦飲食無味兩拗即髀厭屬肝經小便小腹寒熱等症皆肝所主而飲食無味則脾也故須肝脾兼治殊類廢症久而不愈余謂肝脾血氣虧損用八珍湯逍遙散歸脾湯隨症互服而愈大全云新産後有血與氣相搏而痛者謂之瘕瘕之言假也謂其痛浮假無定處也此由夙有風冷血氣不治雖以風冷為因總是血氣不治至産血下則少故致此病不急治則多成積結妨害月水輕則痞澀重則不通也薛氏曰前證乃寒邪乘客氣血壅結此因氣病而血病也當補養胃氣調和月經寬緩靜養為善此亦大概言耳至於治法非行氣破結不可而養正邪自除之說於胃氣不足攻伐太過者切有補焉難經云任脈之病男子為七疝女子為瘕聚當參前後各論治之河間芍藥湯治産後諸積不可攻宜養陰去熱其病自安此方若為風冷所致與夫瘀血所積者當以別治之芍藥一斤黃芩茯苓各六兩上銼散每服半兩水煎溫服日三四神散治産後瘀血不消積聚作塊心腹切痛此以佛手散溫行當歸去蘆川芎赤芍藥乾薑炮各等分上為細末每服二錢食前同溫酒調服一方治血瘕作痛臍下脹滿或月經不行發熱體倦當歸二兩芍藥炒桂心血竭蒲黃炒各一兩半玄胡索炒一兩上為末每服二錢空心熱酒調下桂心丸治産後血氣不散積聚成塊上攻心腹或成寒熱四肢羸瘦煩疼此三方皆以消瘀為主而此兼行氣然有輕重之分在人因病採擇桂心當歸赤芍牡丹皮沒藥檳榔乾漆炒煙盡青皮各七錢半厚朴制三稜煨玄胡索大黃桃仁去皮尖鱉甲酥炙各一兩上為細末煉蜜丸如桐子大每服三四十丸食前溫酒下産寶方療血瘕痛無定處童便三升生地黃汁生藕汁各一升生薑汁三升上先煎前三味約三分減二次下薑汁慢火煎如稀餳每服取一合暖酒調下按癥有形瘕無形有形者血病無形者氣病故血病則著氣病則行今以血瘕而痛無定所者乃氣血俱病也氣為瘕郁鬱則生火火載瘕行故痛無定所方以童便生地藕汁者養血清火破瘀也蓋火清則不痛瘀破則瘕消佐以薑汁調以暖酒以熱則行寒則凝故用之以從治耳此方平順中有奇處可法之千金方療血瘕生乾地黃一兩烏賊魚骨二兩上為細末空心溫酒調服二錢匕霍亂大全云産後霍亂氣血俱傷臟腑虛損或飲食不消觸冒風冷所致陰陽不順清濁相干氣亂於腸胃之間真邪相搏冷熱不調上吐下痢故曰霍亂也經云渴而飲水者五苓散寒多不飲水者理中丸大段虛冷者加附子來復丹亦妙凡霍亂暑症者多不可輕用熱補之劑蓋暑熱之氣迷結心胸若投以溫補是實也今人飲以冷水則生與之熱飲則死者可想矣薛氏曰一産婦停食霍亂用藿香正氣散之類已愈後胸腹膨脹飲食稍過即嘔吐或作瀉余謂此脾胃俱虛用六君子湯加木香治之漸愈後因飲食失調兼恚怒患霍亂胸腹大痛手足逆冷用附子散又用八味丸以補土母而康設泥痛無補法而用辛散或用平補之劑必致不起此以飲食稍過即嘔吐或瀉知其脾虛矣致於手足冷能不溫之乎然以霍亂愈後故可服否則不宜也平日吐瀉與霍亂吐瀉不同治法亦別蓋此非霍亂正治法弗妄試也盡信書不如無書正為此耳一産婦吐瀉咽酸面目浮腫此脾氣虛寒先用六君加炮姜為主佐以越鞠丸而咽酸愈又用補中益氣加半夏茯苓而脾胃康四生散治一切霍亂吐瀉極效方見胎前霍亂五苓散治霍亂渴而飲水者白朮炒茯苓豬苓各一錢澤瀉二錢半桂三分上銼作一服水煎服理中丸治脾胃虛寒嘔吐泄瀉飲食少思肚腹膨脹用此方者當認虛寒二字為主人參白朮炒乾薑炮甘草炙各一錢上為末米糊丸如彈子大每服一丸嚼細白湯下白朮散治産後霍亂吐瀉腹痛煩渴手足逆冷或大便不實白朮橘紅麥門冬去心人參乾薑炮各一兩甘草半兩上銼每服四錢姜水煎服溫中散治産後霍亂吐瀉不止人參白朮當歸草豆蔻仁乾薑各一兩厚朴薑製一兩半上為粗末每服三錢水煎服附子散治産後霍亂不止手足逆冷附子炮桂心吳茱萸炮丁香當歸白朮人參橘紅甘草炙各半兩上為細末每服二錢粥飲調服高良薑散治産後霍亂吐利腹中絞痛良薑當歸吐瀉用當歸者甚少而前三方皆用之亦非理之所宜也草豆蔻仁各等分上為細末每服二錢用粥飲調下霍亂忌粥飲此又以粥飲調所宜所忌有虛實寒暑之別焉上二方非真寒不可用藿香正氣散治外感風寒內停飲食頭痛寒熱或霍亂泄瀉或作瘧疾主症的確誠為對病良藥藿香一錢半桔梗炒大腹皮紫蘇茯苓白朮炒白芷半夏曲陳皮厚朴制各一錢甘草炙五分上銼加薑棗水煎服來復丹治伏暑吐瀉身熱脈弱其效如神倉卒間須用此藥伏暑要藥伏暑者暑熱之氣因時感冒伏於心胸之間以致正氣鬱悶上下不得宣通遂令悶絶而死有如尸厥之狀所謂中脘閉結三焦不通者是也暑月長途往往有之切不可補宜備此藥以濟之硝石一兩同硫黃火上微炒用柳木條攪結砂子不可火大舶上硫黃太陰玄精石研各一兩五靈脂去砂石青皮陳皮各二兩上為末醋糊丸如小豆大每服三十丸空心米飲下易簡方云硝石性寒佐以陳皮其性疏快硫黃性寒味澀若作暖藥以止瀉誤矣蓋用啖食生冷或冒暑熱之氣中脘閉結揮霍變亂非此藥不能通利三焦分理陰陽其功甚效而速一方治吐逆不受湯藥者伏龍肝為細末每服三錢米飲下以其得火土相成之化故能燥濕治吐逆也嘔吐大全云夫胃為水穀之海水穀之精以為血氣榮潤臟腑因産則臟腑傷動有時而氣獨盛者則氣乘腸胃腸胃燥澀其氣則逆故嘔逆不下食也吐屬陽明故以胃字為主盡之薛氏曰前證若因飲食過時用四君子湯飲食過多用六君子湯飲食過時而兼勞役用補中益氣若因飲食停滯用人參養胃湯脾胃氣虛用六君子湯胃氣虛寒加炮姜木香寒水侮土用益黃散肝木侮脾土用六君升麻柴胡命門火衰不能生土用八味丸嘔吐專主脾胃乃理之常八味丸恐非救急之務嘔吐泄瀉手足俱冷或肚腹作痛乃陽氣虛寒急用附子理中湯多有生者一産婦朝吐痰夜發熱晝夜無寐或用清痰降火肌體日瘦飲食日少前症愈甚余曰早間吐痰脾氣虛也夜間發熱肝血虛也晝夜無寐脾血耗也遂用六君子湯此病脾虛生痰故以六君子為先是總訣加味逍遙散加味歸脾湯以次調理而痊香靈丸治産後嘔不止者丁香辰砂另研各六分五靈脂一錢上香脂先研後入砂再研勻用狗膽或豬膽丸如雞頭大每服一丸生薑陳皮湯磨下此方不獨産後可用於雜症之有嘔吐者亦效妙在狗膽靈脂蒲黃散治産後三四日惡露不下嘔逆壯熱芍藥二兩半當歸知母生薑蒲黃各二兩紅花半兩荷葉心中蒂一個生地黃汁一盞上㕮咀水二升煎至一升去渣下蒲黃煎數沸空心分三帖以惡露發為嘔吐人嘗失之此方用荷蒂紅花蒲黃當歸治惡露不下生薑止嘔安胃是矣若生地知母芍藥能不寒胃乎要知此三味又為壯熱者設苟無壯熱其敢用乎況在三四日之間芍藥尤為所忌讀方者當知其源橘紅半夏湯治産後胃虛嘔逆橘皮一兩半夏甘草炙各半兩藿香三兩上銼每服五錢加生薑五片水煎服此方治痰理氣為治嘔正方前方一寒一熱之治瘀血者不同當知此竅開胃散治産後胃虛嘔吐胸滿不食人參一兩訶子一兩半甘草炙半兩上銼每服五錢加生薑五片水煎服人參益胃氣訶子治胸滿一益氣一鎮氣自與前後諸方不同別是一種見解人所未知薑朮散治産後更無他疾但多嘔逆不能食白朮一兩二錢半生薑一兩半上銼作一服酒水各二升煎取一升分三服更無他疾專主胃氣虛寒也故惟以溫補為主既用生薑以佐術復加酒以為煎又法之妙也石蓮散治産後胃寒咳逆嘔吐不食或腹作脹石蓮肉一兩半白茯苓一兩丁香半兩上為細末每服三錢用薑湯或米飲調下日三服本草石蓮即蓮實之沉水中千年者也其味甘其性降故能益胃清水而治嘔況加茯苓以下氣丁香以溫寒生薑佐之其中品味大非前方比矣奈何今之所貿市中石蓮味極苦而內無心形似蓮實而實非蓮實考之市人乃云皆是山中木實本體既殊性味亦異又豈有清胃和中之理求治者宜審擇之毋為市人之所誤錢氏益黃散治脾胃虛寒水反來侮以致嘔吐不食或肚腹作痛或大便不實手足逆冷等症治脾虛有痰嘔逆之正方也陳皮一兩青皮訶子肉甘草炙丁香各二錢上為粗末每服四錢水煎服加味四君子湯治産後嘔逆不已人參白朮茯苓甘草炙半夏陳皮藿香砂仁各等分上銼每服四錢加生薑三片棗一枚水煎溫服以上八方各有見解宜一一考證施治勿妄投也厄逆大全云夫五臟六腑俱稟氣於胃而肺為主氣之總司若産後致傷氣血則臟腑氣損而風冷搏之肺因氣逆而上則厄逆矣又脾虛氣冷胃中伏寒因食熱物冷熱相擊氣厥而不順則厄逆也言聚冷內因也然又有痰熱虛厄之不同並宜詳辨脾者主中焦為三焦之關五臟之倉廩貯積水穀若陰陽氣虛使榮衛氣厥逆則致生斯病也經云厄噫者胃寒所生服藥無效者灸期門期門在乳下三壯必愈期門穴乃胃之大絡薛氏曰前證屬胃氣虛寒之惡候如用後方未應急投參附湯亦有復生者丁香散治産後心煩咳噫不止丁香白豆蔻各半兩伏龍肝一兩上為細末每服一錢煎桃仁吳茱萸湯調下如人行五里再服此治咳逆也而何又有心煩焉閲此方咳逆是虛寒氣滯心煩是敗血瘀留不然何以用桃仁同吳萸為湯也當識之薑桂散治産後咳逆三日不止欲死肉桂五錢薑汁三合上銼同煎服三合以大火炙手摩令背熱時時塗藥汁盡妙此治寒自背入而咳逆也摩背法極妙其曰時時塗藥汁盡則既服之外又以藥塗手摩之也羌活散治厄逆羌活附子炮茴香炒各半兩木香白姜炮各二錢半上為末每服二錢水一盞鹽一捻煎十數沸熱服一服止治下元虛中氣弱而又為外感寒邪者設也妙在用鹽一方治産後厄逆乾柿一個切碎以水一盞煎六分熱呷吃逆症俱用柿蒂而此用乾柿意自有別一方治産後厄逆三五日不止陳壁窠三五個水煎呷瘥即蜂子窠壁窠土蜂窠也補遺治産後厄逆橘皮湯及大小橘皮湯皆效上諸方當審寒熱虛實用之如寒者宜丁香薑桂熱者宜乾柿竹茹實者宜香附橘皮虛者宜人參甚則附子佐之誤施則噬臍之悔慎之咳嗽大全云肺主諸氣産後肺虛外邪易感少有微邪便成咳嗽故或風或熱或寒或濕皆令人咳嗽也若産後吃鹽醯太早而咳嗽者難治郭稽中曰産後血氣不通咳嗽者何答曰産後咳嗽多因食熱面壅滯或熱病或有氣塊發時衝心痛氣急咳嗽四肢寒熱心悶口乾或時煩躁睡夢驚悸氣虛肢體無力宜服局方黑神散五積散加棗煎服薛氏曰産後咳嗽若因陰血虛者用四物加參朮陳皮桔梗若因肺氣傷者用四君加芎歸桔梗因陰火上炎者六味地黃丸加參術因風寒所感者補中益氣加桔梗紫蘇若瘀血入肺發喘兼口鼻起黑氣或鼻出血者急用二味參蘇飲亦有得生者然而所患悉因胃氣不足蓋胃為五臟之根本胃氣一虛五臟失所百病生焉但患者多謂腠理不密所致殊不知經云肺屬辛金生於己土若脾土一虛則不能生金故腠理不密外邪易感法當壯土金生腎水以制火善若不補其虛而直治其病則誤矣李氏曰産後咳嗽多是瘀血入肺二母散加桃仁杏仁人參茯苓水煎其餘以意會之可也旋覆花湯治産後感冒風寒咳嗽喘滿痰涎壅盛鼻塞聲重有汗者不宜服旋覆花麻黃赤芍藥荊芥穗前胡茯苓半夏曲五味子甘草炙杏仁去皮尖麩炒各等分上㕮咀每服四錢生薑三片棗一枚水煎食前溫服此金沸草散加杏仁甘草乃麻黃湯例也而茯苓五味又有下氣斂肺止嗽之妙善用者則五味不嫌於太早麻黃不嫌於太散不善用者則實實虛虛之禍可立見矣用者審之集驗方療産後感風傷寒咳嗽多痰甘草桔梗各一兩半款冬花一兩麥門冬去心生地黃各二兩豆豉一兩蔥白一握上㕮咀水二升煮取八合去滓食後分兩服此方以出症論則治風寒痰嗽而用蔥豉甘桔款花則可然以生地麥門為君而欲治多痰寒嗽則不可大概始於風寒而終於虛熱者宜之所謂其始則同其終則異也二母散治産後惡露上攻流入肺經咳嗽不已知母貝母白茯苓人參各二錢桃仁去皮尖杏仁去皮尖各一錢上㕮咀作一服水煎食後服二母涼藥也豈能治惡露上攻人參補氣藥也豈能治流入肺經之嗽故立齊以桃仁杏仁加倍蓋謂瀉肺導瘀也然亦不敢妄用異功散治脾胃虛弱飲食少思或久患咳嗽或腹滿不食面浮氣逆等證補土生金法人參白朮炒白茯苓甘草炙陳皮各二錢上銼一劑加薑棗水煎服經效方治咳嗽多痰唾黏氣急久嗽多痰者此方甚良蓋為散中能斂補中有瀉也前胡五味子紫菀貝母各一兩半桑白皮茯苓各二兩淡竹葉二十片上㕮咀水二升煎取八合去滓食後分兩服一方治産後咳嗽氣喘百部根苦梗各六分桑白皮二十分干百合赤茯苓上㕮咀水二升煮取七合去滓食後分兩服此保肺法古庵曰久嗽不愈須用百部加以百合斂肺桑皮瀉中有補苦梗下氣赤苓瀉火乃清降妙劑也於結症亦佳釋曰以上六方先以散邪為第一以散中兼涼血清心為第二清肺補氣利氣行瘀為第三補土生金為第四而第五第六一則散而收之一則清而斂之數方之內治嗽之法初中末三治補瀉兼該先後不紊能推廣之以治雜症之咳嗽亦無不可集方者其藥上藥王歟喘急樓氏曰産後喘極危多死也此真實話也臨症者慎之郭稽中曰産後喉中氣急喘促者何答曰榮者血也衛者氣也榮行脈中衛行脈外相隨上下謂之榮衛因産所下過多榮血暴竭衛氣無主獨聚肺中故令喘也此名孤陽絶陰為難治若惡露不快敗血停凝上熏於肺亦令喘急但服奪命丹見胞衣不下血去喘自定陳無擇評曰産後喘急固可畏若是敗血上熏於肺猶可責效奪命丹若感風寒或因憂思飲食鹹冷等致病者奪命丹未可均濟況孤陽絶陰乎若榮血暴絶宜大料煮散川芎湯亦可救傷風寒宜旋覆花湯性理郁發宜小調經散用桑白皮杏仁煎湯調下傷食宜服見晛丸五積散川芎湯薛氏曰前證若脾肺氣虛弱用六君桔梗若兼外邪更加紫蘇若中氣虛寒用補中益氣加炮薑肉桂專益補似太泥若陽氣虛脫更加附子若瘀血入肺急用二味參蘇飲一産婦喘促自汗手足俱冷常以手護臍腹此陽氣虛脫用參附湯四劑而愈浦江吳輝妻孕時足腫七月初旬産後二月洗浴即氣喘但坐不得臥者五個月惡風得暖稍寬兩關脈動尺寸皆虛百藥不效用牡丹皮桃仁桂枝茯苓乾薑枳實厚朴桑白皮紫蘇五味栝蔞仁煎湯服之即寬三服得臥其痰如失蓋作汙血感寒治之也以洗浴氣喘及得暖稍寬之症審之自宜發散而百藥不效乃更用破血溫消之劑愈之者是當責在産後有餘邪也關動脈尺寸虛者邪郁在中不得出也故當溫散而愈可為學者法奪命散治産後敗血衝心胸滿上喘命在須臾此治敗血方見前血暈二味參蘇飲治産後血入於肺面黑髮喘欲死者此保肺逐瘀人參二兩為末蘇木二兩槌碎上用水二碗煮蘇木取汁一碗調人參末隨時加減服旋覆花湯治産後傷風寒喘嗽痰涎壅盛此治風寒方見前咳嗽見晛丸治産後傷鹹冷飲食而喘者此治飲食方見前痞悶五味子湯治産後喘促脈浮而厥此單補虛此補肺法果虛者宜之五味子麩炒人參杏仁各二錢麥門冬去心陳皮各一錢上加生薑三片棗二枚水煎服六君加失笑散治産後喘急不能臥痰與血雜湧而上此脾胃氣虛而敗血乘之也服此立止六君子料六錢加生薑三片水煎服調入蒲黃五靈脂各炒五分攪勻溫服少頃滓再煎再入蒲靈末服神效據此法亦二味參蘇與之變設非究理為治即敗乃事矣妙在佐以失笑散餘一日莊居一鄉人踵門哀懇道其妻産後數喘促不能臥痰與血交湧而上日夜兩人扶坐才側身壅絶乞救療之無暇檢方書以意度之新産後血氣脾胃大虛頓損故虛痰壅盛而敗血乘之犀角六君子加失笑散一服痰血俱下喘亦立止次日來謝云諸病皆去止不能食再與參苓白朮散二帖痊愈對症之藥神效如此故特附於此大補湯治産後百日外面青浮腫唇口氣急有汗乃大虛之證急宜服此要訣在面青自汗上審此大方也宜知之當歸頭大川芎大白朮白芍藥白茯苓人參多黃耆多五味子熟地黃乾薑上上甘草少上銼散水煎服此帖不退即加川烏木香另磨入服即十全大補去桂加乾薑五味子蓋非有真見者不能用川烏木香丸良有瀉加訶子肉豆蔻粟殼鼻衄郭稽中曰産後口鼻黑氣起及鼻衄者何答曰陽明者經脈之海起於鼻交𩹾中還出頰口交人中左之右右之左産後氣虛血散榮衛不理散亂入於諸經卻還不得故令口鼻黑氣起及變鼻衄此緣産後虛熱變生此症胃絶脈敗不可治經驗方云急取緋線一條併産婦頂心發兩條緊繫中指節上即止無藥可治亦禳壓之一端也真良法也當備之胸中以待不時之用薛氏曰按胃脈挾口繞承漿蓋鼻準屬脾土鼻孔屬肺金謂胃虛肺損氣脫血死之證急用二味參蘇飲加附子五錢亦有得生者汪石山治一婦人産後血逆上行鼻衄口乾心躁舌黑蓋因瘀血上升遂用益母丸二丸童便化下鼻衄漸止血漸通益母童便妙治虛熱李氏曰此産後虛熱所致犀角地黃湯救之加味參蘇飲人參二兩蘇木二兩附子五錢上銼水煎服此治虛熱亦良熱加童便更妙
