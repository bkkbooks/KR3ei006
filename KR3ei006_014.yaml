body:
  text: 卷之十四産後門下泄瀉郭稽中曰産後腹痛及泄利者何答曰産後腸胃虛怯寒邪易侵若未滿月飲冷當風乘虛襲留於肓膜散於腹脅故腹痛作陳或如錐刀所刺流入大腸水穀不化洞瀉腸鳴或下赤白胠脅胠脹或痛走不定急服調中湯立愈若醫者以為積滯取之禍不旋踵謹之謹之陳無擇評曰産後下利非止一證當隨所因而調之既云飲冷當風何所不至寒熱風濕本屬外因喜怒憂思還從內性況勞役飢飽皆能致病若其洞泄可服調中湯赤白帶下非此能愈各隨門類別有三方此法中再審虛實乃當薛氏曰産後瀉痢或因飲食傷損脾土或脾土虛不能消食當審而治之若米食所傷用六君加谷蘖若麵食所傷用六君子加麥蘖若肉食所傷用六君加山楂神麯丸兼嘔吐皆加藿香若兼咽酸或嘔吐用前藥送越鞠丸若肝木來侮脾土用六君加柴胡炮姜若寒水反來侮土用錢氏益黃散若久瀉或元氣下陷兼補中益氣湯以升發陽氣若瀉痢色黃乃脾土真氣宜加木香肉果若脾土虛寒當用六君子加木香薑桂若脾腎虛寒用補中益氣及四神丸此十一法須體酌純熟然只用八方加減可謂要而約矣而八方之中以六君子加味者五補中益氣者二而益黃四神八味腎氣等藥或兼或專真切減當於此得心其他亦可變通矣又何患方之不廣用之不神歟若屬命門火衰而脾土虛寒用八味丸以補土母若小便澀滯肢體漸腫或兼喘咳用金匱腎氣丸以補脾腎利水道若腎氣虛弱而四肢浮腫治須補胃為主若久而不愈或非飲食所傷而致乃屬腎氣虧損蓋胞胎主於任而繫於腎況九月十月乃腎與膀胱所養必用四神六味八味三藥以補腎若用分利導水之劑是虛其虛也一産婦瀉痢發熱作渴吐痰甚多肌體消瘦飲食少思或胸膈痞滿或小腹脹墜年餘矣余以為脾腎瀉朝用二神丸夕用六君子三月餘而痊一婦産後泄瀉兼嘔吐咽酸面目浮腫此脾氣虛寒先用六君加炮姜為主按總方所言脾土虛寒用六君加木香薑桂而此止加炮姜一味為主是又不必拘於一定之法矣佐以越鞠丸而咽酸愈又用補中益氣加茯苓半夏而脾胃康一産婦泄瀉年餘形體骨立內熱晡熱自汗盜汗口舌糜爛日吐痰三碗許脈洪大重按全無此命門火衰脾土虛寒而假熱也吐痰者乃脾虛不能統攝歸源也用八味丸補火以生土用補中益氣湯兼補肺金而脾胃健審證審脈用藥俱當具法眼者能之一産婦腹痛後重去痢無度形體倦怠飲食不進與死為鄰此脾腎俱虛用四神丸十全大補湯而愈但飲食難化肢體倦怠用補中益氣而康此法據前條止用補中四神而此又加一十全大補可見須因症用藥毋執泥也一婦人五月患痢日夜無度小腹墜痛發熱惡寒用六君子湯送香連丸二服漸愈仍以前湯送四神丸四服痊愈至七月終怠惰嗜臥四肢不收體重節痛口舌乾燥飲食無味大便不實小便頻數灑栗惡寒悽慘不樂此肺與脾胃俱虛而陽氣虛寒不伸也用升陽益胃湯而痊知立言之中有不言之妙所謂言不盡意也汪石山治一婦産後滑泄勺水粒米弗容時即泄下如此半月餘衆皆危之丹溪云泄瀉症最惡一切湯飲石山亦然所謂理無二致也或用五苓散平胃散病益甚汪診之脈皆濡緩而弱曰此産中勞力以傷其胃也若用湯藥愈滋胃濕非所宜也今以參苓白朮散除砂仁加陳皮肉豆蔻煎薑棗調服旬余而安調中湯治産後腸胃虛怯冷氣乘之腹脅刺痛洞泄不止良薑當歸酒浸肉桂不見火白芍炒川芎附子炮去皮尖各一兩人參甘草炙各半兩上㕮咀每服三錢水煎服豆蔻理中丸治産後元氣虛弱臍腹疼痛泄瀉不止又治男子脾胃虛弱久泄不止人參一兩白朮二兩乾薑炮甘草炙各五錢肉豆蔻麵裹煨七錢上為細末煉蜜丸如桐子大每服四五十丸空心米飲下酒煮麵糊丸亦可神效參香散治産後脾胃虛寒泄瀉洞下及痢疾日久穢積已盡滑瀉不止此收澀如神人參木香各二錢肉豆蔻煨白茯苓白扁豆各四錢陳皮罌粟殼去蒂穰醋炙各一兩上為細末每服一錢匕清米飲調下食遠服此收澀之劑陳皮與粟殼相等得處方之妙萬曆已亥余官金陵內人十二月産難經宿始娩越旬日洞瀉點水入口即下內人恐懼大哭自謂必死余偶有此藥用一錢以米飲調服才下咽瀉即止真起死回生之藥也痢疾大全云産後痢疾者由産勞傷臟腑不足日月未滿虛乏未復或勞動太早或誤食生冷若行起太早則外傷風冷乘虛入於腸胃若誤食生冷則難化之物傷於脾胃皆令洞泄水瀉甚者變為痢也若血滲入大腸則為血痢難治世謂之産子痢也得冷則白或如魚腦得熱則赤黃或為驟血若冷熱相搏則下痢赤白或膿血相雜若下痢青色則極冷也黃赤為熱青之為寒此古人之論自河間論出不分五色均以為熱豈古今不同歟大概始於傷冷久變為熱故熱者多而寒者少未可執以無寒也必因症求之為當若飲食不進便利無常日夜無度産後本虛更加久痢不止無力瘦乏愈見羸弱謂之虛羸下痢又有産後氣血不順而下痢赤白謂之氣痢治之之法熱則涼之冷則溫之冷熱相搏則調之滑者澀之虛羸者補之水穀不分者當利小便若産婦情性執著不能寬解須當順其氣未有不安者也薛氏曰前證白屬氣分而赤屬血分也其論詳見瀉利一産婦食雞子腹中作痛面色青黃服平胃二陳更下痢腹脹服流氣飲子又小腹一塊不時上攻飲食愈少此脾胃虛寒肝木克侮所致用補中益氣加木香吳茱萸漸愈又用八珍大補兼服調理尋愈一婦産後痢未至月滿因食冷物及酒冷熱與血攻擊滯下純血纏墜極痛其脈大無力口乾用黃芩芍藥湯三服而安若果脈大無力可不溫補而乃用黃芩芍藥湯者以纏墜極痛之症為積滯未去也故從症不從脈焉産後下痢作渴者水穀之精化為血氣津液以養臟腑臟腑虛燥故痢而渴若引飲則難止反溢水氣脾胃既虛不能剋水水自流溢浸漬皮膚則令人腫但止其渴痢則自瘥凡裡氣虛不能致津液以養臟腑而渴者宜一味白朮煎湯代茶庶無水腫之患薛氏曰痢證若渴而不喜飲食屬胃氣虛不能生津液宜用七味白朮散夜間發熱口渴屬腎水弱而不能潤宜用六味丸並佐以益氣湯以滋化源救急散治産後赤白痢腹中絞痛白芍阿膠艾葉熟地黃各一兩當歸甘草各三兩上㕮咀水煎分二服空心飲此以四物湯去川芎加艾膠所以止血也而歸甘各用三兩為君所以和氣血而止腹痛耳妙在甘以緩之加味四君子湯治産後赤白痢神效人參白朮白茯苓甘草炙黃耆各一錢罌粟殼炙去蒂五分上銼水煎以上二方治虛滑二方一為氣虛一為血虛而前方妙在分兩此方重在虛滑不然參朮粟殼豈常試之味白頭翁加甘草阿膠湯治産後下痢虛極脈經作熱痢重下新産虛極者白頭翁甘草炙阿膠炒各二錢黃連黃柏秦皮去皮各三錢上銼作二服水煎納膠令消盡溫服白頭翁湯原仲景治協熱毒痢藥而脈經加膠甘以治熱痢新産極虛然非熱痢下血其敢用乎槐連四物湯治産後熱滑血痢臍腹疼痛當歸川芎赤芍藥炒生地黃槐花黃連炒各一錢御米殼去蒂蜜炙五分上銼水煎服前以四君粟殼治氣虛而滑此以四物粟殼以治血熱虛滑氣血之分智者自辨而止澀之劑非滑勿投慎之黃連丸治産後熱滑赤白痢腹中攪痛不可忍此方以三黃解毒為主非真熱勿用辨之黃連四兩黃芩黃柏各二兩梔子仁阿膠蒲黃各一兩當歸二兩半上為末煉蜜丸如桐子大每服六七十丸米飲下日三夜一以上三方治熱滑神效參香散治痢疾日久穢積已少腹中不痛或微痛不窘但滑溜不止乃收功之後藥也以下出症字字真切不落一空用此方者須知集方之心所謂無妄之藥勿試也方見前泄瀉一方治産後血瀉不禁余血作痛兼塊屬寒滑者桂心乾薑各等分上為末空心酒調服方寸匕以血瀉而用薑桂人所難信而謂寒滑不禁又所當遵夫學道愛人用方者宜體認之以上二方治寒滑神仙感應丸治産後固無積痢多有因食葷味早亦作瀉痢者百無一生非此方不能救之三二服立止不然荏苒日月致不救也如不因食葷者不可服神麯炒三錢人參枳殼麩炒去穰各一錢赤石脂熟地白朮各二錢上為細末每服三錢空心米飲調下此方以神仙感應為名必非虛語然以為食葷早而致泄者脾胃必薄故用參朮而神麯為化食之用枳殼佐之赤石脂固之似矣而熟地何為也大抵腎者胃之關産後腎虛氣不能固故用之歟於食葷不食葷可服不可服之理自非庸人所知連翹丸治産後久病赤白痢蓋因脾胃不和氣滯積聚所致心腹脹滿乾嘔酸心飲食不下胸膈噎塞脅肋疼痛危困者連翹陳皮去白京三稜各錢半肉桂不見火檳榔牽牛子取頭末蓬朮青皮去白各一錢肉豆蔻麵裹煨好墨各半錢上為細末麵糊丸如桐子大每服三十丸米飲下或用水煎服亦可凡治積方不等而此所集方一用地黃石脂此用連翹好墨亦大異也其他不過溫氣行氣攻積而已亦奇人用奇藥於他方可再求之以上二方治積痢三聖散治産後下血痢不止止血之劑烏魚骨燒綿灰血餘灰汗脂者各等分上為細末每服一錢煎石榴皮湯調下熱服一方治産後痢日五十行者取木里蠹糞炒黃急以水沃之令稀稠得所服之即愈按木蠹有有毒無毒之異則其糞亦宜別也治産後諸痢雜方取蒼耳葉搗汁半盞日三四溫服一方煮薤白食之一方羊腎脂炒薤白空心食之一方敗龜板一枚米醋炙研為末醋湯調下治産後血痢雜方一方用阿膠二兩以酒一升半煮一升頓服一方用生馬齒莧搗汁二大合煮一沸下蜜一合調頓服以上雜治方必效方療産後痢而渴飲無度數清心生津麥門冬三兩烏梅二十個上細銼水一升煮取七合細呷經效方療産後久痢津液涸渴不止澀氣生津龍骨十二分厚朴茯苓黃耆麥門冬人參各八分生薑六分大棗十四枚上細銼以水一大斗煮取七合空心分兩服録驗方療産後痢日久津液枯竭四肢浮腫口乾舌燥為消渴所宜故服之冬瓜一枚黃泥糊厚五寸煨爛熟去皮絞汁服之痊七味白朮散治産後痢津液竭渴不止大和脾胃以生津方見前渴以上治痢疾發渴大便祕澀郭稽中曰産後大便祕澀者何答曰産臥水血俱下胃虛竭津液不足是以大便祕澀不通也若過五六日腹中悶脹者此乃燥屎在臟腑以其乾澀未能出耳宜服麻仁丸以津潤之若誤以為有熱投之寒藥則陽消陰長變證百出性命危矣薛氏曰前證因去血過多大腸乾涸不可計其日期飲食數多而用藥通之必待腹滿覺脹欲去不能者乃結在直腸宜用豬膽汁潤之若服苦寒疏通之劑反傷中氣或愈加難通或通而不止或成痞證也若去血過多者用十全大補湯若血虛火燥者用加味四物湯氣血俱虛者用八珍湯雖數日不通飲食如常腹中如故仍用八珍加桃仁杏仁治之若泥其日期飲食數多而通之則誤矣一産婦大便不通七日矣飲食如常腹中如故非善守善察者不能余曰飲食所入雖倍常數腹不滿脹用八珍加桃仁杏仁至二十一日腹滿欲去用豬膽汁潤之先去幹糞五七塊後皆常糞而安一産婦大便八日不通或用通利之藥中脘脹痛飲食甚少或云通則不痛痛則不通乃用蜜導之大便不禁厄逆不食余曰此脾腎復傷用六君加吳茱萸肉果骨脂五味數劑喜其年壯而愈不然多致不起一産婦大便祕結小腹脹痛用大黃等藥致吐瀉不食腹痛胸痞余用六君子加木香炮姜治之而愈一婦人大便祕澀諸藥不應苦不可言令飲人乳而安李氏曰産後大便閉者芎歸湯加防風枳殼甘草祕澀者麻子仁丸或蘇麻粥蓋産後去血多則鬱冒鬱冒則汗多汗多則大便閉皆血虛也調導散治婦人産前産後大便不通當歸川芎防風用防風者將欲降之必先升之也枳殼各四錢甘草炙二錢上㕮咀每服一兩用生薑三片棗一枚水煎溫服忌動風物麻仁丸治産後去血過多津液枯竭不能轉送大便閉澀大麻仁研如泥枳殼麵炒人參各一兩大黃半兩上為末煉蜜丸如桐子大每服二十丸空心溫酒米飲任下未通漸加丸數不可太過評曰産後不得利利者百無一生去血過多臟燥大便祕澀則固當滑之大黃似難輕用唯蔥涎調臘茶為丸復以臘茶下之必通亦是良法産後固不可輕用大黃然大腸祕結不通或惡露點滴不出不得大黃以宣利之勢必不通但利後即當以參耆白朮甘草及芎歸等藥大劑調補之不然元氣下脫後將不可救矣滋腸五仁丸治産後血氣虛損大腸閉澀傳道艱難杏仁去皮麵炒桃仁如上制各一兩柏子仁五錢松子仁一錢半郁李仁一錢麵炒橘紅四兩為末以橘紅為君者和氣潤下也一方加當歸梢五錢上五仁另研為膏合橘皮末和勻再研煉蜜丸如桐子大每服三十丸加至五六十丸食前清米飲下阿膠枳殼丸治産後大便祕澀阿膠枳殼各等分上為末煉蜜丸如桐子大滑石末為衣溫水下二十丸未通再服麻蘇粥婦人産後有三種疾鬱冒則多汗汗多則大便祕故難以用藥惟麻子蘇子粥最為穩當蘇子大麻子各半合洗淨上研極細用水再研取汁一盞分二次煮粥啜下本事方云此粥不惟産後可服大抵老人諸虛風祕皆宜服之嘗有一人母年八十四忽爾腹痛頭疼噁心不食召醫數十議皆用補脾進食治風清利頭目等藥數日雖愈全不入食其家憂惶余辨說前藥皆誤矣此證正是老人風祕臟腑壅滯聚於胸中則腹脹噁心不思飲食又上至於顛則頭痛神不清也若臟腑流暢諸疾悉去矣豫命作此粥兩啜而氣泄先下結糞如胡桃者十餘枚後漸得通利不用藥而自愈矣兵部手集方治産後祕結不通膨滿氣急坐臥俱難用大麥蘖炒黃為末酒下一合神效用大麥自有心得大小便不通大全云産後大小便不通者本腸胃挾熱因産後血水俱下津液燥竭腸胃痞澀熱氣內結於腸胃故令大小便不通也薛氏嘗治一婦大小便不通諸藥不應將危矣令飲牛乳一日稍通三日而痊人乳尤善通氣散治産後大小便不通通氣陳皮蘇葉枳殼麩炒木通各等分上銼散每服四錢水煎溫服立通桃仁散治膀胱氣滯血澀大小便閉通血桃仁葵子滑石檳榔各等分上為細末每服二錢空心蔥白湯調下枳殼丸治産後大小便澀滯通氣涼血潤腸木香一錢枳殼麩炒麻仁炒黃大黃各一兩上為末煉蜜丸如桐子大每服三十丸溫水送下食後如飲食不化亦宜服之一方治産後大小便不利下血車前子黃芩蒲黃牡蠣生地黃芍藥各一兩五錢上為細末空心米飲調服方寸匕忌面蒜涼大小腸血而又止血者也則牡蠣之澀與別藥不同金鑰匙散治産後大小便不通腹脹等證滑石蒲黃各等分上為細末酒調下二錢遺屎薛氏曰産後遺屎若脾腎虛弱用還少丹仍以補中益氣湯為主虛寒加肉豆蔻補骨脂或四神丸若脾腎虛寒用八味丸兼四神丸仍佐以前二方按産後遺屎乃腎氣不固宜五味子散主之夫腎開竅於二陰而大便者血之道腎主之故立齊集方皆以脾腎為治以命門兼之者土惡濕也一産婦大便不實飲食少思五更或清晨遺屎此中氣虛寒脾腎不足用補中益氣送四神丸而痊非大有見者不能主此方一産婦小便出糞名大小腸交乃氣血俱虛失行常道先用六君子二劑又用五苓散一劑而痊尋常腸交亦可用補遺方療産後遺屎不知亦治遺尿以下二方乃自良所集各取其義也白蘞芍藥各七分上為末酒調服方寸匕集驗方療産後遺屎亦治男子枯礬牡蠣煅各等分上為末酒調服方寸匕日三服加味補中益氣湯治脾腎虛寒大便不禁此加法火土相生之理然非原方所加以此推之能以無法觀法斯為妙法黃耆人參白朮甘草炙各一錢當歸陳皮各七分升麻柴胡各三分肉豆蔻補骨脂各五分上銼一劑水煎服還少丹治脾腎虛弱遺糞肉蓯蓉本草以肉蓯蓉善動大便人皆忌之今治遺糞而立齊反以為用豈立齊為一代名醫而反不知耶以用所當用則不忌耳遠志去心茴香巴戟乾山藥枸杞子熟地黃石菖蒲山茱萸去核牛膝杜仲去皮薑製楮實子五味子白茯苓各三兩上為末用棗肉百枚同煉蜜丸如桐子大每服五七十丸空心溫酒或鹽湯下日三服四神丸治脾腎虛弱大便不實或五更作瀉破故紙吳茱萸炒各四兩肉豆蔻生用五味子各一兩上為末用大紅棗四十九枚生薑四兩切碎同棗用水煮熟去姜取棗肉和藥丸桐子大每服五十丸空心鹽湯下五味子散治腎泄五味子二兩吳茱萸半兩上炒香熟研為細末每服二錢陳米飲調下廣濟方治産後遺糞亦治男子取故燕窩中草燒為末以酒調下半盞淋閟大全云産後諸淋因熱氣客於脬中內虛則頻數熱則小便澀痛故謂之淋又有因氣虛挾熱熱邪搏血滲入胞中血隨小便而出為血淋者熱邪搏血則有之滲入胞中則未也如交腸症亦豈滲入而來耶三因論曰治諸産前後淋閟其法不同産前當安胎産後當去血如其冷熱膏石氣淋等為治則一但量其虛實而用之瞿麥蒲黃最是産後要藥唯當究其所因則不失其機要矣五淋一治有悖若然則冷熱無分矣薛氏曰按前證若膀胱虛熱用六味丸若陰虛而陽無以化用滋腎丸蓋土生金金生水當滋化源也仍參淋瀝頻數門調治一産婦小水淋瀝或時自出用分利降火之劑二年不愈余以為肺腎之氣虛用補中益氣湯六味地黃丸而痊以分利降火之劑太過故用此藥補之茅根湯治産後諸淋無問冷熱膏石氣結悉主之此方甚良白茅根五錢瞿麥穗白茯苓各二錢半葵子人參各一錢二分半蒲黃桃膠滑石甘草各六分紫貝一個煅石首魚腦砂二個煅紫貝石首皆治石淋要藥上銼分二帖加生薑三片燈心二十根水煎服或為末每服二錢木通煎湯調下如氣壅閉木通橘皮煎湯調下滑石散治産後熱淋滑石一兩二錢半研通草車前子葵子各一兩上為末以漿水調服方寸匕至二匕為妙滑石通淋散産後小便緊澀不通者因血熱積於小腸經水不利恣食熱毒之物而成淋澀故也赤茯苓澤瀉木通黃連豬苓各八分白朮瞿麥山梔子車前子各等分滑石四分上銼加燈心十二莖水煎空心熱服石韋散治婦人小便卒淋澀石韋黃芩木通榆白皮葵子瞿麥穗甘草各等分上㕮咀每服八錢加生薑三片水煎食前溫服加味四物湯諸淋皆屬於熱用此纍效當歸川芎赤芍藥生地黃甘草梢杜牛膝木通各一錢桃仁去皮尖五個滑石一錢半木香上銼水煎服一方療産後淋小便痛及血淋白茅根五分瞿麥車前子各二兩鯉魚齒一百枚為末通草三兩冬葵子三分上以水三升煮取一升入魚齒末空心服張氏方療産後小便不通淋閟陳皮一兩去白為末空心溫酒調下二錢一服便通小腸氣道也肝主之陳皮杏仁皆利氣藥故有驗療卒不得小便方杏仁十四枚去皮尖炒為末和飲頓服灸臍法治産後小便不通腹脹如鼓悶亂不醒蓋緣未産之前內積冷氣遂致産時尿胞運動不順積冷者用此所謂氣化則能出矣用鹽填臍中卻以蔥白剝去粗皮十餘根作一縛切一指厚安鹽上用大艾炷滿蔥餅上以火灸之覺熱氣入腹內即時便通神驗小便數大全云夫産後小便數者乃氣虛不能制故也薛氏曰前證若因穩婆不慎以致胞損而小便淋瀝者用八珍湯以補氣血若因膀胱氣虛而小便頻數當補脾肺若膀胱陰虛而小便淋瀝者須補脾腎一産婦小便頻數時忽寒戰乃屬脾肺虛弱用補中益氣加山茱山藥為主佐以桑螵蛸散而愈後患發熱晡熱盜汗自汗月水不調用加味逍遙散而安一産婦患前證吐痰發熱日晡作渴此膀胱陰虛用補中益氣湯及六味丸而愈又患痢後小便頻數手足俱冷屬陽氣虛寒用前湯及八味丸而瘳桑螵蛸散治産後陽氣虛弱小便頻數及遺尿治氣虛頻數遺尿桑螵蛸三十個炒鹿茸酥炙黃耆各三兩牡蠣煅人參厚僕赤石脂各二兩上為末每服二錢空心粥飲調下外臺方無厚朴石脂有甘草生薑栝蔞湯療産後小便數兼渴此治虛熱栝蔞根人參各三兩黃連桑螵蛸甘草炙生薑各二兩大棗五十枚上細切用水七升煮二升半分三服忌豬肉冷水補遺方療産後小便數及遺尿此命門藥也專主縮小便虛寒者宜之益智仁為末米飲調服小便不禁陳氏曰婦人産蓐産理不順致傷膀胱遺尿無時丹溪云嘗見收生者不謹損破産婦尿脬致病淋瀝遂成廢疾一日有徐婦年壯難産得此因思肌肉破傷在外者宜可補完胞雖在腹恐亦可治遂診其脈虛甚豫曰難産之由多是氣虛産後血氣尤虛試與峻補因以參耆為君芎歸為臣桃仁陳皮黃耆茯苓為佐妙在有破血之藥煎以豬羊胞中湯極飢時飲之但劑小率用一兩至一月而安蓋令氣血驟長其胞自完恐稍緩亦難成功矣薛氏曰前證若脾肺陽虛用補中益氣湯加益智若肝腎陰虛用六味地黃丸若肝腎之氣虛寒用八味地黃丸一産婦小便不禁二年不愈面色或青赤或黃白此肝脾氣虛血熱用加味逍遙散為主漸愈佐以六味地黃丸而痊後因怒小便自遺大便不實左目頓緊面色頓赤仍用前散佐以六君子湯以清肝火生肝血培脾土而痊千金方治産後小便不禁以下七方悉有至理考之本草乃見方不虛立集次有條醒心會意者當自得之白薇芍藥各等分上為末溫酒調下方寸匕日三服又方治産後小便不禁桑螵蛸半兩炙龍骨一兩上為末每服二錢粥飲調下雞內金散治産後溺床失禁用雄雞肶胵一具並腸洗燒為末溫酒調服方寸匕廣濟方療産後小便不禁用雞尾毛燒灰存性酒調下一錢匕日三服黃耆當歸湯婦人産後尿不禁面微浮略發熱於午後此膀胱為坐婆所傷黃耆歸身尾歸尾破血芍藥各一錢半白朮一錢人參陳皮各五分甘草炙少許上水煎熱服之固脬散治婦人臨産時傷手脬破小便不禁黃絲絹自然黃者染黃者不用取三尺以炭灰汁煮極爛以絹水洗去灰令淨黃蠟半兩蜜一兩白茅根馬屁勃為末各二錢黃絹煮爛固脬黃蠟護膜生肌茅根破血止血馬勃塞虛漏之隙上用水二升再煎至二盞空心頓服補脬飲治産後傷動脬破終日不小便但淋瀝不幹生熟絹黃色者一尺白牡丹根皮白及各二錢丹皮破血白及補斂上用水一碗煎至絹爛如餳服之小便出血大全云産後小便出血者因氣血虛而熱乘之血得熱則流散滲於胞內故血隨小便出薛氏曰一産婦尿血面黃脅脹少食此肝木乘脾土也用加味逍遙補中益氣兼服而愈後為懷抱不樂食少體倦驚悸無寐血仍作用加味歸脾湯二十餘劑將愈以歸脾而愈豈尿血亦為脾不攝血歟臨症須酌之惑於衆論服犀角地黃湯諸證復作仍服前湯而愈血餘散治産後小便出血即此五方條理有序品味合宜孰能遺之亂髮不拘多少湯洗淨燒灰研為末米飲調服方寸匕滑石散治産後小便出血滑石研發灰各等分上為末每服一錢生地黃汁調下崔氏方療産後血滲入大小腸蜜一大合車前草搗汁一升上相和煎沸分兩服補遺方治産後小便出血川牛膝去蘆水煎服又方生地黃汁半升生薑自然汁半合上相和服之大便出血薛氏曰産後便血或飲食起居或六淫七情以致元氣虧損陽絡外傷治法若因膏粱積熱用加味清胃散若因淳酒濕毒葛花解酲湯若因怒動肝火加味小柴胡湯若因鬱結傷脾加味歸脾湯若因思慮傷心妙香散若因大腸風熱四物加側柏槐花若因大腸血熱四物加芩連槐花若因腸胃虛弱六君加升麻柴胡若因腸胃虛寒六君加肉蔻木香若因元氣下陷補中益氣加茯苓半夏若因胃氣虛弱用六君升麻若因血虛用四物升麻若因氣血俱虛用八珍柴胡升麻大凡元氣虛弱而發熱者皆內真寒而外假熱也但用六君子或補中益氣加炮姜溫補脾氣諸證悉退若四肢畏冷屬陽氣虛寒急加附子病因多端當臨症制宜庶無誤矣一産婦糞後下血諸藥不愈飲食少思肢體倦怠此中氣虛弱用補中益氣加吳茱萸炒黃連五分四劑頓止用歸脾湯治之而痊一婦人怒則便血寒熱口苦或胸脅脹痛或小腹痞悶此肝木乘脾土用六君子加山梔柴胡而愈又用補中益氣加味逍遙二藥而不復作一婦人久下血在糞前屬脾胃虛寒用補中益氣湯加連炒吳萸一錢數劑稍效乃加生吳萸五分數劑而愈一産婦大便後血口乾飲湯胸脅膨滿小腹悶墜內熱晡熱食少體倦日晡面赤灑淅惡寒此脾肺氣虛先用六君加炮薑木香漸愈用補中益氣將愈用歸脾湯而愈後因勞役兼怒氣發熱血崩夜間譫語此熱入血室用加味小柴胡二劑而熱退用補中益氣而血止用逍遙散歸脾湯調理而康加味清胃散治因膏粱積熱便血當歸身酒浸一錢黃連生地黃酒洗升麻各二錢牡丹皮一錢半石膏三錢上銼水煎服一方無石膏有犀角連翹甘草的奇散治産後惡露不行余血滲入大腸洞瀉不禁下青黑物亦驗用荊芥大者四五穗於盞內燃火燒成灰不得犯油火入麝香少許研勻沸湯一兩呷調下此藥雖微能愈大病幸勿忽之妙理入神産後陰下有物脫出産腸不收三因方云婦人趣産勞力努極致陰下脫若脫肛狀及陰下挺出逼迫腫痛或舉動房勞皆能發作清水續續小便淋瀝丹溪云一婦人三十餘歲生女二日後産戶下一物如手帕下有帕尖約重一斤豫思之此因胎前勞乏傷氣或肝痿所致卻喜血不甚虛耳其時暮天寒恐冷干壞了急與炙黃耆半錢人參一錢白朮五分當歸一錢半升麻五分三帖連服之即收上得汗通身乃安但下裔沾席處乾者落一片約五六兩重蓋脂膜也食進得眠診其脈皆澀左略弦視其形卻實與白朮芍藥各半錢陳皮一錢生薑一片煎二三帖以養之一婦人産子後陰戶中下一物如合鉢狀有二岐其夫來求治豫思之此子宮也必氣血弱而下墜遂用升麻當歸黃耆大料一帖與之半日後其夫復來曰服二次後覺響一聲視之已收陰戶訖但因經宿幹著席上破一片如掌心大在席某妻在家哭泣恐傷破不可復生豫思之此非腸胃乃脂膏也肌肉破尚可復完若氣血充盛必可生滿遂用四物湯加人參與一百帖三年後復有子治子宮下用黃耆一錢半人參一錢當歸七分升麻三分甘草二分作一帖水一鍾煎至五分去滓食前服卻用五倍子末泡湯洗又用末敷之如此數次宜多服藥永不下一婦産後水道中出肉線一條長三四尺動之則痛欲絶先服失笑散數次何以服失笑散以帶皮姜二斤研爛入清油二斤煎油干為度用絹兜起肉線屈曲於水道邊以前姜熏之冷則尉之六日夜縮其大半二六日即盡入再服失笑散芎歸湯調理之如肉線斷則不可治矣當歸黃耆散治産後陰脫謂陰戶脫下也補而升之當歸白芍黃耆人參各二錢升麻五分一方有甘草無芍藥上銼作一劑水煎食前溫服外用五倍子泡湯洗又用末敷之五倍固脫也加味八珍湯治産後生腸不收氣血並補而升八珍湯八錢黃耆一錢防風升麻各五分上銼一服水煎服外以荊芥藿香樗皮煎湯熏洗加味四物湯治因産用力過多陰門突出補血固脫四物湯四錢龍骨另研少許臨服入上銼水煎服陰痛者加藁本防風去龍骨妙在一加一去有本來升法當歸散治陰下脫又名㿗疝當歸黃芩各二兩白芍一兩蝟皮燒存性半兩牡蠣煅二兩半上為末每服二錢溫酒米湯任意調下忌登高舉重㿉即子宮之脫刺蝟牡蠣芩芍涼而固脫也硫黃散治産後努力太過致陰下脫若脫肛狀及陰下挺出逼迫腫痛陰脫有屬肝熱者舉動房勞皆能發作清水續續小便淋瀝硫黃烏賊魚骨各半兩硫黃烏賊溫而固脫也五味子二錢半上為末摻患處日三易烏椒湯治陰下挺出溫法蜀椒一方不用此味烏頭白及各半兩上為末以方寸匕綿裹納陰中入三寸腹中熱易之一日一度明旦乃復著七日愈寸金散治婦人子腸下不收溫澀清涼妙妙蛇床子龍腦葫蘆巴紫梢花各等分上為末每服五七錢煎水半碗淋洗之三二遍為效復元湯治産後子宮不收荊芥穗藿香葉臭椿皮各等分上㕮咀煎湯熏洗子宮即入一方有臨産子腸先出産後腸不收名曰盤腸獻花産治法命産母仰臥卻用好米醋半盞和新汲水七合攪勻忽噀産母面或背每一噀令一縮三噀三縮腸則盡收此良法也一方産腸出俗用冷水噀母面其腸自收此法虛弱之人切不可用恐驚怯成病或即脫絶以此方治之用萆麻子四十粒一方云十四粒去殼研爛塗産母頭頂自能收上如收了即以水洗去頂上萆麻又方治腸出久而不收為風吹乾不能收者以磨刀水少許火上溫過以潤盤腸仍煎好磁石湯一杯與産母飲之自收取意丹溪方治産後腸不收用香油五斤煎熱盛盆俟溫坐油盆中約一頓食時以皂角末吹入鼻中嚏作立上妙有法雜方治盤腸産半夏為末搐鼻中腸自上取嚏之義一方全蠍不拘多少為末口噙水鼻內搐之立效一方以大紙捻蘸香油點燈吹滅以熏産母鼻中腸即上雜方治産後陰腫下脫鐵精羊脂二味攪令稠布裹炙熱尉推納之一方用枳殼二兩去穰銼碎煎湯溫浸良久即入一方用人尿燒酒調下方寸匕一方腸出盛以潔淨漆器濃煎黃耆湯浸之腸即上一方蛇蛻蛇床子二味炒熱布裹尉患處亦治産後陰痛一方單用蛇床子一升炒熱帛裹尉患處亦治産後陰痛一方燒兔頭末敷之一方以溫水洗軟卻用雄鼠糞燒煙燻入灸法治産後陰脫灸臍下橫紋二七壯一法婦人陰挺出四肢淫濼身悶少海主之一作照海一法婦人胞胎門落頽不收常濕灸神闕玉泉五十壯陰交臍下一寸指縫中灸五十壯三報又法玉泉旁開三寸灸隨年壯三報一法女人陰門冷腫灸歸來三十壯産門不閉腫痛薛氏曰玉門不閉氣血虛弱也用十全大補湯腫脹焮痛肝經虛熱也加味逍遙散若因憂怒肝脾氣血傷也加味歸脾湯若因暴怒肝火血傷也龍膽瀉肝湯一産婦玉門不閉發熱惡寒用十全大補加五味子數劑而寒熱退用補中益氣加五味子數劑而玉門閉一婦人脾胃素弱兼有肝火産後玉門腫痛寒熱作渴嘔吐不食外敷大黃等藥內用驅利之劑腫及於臂諸證蜂起此真氣虛而邪氣盛也先用六君子以固腸胃次用補中益氣以升陽氣下數劑而痊愈無肝火則不腫痛非脾胃弱則不嘔吐故用大黃等藥失其治也一産婦患此失治腫潰不已形體消瘦飲食少思此從飲食少思治朝寒暮熱自汗盜汗半年矣用補中益氣湯加茯苓半夏膿水漸少飲食漸進又用歸脾湯共五十餘劑而愈一産婦玉門不閉小便淋瀝腹內一塊攻走脅下或脹或痛此從脅下脹痛淋瀝治用加味逍遙散加車前子而愈一婦人子宮腫大二日方入損落一片殊類豬肝面黃體倦飲食無味內熱晡熱自汗盜汗用十全大補湯二十餘劑諸證悉愈仍復生育十全大補湯治産後血氣大虛陰門不閉發熱惡寒本方加五味子水煎服硫黃湯治産後玉門開而不閉硫黃四兩吳茱萸菟絲子各一兩半蛇床子上銼每服四錢水一碗煎湯頻洗之自效斂陰法治新産後陰腫下脫及産門不合新石灰半升先放在腳盆內後以沸湯衝入乘熱於上熏之俟溫用手掬清者沃淋之未效日再用有一婦用此法熏之即死不可不慎大抵宜溫不宜乘熱也蓋以新石灰而加滾湯以熏新産之婦能不傷乎故盡信書不如無書又當以己意逆之也當歸湯治産後臟中風冷陰腫痛品味俱妙當歸獨活白芷地榆各三兩敗醬千金翼不用礬石各三兩上銼碎以水一斗半煮取五升適冷暖洗陰日三適冷暖二字妙一方治婦人子宮大痛不可忍併産後生腸不收謂子宮墜下以致大痛也此子宮當以玉門為釋觀生腸不收可想矣不然腹中之物豈能泡糝是玉門前案可據五倍子白礬各等分上為末溫酒泡洗干糝亦可桃仁膏治産後陰腫妨悶此謂陰腫有瘀血桃仁去皮尖五倍子枯礬各等分上為末研桃仁膏拌勻敷一方單用桃仁去皮尖研細四五次抹之萬應丸治産後小戶痛不可忍知母一味去皮炒為末煉蜜丸如彈子大每服一丸清酒一盞化下一方治産後陰戶兩旁腫痛手足不能舒伸者用四季蔥入乳香同搗成餅安於陰戶兩旁良久即愈兩旁屬厥陰蔥涎止痛以其通也四季蔥通而愈通況同乳香乎此入理之方請試思之乳病門乳汁不行大全云婦人乳汁乃氣血所化其或不行者皆由氣血虛弱經絡不調所致凡乳汁勿令投於地蟲蟻食之令乳無汁若乳盈溢可潑東壁上佳或産後乳漲或臖作者此年少之人初經産乳內有風熱也須服清利之藥則乳行若纍經産而無乳者亡津液故也須服滋陰之藥以助之若雖有乳卻又不甚多者須服通經之藥以動之仍以羹臛引之蓋婦人之乳資以衝脈沖與胃經通故也有屢經産而乳汁常多者亦婦人血氣不衰使然若婦人素有疾在衝任乳汁少而色帶黃者生子則怯弱而多疾三因方云産婦有二種乳脈不行有血氣盛而壅閉不行者有血少氣弱澀而不行者虛當補之盛當疏之盛者當用通草漏蘆土瓜根輩虛者當用煉成鍾乳粉鍾乳原從氣化而成故取之以天人合氣也微乎微乎豬蹄鯽魚之屬概可見矣薛氏曰前證若氣血虛弱而不能生化者宜壯脾胃怒動肝膽而乳腫汁出者宜清肝火夫乳汁乃氣血所化在上為乳在下為經若屢産無乳或大便澀滯當滋化源一産婦因乳少服藥通之致乳房腫脹發熱作渴余謂血氣虛以玉露散補之而愈通草散治産後血氣盛實乳汁不通以下五方皆治盛實壅滯各有經濟法度宜熟味之桔梗二錢瞿麥柴胡天花粉各一錢通草七分青皮白芷赤芍藥連翹木通甘草各五分上銼一劑水煎細飲更摩乳房漏蘆散治婦人肥盛氣脈壅滯乳汁不通或經絡凝滯乳內脹痛或作癰腫將欲成者此藥服之自然內消乳汁通行漏蘆一兩半蛇蛻炙十條栝蔞十枚急火煅存性一方用根十枚切片炒焦上為末每服二錢酒調下仍食豬蹄羹助之經驗方有牡蠣燒存性此厥陰陽明藥加牡蠣尤奇一方只用牡蠣煅末酒調下祕傳湧泉散治乳婦氣脈壅塞乳汁不行及經絡凝滯奶乳脹痛或作癰腫王不留行白丁香漏蘆天花粉殭蠶穿山甲火炮黃色各等分一方無此味上為末每服四錢用豬懸蹄煮汁調下此散結通塞劑也而白丁香宜查羅氏湧泉散治氣滯少乳瞿麥穗麥門冬去心王不留行龍骨穿山甲炮黃各等分上為細末每服一錢熱酒調下先食豬懸蹄羹後服此藥服後以木梳刮左右乳房三十餘下日三服立齊方無穿山甲而以豬蹄汁一碗酒一杯煎服其用龍骨與氣滯何居意以通中用塞也取義而已忌食姜椒辛辣之物湧泉散治乳汁不通不問虛盛先用木梳頻刮乳房後服藥穿山甲白殭蠶肉豆蔻麵包煨熟各四錢皂角五錢胡桃仁去皮四兩芝麻炒半斤上為細末每服不拘多少溫酒調下任意飲之湧泉三方俱有奇藥而此以穿山殭蠶皂角通塞胡桃芝麻生乳若肉豆蔻者其善溫胃化食者歟可與智者生巧産寶方治産後乳無汁土瓜根漏蘆各三兩通草四兩甘草二兩上銼碎以水八升煎取二升分溫三服若為乳無汁須以補氣血為主而此以土瓜根桂心通血脈有冷熱不同全無氣血之劑而甘草一味又超於法外矣一方加桂心併為末酒服方寸匕胡桃散治婦人少乳及乳汁不行核桃仁去皮十個搗爛穿山甲為末一錢上搗和一處共酒調服皂角散治乳汁不通及乳結硬疼痛皂角燒粉蛤粉上為末每服二錢熱酒調服歌曰婦人吹乳意如何皂角燒灰蛤粉和熱酒一杯調八字須臾核散笑呵呵張氏方滋益氣脈榮衛行津液葵子炒香縮砂仁各等分上為細末每服二錢熱酒調下雜方下乳汁栝蔞子洗淨炒令香熟瓦上㩉令白色為末酒調下一錢合面臥少時再服一方栝蔞一枚熟搗以白酒一斗煮取四升去滓溫飲一升日三一方土瓜根為末酒調下一錢日三服一方京三稜三個水二碗煮取一碗洗之取汁下為度妙以洗法通氣又是一法一方穿山甲洗淨一兩灰炒燥為細末酒調服方寸匕治産乳無汁亦治乳結癰腫以上治乳滯不行之劑加味四物湯治氣血虛乳汁不通以下皆補法而諸法不同然會其理則各臻至妙也試法尤為入門便訣當歸川芎白芍藥酒炒生地黃木通王不留行天花粉各等分上銼一劑同獖豬蹄旁肉四兩煎湯二鍾入藥同服先將蔥湯頻洗乳房按第一方以四物不用熟地第二方合四君而無白朮更去生地第三方有黃耆或歸或芎或甘草以至粳糯米羊蹄鍾乳種種變更皆不出於至中至正之道噫其能復超於法外否玉露散治産後乳脈不行身體壯熱疼痛頭目昏痛大便澀滯此藥涼膈壓熱下乳人參白茯苓當歸各五分芍藥七分川芎桔梗炒白芷各一錢甘草五分上㕮咀水煎食後服如熱甚大便祕加大黃炒三分當歸補血加蔥白湯治産後無乳當歸二錢黃耆一兩蔥白十根上銼水煎服此方亦從補法來而以蔥白引入乳房尤為捷徑通脈散治女人乳少當歸天花粉木通牡蠣穿山甲上為細末用豬蹄湯入酒少許調服通乳湯治乳後氣血不足經血衰弱乳汁澀少豬蹄下節四隻通草二兩川芎一兩穿山甲十四片炒黃甘草一錢上用水五升煮汁飲之忌生冷避風寒夜臥不宜失蓋更以蔥湯頻洗乳房一方治乳汁不通當歸穿山甲酥炙各五錢天花粉王不留行甘草各三錢上為細末每服三錢豬蹄湯或熱酒調下其乳即通豬蹄湯治婦氣少力衰脈澀不行絶乳汁豬蹄一隻通草四兩上將豬蹄淨洗依食治法次用水一斗同通草浸煮得四五升取汁飲之末作二料立效散下乳汁粳米糯米各半合萵苣子一合並淘淨生甘草半兩上研細用水二升煎取一升去滓分三服立下全以穀氣為主即糯米又為養陰助乳之大藥也又方治乳汁少栝蔞根薄荷干身各等分上為粗末先吃羊蹄汁一碗次服藥後再吃蔥絲羊羹湯少許立效羊肉補形薄荷蔥絲和味引經通滯鍾乳散治乳婦氣少血衰脈澀不行乳汁絶少成煉鍾乳粉研細濃煎漏蘆湯調下二錢雜方有人乳汁不行已十七日諸藥無效遇有人送赤豆一斗遂時常煮粥食之當夜乳脈通行一方麥門冬不拘多少去心焙為末以酒磨犀角約一錢許暖調二錢服之不過兩服乳汁便下此清心法可為焦勞者一助云乃又超於法外矣以上治乳少不行之劑乳汁自出大全云産後乳汁自出者乃是胃氣虛所致宜服補藥以止之若乳多溢滿急痛者溫帛尉之當觀人勇怯及乳汁濃淡以論虛實為有湧溢故也産寶有是論卻無方以治之若有此證但以漏蘆散亦可有未産前乳汁自出者謂之乳泣生子多不育經書未嘗論及豫曾診一內氣盛脈旺患乳泣其生子長而遊癢其不育之說亦未必盡然也薛氏曰前證氣血俱虛用十全大補湯肝經血熱用加味逍遙散肝經怒火用四物柴梔芩連肝脾鬱怒用加味歸脾湯一産婦勞役忽乳汁如湧昏昧吐痰此陽氣虛而厥也灌以獨參湯而蘇更以十全大補湯數劑而安若婦人氣血方盛乳房作脹或無兒飲脹痛憎寒發熱用麥芽二三兩炒熟水煎服立消其耗散血氣如此何脾胃虛弱飲食不消方中多用之漏蘆散方見前免懷湯欲摘乳者用此方通其月經則乳汁不行當歸尾赤芍藥紅花酒浸牛膝酒浸各五錢上銼水煎服一方治歸人血氣方盛乳房作脹或無兒食乳要消者服此立消麥芽二兩炒熟水煎服一方炒為末煎四物湯調服即止吹乳癰腫大全云産後吹奶者因兒吃奶之次忽自睡著為兒口氣所吹令乳汁不通蓄積在內遂成腫硬壅閉乳道傷結疼痛亦有不疼下痛腫硬如石者總名曰吹奶若不急治腫甚成癰逮有至死者連服皂角散栝蔞散敷以天南星散更以手揉之則散薛氏曰前證用藥切不可損其氣血丹溪云乳房陽明所經乳頭厥陰所屬乳子之母不知調養或為忿怒所逆鬱悶所遏厚味所釀以致厥陰之氣不行故竅不通而汁不得出陽明之熱沸騰故熱甚而化膿亦有所乳之子膈有滯痰口氣焮熱含乳而睡熱氣所吹遂生結核於初起時便須忍痛揉令稍軟吮令汁透自可消散矣此不治必成癰癤治法疏厥陰之滯以青皮清陽明之熱以細研石膏行汙濁之血以生甘草節治腫導毒以栝蔞子或加沒藥青橘葉皂角刺金銀花當歸頭或湯或散加減隨意消息然須少酒佐之若加以艾火兩三壯於腫處其效尤捷立方有法用藥有訣不可不達彼村工喜於自銜便妄目針刀引惹拙病良可哀憫李氏曰婦人之乳男子之腎皆性命根也初起煩渴嘔吐者膽胃風熱也甚則毒氣上衝咽膈妨礙寒熱者肝邪也此皆表證宜不換金正氣散加天花粉能止渴嘔定寒熱咽膈有礙者甘桔湯加生薑或護心散如潰後見此四證為虛飲食厚味忿怒憂鬱以致胃火上蒸乳房乳汁化為濁膿肝經氣滯乳頭竅塞不通致令結核不散痛不可忍初起便宜隔蒜灸法切忌針刀能飲者一醉膏加芎歸各一分一服兩服即效不能飲者栝蔞散結核亦有因氣血虛弱被外感內傷以致痰瘀凝滯而成核者俱以芷貝散為主血虛合四物湯更加參朮柴胡升麻氣虛合四君子湯更加芎歸柴胡升麻憂思傷脾者歸脾湯加栝蔞根貝母白芷連翹甘草節水酒各半煎服有肝火結核腫痛甚者清肝解鬱湯吹乳因乳子膈上有痰口氣焮熱含乳而睡熱氣吹入乳房凝滯不散作痛初起須忍痛揉令稍軟吸令汁透自可消散不散宜益元散冷薑湯或井水調一日一夜服三五十次自解重者解毒湯頓服之挾氣者芷貝散單青皮湯外用漏蘆為末水調敷之又有乳汁不行奶乳脹痛者湧泉散核久內脹作痛外腫堅硬手足不近謂之乳癰未潰者仍服栝蔞散內托升麻湯或復元通氣散加漏蘆虛者托裡消毒散將潰兩乳間出黑頭瘡頂陷下作黑眼者內托升麻湯已潰寒熱者內托十宣散少食口乾者補中益氣湯晡熱內熱者八物湯加五味子胃虛嘔者六君子湯加香附砂仁胃寒嘔吐或瀉者六君子湯加乾薑藿香遇勞腫痛者八物湯倍參耆歸術遇怒腫痛者八物湯加山梔王損庵曰隆慶庚午豫自秋闈歸則妹已病蓋自七月乳腫痛不散八月用火針取膿醫以十全大補湯與之外敷鐵箍散不效反加喘悶九月産一女潰勢益大而乳房爛盡乃及胸腋膿水稠黏出膿幾六七升略無斂勢十一月始歸就醫改用解毒和平中劑外摻生肌散龍骨寒水石等劑膿出不止流濺所及即腫泡潰膿兩旁紫黑瘡口十數胸前腋下皆腫潰不可動側其勢可畏余謂産後毒氣乘虛而熾宜多服黃耆解毒補血益氣生肌而醫不敢用十二月中旬後益甚瘡口念余諸藥及試不效始改用豫藥時膿穢黏滯煎楮葉豬蹄湯沃之頓爽乃治一方名黃耆托裡湯黃耆之甘溫以排膿益氣生肌為君甘草補胃氣解毒當歸身和血生血為臣升麻葛根漏蘆為足陽明本經藥及連翹防風皆散結疏經栝蔞仁鼠黏子解毒去腫皂角刺引至潰處白芷入陽明排膿長肌又用川芎三分及肉桂炒柏為引用每劑入酒一盞煎送白玉霜丸疏膿解毒時膿水稠黏方盛未已不可遽用收澀之藥理宜追之以翠青錠子外摻明日膿水頓稀痛定穢解始有向安之勢至辛未新正患處皆生新肉有紫腫處俱用蔥尉法隨手消散但近腋足少陽分尚未斂乃加柴胡一錢青皮三分及倍川芎膿水將淨者即用搜膿散摻之元宵後遂全安康祖為廣德宰事張王甚謹後授溫倅左乳生癰繼又胸臆間結核大如拳堅如石荏苒半載百療莫效已而牽掣臂腋徹於肩痛楚特甚急禱王祠下夢聞語曰若要安但用生薑自然汁制香附服之覺呼其子檢本草視之二物治證相符訪醫者亦云有理遂用香附子去毛薑汁浸一宿為末二錢米飲調方數服瘡膿流出腫硬漸消自是獲愈一婦人稟實性躁懷抱久郁左乳內結一核按之微痛以連翹飲子二十餘劑少退更以八珍加青皮香附桔梗貝母二十餘劑而消消毒飲治吹乳吹癰並便毒如憎寒壯熱或頭痛者先服人參敗毒散一二劑方可服此藥如無前證即服此二三劑或腫不消宜服托裡藥當歸白芷青皮去皮貝母柴胡天花粉殭蠶炒金銀花各三錢上銼一劑水煎服便毒加大黃煨一錢空心服白芷為陽明經排膿止痛青皮柴胡行厥陰經氣滯當歸行血天花粉通血脈殭蠶散結痰貝母開鬱痰金銀花味甘總解諸毒其加大黃以治便毒者亦行厥陰汙濁之血也連翹飲子治乳癰此專行厥陰氣血凝滯之藥連翹結熱栝蔞仁滌痰緩肝川芎血皂莢刺橘葉氣青皮氣甘草節血桃仁各二錢血上作一服水煎食遠服如已破者加參耆當歸未破者加柴胡升麻一方治血脈凝注不散結成吹乳乳癰痛腫不可忍者天花粉金銀花皂角刺穿山甲當歸尾白芷梢栝蔞仁貝母去心甘草節上銼酒煎眼以凝注不散故用天花角刺山甲歸尾又方治婦人乳中結核升麻連翹青皮甘草節各二錢栝蔞仁三錢上作一服水煎食後細細呷之以乳房結核故用升麻青皮而連翹散結熱甘草栝蔞緩肝潤燥也內托升麻湯治婦人兩乳間出黑頭瘡頂陷下作黑眼並乳癰初起亦治升麻當歸身葛根連翹黃柏各二錢黃耆三錢牛蒡子甘草炙各一錢肉桂五分上作一服水一盅酒半鍾煎食後服治黑陷妙劑而黃柏之用所以濟陷也肉桂之用所以發毒也清肝解鬱湯治肝經血虛風熱或肝經鬱火傷血乳內結核或為腫潰不愈凡肝膽經血氣不和之證宜用此藥人參去蘆茯苓熟地黃芍藥炒貝母去心山梔炒各一錢白朮當歸各一錢半柴胡牡丹皮川芎陳皮各八分甘草五分上水煎服風熱即肝熱生風言熱則火在其中矣治以逍遙散加山梔四物養肝血清膽熱也治熱即治風養血即清火也人參同白朮非氣虛者不宜輕用一方乳栗破則少有生者必大補或庶幾耳此方重在破字上人參黃耆白朮當歸川芎連翹白芍甘草節上銼水煎服一方有青皮栝蔞無白朮乳岩小破加柴胡以乳栗有青皮栝蔞無白朮此方中之竅須得之小破二字亦一竅也一方治乳硬痛硬字上討好當歸甘草各三錢沒藥一錢上銼作一服水煎入酒少許熱飲金銀花散治乳脈不行結成癰腫疼痛不可忍者金銀花當歸黃耆蜜炙以乳脈不行而用黃耆宜詳之甘草各二錢半上作一服水煎入酒半鍾食後溫服丹溪方治乳腫痛青皮石膏煅連翹皂角刺炒黃藥子黃藥子解熱毒要藥而所要配諸藥又極當非丹溪論中語也當歸頭木通各一錢生甘草三分上作一帖水煎入好酒些少同煎服一方治乳癰奶勞焮腫石膏煅樺葉燒栝蔞子青皮石膏青皮是一套子而配法差別甘草節上銼水煎服一方治乳有核在核字上看南星貝母甘草節栝蔞各一兩連翹半兩上以水煎入酒服復元通氣散治婦人乳癰及一切腫毒通氣二字妙木香茴香青皮穿山甲酥陳皮白芷甘草漏蘆貝母去心薑製各等分上為細末每服三錢好酒調下治乳癰方行結氣結血其加參耆又是一法青皮栝蔞子橘葉連翹桃仁留尖皂角刺甘草節上水煎服如破多加參耆神效栝蔞散治婦人乳癰乳岩神效黃栝蔞子多者不去皮焙乾研爛當歸酒洗生甘草各五錢乳香沒藥各別研二錢半用乳沒法始此上作一劑用好酒三碗於瓷石器中慢火熬至碗半分為三次食後服如有乳岩便服此藥可杜絶病根如毒氣已成能化膿為黃水毒未成則內消疾甚者再合一服以愈為度立效散與此間服神效但於栝蔞散方減去當歸加紫色皂角刺一兩六錢是也究源五物湯治癰疽發背乳癰通用栝蔞炒一枚皂角刺半燒帶生沒藥乳香甘草各半兩上銼用淳酒三升煎取二升時時飲之痛不可忍立止栝蔞散治吹乳乳香一錢研栝蔞一個一方用根一兩上銼用酒煎服或為末溫酒服二錢外用南星末溫湯調塗橘香散治乳癰未結即散已結即潰極痛不可忍者藥下即不疼神驗因小兒吹乳變成斯疾者並皆治之陳皮去白乾麵炒黃為末一兩麝香一分上研勻酒調下二錢被蓋汗出即愈補遺方治吹乳結實腫痛陳皮二兩陳皮亦厥陰藥甘草一錢上銼水煎分兩次服用荊芥羌活獨活煎湯熏洗即散一方治乳癰夜明砂栝蔞炒阿魏上為末飯丸酒吞下此方無分兩大都以夜明砂為君以破結血也栝蔞為臣以潤結痰也阿魏為佐軟堅破滯也通和湯治婦人乳癰疼痛不可忍者穿山甲炮黃木通各一兩自然銅半兩醋淬七次自然銅其通壅滯者歟上為末每服二錢熱酒調下食遠服二灰散治産後乳汁不泄結滯不消熱毒蔓荊子燒皂角刺燒各等分上為末每服二錢溫酒調下無時夜陰散治吹乳乳癰蜘蛛三個紅棗三枚去核上每棗一枚入蜘蛛一個夾於內炒熟口嚼吃用燒酒送下未成者立消已成者立潰獨勝散治婦人吹奶初覺身熱頭疼寒熱及胸乳腫硬是其候也服之能令下乳汁通血脈立能自消白丁香真者上為末每服二錢酒調服腫硬立消甚者不過三服一方治婦人吹乳硬腫身發熱憎寒疼痛難忍不進飲食者服之良驗鹿角一兩此藥行厥陰經炭火煅存性研細分作二服先將末藥五錢入鍋次下無灰酒一碗滾數沸倒在碗內乘熱盡飲臥覆汗出即安一方用鹿角銼為細末酒調二三錢服亦效一方用鹿角於粗石上磨取白汁塗之磨者更妙干又塗勝金丹治吹乳結核不散腫痛者神效亦治乳岩百齒霜即梳齒上頭垢上用無根水丸如雞頭子大以黃丹為衣每服一丸或二丸好酒下如不飲酒白湯下不可化開亦不可令病人知極有效驗一方治乳癰及無名腫毒初起用五葉藤一名五爪龍不拘多少生薑一塊好酒一碗擂爛去渣熱服汗出為度仍以渣敷敷乳方破血破氣破痰天南星皂角刺燒帶生半夏生各三分白芷草烏直殭蠶焙各一分上為細末多用蔥白研取汁入蜜調敷若破瘡口用膏藥貼蔥與蜜反故用之蔥尉法治吹乳乳癰登時立消通陽明壅結用連根蔥一大把搗爛成餅一指厚攤乳上用瓦罐盛灰火覆蔥上須臾汗出即愈一方治吹奶金銀花天蕎麥紫葛藤各等分上以醋煎洗患處立消如無蕎麥葛藤二味只金銀花亦可一方治乳癰前敷藥宜溫熱此以清涼而氣血之分蓋有別也大黃鼠糞新者各一分黃連二分上三味搗為末以黍米粥清和敷乳四邊痛止即愈無黍米粟米粳米亦得柳根尉法治乳癰二三百日衆療不瘥但堅紫色青用柳根削取上皮搗令熟熬令溫盛著練囊中尉乳上干則易之一宿即愈雜方治吹乳乳癰用新柏葉一握洗淨以朴硝一勺同入臼內杵之旋加清水扭取自然汁半碗先以病人飲三兩口仍用雞翎蘸汁掃於患處中間留一眼四邊頻頻掃之其腫自消一方用生地黃擂汁塗之一日三五次立效一方用生山藥搗爛敷上即消消即去之遲則肉腐一方採嫩桑葉研細米飲調攤紙花貼患處一方用蒲公英搗爛敷患處神妙一方用天南星為末以溫酒調塗一方以益母草為末調塗或生搗爛用之一方治吹乳用桑樹蛀屑飯搗成膏貼之一方用遠志酒煎服滓敷患處一方用野椒桑和藥一同搗膏敷患處一方用鼠黏子加射干酒吞下一方治乳癰用人牙齒燒存性研為細末以酥調塗貼癰上一方治乳癰初發用貝母為末每服二錢溫酒調下即以兩手覆按於桌上垂乳良久自通一方用真樺皮為末酒服方寸匕睡醒已失一方用蒲公英忍冬藤酒煎服即欲睡是其效也一方單用蒲公英煮汁飲及封之立消一方治吹乳用豬牙皂角去皮弦蜜炙為末酒調服之一方用大車頭邊油垢丸如桐子大每服五十丸溫酒下一方螃蟹去足用蓋燒存性為末每服二錢黃酒下一方用黍子一合黃酒下即散一方治吹乳未成膿者用鼠糞二十一粒研為細末冷水調服立效妒乳夫妒乳者由新産後兒未能飲至乳不泄或乳脹捏其汁不盡皆令乳汁蓄結與血氣相搏即壯熱大渴引飲牢強掣痛手不得近是也初覺便知以手捏去汁更令旁人助吮引之不爾或作瘡有膿其熱勢盛必成癰也輕則為吹乳妒乳重則為癰雖有專門不可不知集驗論曰浸淫瘡亦名姑妒凡婦人女子乳頭生小淺熱瘡搔之黃汁出浸淫漸長百療不瘥動經年月名為妒乳宜以赤龍皮湯天麻湯洗之敷二物湯飛烏膏及飛烏散始作者可敷以黃芩漏蘆散黃連胡粉散並佳缺漏蘆散連翹湯治産後妒乳並癰實者下之有餘者瀉之連翹升麻元參芍藥白蘞防風射干杏仁芒硝大黃甘草各一錢上作一服水二鍾煎至一鍾食後服栝蔞散冶乳初結脹不消令敗乳自退栝蔞一個半生半炒粉草一寸半生半炙生薑一塊半生半煨上銼用酒二碗煎服少頃痛不可忍即搜去敗乳臨臥再一服順所患處乳側臥於床上令其藥行故也無生薑用麥芽一方治妒乳黃芩白蘞芍藥上為末以漿水飲服半錢匕日三若左乳汁結者即捋左乳汁捋法有見解若右乳汁結者可捋去右乳汁赤龍皮湯治妒乳槲皮三升水一斗煮五升夏冷洗秋冬溫之分以洗乳天麻湯治妒乳亦洗浸淫黃爛熱瘡癢疽濕陰蝕瘡小兒頭瘡天麻草即益母五升以水一斗半煎取一斗隨寒溫分洗乳以殺癢也洗畢敷膏散飛烏散治乳頭生瘡及諸熱浸淫丈夫陰蝕癢濕小兒頭瘡疳蝕等瘡並以此敷之維粉燒硃砂作水銀上黑煙三兩熬令焦燥枯礬三兩燒粉上二味篩為細末以甲煎和之令如脂以敷乳瘡日三有汁可乾摻黃連胡粉膏治乳瘡並諸濕癢黃爛肥瘡黃連二兩為末胡粉二兩半水銀一兩同研令消散上三味相和皮裹熟捼之自和合也縱不成一家且得水銀細散入粉中以敷乳瘡一方治妒乳生瘡蜂房豬甲中土車轍中土各等分上二味為末苦酒和敷之鹿角散治婦人乳頭生瘡汁出疼痛欲死不可忍者鹿角三分甘草一分上二味為末和以雞子黃於銅器中置溫處炙上敷之日再即愈神驗不傳雜方治妒乳乳癰燒自死蛇為灰和以豬膏塗之大良一方葵莖及子搗篩為末酒服方寸匕即愈一方雞屎干為末酒服方寸匕須臾三服愈一方馬溺塗之立愈一方取搗米槌二枚炙令熱以絮及故帛㩉乳上以槌更互尉之瘥止已用立效一方皂角十條以酒一升揉取汁硝石半兩煎成膏敷之一方蔓荊子搗爛酒服仍以滓敷患處一方用赤小豆酒研爛溫服滓封患處一方仙人掌草一握小酒糟一塊生薑一大塊同研爛入桂末少許炒酒服滓罨患處一方治乳頭裂破用丁香為末敷之一方用秋茄子裂開者陰乾燒存性水調塗之補遺方治婦人乳頭小淺瘡爛癢用芙蓉花或葉干為末摻之乳岩丹溪云婦人不得於夫不得於舅姑憂怒郁遏時日積纍脾氣消沮肝氣橫逆遂成隱核如鱉棋子不痛不癢十數年後方為瘡陷名曰乳岩以其瘡形嵌凹似巖穴也不可治矣若於始生之際便能消釋病根使心清神安然後施之治法亦有可安之理豫族侄婦年十八歲時曾得此證審其形脈稍實但性急躁伉儷自偕所難者從姑耳遂以單方青皮湯間以加減四物湯行經絡之劑兩月而安此病多因厚味濕熱之痰停蓄膈間與滯乳相搏而成又有滯乳因兒口氣吹噓而成又有拗怒氣激滯而生者煅石膏燒樺皮栝蔞子甘草節青皮皆神效藥也婦人此病若早治之便可立消有月經時悉是輕病五六十後無月經時不可作輕易看也經通肝氣能散經止則血枯矣一婦年六十厚味鬱氣而形實多妒夏無汗而性急忽左乳結一小核大如棋子不痛自覺神思不佳不知食味才半月以人參調青皮甘草末入生薑汁細細呷一日夜五六次至五七日消矣此乃妒岩之始不早治隱至五年十年以後發不痛不癢必於乳下潰一竅如巖穴出膿又或五七年十年雖飲食如故洞見五內乃死惜哉惟不得於夫者有之婦人以夫為天失於所天乃能生此此謂之岩者以其如穴之嵌岈空洞而外無所見故名曰岩患此者必經久淹延惟此婦治之早正消患於未形余者皆死凡十餘人又治一初嫁之婦只以青皮甘草與之安龔氏曰婦人乳岩始有核腫如鱉棋子大不痛不癢五七年方成瘡初便宜多服疏氣行血之藥須情思如意則可愈如成瘡之後則如巖穴之凹或如人口有唇赤汁膿水浸淫胸腹氣攻疼痛用五灰膏去蠹肉生新肉漸漸收斂此疾多生於憂鬱積忿中年婦人未破者尚可治成瘡者終不可治宜服十六味流氣飲薛氏曰乳岩乃七情所傷肝經血氣枯槁之證大抵鬱悶則脾氣阻肝氣逆遂成隱核不痛不癢人多忽之最難治療若一有此宜戒七情遠厚味解鬱結更以養血氣之藥治之庶可保全否則不治惟一婦服益氣養榮湯百餘劑血氣漸復更以木香餅灸之喜其謹疾年餘而消余不信乃服克伐行氣之劑如流氣飲敗毒散反大如覆碗自出清膿不斂而歿李氏曰有鬱怒傷肝脾結核如鱉棋子大不痛不癢五七年後外腫紫黑內漸潰爛名曰乳岩滴盡氣血方死急用十六味流氣飲及單青皮湯兼服虛者只用清脾解鬱湯或十全大補湯更加清心靜養庶可苟延歲月經年以後必於乳下潰一穴出膿及中年無夫婦人死尤速惟初起不分通何經絡急用蔥白寸許生半夏一枚搗爛為丸如芡實大以綿塞之如患左塞右鼻患右塞左鼻二宿而消有如是之神青皮散治乳岩初起如鱉棋子不痛不癢須趁早服之免致年久潰爛青皮甘草上為末用人參煎湯入生薑汁調細細呷之一日夜五六次至消乃已年少婦人只用白湯調下十六味流氣飲治乳岩當歸川芎白芍黃耆人參官桂厚朴桔梗枳殼烏藥木通檳榔白芷防風紫蘇甘草上銼一劑水煎食遠臨臥頻服外用五灰膏去其蠹肉生新肉漸漸收斂五灰膏見痔漏門乳岩之病大都生於鬱氣蓋肝主怒其性條達鬱而不舒則曲其挺然之質乳頭屬厥陰經其氣與痰時為積纍故成結核茲以風藥從其性氣藥行其滯參耆歸芍以補氣血官桂血藥以和血脈且又曰木得桂而枯乃伐木之要藥其不定分兩者以氣血有厚薄病邪有淺深又欲人權輕重也乳癰加青皮益氣養榮湯治抑鬱及勞傷血氣頸項兩乳或四肢腫硬或軟而不赤不痛日晡微熱或潰而不斂並皆治之人參白朮炒各二錢茯苓陳皮貝母香附子當歸酒拌川芎黃耆鹽水拌炒熟地黃酒拌芍藥炒桔梗甘草炒各一錢上銼一劑加生薑三片水煎食遠服此方以六君子湯去半夏加貝母合四物湯外加香附黃耆桔梗者也為調理之劑胸痞減人參熟地黃各三分口乾加五味子麥門冬往來寒熱加軟柴胡地骨皮膿清加人參黃耆膿多加川芎當歸膿不止加人參黃耆當歸肌肉遲生加白蘞官桂木香餅治一切氣滯結腫或痛或閃朒及風寒所傷作痛並效木香五錢生地黃一兩上木香為末地黃杵膏和勻量患處大小作餅置腫處以熱尉火尉之乳懸芎歸湯治産後瘀血上攻忽兩乳伸長細小如腸直過小腹痛不可忍名曰乳懸危證川芎當歸各一斤上用水煎濃湯不時溫服再用二斤逐旋燒煙安在病人面前桌子下令病人曲身低頭將口鼻及病乳常吸烟氣未甚縮再用一料則瘀血消而乳頭自復矣若更不復舊用萆麻子搗爛貼頂上片時收即洗去
