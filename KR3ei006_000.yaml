body:
  text: 附保生碎事濟陰慈幼外編憺漪子曰嘗觀列女傳曰古之婦人妊子坐立寢食視聽言動皆要循循合矩如太任之性端一誠莊惟德之行及娠文王未嘗不以胎教為重生子卒為周宗其理可不驗與今之孕婦未諾古法為夫者當以胎教之理諭之俾婦善調固其本以達其支非惟無墮失之患抑且生子形容端正才器過人矣又曰人稟陰陽之氣以生借父精母血以成其形人始胎一月如露珠二月似桃花三月男女分四月形象具五月五臟生六月六腑成七月關竅通八月遊其魂九月三轉身十月受氣足始生所以古人云有孕不在房養子痘疹稀以慎重其胎也世人可不謹歟今幼科醫書多種自有專門餘集只録墮地時至七日內之事採其最要者簡而當詳而明有先後原委切要著明其良法實實可防患於未然耳朽淇年已逾甲志在守庚杜卻家緣養疴山寺向梓證道並地理碎事諸刻以求政四方此亦不過幼吾幼之婆心焉耳保嬰經驗方夢生方初生不能發聲謂之夢生切不可斷臍以綿衣包兒用大油紙捻燒臍待氣回方可斷也將胞衣連帶用火炙令暖氣入兒腹取一貓用青布裹頭目令一伶俐女人拿住貓頭向兒耳旁以口咬破貓耳貓大叫一聲兒即醒矣初生無啼是肛門為脂皮所塞用簪通開外臺祕要云兒生不啼由産難少氣也取臍帶向身卻捋之令氣入腹仍呵至百度自啼矣又以蔥白徐徐鞭之亦妙菖蒲搗生汁入口即活生兒啼聲不出及聲不轉者舌下有膜如石榴子或口中上齶有泡速以指爪摘斷之用葦刀於割之亦可微有血出即活若血多者燒斷髮同豬脂塗之小兒因産難産下不哭微有氣者以本父母真氣度之即活拭口法嬰兒在胎口有熱物蓋胎毒也生下啼聲未出急用軟帛或綿裹指拭盡貴在神速遲則咽下伏之於心遇天行時氣久熱不除乃乘於心心主血脈得熱而散流溢於胃胃主肌肉發出於外成瘡疹之毒世之小兒無可免者不知病源在此若依此法庶可免矣産家要訣云豫見有挖出血餅切開色成五彩舉家大喜謂必無痘患矣而竟以患痘死者且口血雖咽必入腸胃大便一通其血亦去豈有徑投極下之處伏於棗大有腎之中藏蓄不動久而後發者哉太醫院支改齋先生辨之甚悉謂痘之所主皆屬心火斯言足破千古疑案及思古方用黃連甘草抹兒口以解胎毒者豈非瀉心之藥也乎甘草法凡妊娠臨月預辦好甘草指許一節拍碎以水二蜆殼煎一蜆殼以綿裹蘸令兒吮之若吐出惡物為佳服一蜆殼不吐即不須服不問小兒虛實皆可服之黃連法臨産時先以黃連五錢甘草二錢五分熬濃汁生下即與二三匙再加硃砂細末調汁抹兒口中打盡腹中舊屎次用朱蜜朱蜜法葛氏肘後方云先用甘草黃連拭口吐其惡汁稍定更與朱蜜安神定魄用好硃砂一大豆許細研水飛過煉蜜一蜆殼許和硃砂成膏旋抹口中非獨鎮心定神亦解惡毒若面色青白啼聲不響即不須服斷臍法産家要訣云兒出胎洗後方斷臍帶則不傷水生病斷臍須捋汁令盡否則寒濕入腹或作臍風又須於近臍四五寸處以線緊扎以帛包裹以口咬斷蓋扎緊則兒血不貫於胞衣自然痿縮弗脹而易下即或延緩數日亦無大害口咬則斷臍不犯乎刀剪自無冷氣內侵可免腹中吊痛之虞如或天時寒沍坐草艱難母子勞傷元氣者先扎臍帶以油紙捻點火燒斷令暖氣入兒腹中此又為回生起死之妙法近用蘄艾灸臍亦妙所留臍帶不可太長太長則難乾而傷肌且恐引外風為臍風亦不可太短太短則逼內而傷臟或致成腹痛而夜啼只以兒之足掌長短為度乃酌中之法千金論云須令至兒足趺上為度造道集云兒始生宜淨洗則燥血不留於摺路之間可令皮膚光澤然後剪臍臍乃初生之蒂也剪之宜長一尺有二用粗線縛緊剪不長多生臍風縛不緊陰間虛腫繆仲淳廣筆記云兒初生不可剪臍帶三朝用面和水成薄餅置兒腹穿臍帶於面上將蘄艾火灸臍帶近臍處或三炷或五七炷須下帳避風灸畢仍將臍帶扎好聽其自脫至七日方脫者元氣足也凡兒生下每日夜將清湯或苦茶蘸軟絹攪兒口內如齒邊有白點即以指爪或細針挑破取桑樹內汁濾清塗之永無驚風撮口之患裹臍法千金論云裹臍須令白練揉軟方四寸新綿厚半寸與帛等合之緩急得中急則令兒吐哯不可輕解解時閉戶下帳冬間用火令帳內溫暖仍以溫粉敷之若臍不幹燒絳帛敷之枯礬五錢龍骨一錢黃丹一錢麝香少許為末敷之亂髮燒灰敷之亦可或云黃柏末敷妙臍風方張渙論云嬰兒斷臍後宜用厚帛裹護若乳母不慎或因浴水入或兒尿繃中未換濕氣所侵或當風解視七日內遂有此疾令兒臍腫多啼不能乳哺即成臍風也臍腫當隨輕重重者灸二三十次輕者但汁出多啼用當歸末和胡粉敷之常用熱絮尉之初生七日內面赤喘急啼聲不出名曰嘬口臍風齒齦上有小泡如粟米狀急以溫水蘸青軟帛或綿裹指輕輕擦破即開口不須服藥白殭蠶直者四枚炒去絲嘴為末蜜調敷唇內即愈繆仲淳云嘬口之症必先大便熱須用生犀角及真羚羊角磨和蜜汁飲之有效急則用大黃二錢甘草二錢煎服口噤方蔥白一寸破四片乳汁蒸灌之浴兒方北方生子多不洗浴初生下但以舊綿拭淨直至三四歲出痘後方浴或大小便處略以水揩抹之故北方人較南方壯實不徒風氣然也若畢竟欲浴取益母草五兩銼細煎滾溫溫浴之不生瘡疥又可祛寒氣風濕産家要訣云兒初出胎浴洗湯內宜入食鹽少許洗畢拭乾以膩粉一錢許研細摩其遍身及兩脅然後繃裹既不畏風又散諸氣今北方三朝方洗將繃裹之兒又復解開多致感冒驚風蓋洗三雖云古禮而防患貴在變通只依前法出胎便洗自是穩當保生要方云小兒初生候浴水不得且以綿絮包裹大人懷中暖之浴後仍當如此雖暑月綿絮亦宜漸漸去之乍離母腹未可冒寒氣也預煎沸湯以甑貯之臨時熱洗不犯生水則兒不生瘡乳兒方保生要法云小兒初生若多睡勿強與乳自然長而少病顱囟經云夏中盛熱時乳母浴後便與兒乳使兒成胃毒赤白痢定息良久熟揉乳之可也千金論云乳兒不可過飽滿而溢則成嘔吐大飽以空乳吮之即消若乳來猛取出再乳凡初乳時須常捏去宿乳夏不去熱乳令兒嘔逆冬不去冷乳令兒咳痢母與兒臥以臂枕之令乳與頭平則兒不噎母欲寐即奪其乳恐睡熟則不如飽足而成嘔吐也小兒精要云夜間乳兒須乳母起坐抱兒乳之母有娠乳兒必患胎黃母大醉乳兒必患驚熱母傷飽乳兒必患喘急母新房乳兒必患羸瘦母大怒乳兒必患癲狂母新吐乳兒必患虛羸瑣碎録云兒睡忌乳母鼻風吹囟門成風疾哺兒方葛氏肘後方云兒生三日應開腹助穀神壯胃氣用粟米煮熟研如乳汁與兒大豆許慎不可與雜藥乳者奶也哺者食也乳後不得與食哺後不得與乳乳食相併難以克化大則成癖小則成積疳氣自此始矣或云小兒無傷乳法即乳滿而溢亦不為害惟與食相併則乳裹食不化遂結成痰癖是傷食非傷乳也故小兒以乳為主三歲後方可食糕粥五歲外方可食葷腥則一生永無脾胃之疾而孫真人葛氏巢氏聖濟經皆云三日即當用哺以助穀神導腸胃是在為母者細審兒之虛實而調劑之護兒方巢氏病源云小兒始生肌膚未實宜單衣不宜暖衣暖則筋骨緩弱易發瘡瘍宜舊絮不宜新綿新則汗出表虛易受寒邪宜見地氣尤宜見風日不見地氣風日則肌膚柔軟易得損傷嘗見富貴之家重裀疊被日在懷抱中雖數歲亦未能行而田舍小兒終日暴露或飢或寒絶無他病譬如草木生於深山峻谷及大澤中容易合抱至園圃奇材異卉縱加培壅多有秀而不實者豈貴賤之理有異哉小兒精要云初生小兒不得用油膩手繃裹春忌覆頂裹足夏忌飲冷食冰冬忌火炙衣被要得小兒安常受飢與寒真至言也又云小兒腸胃脆窄若稠黏乾硬酸鹹辛辣一切魚肉水果濕面燒炙煨炒煎煿俱是發熱難化之物皆宜禁絶婦人無知畏其啼哭無所不與積成痼疾雖悔何及語云惜兒須惜食記之記之養子真訣云吃熱莫吃冷吃軟莫吃硬吃少莫吃多真妙法也又云乳子須調護看承莫縱馳乳多終損胃食舊即傷脾衾厚非為益衣單政所宜無風頻見日寒暑順天時夜啼方雞糞塗兒臍中極佳男雌女雄初生夜啼用燈花燒灰塗乳或用燈花四五丸捻爛以燈心湯化下即安牛甲為末調敷臍上即安黃連一錢五分薑汁炙人參一錢五分甘草五分竹葉二十片作二劑每劑加薑一片水煎服兒月內啼者用真牛黃飛辰砂極細末各五釐塗兒舌上立止稀痘方臍帶乾落安淨瓦上四圍以炭炙之止令煙盡勿使成灰取起以碗覆地上良久出炙毒研極細每一分加辰砂半分共研次日以乳汁調敷乳上令兒食乳隨一日內作二三次服盡永不生瘡疹即生亦小或云兒生一十三日服之未知何説産家要訣云豫嘗得方士祕傳出胎稀痘小金丹一方不惟鎮心解毒痘瘡必稀更能助胃辟邪斷除百病豫曾制而試驗矣方用箭頭砂一兩五錢敲如緑豆粒大以黃連甘草各一兩河水五碗於新砂鍋內文武火同煮一日水於則旋添之煮訖研末更煮甘草湯飛去黑腳止取隨水過者一兩牛黃三錢此藥市賣多假須看層相裹輕鬆而有香氣者乃真川大黃錦紋者切大片以粗紙厚裹於高黃酒內泡濕略捻成團埋灰火中煨乾又泡又煨如此七次取出以紙攤淨地上一宿出火氣研末三錢燈心白色者以水和漿粉揉濕曬乾或焙乾急研為極細末入水再研加水漂取浮者曬乾用二錢粉草去皮研末二錢上五味共研勻煉蜜和劑分作三十丸乘濕以金箔為衣黃蠟為匱毋令泄氣可以久收丸嬰兒出胎未曾吃乳之先用江西淡豆豉以河水熬取濃汁少許用前丸一粒指研如稀糊盛以小杯坐於湯碗中不時抹兒口內既吃乳後即抹乳上亦可只用一丸胎毒盡從大小便消釋而去真聖藥也但苦牛黃難得真耳此而不真雖用弗效矣又方云小兒能吃食取冷窯糞水以頭窠雞子每日投一個在內七日投完第八日取第一個起來洗淨煮熟與小兒吃依次吃完不特稀痘竟可不出矣
