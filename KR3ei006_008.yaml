body:
  text: 卷之八胎前門上論胎屬十二經所養虞氏曰脈經云診其脈手少陰之脈動甚者手少陰動脈診在神門於左右手掌後內側橫紋下與關相對者是妊子也蓋手少陰心脈也心主血脈故也又腎為胞門子戶尺中腎脈尺脈更真按之不絶當妊子也又曰婦人妊娠一月之時足厥陰脈養之二月足少陽脈養之三月手少陰脈養之四月手少陽脈養之五月足太陰脈養之六月足陽明脈養之七月手太陰脈養之八月手陽明脈養之九月足少陰脈養之十月足太陽脈養之是以諸經脈各養三十日也若夫至期當養之經虛實不調則胎孕為之不安甚則下血而墮矣夫手足十二經氣血盈虧不同如手足厥陰太陽少氣多血手足太陰少陰少血多氣手足少陽氣多血少手足陽明氣盛血多安胎之法宜各按月依經視其氣血虛實而調之庶無胎墮之患其或感冒風寒別生異證又宜各按法而調治之如此治皆得法論治胎産三禁潔古云治胎産之病從厥陰經論之是祖氣生化之源也厥陰肝木乃風化之始故曰化之源而祖氣乃天真之氣非穀氣也東方生風風生蟲人亦倮蟲也故從厥陰風木論之厥陰與少陽相為表裡故治法無犯胃氣及上二焦有三禁不可汗不可下不可利小便發汗則傷上焦之陽利大便則脈數而動脾利小便則內亡津液胃中枯燥製藥之法能不犯此三禁則榮衛自和而寒熱止矣如發渴則白虎氣弱則黃耆血刺痛而和以當歸腹中疼而加之芍藥大抵産病天行從增損柴胡雜證從增損四物宜詳察脈證而用之論胎前調理法集略云母之腎臟繫於胎是母之真氣子之所賴也受妊之後宜令鎮靜則血氣安和須內遠七情外薄五味大冷大熱之物皆在所禁使霧露風邪不得投間而入亦不得交合陰陽觸動欲火務謹節飲食若食兔缺唇食犬無聲食雜魚而致瘡癬心氣大驚而癲疾腎氣下足而解顱脾氣不和而羸瘦心氣虛乏而神不足兒從母氣不可不慎也心藏神腎主骨脾主肉故云然苟無胎痛胎動瀉痢及風寒外邪不可輕易服藥胎前藥最忌群隊故不必多不得已在審度疾勢輕重藥性高下不必多品然父少母老産女必羸母壯父衰生男必弱出遺書乃至言也氣受偏瘁與之補之補羸女則養血壯脾補弱男則壯脾節色羸女宜及時而嫁弱男及待壯而婚昔人論年老有子者男不過八八女不過七七則知血氣在人固自有量夫豈逃陰陽之至數哉知七損八益之理者能道此論胎前用藥法丹溪曰胎前當清熱養血氣實者宜清熱養血氣滯者宜理氣安胎氣虛者宜補産婦因火逼動胎逆上作喘急者急用條芩香附之類為末調下條芩水中取沉者為佳黃芩安胎乃上中二焦藥能降火下行天行不息所以生生而無窮茺蔚子治血行氣有補陰之妙命名益母以其行中有補也故曰胎前無滯産後無虛難産可煎作膏條芩白朮乃安胎之聖藥俗以黃芩為寒而不用反謂溫熱藥能養胎殊不知胎孕宜清熱養血使血循經而不妄行乃能養胎懷娠嗜物乃一臟之虛如愛酸物乃肝臟不能養胎而虛也有孕八九個月必用順氣須用枳殼紫蘇梗孕婦食忌雞肉合糯米食令子生寸白蟲食犬肉令子無聲鯉魚同雞子食令子生疳多瘡食兔肉令子缺唇食羊肝令子多厄食鱉肉令子項短縮頸雞子與桑堪同食令子倒生心寒鮮魚同田雞食令子喑啞雀肉同豆醬食令子面生䵟𪒟黑子食螃蟹令子橫生食生薑令子多指食冰漿令絶産食雀肉飲酒令子多淫無恥食慈菰消胎氣食驢馬肉過月難産豆醬合藿香食之墮胎食山羊肉令子多病食鰍無鱗魚難産食諸般菌生子驚風而夭食雀腦令子患雀目孕婦藥忌歌曰蚖斑水蛭及虻蟲烏頭附子配天雄野葛水銀並巴豆牛膝薏苡與蜈蚣三稜代赭芫花麝大戟蛇脫黃雌雄牙硝芒硝丹皮桂槐花牽牛皂角同半夏南星與通草瞿麥乾薑桃仁通硇砂乾漆蟹腳爪地膽茅根莫用好此藥外或有未盡者可以類推孕婦起居忌便産須知云勿亂服藥勿過飲酒勿妄針灸弗向非常地便勿舉重登高涉險心有大驚犯之産難子必癲癇勿多睡臥時時行步勿勞力過傷使腎氣不足生子解顱腦破下合衣毋太溫食毋太飽若脾胃不和榮衛虛怯子必羸瘦多病自家及鄰家修造動土犯其胎氣令子破形殞命刀犯者形必傷泥犯者竅必塞打擊者色青黯緊縛者相拘攣有此等驗如影響切宜避之候胎法脈經曰婦人懷軀七月而不可知時時衄血而轉筋者此為軀也衄時嚏而動者非軀也素問曰婦人足少陰脈動甚者妊子也陰搏陽別謂之有子王注云陰謂尺中也搏謂搏觸於手也此脈搏擊與寸脈殊別則謂有孕之兆素問以足少陰脈動甚為有妊脈經以手少陰脈動甚為有妊豈心腎同一診耶此只言素問蓋亦有見脈經曰妊脈初時寸微小呼吸五至三月而尺數也脈滑疾重以手按之散者胎已三月也脈重手按之不散但疾不滑者五月也尺脈左偏大為男右偏大為女左右俱大産二子大者如實狀實字妙婦人妊娠四月欲知男女法左疾為男右疾為女俱疾為二子王子亨云妊娠三部俱滑而疾在左為男在右為女診在尺脈的是至論然於王子亨云說亦為稟厚者言遣妊娠人面南行還復呼之左回首者是男右回首者是女看上圊時夫從後急呼之左回首者是男右回首者是女也樓全善云按丹溪云男受胎在左子宮女受胎在右子宮新言大契是說也蓋男受胎在左則左重故回首時慎護重處而就左也女胎在右則右重故回首慎護重處而就右也推之於脈其義亦然胎在左則血氣護胎而盛於左故脈亦從之而左疾為男左大為男也胎在右則血氣護胎而盛於右故脈亦從之而右疾為女右大為女也亦猶經云陰搏陽別謂之有子言受胎處在臍腹之下則血氣護胎而盛於下故陰之尺脈鼓搏有力而與陽之寸脈殊別也又如癰節發上則血氣從上而寸脈盛發下則血氣從下而尺脈盛發左則血氣從左而左脈盛發右則血氣從右脈盛也丹溪以左大順男右大順女為醫人之左右手蓋智者之一失也丹溪以此診男女之病原不診産婦須知之診婦人有妊歌肝藏血兮肺主氣血為榮兮氣為衛陰陽配偶不參差兩臟通和皆類例血衰氣旺定無娠血旺氣衰應有體寸微關滑尺帶數流利往來並雀啄小兒之脈已見形數月懷耽猶未覺左疾為男右為女流利相通速來去兩手關脈大相應已形亦在前通語左手帶縱兩個男右手帶橫一雙女左手脈逆生三男右手脈順生三女寸關尺部皆相應一男一女分形證有時子死母身存或即母亡存子命往來三部通流利滑數相參皆替替陽實陰虛脈得明遍滿胸膛皆逆氣左手太陽浮大男右手太陰沉細女諸陽為男諸陰女指下分明長取記三部沉正等無疑尺內不止真胎婦夫乘妻兮縱氣霧妻乘夫兮橫氣助子乘母兮逆氣參母乘子兮順氣護小兒日足胎成聚身熱脈亂無所苦汗出不食吐逆時精神結備其中住滑疾不散胎三月但疾不散五月母弦緊牢強滑者安沉細而微歸泉路驗胎神方驗胎散婦人兩三個月月經不行疑是兩身卻疑血滯心煩寒熱恍惚此藥可驗真雀腦芎一兩當歸全用重一兩者只用七錢上二味為細末分作二服濃煎好艾湯一盞調下或好酒調服亦得可待三兩個時辰間覺臍腹微動仍頻即有胎也動能即愈安穩無虞如不是胎即不動所滯惡物自行母亦安也如服藥下覺效再煎紅花湯調下必有神效驗胎方經脈不行已經三月者用川芎為細末濃煎艾葉湯空心調下二錢覺腹內微動則有胎也否則是經滯艾醋湯如過月難明有無或月數未足難明用好醋炆艾服半盞後腹中翻大痛是有孕不為痛定無探胎散婦人胎氣有無疑似之間以此探之有胎則吐無則不吐皂角去皮皂角探胎未有不吐但恐胃弱之婦即無胎亦不免於吐耳甘草炙各一錢黃連五分上為細末作一服溫酒調服逐月養胎法北齊名醫徐之才云妊娠一月名胎胚飲食精熟酸羹受御宜食大麥毋食腥辛是謂才正妊娠一月足厥陰脈養不可針灸其經如大敦行間太衝中封五里中郤等穴是也足厥陰內屬於肝肝主筋及血一月之時血行痞澀不為力事寢必安靜無令恐畏妊娠二月名始膏無食辛臊居必靜處男子勿勞百節皆痛是為胎始結妊娠二月足少陽脈養不可針灸其經如膽竅血墟陽輔絶骨外丘陽陵泉等穴是也足少陽內屬於膽膽主精二月之時兒精成於胞里當慎護勿驚動也妊娠三月名始胎當此之時未有定儀見物而化欲生男者操弓矢欲生女者弄珠璣欲子美好數視璧玉欲子賢良端坐清虛是謂外角而內感者也妊娠三月手心主脈養不可針灸其經如中衝勞宮大陵內關間使郤門曲澤等穴是也手心主內屬於心毋悲哀思慮驚動妊娠四月始受水精以成血脈食宜稻粳羹宜魚雁是謂盛血氣以通耳目而行經絡妊娠四月手少陽脈養不可針灸其經如關衝陽池內關三陽天井曲垣等穴是也手少陽內輸三焦四月之時兒六腑順成當靜形體和心志節飲食妊娠五月始受火精以成其氣臥必晏起沐浴浣衣深其居處厚其衣服朝吸天光以避寒殃其食稻麥其羹牛羊和以茱萸調以五味是謂養氣以定五臟妊娠五月足太陰脈養不可針灸其經隱白大都公孫商丘三陰交漏谷陰陵泉等穴是也足太陰內輸於脾五月之時兒四肢皆成毋太飢毋甚飽毋食乾燥毋自炙熱毋太勞倦妊娠六月始受金精以成其筋身欲微勞無得靜處出遊於野數觀走犬及視走馬食宜鷙鳥猛獸之肉是謂變腠理紉筋以養其力以堅背膂妊娠六月足陽明脈養不可針灸其經如厲兌豐隆陰市上下廉三里等穴是也足陽明內屬於胃主其口目六月之時兒口目皆成調五味食甘美毋太飽妊娠七月始受木精以成其骨勞身搖肢無使定止動作屈伸以運血氣居處必燥飲食避寒常食稻粳以密腠理是謂養骨而堅齒妊娠七月手太陰脈養不可針灸其經如少商魚際列缺尺澤天府等穴是也手太陰內屬於肺主皮毛七月之時兒皮毛已成無大言無號哭無薄衣無洗浴無寒飲妊娠八月始生土精以成膚革和心靜息無使氣極是調密腠理而光澤顏色妊娠八月手陽明脈養不可針灸其經如商陽二間合谷上下廉三里曲池肩井肩髃等穴是也手陽明內屬於大腸主九竅八月之時兒九竅皆成無食燥物無輒失食無忍大起妊娠九月始受石精以成皮毛六腑百節莫不畢備飲醴食甘緩帶自持而待之是謂養毛髮致才力妊娠九月足少陰脈養不可針灸其經如湧泉然谷太溪交信築賓伏溜等穴是也足少陰內屬於腎腎主續縷九月之時兒脈續縷皆成無處濕冷無著炙衣妊娠十月五臟俱備六腑齊通納天地氣于丹田故使關節人神皆備但俟時而生妊娠一月始胚二月始膏三月始胞四月形體成五月能動六月筋骨立七月毛髮生八月臟腑具九月穀氣入胃十月諸神備即産矣宜服滑胎藥八月即服烏雌雞湯妊娠一月陰陽新合為胎寒多為痛熱多卒驚舉重腰痛腹滿胞急卒有所下當預安之宜服此烏雌雞一隻治如食法茯苓阿膠各二兩吳茱萸一升人參麥門冬五合去心白朮芍藥各三兩甘草生薑各一兩上㕮咀以水一斗二升煮雞汁取六升去雞下藥煎取三升納酒三升並膠煬盡取三升每服一升日三補胎湯若曾傷一月胎者當預服此胎始一月生氣方濃傷之則薄矣故用溫升之藥以助之然于丹溪清熱養血之語須活看細辛一兩防風一兩乾地黃白朮生薑四兩吳茱萸大麥各五合烏梅一升上㕮咀以水七升煮取二升半分三服先食服寒多者倍細辛茱萸熱多渴者去之加栝蔞根二兩若有所思加柏子人參一方有人參一兩艾葉湯妊娠二月陰陽踞經有寒多壞不成有熱即萎悴中風寒有所動搖心滿臍下懸急腰背強痛卒有所下乍寒乍熱宜服此艾葉丹參當歸麻黃各二兩麻黃之用非果有風寒者不可即果有風寒體虛者亦不可宜酌之人參阿膠各三兩甘草一兩生薑六兩大棗十二枚上㕮咀以酒三升水一斗煮減半去滓納膠煎取三升分三服一方用烏雌雞一隻煮汁並頭血煎藥黃連湯若曾傷二月胎者當預服此黃連人參各一兩吳茱萸五合生薑三兩生地黃五兩生地為君黃連為臣似太寒矣而又佐以薑茱豈非中和之劑乎至於酢漿煮法並晝夜服法俱佳一方用阿膠一方用當歸半兩上㕮咀以酢漿七升煮取三升分四服日三夜一十日一修合若頗覺不安加烏梅一升水煎不用漿雄雞湯妊娠三月為定形有寒大便青有熱小便難不赤即黃卒驚恐憂愁嗔怒喜頓僕動於經脈腹滿繞臍苦痛或腰背卒有所下宜服此雄雞一隻治如食法黃芩白朮生薑各一兩麥門冬五合芍藥人參茯苓甘草阿膠各二兩大棗十二枚劈上銼咀以水一斗三升煮雞減半出雞納藥煮取半納清酒三升並膠煎取三升分三服一日令盡一方用當歸川芎各二兩不用黃芩生薑茯神湯若曾傷三月胎者當預服此茯神丹參龍骨各一兩人參當歸阿膠甘草各一兩大棗二十一枚劈赤小豆二十粒上㕮咀以酢漿一斗煮取三升分四服先食服七日後服一劑腰痛者加桑寄生二兩深師有薤白二兩麻子一升菊花湯妊娠四月有寒心下慍慍欲嘔胸膈滿不欲食有熱小便難數數如淋臍下苦急卒風寒頸項強痛寒熱或驚動身軀腰背腹痛往來有時胎上迫胸心煩不得安卒有所下宜服此菊花雞子大一枚麥門冬一升人參一兩半甘草當歸各二兩麻黃阿膠各二兩半夏四兩生薑五兩大棗十二枚上㕮咀以水八升煮減半納清酒三升並阿膠煎取三升分三服溫臥當汗以粉粉之護風寒四五日一方用烏雌雞一隻煮汁煎藥有寒有熱卒風寒或驚動是四癥矣而以一方治之何耶總之有人參麥門歸甘等藥以植其本則雖有雜症之來余藥自能制之調中湯若曾傷四月胎者當預服此白朮枳實李根白皮厚朴柴胡各三兩白芍藥生薑各四兩當歸一兩半川芎續斷甘草各一兩烏梅一升上㕮咀以水一斗煮取三升分四服日三夜一八日後復服一劑阿膠湯妊娠五月有熱苦頭眩心亂嘔吐有寒苦腹滿痛小便數卒有恐怖四肢疼痛寒熱胎動無常處腹痛悶頓欲僕卒有所下宜服此阿膠四兩人參一兩當歸芍藥甘草黃芩各二兩麥門冬一升吳茱萸七合旋覆花二合生薑六兩上㕮咀以水九升煮藥減半納清酒三升並膠微火煎取三升半分四服日三夜一先食服便愈不瘥再服一方用烏雌雞一隻割取咽血納酒中以水煮雞汁煎減半納酒並膠煎取三升半分四服安中湯若曾傷五月胎者當預服此黃芩一兩當歸川芎乾地黃人參各二兩甘草芍藥各三兩麥門冬五味子大麻仁各五合生薑六兩大棗三十五枚上㕮咀以水七升清酒五升煮取三升半分四服日三夜一七日復服一劑麥門冬湯妊娠六月卒有所動不安寒熱往來腹內脹滿身體腫驚怖忽有所下腹痛如欲産手足煩疼宜服此此方似與驚怖卒有所下以下諸症相宜若腹滿體腫自有正方麥門冬一升人參甘草黃芩各二兩乾地黃三兩阿膠四兩生薑六兩大棗十五枚上以水七升煮減半納清酒二升半膠煎取三升分三服中間進糜粥一方用烏雌雞一隻煮汁煎藥柴胡湯若曾傷六月胎者當預服此柴胡四兩乾地黃五兩白朮芍藥一作紫葳川芎麥門冬甘草各二兩蓯蓉一兩生薑六兩大棗三十枚一方有黃芩二兩上以水一斗煮取三升分四服日三夜一中間進糜粥勿食生冷及堅硬之物七日更服一劑蔥白湯妊娠七月忽驚恐搖動腹痛卒有所下手足厥冷脈若傷寒煩熱腹滿氣短常苦頸項及腰背強蔥白三四寸長十四莖黃耆當歸甘草各三兩人參一兩半黃芩一兩阿膠四兩麥門冬半夏各一升生薑八兩此方妙在生薑八兩然非真若傷寒煩熱氣血兩虛者不可輕用旋覆花二合上㕮咀以水二升煮減半納清酒三升及膠煎取四升每服一升日三夜一溫臥當汗出若不出者加麻黃二兩煮服如前法若秋後勿強責汗一方以黃雌雞一隻割咽取血納酒中煮雞取汁以煎藥杏仁湯若曾傷七月胎者當預服此杏仁甘草各二兩紫菀一兩鍾乳乾薑各二兩麥門冬吳茱萸各一升五味子三合粳米五合病在肺肺之用主布散以下諸藥皆補肺而溫散酸收者也甘草粳米又補土生金之藥上㕮咀以水八升煮取三升半分四服日三夜一中間進食七日服一劑一方用白雞一隻煮汁煎藥芍藥湯妊娠八月中風寒有所犯觸身體盡痛乍寒乍熱胎動不安常苦頭眩痛繞臍下寒時時小便白如米汁或青或黃或時寒栗腰背苦冷而痛目䀮䀮補土生金散寒除痛芍藥生薑各四兩人參白朮當歸甘草各三兩厚朴二兩薤白切一升上㕮咀以水五升清酒四升合煮取三升分三服日二夜一一方用烏雌雞煮汁以煎前藥葵子湯若曾傷八月胎者當預服此八月用葵子當思之葵子二升芍藥四兩白朮柴胡各三兩厚朴甘草各二兩生薑六兩大棗二十枚上㕮咀以水九升煮取三升分三服日三凡十日一劑一方用烏雌雞一隻煮汁煎藥半夏湯妊娠九月若卒得下痢腹滿懸急胎上衝心腰背痛不可轉側短氣宜服此九月獨言痢且曰四服即止必有所見然藥品燥熱用宜斟酌半夏麥門冬吳茱萸當歸阿膠各三兩乾薑一兩大棗十二枚上㕮咀以水九升煮取三升去滓納白蜜八合微火上溫服四服痢即止一方雌烏雞一隻煮汁煎藥豬腎湯若曾傷九月胎者當預服此豬腎一具白朮四兩茯苓桑寄生乾薑乾地黃川芎各三兩附子中者一枚附子安胎亦是奇局苟非氣弱胎寒者不可輕試大豆三合麥門冬一升上㕮咀以水一斗煮腎令熟去腎納諸藥煎取三升半分四服日三夜一十日更一劑惡阻惡阻謂嘔吐噁心頭眩惡食擇食是也千金方云凡婦人虛羸血氣不足腎氣又弱或當風飲冷太過心下有痰水者欲有胎而喜病阻所謂欲有胎者其人月水尚來顏色肌膚如常但苦沉重憒悶不欲飲食又不知其患所在脈理順時平和則是欲有娠也如此經二月日後便覺不通則結胎也阻病者患心中憒憒頭重眼眩四肢沉重懈惰不欲執作惡聞食氣欲啖鹹酸果實多臥少起世謂惡食惡阻俗謂病兒然亦間有不病者又不拘於強弱此何以故即俗所謂胎氣好其至三四月日以上皆大劇吐逆不能自勝舉也此由經血既閉水潰於臟臟氣不宣通故心煩憒悶氣逆而嘔吐也血脈不通經絡痞澀則四肢沉重挾風則頭目眩也覺如此候者便宜服半夏茯苓湯數劑後將茯苓丸痰水消除便欲食也既得食力體強氣壯力足養胎母便健矣大全云妊娠稟受怯弱便有阻病其狀顏色如故脈息和順但覺肢體沉重頭目昏眩擇食惡聞食氣好食鹹酸甚者或作寒熱惡阻亦有寒熱不可不知心中憒悶嘔吐痰水恍惚不能支持巢氏謂之惡阻但證有輕重耳輕者不服藥亦不妨重者須以藥聞之千金方以半夏茯苓湯茯苓丸專治阻病然此二藥比來少有服者以半夏有動胎之性蓋胎初結慮其易散不可不謹也張仲景傷寒論有用黃龍湯者小柴胡湯中去半夏是也此蓋為妊娠而設焉王子亨則有白朮散局方則有人參丁香散楊振則有人參橘皮湯齊士明則有醒脾飲醒脾二字足以盡之也皆不用半夏用之多效李茂翁云若左脈弱而嘔服諸藥不止者當服理血歸原藥則愈經云無陰則嘔是也薛氏云前證若中脘停痰用二陳藥加枳殼若飲食停滯用六君子加枳殼若脾胃虛弱用異功散若胃氣不足用人參橘皮湯兼氣惱加枳殼胸脅痞悶更加蘇梗脅痛再加柴胡若飲食少思用六君子加紫蘇枳殼頭暈體倦用六君子湯若脾胃虛弱嘔吐不食用半夏茯苓湯蓋半夏乃健脾氣化痰滯之主藥也脾胃虛弱而嘔吐或痰涎壅滯飲食少思胎不安必用半夏茯苓湯倍加白朮然半夏白朮茯苓陳皮砂仁善能安胎氣健脾胃豫常用之驗半夏茯苓湯治妊娠惡阻嘔吐心煩頭目眩暈惡聞食氣好食酸鹹多臥少起百節煩疼羸瘦有痰胎孕不牢半夏湯洗七次薑汁炒黃白朮陳皮各一錢熟地黃胸滿者去之旋覆花無痰涎不用桔梗人參芍藥川芎甘草各五分上㕮咀加生薑三片水煎空心服兼服後茯苓丸千金方無旋覆花有紫蘇葉細辛有熱加黃芩有客熱煩渴口瘡去橘皮細辛加前胡知母各七分半若腹冷下利去地黃加炒桂心五分有熱是內熱有客熱是邪熱桂心炒用即不墮胎然非真腹冷不利者不宜若胃中虛熱大便祕小便赤澀去地黃加大黃七分半黃芩一錢加大黃又是一案陳皮半夏湯治懷妊氣血不足胎氣始盛逆動胃氣惡阻嘔吐不進飲食陳皮去白鹽水炒茯苓各一錢半夏制一錢半子芩淡薑汁炒枳殼麩炒紫蘇各八分甘草炙五分上切一劑生薑三片水一盅煎七分食遠溫服旋覆花湯療妊娠六七月間胎不安常處亦治阻病補脾利氣行痰水旋覆花五分白朮厚朴枳殼黃芩茯苓各一錢五分半夏芍藥生薑各一錢上㕮咀作一服水煎食前溫服縮砂二陳湯治妊娠脾胃虛弱飲食不化嘔吐不止此方有辛散酸收之妙半夏陳皮去白砂仁炒各一錢白茯苓二錢甘草炙五分上加生薑三片棗一枚烏梅肉少許水煎服一二劑後服茯苓丸參橘散治妊娠惡阻吐逆痰水不食心虛煩悶重在心虛煩悶故用麥門竹茹人參橘皮去白茯苓麥門冬去心白朮厚朴薑汁炒各一錢甘草炙五分上作一服加生薑七片竹茹如彈子大水煎服青竹茹湯妊娠惡阻嘔吐不食此方清而不寒自是一法竹茹彈子大一團橘皮白茯苓各一錢半半夏湯泡七次生薑各二錢上銼水煎溫服忌羊肉餳鮓等物蘆根湯治妊娠嘔吐不食兼吐痰水清肺胃降逆氣散滯氣而不用半夏又是一法生蘆根七分橘紅四分生薑六分檳榔二分枇杷葉三分上切以水二盞煎七分空心熱服一方治妊娠惡食心中煩憒熱悶嘔吐青竹茹麥門冬各三兩前胡二兩橘皮一兩蘆根一兩如體熱四肢煩熱加地骨皮一兩上切細以水一大升煮半升去渣分兩服食前服人參半夏丸治妊娠惡阻酸心胸腹冷痛吐逆不食人參半夏湯泡七次乾生薑各半兩上為末以生地黃汁浸蒸餅為丸生地汁浸蒸餅法不特製半夏之燥而又不傷血分妙妙如桐子大每服四十丸米飲下樓氏曰大全方論半夏動胎而不用今仲景豈獨不知此而用於此方乎豫治妊娠阻病纍用半夏未嘗動胎也經云有故無殞是也茯苓丸治妊娠惡阻心中煩悶吐痰眩暈先服半夏茯苓湯兩劑後服此藥赤茯苓人參桂心乾薑炮前方用乾生薑此用炮姜又用桂心亦大熱矣而炮而生又復有別不可不知半夏洗七次焙陳皮各一兩乾葛根白朮甘草炙枳殼去白麩炒黃各二兩上為細末煉蜜丸如桐子大每服五十丸空心米飲下日三服一方加麥門冬肘後方加五味子歸原散治妊娠惡阻嘔吐不止頭痛全不入食服諸藥無效者人參甘草川芎當歸芍藥丁香各半兩白茯苓白朮陳皮各一兩半桔梗炒枳殼炒各二錢半半夏洗炒黃一兩上㕮咀每服三錢加生薑五片棗一枚水煎服橘皮湯治妊娠嘔吐不下食橘皮竹茹人參白朮各二錢生薑一錢厚朴一錢半上銼水煎服惡阻惡食責之脾虛嘔吐責之有火所謂諸逆衝上皆屬於火也此方竹茹能平少火厚朴能下逆氣橘皮生薑所以開胃人參白朮所以益脾開胃益脾欲其安穀云爾白朮湯治胃虛惡阻吐水甚至十餘日水漿不入者白朮炒一兩人參五錢丁香二錢半甘草一錢上為細末每服二錢加生薑五片水煎食前溫服人參丁香散治妊娠惡阻胃寒吐逆翻胃吐食及心腹刺痛人參五錢丁香藿香各二錢半上㕮咀每服五錢水煎服二香散治妊娠胎動不安氣不升降嘔吐酸水起坐覺重香附子一兩藿香葉甘草各二錢上為細末每服二錢沸湯調下不拘時白朮散治妊娠胎氣不和不進飲食白朮炒人參紫蘇各一錢青皮去白川芎訶子各八分甘草炙五分上㕮咀作一服加生薑三片水煎服以上數條方法俱備保生湯治妊娠惡阻少食嘔吐或兼吐瀉作渴人參一錢白朮炒甘草炒香附烏梅一方作烏藥吐瀉作渴則效在烏梅矣作烏藥者非橘紅各五分上銼加生薑水煎服覺噁心嘔吐加丁香縮砂散治妊娠胃虛氣逆嘔吐不食縮砂仁為末每服二錢生薑或米飲調服胎動不安大全云妊娠胎動不安者由衝任經虛受胎不實也亦有飲酒房室過度損動不安者有誤擊觸而胎動者有喜怒氣宇不舒傷於心肝觸動血脈者有信醫宜服暖補反為藥所害者有因母病而胎動者但治母病其胎自安有胎不堅固動及母疾但當安胎其母自愈當以母形色察之若面赤舌青兒死母活面青舌赤口中沫出母死子活若唇青兩旁沫出者子母俱死安胎散妊娠常服安胎健脾養血清火則衝任自足胎孕自安白朮當歸各一錢黃芩一錢五分甘草炙三分上銼水煎服如腹脹加神麯麥芽各二分半氣虛泄瀉加人參三分陳皮二分潮熱加柴胡一錢氣上逆加枳殼三分蒼朮湯常服健脾清熱致胎不動子芩一兩白朮五錢上銼水煎服一方芩術各半兩加當歸二錢一方用芩術等分為末粥丸桐子大每服五十丸白湯下名安胎丸金匱當歸散此方養血清熱孕婦宜常服之如瘦人血少有熱胎動不安素曾半産者皆宜服之以清其源而無後患也當歸川芎白芍藥黃芩各一兩白朮二兩上為末每服二錢酒飲調服日再服或用酒糊為丸如桐子大每服五十丸茶湯任下日三服鉤藤湯治妊娠八九月胎動腹痛面青冷汗氣欲絶者此由勞動用力以傷胎宮宜急治之鉤藤鉤當歸茯神去木人參各一錢苦梗一錢五分桑寄生五分上銼水煎服鉤藤寄生清肝兼補氣血煩熱加石膏二錢半十聖散治因母疾病氣衰血少不能護養其胎以致不安者宜此主之即十全大補湯加減人參黃耆白朮地黃砂仁各五分甘草炙當歸川芎芍藥炒各一錢川續斷八分上銼水煎服黃耆湯治胎動不安腹痛下黃汁黃耆川芎各一兩糯米一合糯米者穀味之陰所以補地氣之不足乘天行之健也上細銼水二大盞煎至一盞三分溫服佛手散治妊娠因事築磕胎動不安或子死腹中惡露不下疼痛不已用此藥探之若不損則疼止子母俱安若胎損立便逐下當歸去蘆酒浸三錢川芎二錢上銼先用酒一盅煎乾再入水一盅煎二三沸溫服小膠艾湯治傷損動胎下血腹痛阿膠炒成珠一兩艾葉二兩上銼水煎服指迷方加秦艽一兩膠艾芎歸湯治妊娠二三月上至八九月頓僕跌胎動不安腰腹疼痛欲死已有所下阿膠川芎各三兩當歸乾地黃艾葉各二兩一方有甘草無地黃上細切以水七升煮取三升半分三服阿膠散治妊娠或因傾僕或因毒藥胎動不安腰腹痛疼或有所下阿膠蛤粉妙成珠艾葉炒阿膠益金固血艾葉助陽上升升則不墜固則不流故三方皆用之當歸酒浸川芎白芍藥炒熟地黃洗黃耆甘草炙各一錢上㕮咀加生薑五片棗三枚水煎空心服當歸湯治妊娠胎動蕩心煩燥悶絶口乾橫生逆産上衝下築迷悶唇口青黑手足冷厥當歸人參各一兩半阿膠炒一兩甘草二兩上㕮咀每服八錢加連須蔥白一莖水煎溫服二方平中之奇且奏效最捷一方有川芎一方有川芎厚朴無甘草一方治妊娠從高墜下腹中下血煩悶生地黃益母草各一兩當歸黃耆各半兩上㕮咀每服四錢水一盞姜四片煎至六分去渣服無時三物解毒湯治誤服毒藥動胎解毒良方甘草黑豆淡竹葉各等分上用水煎濃服白扁豆散治妊娠誤服諸般毒藥毒物白扁豆生去皮為細末米飲調服方寸匕神效或濃煎亦可胎漏下血附妊娠經來脈經云婦人經月下但為微少師脈之反言有軀其後審然其脈何類何以別之師曰寸口脈陰陽俱平榮衛調和按之則滑浮之則輕陽明少陰各如經法身反灑淅不欲飲食頭痛心亂嘔吵欲吐呼則微數吸則不驚陽多氣溢陰滑氣盛當作血盛滑則多實六經養成所以月見陰見陽精汁凝胎散散者損墮設復陽盛雙妊二胎今陽不足故令激經也滑脈主血有餘今經又少故知孕大抵妊娠經來不多而飲食精神如故六脈和緩滑大無病者血盛有餘也兒大能飲自不來矣大全云夫妊娠漏胎者謂妊娠數月而經水時下也此由衝任脈虛不能約制手太陽少陰之經血故也衝任之脈為經絡之海起於胞內手太陽小腸脈也手少陰心脈也是二經為表裡上為乳汁下為月水有娠之人經水所以斷者壅之養胎蓄之以為乳汁也衝任氣虛則胞內泄不能制其經血故月水時下亦名胞漏血血盡則人死矣又有因勞役喜怒哀樂不節飲食生冷觸冒風寒遂致胎動若母有宿疾子臟為風冷所乘氣血失度使胎不安故令下血也此言漏胎有三衝任虛者血海自虛也七情飲食胃寒者因有所感也宿疾者氣血失於榮養也曾有一娠婦月信不絶而胎不損問産科熊宗古答曰婦人血盛氣衰其人必肥既娠之後月信常來而胎不動若晚進觀之便以為漏胎若作漏胎治之則胎必墮若不作漏胎治則其胎未必墮今推宗古之言誠有旨也巢氏曰婦人經閉不利別無所苦者是謂有子以其經血蓄之以養胎壅之為乳汁也有子之後蓄以養胎矣豈可復能散動耶所以然者有妊而月信每至是亦未必因血盛也若謂婦人榮經有風則經血喜動以其風勝則可也漏胎用風藥亦是升舉肝氣使血不漏則胎自固不但疏風已也既榮經為風所勝則所來者非養胎之血以此辨之若作漏胎治之必服保養補胎之藥且胎不損強以藥滋之乃所謂實實虛虛也其胎終墮宜矣若醫者知榮經有風之理專以一藥治風經信可止或不服藥胎亦無恙然而有胎本不固而因房室不節先漏而後墮者須作漏胎治之此又不可不審也方氏曰胎動胎漏皆下血而胎動有腹痛胎漏無腹痛為異爾故胎動宜行氣胎漏宜清熱精悉李氏曰尿血自尿門下血漏胎自人門下血妊娠尿血屬胞熱者多四物湯加山梔發灰單苦蕒菜飲亦妙因暑者益元散加升麻煎湯下稍虛者膠艾四物湯久者用龍骨一錢蒲黃五錢為末酒調服脈經曰婦人懷軀六月七月暴下鬥余水其胞必倚而墮此非時孤漿預下故也孤漿預下必倚而墮此氣血兩虛也薛氏曰胎漏黃汁下或如豆汁若因肝脾濕熱用升陽除濕湯血崩肝脾風熱用加味逍遙散肝脾鬱怒用加味歸脾湯脾胃氣虛用錢氏白朮散若脾氣下陷用補中益氣湯肝經風熱用防風黃芩丸風入腸胃用胃氣湯加減膠艾湯治胎動漏血有效阿膠炒成珠當歸川芎白芍藥炒地榆各一錢艾葉炒甘草各五分上銼一服水煎飢服胎漏血多起於氣惱血逆火動之故可加炒黃芩炒香附炒砂仁研細同煎或有受胎至四五個月即墮或至六七個月漏血要墮者宜前方去艾葉地榆加白朮黃芩茯苓熟地黃續斷有氣盛亦加香附砂仁氣虛加人參黃耆之類如傷墮多次受孕後便宜服千金紫蘇飲及前加減法湯丸相間庶免再墮安胎飲治妊娠卒然腰痛下血不已當歸川芎白芍藥炒熟地黃阿膠炒艾葉黃耆各一錢甘草炙地榆各五分上銼一劑加薑棗水煎服大全方治妊娠三四月腹痛時時下血當歸熟地黃艾葉各六兩續斷二兩阿膠雞蘇竹茹各一兩上用水一升煎取七合空心再服如聖湯治胎動腹痛或為胎漏鯉魚皮鯉魚皮之用奇當歸酒浸白芍藥熟地黃酒蒸川芎川續斷酒浸阿膠蛤粉炒成珠甘草炙各等分上㕮咀每服四錢加苧根少許生薑五片水煎溫服安胎當歸湯治妊娠舉動驚悸胎不安小腹痛引腰絡下血當歸川芎阿膠炒人參各一兩大棗十二枚艾葉一把一方有甘草無參棗上以水酒各三升煮至三升納膠令煬分三服枳殼湯治胎漏下血及因事下血枳殼去穰麩炒黃芩各半兩白朮一兩白朮為君不用血藥又是一法上銼水煎食前溫服一方加生地入少酒煎當歸寄生湯治妊娠胎漏非時下血當歸川芎艾葉白朮各一錢人參桑寄生續斷熟地黃各二錢上水煎空心溫服二黃散治婦人胎漏下血生地黃熟地黃各等分上為細末每服二錢煎白朮枳殼湯調食前服或㕮咀水煎服白朮枳殼煎湯調地黃末意見超卓阿膠散治妊娠無故卒然下血阿膠蛤粉炒成珠二兩為末生地黃半斤搗取汁上以清酒三升用清酒妙攪勻溫熱分三服一方治胎漏下血不止胞干即死宜急治之生地黃汁一升陳酒五合上同煎三五沸溫三服以止為度榆白皮散治妊孕胎漏去血恐其難産常宜服之榆白皮葵很大麻仁瞿麥各二錢木通一錢牛膝酒浸焙一錢半上㕮咀水煎溫服一方治妊娠忽暴下血數升胎燥不安此方治胎燥則可若脾虛滑泄者禁用榆白皮三兩熟地黃四兩當歸生薑各二兩葵子一升肘後方不用上銼以水五升煮取二升半分三服不瘥更作服之子芩散治肝經有熱妄行下血細條黃芩炒為末每服一錢以稱錘燒赤淬酒熱調服若脾胃虛不宜用防風丸治肝經有風以致血得風而流散不歸經防風為末每服一錢白湯調服防風黃芩丸治肝經有風熱致血崩便血尿血黃芩炒焦防風各等分上為末酒糊丸如桐子大每服三五十丸食遠或食前米飲或溫酒送下上三方治肝經風熱之劑桂枝茯苓丸仲景云婦人宿有癥病凡遇此症最宜斟酌經斷未及三月而得漏下不止胎動在臍上者為癥痼害妊娠六月動者前三月經水利時胎也下血者後斷三月衃也所以血不止者其癥不去故也當下其癥桂枝茯苓丸止之樓氏曰凡胎動多當臍今動在臍上故知是癥也桂枝茯苓牡丹皮桃仁去皮尖炒芍藥各等分上五味末之煉蜜丸如兔屎大每日食前服一丸不知加至三丸本事方治胎漏下血不止取桃樹上幹不落桃子燒灰和水服瘥本草云桃奴破血又治伏梁氣積上二方治癥病破血之劑大全方治妊娠忽然下黃汁如膠或如豆汁等物或胎動腹痛黃耆炒六兩糯米五合上以水七升煎取二升分為四服銀苧酒治妊娠下黃汁或如赤豆苧根去黑皮切二兩銀五兩或金銀首飾黃赤為熱故用苧根以涼之下黃赤為肝氣之疏泄故重用銀以鎮之上用水酒各一大盞煎服上二方治漏下黃豆汁之症煩躁即子煩附口乾大全云妊娠苦煩悶者以四月受少陰君火氣以養精六月受少陽相火氣以養氣若母心驚膽寒多有煩悶名曰子煩也産寶云夫妊娠而子煩者是肺臟虛而熱乘於心肺虛乘熱於心於理似背當在虛字上看則令心煩也停痰積飲在心胸之間或衝於心亦令煩也若熱而煩者但熱而已若有痰飲而煩者嘔吐涎沫惡聞食氣煩躁不安也大凡妊娠之人既停痰積飲又寒熱相搏氣鬱不舒或煩躁或嘔吐涎沫劇則胎動不安均為子煩也薛氏曰前證若因內熱用竹葉湯氣滯用紫蘇飲痰滯用二陳白朮黃芩枳殼氣鬱用分氣飲加川芎脾胃虛弱用六君紫蘇山梔大全云妊娠煩躁口乾者煩躁口乾屬心脾與子煩大同小異足太陰脾經其氣通於口手少陰心經其氣通於舌若臟腑氣虛榮衛不理致陰陽隔絶熱乘於心脾津液枯少故令心煩而口乾也與子煩大同小異宜用知母丸薛氏曰前證若胃經實火用竹葉石膏湯若胃經虛熱用人參黃耆散若胃經氣虛用補中益氣湯若肺經虛熱用紫蘇飲若肝經火動用加味逍遙散若脾氣鬱結用加味歸脾湯若腎經火動加味地黃丸竹葉湯治妊娠心驚膽怯終日煩悶名曰子煩白茯苓三錢麥門冬去心防風黃芩各二錢上作一服加竹葉十片水煎服無時一方有知母無黃芩一方有人參無黃芩知母飲治妊娠心脾壅熱咽膈渴苦煩悶多驚知母麥門冬去心赤茯苓各一錢半黃芩黃耆各二錢壅熱用黃耆要知是虛非實甘草一錢上作一服水二盅入桑白皮半錢煎至一盅再入竹瀝些少同煎一二沸服無時犀角散治子煩犀角尖磨水時入地骨皮條芩麥門冬去心甘草五分赤茯苓各二錢上切作一服水二盅煎八分入竹瀝一合溫服當歸飲治子煩當歸二錢酒洗川芎阿膠珠豆豉桑寄生各一錢蔥白七莖上銼水煎溫服用蔥豉川芎散熱又是一法人參散治妊娠熱乘心脾津液枯少煩躁乾渴人參麥門冬去心赤茯苓地骨皮乾葛黃芩炒犀角鎊各七錢五分甘草半兩上銼每服三錢水煎服竹茹湯療妊娠煩躁或胎不安清心涼肝妙劑用淡青竹刮茹一兩以水一大升煮取四合徐徐服盡為度治妊娠心煩熱不止蔥白一握豉二合上以水二大盞煎至一盞半去滓溫分三服一母丸治妊娠因服藥致胎氣不安有似虛煩不得眠巢氏謂之子煩也醫者不知作虛煩治之損動胎氣宜矣知母洗焙二兩為細末棗肉丸如彈子大每服一丸煎人參湯下心腹脹滿即子懸大全云妊娠心腹脹滿者由腹內素有寒氣致令停飲重因觸冷飲發動與氣相爭故令心腹脹滿也此雖言寒氣停飲所致然大概陽氣壅滯則令上湊心腹故以紫蘇飲寬氣下氣為主余隨症加減薛氏曰前證若外感風寒內傷飲食用藿香正氣散若食傷脾胃用六君子湯若陽氣壅滯胎上逼心用紫蘇飲一妊婦飲食停滯心腹脹滿或用人參養胃湯加青皮山楂枳殼其脹益甚其胎上攻噁心不食右關脈浮大按之則弦此脾土不足肝木所侮用六君子加柴胡升麻而愈後小腹痞滿用補中益氣升舉脾氣而瘥一妊婦腹脹小便不利吐逆諸醫雜進溫胃寬氣等藥服之反吐轉加脹滿湊心驗之胎死已久服下死胎藥不能通因得鯉魚湯其論曰妊婦通身腫滿或心胸急脹名曰胎水遂去妊婦胸前看之胸肚不分須識此症急以鯉魚湯三五服大小便皆下惡水腫消脹去方得分娩死胎此症蓋因懷妊腹大不自知覺人人皆謂娠孕如此終不知胎水之為患也李氏曰子懸者心腹脹滿痛也妊孕四五個月以來相火養胎以致胎熱氣逆湊心心腹脹滿疼痛宜紫蘇飲有郁心腹脹滿甚者加莪朮及丁香少許不食者芩術湯倍白朮加芍藥火盛極一時心氣悶絶而死紫蘇飲連進救之以火盛極而連進紫蘇飲人恆失之須知是氣作悶此症兩尺脈絶者有誤服動胎藥子死腹中則憎寒手指唇爪俱青全以舌為證驗芎歸湯救之仲景云婦人懷孕六七月脈弦發熱其胎愈脹腹痛惡寒者少腹如扇所以然者子臟寒故也當以附子湯溫其臟附子胎前禁用而此以治臟寒正所謂有故無殞也婦人傷胎懷身腹滿不得小便從腰以上重如有水氣狀懷身七月太陰當養不養此心氣實當刺瀉勞宮及關元小便微利則愈紫蘇飲治胎氣不和湊上心腹脹滿疼痛謂之子懸兼治臨産驚恐氣結連日不下無川芎名七寶散紫蘇葉二錢大腹皮川芎白芍藥陳皮去白當歸各一錢人參甘草各五分上銼作一服加生薑三片蔥白七寸水煎服本事方云曾有一婦纍日産不下服遍催生藥不驗豫曰此必坐草太早心懷一點懼氣結而不行然非不順也素問曰恐則氣下蓋恐則精神怯怯則上焦閉閉則氣還還則下焦脹氣乃不行矣得此藥一服便産及婦人六七月子懸者豫用此數數有驗不十服胎便近下陳方甫治一婦有孕七個月遠歸忽然胎上衝心而痛坐臥不安兩醫治之無效遂說胎已死矣用萆麻子研爛和麝香調貼臍中以下之命在垂亡召陳診視兩尺脈絶他脈平和陳問二醫作何證治之答曰死胎也陳曰何以知之曰兩尺脈沉絶以此知之陳曰此說出何經二醫無答陳曰此子懸也若是胎死卻有辨處面赤舌青子死母活面青舌赤吐沫母死子活唇口俱青子母俱死今面不赤舌不青其子未死是胎上逼心宜以紫蘇飲治之至十服而胎近下矣訶黎勒散療妊娠心腹脹滿氣衝胸膈煩悶四肢少力不思飲食訶黎勒赤茯苓前胡各一兩陳皮大腹皮桑白皮各七錢半枳殼川芎白朮各半兩上為粗末每服四錢姜三片棗一枚水煎服保胎和氣飲專治胎前四五個月身體困倦氣急發熱飲食無味貪睡頭暈等證枳殼四錢厚朴香附子各三錢砂仁蒼朮橘紅各二錢蘇葉一錢甘草九分小茴香一錢半上銼分作三服每服用水一盅半煎七分服瘦胎飲專治胎前五六個月胎娠困弱體重貪睡食不知味肚腹胎動當歸二錢白芍藥益母草枳殼各四錢砂仁香附子益智各三錢甘草一錢上銼分作三服每服水一盅半煎至七分空心溫服枳殼湯治婦人妊娠胎腹脹枳殼三兩黃芩二兩一方只用一兩上為粗末每服五錢水煎服如腹滿身體沉重加白朮一兩蔥白湯治胎上逼心煩悶又治胎動困篤用蔥白二七莖濃煮汁飲之若胎未死即安已死即出未效再服蔥白安胎人所未知樓全善云此方神效脈浮滑者宜之本草云蔥白通陽氣安胎一方治胎動上逼心痛取艾葉如雞子大一團以頭醋四升煎至二升半溫服倉公下氣湯治心腹兩脅脹悶飲食少思四肢無力羌活檳榔青皮大腹皮赤芍藥炒甘草炙陳皮赤茯苓半夏薑製桑白皮炒各五分桂心二分紫蘇莖二錢上銼加生薑五片棗一枚水煎服當歸湯治胎動衝心煩悶欲死安胎止痛當歸酒洗川芎人參阿膠甘草炙各一兩半連根蔥白一握上細銼以水二升煎四味至升半去滓下蔥再煎減三合入阿膠溫服一劑分為二三服大聖散治婦人怔悸睡中多驚腹脅膨脹坐臥不寧白茯苓川芎黃耆蜜炙當歸酒浸麥門冬去心各一錢人參甘草炙木香不見火各五分上㕮咀加生薑五片水煎服治妊娠遍身痛或衝心欲死不能飲食白朮五兩此症禁用白朮而此方獨用白朮為君非認症之確者不可黃芩二兩芍藥四兩上用水六升煮取二升半分三服一方治妊娠心下滿氣急切痛赤茯苓六分桑白皮五分前胡四分郁李仁檳榔各三分上為細末以水一升煮取一半去滓夜臥服安胎和氣飲治胎冷腹痛引兩脅小便頻數大便虛滑訶子麵裹煨去核白朮各二錢陳皮去白高良薑炒木香不見火白芍藥陳米炒甘草炙各一錢上作一服生薑五片水煎服忌生冷之物仲景附子湯婦人懷妊六七月脈弦發熱其胎愈脹腹痛惡寒者少腹如扇所以然者子臟寒故也當以此湯溫其臟附子二枚炮去皮破八片白朮四兩茯苓芍藥人參二兩上五味以水八升煮取三升去渣溫服一升日三服心痛大全云妊娠心痛乃風邪痰飲交結若傷心正經為真心痛旦發夕死夕發旦死若傷心支絡則乍安乍作若傷於子臟則胎動而血下薛氏曰前證若飲食所傷用平胃散加枳殼山楂若因錯雜諸邪當審其因而治之一妊婦心痛煩熱作渴用白朮散即愈後因停食其痛仍作胸腹脹滿按之則痛此因飲食停滯用人參養胃湯按之不痛乃脾胃受傷以六君子湯補之而愈一妊婦心腹作痛胸脅作脹吞酸不食此肝脾氣滯用二陳山楂山梔青皮木香而愈又因怒仍痛胎動不食面色青黃肝脈弦緊脾脈弦長此肝木乘土用六君子湯加升麻柴胡木香而愈火龍散治妊娠心氣疼此方治平常心痛亦妙川楝子茴香炒各三錢艾葉末鹽炒錢半上作一服水二盅煎至一盅不拘時服産寶丸治妊娠卒心痛氣欲絶川芎當歸茯苓厚朴制各一錢上用水六升煎取二升分二服白朮湯治妊娠卒心痛欲死不可忍者白朮三兩諸痛無補法豈以心痛而可用白朮者詳之赤芍藥二兩黃芩一兩半上切以水六升煮取二升半分三服半日令盡微下水令易生忌桃李雀肉等千金方療妊娠心痛按此可治燥熱心痛青竹茹一升羊脂八兩白蜜三兩上三味合煎每服棗核大三枚食前頓服日三服一方治妊娠忽然心痛悶絶欲死者謂之中惡生地黃二錢枳殼一錢木香三分上銼酒煎服一方橘皮二兩豆豉五兩上為末煉為丸如桐子大溫水下二七丸無時雜方青竹茹一升酒二升煮取一升半去滓分溫頓服一方破雞子一枚酒調服之一方大麻子三升研水八升煮取五升分五服補遺沉香降氣湯茯苓補心湯四七湯紫蘇飲皆可用炮炙論云心痛欲死急覓玄胡此治瘀血痛心腹痛大全云妊娠心腹痛者或由宿有冷疼或新觸風寒皆由臟虛而致動也邪正相擊而並於氣隨氣上下上衝於心則心痛下攻於腹則腹痛故令心腹痛也妊娠而痛者邪正二氣交攻於內若不時瘥者其痛衝擊胞絡必致動胎甚則傷墮矣又云妊娠心腹疼痛多是風寒濕冷痰飲與臟氣相擊故令腹痛攻衝不已則致胎動也薛氏曰前證若風寒痰飲用金沸草散雜病咳嗽胎氣鬱結加香附川芎若飲食停滯用六君加紫蘇枳殼若怒動肝火前藥更加柴胡山梔若鬱結傷脾用歸脾湯加枳殼山梔一妊婦心腹作痛吐痰噁心胎氣上攻飲食少思此脾虛氣滯而為痰用六君子加柴胡枳殼諸證漸退飲食漸進又用四君子加枳殼山梔桔梗而安後因怒兩脅氣脹中脘作痛惡寒嘔吐用六君加柴胡升麻木香一劑而愈川芎散治妊娠素有冷氣忽心腹痛如刀刺川芎當歸各一錢人參吳茱萸厚朴薑製各五分茯苓桔梗各四分芍藥七分半枳殼甘草各二分上劑水煎稍熱服當歸芍藥散治妊娠腹中絞痛心下急痛及療産後崩中去血過多眩暈虛乏白芍藥炒四兩産後忌芍藥而此方兼治且以為君愚謂産後惟去血過多者可用若惡露不行作痛者不可用也當歸茯苓白朮各二兩澤瀉川芎各一兩上為細末每服二錢食前溫調服阿膠散治妊娠胎動腹中絞痛不思飲食當歸炒陳皮各一兩白朮白茯苓阿膠炒川芎各七錢半甘草二錢半上㕮咀每服三錢水一盞姜三片棗一枚煎七分服胎動方中多用艾葉而此則用白朮者蓋不治痛而治不思飲食也妙在當歸陳皮為君一方治妊娠患腹痛並胎動不安當歸三兩川芎阿膠人參厚朴各二兩蔥白切一升上㕮咀以水七升煎至三升分三服一方有甘草無厚朴川芎香莪散治妊娠五個月以後常胸膈間氣刺痛滿或腸鳴以至嘔逆減食此由喜怒憂慮過度飲食失節之所致也蔡元度寵人有子夫人怒欲逐之遂病醫官王師復處此方三服而愈廣中莪朮炒一兩丁香半兩粉草二錢半上為細末空心鹽湯點服一大錢覺胸中如物按下之狀古今録驗方療妊娠腹內冷痛忽胎動薤白一升當歸切四兩上以水五升煮取四升作三服一方治妊娠胎動欲落腹中痛不可忍鎮墜解熱護胎方法俱妙於體強暴病者可用上等銀一斤茅根二斤去黑皮上以水九升煮銀取五升入清酒一升同煎茅根取三升分三服立安一方治妊娠腹痛血熱血虛腹痛若此方甚妙用生地黃三斤搗酒一升合煎減半頓服愈一方治妊娠四五個月忽然腹絞痛大棗十四枚炒令黑鹽一錢炒令赤上為末取一撮許酒調服即愈一方單用棗十四枚燒存性為末童子小便調下一方單用鹽一斤燒令赤以兩指取一撮酒調服腹痛即子痛仲景云婦人懷胎腹中諸疾痛當歸芍藥散主之脈經曰婦人有胎腹痛其人不安若胎病不動欲知生死令人摸之如覆杯者則男如肘頸參差起者女也冷者何面所謂何面者意在腹之左右也冷者為死溫者為生薛氏曰若腹中不時作痛或小腹重墜名胎痛用地黃當歸湯未應加參朮陳皮氣虛者可用或因脾氣虛用四君子加歸地中氣虛用補中益氣湯地黃當歸湯治婦人有孕胎痛血虛痛妙當歸一兩熟地黃二兩上為末作一服水三升煎至一升去滓頓服未效加人參白朮陳皮加味四物湯治血少胎痛當歸川芎白芍藥熟地黃香附子各等分上為末每服三錢紫蘇湯調下妙在紫蘇湯小腹痛大全云妊娠小腹痛者由胞絡虛風寒相搏痛甚亦令胎動也薛氏曰前證若風寒所搏用紫蘇飲加生薑氣血虛用八珍湯脾氣虛用六君子湯中氣虛用補中益氣湯若腹脹痛用安胎飲加升麻白朮不應兼補中益氣湯一妊婦小腹作痛其胎不安氣攻左右或時逆上小便不利用小柴胡湯加青皮山梔清肝火而愈後因怒小腹脹滿小便不利水道重墜胎仍不安此亦肝木火盛所致用龍膽瀉肝湯一劑諸證頓愈乃以四君子加柴胡升麻以培脾土而安治妊娠小腹痛方療妊娠被驚惱胎向下不安小腹連腰痛下血當歸川芎各八分阿膠炙人參艾葉各四分茯苓一錢大棗二十個上細切以水五升煮取三升溫分三服補遺方治妊娠小腹痛胎動不安川芎為細末酒調下一方用川芎當歸等分煎服腰腹及背痛大全云腎主腰足因勞傷損動其經虛則風冷乘之故腰痛冷氣乘虛入腹則腹痛故令腰腹相引而痛其痛不止多動胎氣婦人腎以系胞妊娠而腰痛甚者則胞墮也薛氏曰前證若外邪所傷用獨活寄生湯勞傷元氣用八珍湯加杜仲砂仁阿膠艾脾腎不足以前藥加白朮補骨脂氣血鬱滯用紫蘇飲加桔梗枳殼肝火所動用小柴胡湯加白朮枳殼山梔肝脾鬱結用歸脾湯加柴胡枳殼一妊婦頸項強直腰背作痛此膀胱經風邪所致用拔萃羌活湯一劑而愈又用獨活寄生湯及八珍湯以祛邪固本而痊汪石山治一婦懷妊八月嘗病腰痛不能轉側大便燥結醫用人參等補劑痛益加用硝黃通利之藥燥結雖行而痛如故汪診之脈稍洪近快曰血熱血滯也宜用四物加木香乳沒黃柏火麻仁煎服四五帖痛稍減燥結潤復加發熱面赤或時惡寒仍用前方去乳香沒藥加柴胡黃芩服二帖而寒熱除又背心覺寒腹痛復作汪曰血已利矣可於前方加人參一錢服之而安通氣散治妊娠腰痛狀不可忍此藥神效破故紙瓦上炒香為末上先嚼胡桃肉一個爛後以溫酒調下故紙末三錢空心服五加皮散治妊娠腰痛不可忍或胯痛先服此散杜仲四兩炒五加皮阿膠炙另入防風狗脊川芎白芍藥細辛萆薢各三兩杏仁八十個去皮尖麵炒上㕮咀以水九升煮取二升去滓下膠作三服五加皮丸治妊娠腰痛不可忍者次服此丸續斷炒杜仲各二兩半川芎獨活各三兩五加皮狗脊萆薢芍藥訶子肉各四兩此與前方不甚相遠而以杏仁易訶子通塞不同者此宜詳之上為細末煉蜜丸如桐子大每服四十丸空心酒下日三服療觸動胎以致腰痛背痛杜仲五加皮當歸芍藥川芎萆薢各等分上為末每用三錢空心酒調下療妊娠氣壅攻腰痛不可忍兼治腹痛當歸三兩阿膠甘草各二兩蔥白切二升上細銼以水七升煮取三升去滓分溫三服小品苧根湯療損動胎腰腹痛去血胎動向下生地黃苧根各二兩當歸芍藥阿膠甘草各一兩上細切以水六升煮取二升去滓納膠煎煬分溫三服忌海藻蕪荑大地黃丸治産前後腰腹疼一切血疼兼治血氣虛四肢不舉骨髓熱疼此方不特産前後妙即平日血虛內熱者亦宜熟地黃二兩烏梅肉當歸各一兩上為細末煉蜜丸如彈子大每服一丸空心白湯嚼下紫酒治妊娠腰痛如折亦治常人卒腰痛者大黑豆二合炒令香熟酒一大盞煮取七分去豆空心頓服雜方治胎動腰痛搶心或下血取蔥白不拘多少濃煎汁飲之一方用鹿角長六寸燒令赤酒中淬再燒再淬以角碎為度取酒飲之鹿角為末服方寸匕一方用菖蒲汁酒一升服之一方用艾葉一把如雞子大以酒四升煮取二升分為二服良胎水腫滿即子腫子滿子氣産寶論曰妊娠腫滿由臟氣本弱因妊重虛土不剋水血散於四肢遂致腹脹手足面目皆浮腫小便祕澀陳無擇云凡婦人宿有風寒冷濕妊娠喜腳腫俗呼為皺腳亦有通身腫滿心腹急脹名曰胎水論曰凡妊娠之人無使氣極若心靜氣和則胎氣安穩若中風寒邪氣及有所觸犯則隨邪而生病也凡妊娠經血壅閉以養胎若忽然虛腫乃胎中挾水水血相搏脾胃惡濕身之肌肉溫漬氣弱則肌肉虛水氣流溢故令身腫滿也然其由有自或因泄瀉下痢臟腑虛滑耗損脾胃或因寒熱瘧疾煩渴引飲太過濕漬脾胃皆能使頭面或手足浮腫也然水漬於胞兒未成形則胎多損壞及臨産日腳微痛者乃胞髒水少血多水出於外故現微腫則易生也宿有寒氣因寒冷所觸故能令腹脹滿腫也産乳集論曰妊娠自三月成胎之後兩足自腳面漸腫腿膝以來行步艱辛以至喘悶飲食不美似水氣狀至於腳趾間有黃水出者謂之子氣直至分娩方消此由婦人素有風氣或衝任經有血風未可妄投湯藥亦恐大段甚者慮將産之際費力有不測之憂故不可不治於未産之前也古方論中少有言者元豐中淮南陳景初名醫也獨有論治此證方名初謂之香附散李伯時名曰天仙藤散也子氣者因子而肝脾氣阻土遂不能制水故一香附散足以療之然不服藥亦無害薛氏曰前證若胸滿腹脹小便不通遍身浮腫用鯉魚湯脾胃虛弱佐以四君子若面目虛浮肢體如水氣用全生白朮散如未應用六君子湯脾虛濕熱下部作腫用補中益氣加茯苓若飲食失宜嘔吐泄瀉用六君子湯若腿足發腫喘悶不安或趾縫出水用天仙藤散脾胃虛弱兼四君子湯如未應用補中益氣湯若脾肺氣滯用加味歸脾湯佐以加味逍遙散白朮散治妊娠面目虛浮四肢腫如水氣名曰子腫子腫與子氣相類然子氣在下體子腫在頭面須識之白朮二錢半茯苓皮一錢半陳皮生薑皮大腹皮桑白皮各一錢上銼水煎服或為細末每服三錢米飲調下本方去白朮名五皮散或加木香木通散治妊娠身體浮腫四肢脹急小便不利木通香薷紫蘇莖葉各一錢枳殼麵炒檳榔條芩各五分木香訶子皮各三分上銼加生薑三片水煎食前服葶藶散治妊娠遍身洪腫補膽瀉肺利大腸葶藶子一兩白朮五兩茯苓桑白皮郁李仁各二兩上為粗末水六升煎取二升分三服小便利即瘥千金鯉魚湯治妊娠腹脹滿或渾身浮腫小便赤澀當歸白芍藥各一錢白茯苓一錢半白朮二錢橘紅五分鯉魚一尾上作一服將鯉魚鯉魚治懷妊身腫及胎氣不安煮食又下水氣利小便去鱗腸白水煮熟去魚用汁一盞半入生薑三片煎至一盞空心服胎水即下如未盡腹悶未除再合一劑服之一方澤瀉葶藶各二兩茯苓枳殼白朮各六兩上銼以水六升煮取二升半分溫二服防己湯治妊娠脾虛遍身浮腫腹脹喘促小便不利防己一錢半桑白皮炒紫蘇莖葉赤茯苓各二錢木香五分上銼一服加生薑四片水煎服如大便不通加枳殼檳榔澤瀉散治妊娠遍身浮腫上氣喘急大便不通小便赤澀謂之子滿子滿大都在五六月以後病此氣與腫不同蓋胎大則腹滿滿則氣浮遍身腫邪無所挾但一瀉氣利水則愈澤瀉桑白皮炒木通枳殼麵炒檳榔赤茯苓各一錢半上銼一服加生薑五片水煎服天仙藤散治妊娠自三月成胎之後兩足自腳面漸腫至腿膝行步艱難喘悶妨食狀似水氣甚至足趾間有黃水出者謂之子氣天仙藤洗略炒即青木香藤香附子炒陳皮甘草烏藥木香各等分一方作木瓜上銼每服五錢加生薑三片紫蘇五葉水煎日三服腫消止藥産寶方療妊娠身腫有水氣心腹脹滿小便少以下三方不甚相遠但郁李與白朮補瀉不同黃芩與乾薑冷熱不同而旋覆散結痰杏仁瀉肺氣亦略相似惟在用者審之茯苓四兩杏仁檳榔各三兩旋覆花郁李仁各一兩上為粗末以水六升煮取二升去滓分溫三服小便通即瘥崔氏方療妊娠體腫有水氣心腹急滿茯苓白朮各四兩旋覆花二兩杏仁黃芩各三兩上細切以水七升煮取二升半分溫三服忌桃李雀肉酢物腎著湯治妊娠腰腳腫茯苓白朮各二錢乾薑炮甘草各一錢杏仁一錢半上㕮咀水煎服子和方治妊娠從腳上至腹腫小便不利微渴豬芩五兩為末以熱水調服方寸匕日三服即仲景豬芩湯法而服法更巧腹哭鐘鳴産寶方治小兒在腹中哭及孕婦腹內鐘鳴用空房下鼠穴中土一塊令孕婦噙之即止或為末入麝香少許酒調下二錢立愈然麝香開竅當酌量用之補遺方治孕婦腹中兒哭用黃連濃煎汁母常呷之即止一法小兒腹哭者蓋臍帶上疙瘩兒含口中因娠婦登高舉臂脫出兒口以此作聲令妊婦曲腰就地如拾物仍入兒口即止有令孕婦以笤帚掃地即止者亦此意積聚黃帝問曰婦人重身毒之何如岐伯曰有故無殞帝曰願聞其故歧伯曰大積大聚其可犯也衰其大半而止過者死丹溪方治血塊如盤有孕難服峻劑此方主之香附子醋煮四兩桃仁去皮尖一兩海粉醋煮二兩白朮一兩上為末麵糊丸服
