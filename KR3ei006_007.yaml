body:
  text: 卷之七浮腫門論浮腫由血分水分證治不同良方論曰婦人經水不通則化為血血不通復化為水故先因經水斷絶後至四肢浮腫致小便不通名曰血分宜用椒仁丸夫氣者水之母血者氣所化非氣無以生血非血無以養氣若經水不通則血病血病氣亦病豈有水不通而能化血乎血不通而化水者乃是氣壅不能化血而成水也觀椒仁丸可想矣若先因小便不通後身面浮腫致經水不通名曰水分宜葶藶丸經水不通而化為水流走四肢悉皆腫滿亦名血分其證與水證相類實非水也用人參丸薛氏曰按前證或因飲食起居失養或因六淫七情失宜以致脾胃虧損不能生髮統攝氣血乖違行失常道若先斷經後浮腫此血化為水名曰血分宜椒仁丸治之若先浮腫後經水不通此水化為血名曰水分宜用葶藶丸治之此屬形氣不足邪淫隧道必用此藥以宣導其邪而佐以補輔元氣之劑庶使藥力有所仗而行則邪自不能容而真氣亦不至於復傷矣大凡月水不通凝結於內久而變為血瘕血水相併亦為水腫血凝成瘕因而致腫當知此症李氏曰經水斷而後腫名曰血分乃瘀血化水閉塞胞門比水腫更難治但能調其經則水自消小調經散葶歸丸先浮腫而後經水不通名曰水分乃脾不能制血與水並浮肌肉為之虛腫紅礬丸通用腎氣丸腎虛則水不利而散溢妄行故用腎氣丸加減水分君澤瀉加防己葶藶木通血分君牡丹皮加牛膝紅花有經閉腳腫者桑白皮散治浮腫椒仁丸治先因經水斷絶後至四肢浮腫小便不通血化為水名曰血分血既化而為水則以利水為先而行血溫血開結破氣又不可少者然非峻利氣悍之物不可故又佐之以大毒之藥椒仁續隨子去皮研甘遂附子炮郁李仁黑牽牛五靈脂研碎當歸吳茱萸玄胡索各五錢芫花醋浸石膏各二錢膽礬信砒各一錢芫青糯米炒黃去頭翅足斑蝥糯米炒黃各十個上為末麵糊丸如豌豆大每服一丸橘皮湯下此方藥雖峻利所用不多若畏而不服有養病害身之患常治虛弱之人亦未見其有誤也此必已試有成驗者讀之令人膽壯葶藶丸治先因小便不利後至身面浮腫經水不通水化為血名曰水分甜葶藶炒另研續隨子去殼另研各五錢干筍末一兩上為末棗肉丸如桐子大每服七丸煎扁竹湯下如大便利者減續隨子葶藶各一錢加白朮五錢先水病故先利水而又佐以白朮者助土以防水也人參丸一名葶藶丸治經脈不利血化為水流走四肢悉皆腫滿名曰血分其候與水相類若作水治之非也宜用此方人參當歸大黃濕紙裹飯上蒸熟切炒桂心瞿麥穗赤芍藥白茯苓各半兩葶藶炒另研一錢上為末煉蜜丸如桐子大每服十五丸至二三十丸空心米飲下小調經散治敗血停積五臟日久腐爛成水變為浮腫忌用利水之藥此重在敗血故曰忌用利水所謂調經水自消也産後浮腫亦宜當歸赤芍藥桂心各一兩沒藥琥珀甘草各一錢細辛麝香各五分上為末每服五分溫酒入薑汁調服桑白皮散治腳氣感發兩足浮腫小便赤澀腹脅脹滿氣急坐臥不得此係腳氣方借用也桑白皮炒一錢郁李仁炒一錢赤茯苓二錢木香防己酒洗大腹皮各五錢蘇子炒木通檳榔青皮各七分半上銼一服加生薑三片水煎服正脘散治中焦虛痞兩脅氣痛面目手足浮腫大便祕澀兼治腳氣脾虛不能制水而氣不降者宜之白朮川芎木香檳榔甘草各七錢半大腹皮紫蘇木瓜陳皮沉香獨活各一兩上㕮咀每服三錢水煎食後服大調經散治榮衛不調陰陽相乘憎寒發熱自汗腫滿此開鬼門潔淨府法皆在氣分而不在血不調憎寒自汗乃邪在表也大豆炒去皮一兩半茯苓一兩真琥珀一錢上為末每服一錢濃煎烏豆紫蘇湯下大腹皮飲治婦人血嬰單單腹腫大腹皮防己木通厚朴栝蔞黃耆枳殼桑白皮大黃陳皮五味子各等分上銼每服一兩水煎去滓入酒少許服血嬰之名甚新謂單腹脹如抱嬰瘤之狀也然皆用行氣藥也黃耆五味大黃又可以補氣而行血大黃甘遂湯治婦人小腹滿如敦敦狀敦敦何狀小便微微而不竭産後者惟水與血並結血室也大黃半兩甘遂炮甘遂峻藥也恐太多阿膠炒各一兩上銼每服二錢水一盞煎七分其血當下前陰諸疾門論陰戶腫痛良方論曰婦人橫痃一名便癰一名便毒俗名喑子或肝經濕熱下注或鬱怒傷損脾肝其外證或兩拗小腹腫痛或玉門焮腫作痛肝經之脈環陰器故見證如是而治法亦如是也或寒熱往來憎寒壯熱其內證或小便澀滯或腹內急痛或小腹痞悶或上攻兩脅或晡熱重墜若兩拗小腹腫痛肝經濕熱壅滯也用龍膽瀉肝湯玉門腫脹肝火血虛也用加味逍遙散及龍膽瀉肝湯加木香若概投散血攻毒之劑誤甚矣又曰婦人陰腫因胞絡素虛風邪客之乘於陰部血氣相搏故也薛氏曰婦人陰腫若氣血虛弱用補中益氣湯舉而補之肝經濕熱用龍膽瀉肝湯滲而清之李氏曰陰戶兩旁腫痛手足不能舒伸者用四物湯入乳香末同搗成餅安陰中立效陰腫痛極便祕欲死者枳橘尉但腫痛者四物湯加柴胡山梔牡丹皮龍膽草如時常陰腫者四物湯加藁本防風陰戶腫痛不閉者逍遙散十全大補湯腫消不閉者補中益氣湯腫痛者加山梔牡丹皮以不閉屬虛故宜補以腫痛屬實故宜涼濕癢出水又痛者憂思過也歸脾湯加柴胡山梔牡丹皮芍藥生甘草潰爛者逍遙散陰戶腫痛不閉寒熱溺澀體倦少食者補中益氣湯加升麻柴胡至一錢量入茯苓山梔陰戶不閉小便淋瀝腹中一物攻動脹痛者逍遙散加柴胡山梔車前子論陰癢生蟲大全云婦人陰癢者是蟲蝕所為三蟲在於腸胃之間因臟虛三蟲動作蝕於陰內其蟲作熱微則為癢重者乃痛也陰癢生蟲當與腸胃求食之蟲不同仲景曰風三蟲此當從風木所化故治法悉以清肝為主薛氏曰前證屬肝經所化當用龍膽瀉肝湯逍遙散以主其內外以桃仁研膏和雄黃末或雞肝納陰中以制其蟲一婦人胸膈不利內熱作渴飲食不甘肢體倦怠陰中悶癢小便赤澀此鬱怒傷肝脾所致用歸脾湯加山梔而愈復因怒患處並小腹脹痛用小柴胡加山梔芎歸芍藥痛止用逍遙散加山梔而愈又因勞役患處腫脹小便仍澀用補中益氣加山梔茯苓丹皮而痊一婦人陰內痛癢不時出水食少體倦此肝脾氣虛濕熱下注用歸脾加丹皮山梔芍藥甘草主之而安一婦人陰內癢痛內熱倦怠飲食少思此肝脾鬱怒元氣虧損濕熱所致用參耆歸朮陳皮柴胡炒梔車前升麻芍藥丹皮茯苓而瘥若陰中有蟲癢痛亦屬肝木以桃仁雄黃研納陰中以殺之仍用清肝解鬱之藥有以雞肝納之者乃取蟲之法也一方搗新桃葉綿裹納陰中日三兩易李氏曰陰中生蟲𧈟如小蛆者乃濕熱甚而心氣又郁氣血凝滯而生此又謂脾胃濕熱下流而生蟲者宜藿香養胃湯補心湯硫鯉丸外用生艾汁調雄黃末燒煙燻之更用雄黃鋭散納陰中陰中生細蟲癢不可忍食入臟腑即死令人發寒熱與勞證相似先以蛇床子煎湯淨拭乾後用梓樹皮焙乾為未入枯礬四分之一麝香少許敷之立效如下疽生蟲所下如柿汁臭穢及心中絞痛悶絶虛煩甚者不治論陰戶生瘡大全云婦人少陰脈數而滑者陰中有瘡名曰𧈟或痛或癢如蟲行狀膿水淋瀝亦有陰蝕幾盡者皆由心神煩郁脾胃虛弱致血氣流滯耳故經云諸痛癢瘡皆屬於心若論諸痛癢瘡當從手少陰若以瘡在下部當從足少陰又云陽明主肌肉治之當補心養胃外以熏洗坐導藥治之乃可薛氏曰婦人陰中生瘡乃七情鬱火傷損肝脾濕熱下注其外證有陰中舒如蛇俗呼陰挺有翻突如餅俗呼陰菌亦有如雞冠花亦有生諸蟲亦有腫痛濕癢潰爛出水脹悶脫墜者俱屬肝膽之火少分虛實求治其內證口乾內熱體倦經候不調或飲食無味晡熱發熱胸膈不利脅肋不調小腹痞脹赤白帶下小水淋澀其治法腫痛者宜用四物湯加柴胡山梔牡丹皮龍膽草濕癢者宜用歸脾湯加山梔牡丹皮柴胡淋澀者宜用龍膽瀉肝湯加白朮牡丹皮潰腐者宜用加味逍遙散腫悶脫墜者宜用補中益氣湯加山梔牡丹皮佐以外治之法以腫痛屬血虛肝熱濕癢為脾虛肝熱淋澀屬肝腎有熱腐潰屬肝脾腫脫為不足有火故其立方如此論陰挺下脫大全云婦人陰挺下脫或因胞絡傷損或因子臟虛冷或因分娩用力所致此即陰㿉有謂藁本一味能治婦人㿉疝以其升舉太陽之氣也但與虛而下墜者非宜薛氏曰陰挺下脫當升補元氣為主若肝脾鬱結氣虛下陷用補中益氣湯若肝火濕熱小便澀滯用龍膽瀉肝湯一婦人陰中突出如菌四圍腫痛小便頻數內熱晡熱似癢似痛小便重墜此肝脾鬱結蓋肝火濕熱而腫痛脾虛下陷而重墜也先以補中益氣加山梔茯苓車前子青皮以清肝火升脾氣更以加味歸脾湯調理脾郁外以生豬脂和藜蘆末塗之而收一婦人陰中挺五寸許悶痛重墜水出淋瀝小便澀滯夕與龍膽瀉肝湯分利濕熱朝與補中益氣湯升補脾氣諸證漸愈再與歸脾湯加山梔川芎茯苓黃柏間服調理而愈後因勞役或怒氣下部濕癢小水不利仍用前藥即愈論陰冷良方云婦人陰冷因勞傷子臟風冷客之也薛氏曰陰冷屬肝經有濕熱外乘風冷所致若小便澀滯或小腹痞痛用龍膽瀉肝湯若內熱寒熱或經候不調用加味逍遙散若寒熱體倦飲食少思用加味四君子湯若鬱怒發熱少寐懶食用加味歸脾湯一婦人陰中寒冷小便黃澀內熱寒熱口苦脅脹此因肝經濕熱用龍膽湯祛利濕熱用加味逍遙散調補氣血而安一婦人所患同前更寒熱嘔吐兩股腫痛先用小柴胡加山梔一劑寒熱嘔吐頓止次用龍膽瀉肝湯一劑頓消一婦人陰中寒冷小便澄清腹中亦冷飲食少思大便不實下元虛冷治以八味丸月餘飲食漸加大便漸實又月餘諸證悉愈論交接出血作痛薛氏曰女人交接輒出血作痛此肝火動脾而不能攝血也用補中益氣湯濟生歸脾湯若出血過多而見他證但用前藥調補肝脾有一婦患此每交感後輒面黃如蠟亦終身不育論傷丈夫頭痛薛氏曰女人交接傷丈夫頭痛當用補中益氣湯六味地黃丸以滋化源為主補遺局方來復丹治婦人與男子交接相傷因而四肢沉重頭痛昏暈米飲吞下五十丸脈法脈經曰少陰脈滑而數者陰中生瘡少陰脈弦者白腸必挺核治陰戶腫痛龍膽瀉肝湯治肝經濕熱下部兩拗腫焮作痛小便澀滯陰挺如菌或出物如蟲等證龍膽草酒炒澤瀉各一錢車前子炒木通當歸酒拌生地黃酒炒山梔子炒黃芩炒生甘草各五分上銼水煎服瀉肝而兼導赤瀉其子也瀉肝而用利水肝主疏瀉也龍膽山梔假以降火當歸生地以滋肝陰生甘草緩肝之急炒黃芩助肝之氣玉門腫脹加木香加味四物湯治陰戶腫痛當歸川芎芍藥生地黃柴胡山梔子牡丹皮龍膽草上銼水煎服九味柴胡湯治肝經濕熱下注便毒腫痛或小腹脅肋結核凡肝膽經部分一切瘡瘍或風熱結核瘰癧並皆治之柴胡黃芩炒各一錢人參山梔炒半夏龍膽草炒焦當歸芍藥炒甘草各五分上銼水煎服加味小柴胡湯治肝經下部腫脹小便不利或寒熱往來或晡熱或胸脅作痛柴胡二錢黃芩炒一錢人參半夏山梔子牡丹皮各七分甘草上銼加生薑水煎服加味逍遙散治婦人肝脾血虛濕熱流注下部陰內潰爛癢發熱晡熱寒熱等證當歸芍藥白朮炒茯苓甘草炙各一錢山梔牡丹皮柴胡各五分上銼水煎服外以鶴蝨草煎湯洗菖蒲散治婦人陰戶腫痛月水澀滯菖蒲當歸各一兩炒秦艽一兩吳茱萸制五錢上為末每服五錢空心蔥湯調下或水煎服陰戶屬厥陰腫痛則氣壅血聚故用此四味以行心肝之氣血耳尤妙在蔥湯麻黃湯洗方治婦人陰腫或瘡爛麻黃黃連蛇床子各一兩北艾葉一兩半烏梅十個上銼細以水一斗煮取五升去滓熱洗避風冷其妙又在麻黃以麻黃氣悍能開竅而通氣也艾葉暖其下以其瘡爛故又佐以連床烏梅云經心録方治婦人陰中腫痛不可忍艾葉五兩防風三兩大戟二兩上銼細以水一斗煮取五升熱洗日三次宜避風冷陰腫者肝木之風也以防風瀉肝木之風邪以艾葉溫厥陰之結氣大戟瀉腫消毒故加之白礬散治婦人陰腫堅痛治熱腫白礬半兩甘草半分生大黃一分上為末水和丸如棗大綿裹納陰中日兩換以愈為度黑白散治婦人陰中腫痛小麥朴硝白礬五倍子蔥白煎湯頻洗枳橘尉治婦人陰腫如石如石者氣凝血滯也厥陰之經環陰器用此尉之是行其氣耳痛不可忍二便不利枳實陳皮各四兩上二味炒令香熱以絹袋盛之遍身從上至下及陰腫處頻頻尉之冷則又換直至喉中覺枳實氣則痛止腫消便利矣雜方治婦人陰中腫痛用枳實半斤切碎炒熱布裹包尉之冷即易一方用枳殼一方用鐵精粉敷上一方以甘菊苗研爛百沸湯淋洗熏浸一方用馬鞭草搗爛塗之鐵精平肝熱甘菊清肝熱而散馬鞭草散肝血治陰癢生蟲大黃散治婦人陰癢陰癢總是心肝二火遊行大黃微炒黃芩黃耆炙各一兩赤芍藥元參丹參山茱萸蛇床子各半兩上為細末每服二錢食前溫酒調服硫鯉丸治陰中生蟲亦治茄子疾生蟲由穢惡不潔外治無非殺蟲內治無非清火養陰大鯉魚一個去頭皮入硫黃一兩黃泥固用火煅煙盡為末米糊丸如桐子大每服二十丸溫酒下廣濟方療婦人陰癢不止蚺蛇膽雄黃硫黃硃砂硝石蕪荑各半兩藜蘆二錢半上為細末以臘月豬脂和如膏用故布作纏子如指長一寸半以藥塗上納陰中日一易之易時宜用花椒根三五兩水煮稍熱洗干拭納之先師云一婦患此日用熱水洗滌數次百方不效後隨夫任至山東食小米飯數月而愈豈亦補土而制濕歟觀此則治法又須補脾燥濕矣姑試之一方治陰中生細蟲癢不可忍若食人臟腑即死梓樹皮焙乾為末二錢枯礬五分麝香少許上和一處研勻敷之立效又方桃仁雄黃研勻納陰中乃服清肝解鬱之藥又方蛇床子白礬煎水淋洗即止又方狼牙二兩細銼蛇床子三兩以米三升煮汁沸熱洗又方取牛肝或豬肝截五寸繩緊納陰中半日蟲入肝取出立效又方取雞肝乘熱納陰中如有蟲當盡下又方新桃葉搗爛綿裹納陰中日三兩易又方生艾汁調雄黃末燒煙燻之更用雄黃末納陰中聖惠方療陰中有蟲癢且痛目腫身黃欲得男子漏血下白少氣思美食用鯉魚長一尺去頭肉取骨搗末熬黃黑以豬脂和以絹袋盛如常法納陰中至痛處即止蟲當自出崔氏療陰癢不可忍方杏仁燒作灰乘熱綿裹納陰中日二易之又方蒜煮湯洗之又方枸杞根煎湯洗又方小薊不拘多少水煎作湯熱洗日三次治陰戶生瘡補心湯治婦人陰戶生瘡名曰𧈟瘡或痛或癢如蟲行狀膿水淋瀝陰蝕已盡治之當補心養胃湯名補心我不知其所以補能治陰瘡我不知其所以治當問之知者人參茯苓前胡半夏湯泡七次川芎各七錢半陳皮枳殼去穰麩炒紫蘇桔梗乾薑甘草各五錢當歸白芍藥各一兩熟地黃一兩半上銼每服四錢加薑棗煎服如濕熱有蟲者去薑蘇參梗四味加苦參北艾桃仁吳茱萸水炒黃連藿香養胃湯治陽明經虛不榮肌肉陰中生瘡不愈此名養胃固宜第以陰中生瘡而歸之陽明經虛豈以上失生氣而自腐歟以此而推則食小米而陰𧈟乃愈者亦此意也藿香薏苡仁神麯炒烏藥去木砂仁半夏曲茯苓白朮人參各五分蓽澄茄甘草各三分半上銼薑棗煎服一方治陰內生瘡膿水淋瀝或癢痛此方清熱導濕活血排膿生肌乃太陰陽明少陰厥陰正法也升麻白芷黃連木通當歸川芎白朮茯苓上銼水煎服更用塌腫湯浴洗塌腫湯治婦人陰戶生瘡或癢痛或膿水淋瀝甘草乾漆各三錢生地黃黃芩當歸川芎各二錢鱉甲炙五分上銼作一劑用水數碗煎數沸去滓時常洗患處治陰瘡方蕪荑川芎黃芩甘草黃連白芷附子礬石雄黃各六銖上㕮咀取豬脂四兩合煎敷之治婦人陰瘡與男子妒精瘡大同小異方黃丹枯白礬萹蓄藁本各一兩荊芥蛇床子研極細白蛇皮一條燒灰硫黃各半兩上為細末另以荊芥蛇床子煎湯溫洗軟帛滲干清油調塗如瘡濕乾末摻之治疳瘡方因月後便行房致成湛濁湛濁為經事斷續不了了也伏流陰道疳瘡遂生瘙癢無時生用胡椒蔥白作湯一日兩三度淋洗卻服後藥黃耆鹽水炙菟絲子酒浸蒸沙苑蒺藜炒黑牽牛以補藥配牽牛以燥濕合通利何也赤石脂龍骨上為末煉蜜丸桐子大每服二十丸燕窩蒸酒澄上清者吞下燕窩酒奇黃芩湯洗方療婦人陰中生瘡活血清熱燥濕殺蟲當歸大黃黃芩川芎雄黃礬石各二分黃連一分凡方中有云分者音作忿每一分二錢半也上切以水五升取四升洗瘡日三度雄黃散活血開結殺蟲雄黃川芎當歸北細辛川椒藜蘆辰砂上為末綿裹納陰中又敷外瘡上忌如常法當歸湯治陰蝕當歸川芎芍藥甘草各二兩地榆三兩一方有蛇床子不用川芎上細切以水五升煮取三升去滓熏洗日三夜二又方燥濕生肌五倍子甘草滑石黃丹各等分上為末先以甘草湯洗然後敷之肘後方治婦人陰戶生瘡作癢或痛燥濕殺蟲杏仁炒雄黃白礬各五錢麝香二分上為細末敷入陰中一方單用硫黃研細敷之亦效銅緑散治男婦陰部濕淹瘡燥濕去腐生肌五倍子五錢白礬一錢乳香五分輕粉一字銅緑少許上為末洗淨摻之麝香杏仁散治婦人陰瘡入肝開竅殺蟲麝香少許杏仁不拘多少燒存性上為細末如瘡口深用小絹袋子二個盛藥滿系口臨上床炙熱安在陰中立愈柏蛤散治下疳濕瘡黃柏以磁鋒刮末蛤粉各等分上摻上即愈蓋黃柏去熱蛤粉燥濕故也又方平胃散加貫衆末貫衆殺蟲除熱每服二錢煮熟豬肝拌藥納陰戶數日可安治陰痔治婦人陰中生痔方九竅有肉突出者皆名為痔肉突為痔人嘗未諳烏頭醋洗亦所未知用烏頭七個燒存性用小瓦罐盛釅醋淬之乘熱熏候通手沃之良洗方治茄子疾茄皮白礬馬椿頭根朴硝澤蘭石灰炒少許上煮水熏洗敷藥治茄子疾朴硝為末黃荊柴燒瀝調敷或濃鐵漿水調敷又方治茄子疾心躁連綿黃水易治白水難愈用生枳殼為散煎湯熏洗卻用綿帛包枳殼滓納入陰中即日漸消治陰挺下脫當歸散治婦人陰中突出一物長五六寸名陰挺又名㿉疝當歸黃芩各二兩牡蠣一兩半蝟皮炙一兩赤芍藥五錢上為末每服二錢食前溫酒調下滾湯亦可如不應更以補中益氣湯倍加升麻柴胡兼服之又方治陰挺治在肝當歸穿山甲蒲黃炒各半兩辰砂一錢麝香少許上為末每服二錢酒調下尤效三茱丸治陰中生一物所大牽引腰腹膨脹痛至甚不思飲食皆因多服熱藥及煎爆或犯非理房事兼意淫不遂名陰挺食茱萸吳茱萸湯浸微炒山茱萸肉舶上蘹香白蒺藜桔梗慢火炒青皮去白各一兩五味子海藻洗焙大腹皮酒洗曬乾川楝子去核玄胡索各一兩二錢半上為末酒糊丸如桐子大每服三十五丸木通湯下下虛加川烏炮去皮肉桂去粗皮各一兩腰腹痛甚加桃仁去皮尖麩炒別研青皮去白枳實去穰各一兩真南木香七錢半服之一方每服二錢生地黃湯調仍用金毛狗脊五倍子白礬水楊根魚腥草山黃連各一兩為散分作四服以有嘴瓦罐煎熟預以銀錫作一長小筒下透罐嘴嘴上貫挺上先熏後洗立效更服白薇散凌霄花少許煎一捻金丸服前藥未效卻用此此是肝家藥玄胡索舶上蘹香吳茱萸炒川楝子去核青木香各二兩上為末粳米飯糊丸如桐子大每服三十五丸空心木通湯服又用梅花腦子半錢鐵孕粉一錢水調刷上腦子辛涼透髓鐵粉以金平肝散而制之誠治法之正也如陰畔生疱以涼血餘每服三錢加凌霄花少許煎空心服立效治婦人陰挺出下脫方桂心一方作川椒吳茱萸一兩生用戎鹽二兩上藥並炒令色變搗羅為末以綿裹如指大納陰中日再易之甚妙又方川椒川烏頭並生用白及各半兩上搗羅為末綿裹一錢納陰中深三寸腹中熱即止來日再用之又方蛇床子五兩烏梅二七枚以水五升煮取三升去滓稍熱洗之每日夜三五度用又方硫黃烏賊骨各半兩搗羅為末敷之又方鐵精細研以羊脂調布裹炙熱尉之以瘥為度又方用羊脂煎令適暖取塗上以鐵精敷之多少令調以火炙布暖尉肛上漸塗納之然後末磁石酒服方寸匕日三熏洗法用荊芥穗臭椿樹皮藿香葉煎湯熏洗即入托藥用萆麻子葉有九角者好飛過白礬為末以紙片攤藥托入摻藥先以淡竹根煎湯洗仍用五倍子白礬為末乾摻立效敷藥用溫鹽水洗軟卻用五靈脂燒煙燻次用萆麻子研爛塗上吸入如入即洗去治陰冷五加皮浸酒方治婦人癖瘦陰冷總是寒者溫之而地骨天門又所以清上而實下也五加皮乾薑丹參蛇床子熟地黃杜仲各三兩地骨皮天門冬各一兩鍾乳粉四兩上銼碎以生絹袋盛用酒十五斤漬二宿每服一盞空心食前飲之一方用枸杞子無地骨皮枸杞尤佳八味丸治血弱不能榮養臟腑津液枯澀風寒客於子臟以致陰冷熟地黃半斤杵膏山茱萸乾山藥各四兩牡丹皮白茯苓澤瀉各三兩肉桂附子各一兩上為末和地黃膏加煉蜜為丸如桐子大每服七八十丸空心食前白滾湯下治婦人陰冷方遠志乾薑蓮花各半兩蛇床子五味子各一兩上搗羅為末每用兼以兔糞塗陰門用綿裹一錢納陰中熱即為效又方蛇床子吳茱萸甜葶藶各半兩沒石子一枚上為末綿裹棗許大納陰中令腹內熱為度又方蛇床子一兩吳茱萸一兩半生用一方用麝香上為末煉蜜丸如酸棗大以綿裹納陰中下惡物為度溫中坐藥用蛇床子為末白粉少許和勻如棗大綿裹納之自然溫熱有效又方吳茱萸入牛膽中令滿陰乾百日每取二十粒研碎帛裹納陰中良久如火熱治交接出血作痛千金方治女人交接出血溫養其陰則陽舒而受矣蓋寒則氣閉故致傷焉桂心伏龍肝各五錢上為末酒服方寸匕瘥止又方黃連六分牛膝甘草各四分每一分二錢半也上細切以水四升煮取二升洗日三四度瘥又方亂髮青皮二味燒灰敷之又方用熟艾緊裹一團然後以綿裹納陰中集驗方療女人交接陽道違理及他物所傷犯血流瀝不止者取釜底墨斷葫蘆塗藥納之以何物調塗之又方療童女交接陽道違理血出不止用燒發並青布末為粉塗之一方割雞冠血塗之一方以赤石脂末摻之一方五倍子末乾摻亦良小戶嫁痛方按此方嫁痛之故乃肝陽不足宜養肝之陽以陰主合陽主開也甘草生薑各五分白芍藥四分桂心二分上銼以水二升煎三四沸服又方海螵蛸燒為末酒調服方寸匕日三服又方小麥甘草二味各等分煎湯洗甚效治傷丈夫頭痛集驗方治女人傷丈夫四肢沉重噓吸頭痛傷丈夫則淫欲過也或肝陰不足歟此方既補肝陰復壯肝氣服之自效生地黃八兩芍藥五兩甘草三兩香豉一升蔥白一斤生薑四兩上以水七升煮取二升半分三服不得重作忌房事桑白皮湯治婦人傷丈夫苦頭痛欲嘔悶此溫中藥也於治嘔悶固宜至頭痛而用桑皮則莫為之解桑白皮半兩乾薑一絮桂心五寸大棗二十枚上切以酒一斗煮三四沸去滓分溫服衣適厚薄毋令汗出附治腳癬金蓮穩步膏治婦人腳趾縫壞痛黃連黃柏黃丹荊芥微炒各等分上為細末摻腳趾縫內布扎縛自然平穩不痛
