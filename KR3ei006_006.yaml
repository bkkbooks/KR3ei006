body:
  text: 卷之六求子門論求子須知先天之氣胡氏曰男女交媾其所以凝結而成胎者雖不離乎精血猶為後天滓質之物而一點先天真一之靈氣萌於情欲之感者妙合於其間朱子所謂稟於有生之初悟真篇所謂生身受氣初者是也醫之上工因人無子語男則主於精語女則主於血著論立方男以補腎為要女以調經為先而又參之以補氣行氣之説察其脈絡究其虧盈審而治之夫然後一舉可孕天下之男無不父女無不母矣論求子脈須和平陳楚良曰人身氣血各有虛實寒熱之異惟察脈可知以尺寸浮沉分氣血舍脈而獨言藥者妄也脈有十二經應十二時一日一周與天同運循環無端其至也既不宜太過而數數則熱矣又不宜不及而遲遲則寒矣不宜太有力而實非正氣能自實也正氣虛而火邪來乘以實之也治法先當散郁以伐其邪邪去而後正可補也不宜太無力而虛虛乃正氣正血虛也治法惟當補其氣血耳又須分出氣虛血虛不可並補亦有男婦上熱下寒寒熱有上下治法分早晏表實裡虛而未得子者法當臨睡時服涼膈之藥以清其上每晨食未入口時服補藥以溫其下暫進升散之藥以達其表及服厚味之藥以實其里又有女人氣多血少寒熱不調月水違期或後或先白帶頻下而無子者皆當診脈而以活法治之務欲使其夫婦之脈皆和平有力不熱不寒交合有期不妄用精必能生子子不殤夭故欲得子者必須對脈立方因病用藥論求子先調經樓氏曰求子之法莫先調經理婦人者先須熟此症治每見婦人之無子者其經必或前或後或多或少或將行作痛或行後作痛或紫或黑或淡或凝而不調不調則血氣乖爭不能成孕矣詳夫不調之由其或前或後及行後作痛者虛也其少而淡者血虛也多者氣虛也其將行作痛及凝塊不散者滯也紫黑色者滯而挾熱也治法血虛者四物氣虛者四物加參耆滯者香附縮砂木香檳榔桃仁玄胡滯久而沉痼者吐之下之湧泄調經惟子和可法脈證熱者四物加芩連脈證寒者四物加桂附及紫石英之類是也直至積去滯行虛回然後氣血和平能孕子也豫每治經不調者只一味香附末有積滯則汙濁不清虛未回則新生之氣不鼓一味香附有去舊生新之妙醋為丸服之亦百發百中也論求子貴養精血袁了凡先生云聚精之道一曰寡欲二曰節勞三曰息怒四曰戒酒五曰慎味此五者非特求子者之良藥亦可為攝生者之真方今之談養生者多言採陰補陽久戰不泄此為大謬腎為精之府凡男女交接必擾其腎腎動則精血隨之而流外雖不泄精已離宮未能堅忍者亦必有真精數點隨陽之痿而溢出此其驗也如火之有煙焰豈有復反於薪者哉是故貴寡欲精成於血不獨房室之交損吾之精凡日用損血之事皆當深戒如目勞於視則血於視耗耳勞於聽則血以聽耗心勞于思則血于思耗吾隨事而節之則血得其養而與日俱積矣是故貴節勞主閉藏者腎也司疏泄者肝也二臟皆有相火而其繫上屬於心心君火也怒則傷肝而相火動動則疏泄者用事而閉藏不得其職雖不交合亦暗流而潛耗矣是故當息怒人身之血各歸其舍則常凝酒能動血人飲酒則面赤手足俱紅是擾其血而奔馳之也血氣既衰之人數月無房事精始厚而可用然使一夜大醉精隨薄矣是故宜戒酒內經云精不足者補之以味然濃郁之味不能生精惟恬淡之味乃能補精耳蓋萬物皆有真味調和勝而真味衰矣不論腥素淡煮之得法自有一段沖和恬淡之氣益人腸胃洪範論味而曰稼穡作甘世間之物惟五穀得味之正但能淡食穀味最能養精又凡煮粥飯而中有厚汁滾作一團者此米之精液所聚也食之驟能生精試之有效煉精有訣全在腎家下手內腎一竅名玄關外腎一竅名牝戶玄牝內外之説固是舊話然猶未確真精未泄乾體未破則外腎陽氣至子時而興人身之氣與天地之氣兩相吻合至論精泄體破而吾身陽生之候漸晚有醜而生者次則寅而生者又次則卯而生者有終不生者始與天地不相應矣煉之之訣須半夜子時即披衣起坐兩手搓極熱以一手將外腎兜住以一手掩臍而凝神於內腎內腎二字還差一線須得口訣久久習之而精旺矣論求子必知氤氳之時袁了凡先生云天地生物必有氤氳之時萬物化生必有樂育之時貓犬至微將受娠也其雌必狂呼而奔跳以氤氳樂育之氣觸之而不能自止耳此天然之節候生化之真機也世人種子有云三十時辰兩日半二十八九君須算此特言其大概耳非的論也丹經云一月止有一日一日止有一時凡婦人一月經行一度必有一日氤氳之候於一時辰間氣蒸而熱昏而悶有欲交接不可忍之狀此的候也於此時逆而取之則成丹須得逆取之道待之便是築基此先天氣生時也順而施之則成胎矣其曰三日月出庚又曰溫溫鉛鼎光透簾幃皆言其景象也當其欲情濃動之時子宮內有如蓮花蕊者不拘經淨幾日自然挺出陰中如蓮蕊初開內人洗下體以手探之自知也但含羞不肯言耳男子預密告之令其自言一舉即中矣論合男女必當其年褚尚書求男論云建平孝王妃姬皆麗無子擇民家未笄女子入御又無子問曰求男有道乎澄對曰合男女必當其年男雖十六而精通必三十而娶女雖十四而天癸至必二十而嫁今有年二十而乳子者亦事之變也皆欲陰陽完實然後交而孕孕而育育而子堅壯強壽今未笄之女天癸始至已近男色陰氣早泄未完而傷未實而動是以交而不孕孕而不育育而子脆不壽此王之所以無子也然婦人有所産皆女者有所産皆男者大王誠能訪求多男婦人至宮府有男之道也方是求子一法王曰善未再期生六男夫老陽遇少陰老陰遇少陽亦有子之道也論男女精血盛衰褚尚書曰飲食五味養髓骨肉血肌膚毛髮男子為陽陽中必有陰陰中之數八故一八而陽精升二八而陽精溢女子為陰陰中必有陽陽中之數七故一七而陰血升二七而陰血溢陽精陰血皆飲食五味之秀實也盛衰之道在七損八益中方其升也智慮開明齒牙更始發黃者黑筋弱者強暨其溢也凡充身肢體手足耳目之餘雖針芥之瀝無有不下凡子形肖父母者以其精血嘗於父母之身無所不瀝也是以父一肢廢則子一肢不肖其父母一目虧則子一目不肖其母精未通而御女以通其精則五體有不滿之處異日有難狀之疾陰已痿而思色以降其精則精不出內故小便道澀而為淋精已耗而復竭之則大小便道牽疼愈疼則愈欲大小便愈便則愈疼女人天癸既至逾十年無男子合則不調未逾十年思男子合亦不調不調則舊血不出新血誤行或漬而入骨或變而之腫或雖合而難子合男子多則瀝枯虛人産乳衆則血枯殺人觀其精血思過半矣血竭者淫白液精竭者必血來一以氣不及化血一以血不及化精二者病則一般其為害又不止於此論成胎分男女之異褚尚書曰男女之合二精皆暢陰血先至陽精後沖血開裹精精入為骨而男形成矣陽精先入陰血後參精開裹血血入為骨而女形成矣陽氣聚面故男子面重溺死者必伏陰氣聚背故女子背重溺死者必仰走獸溺死仰伏皆然陰陽均至非男非女之身精血散分駢胎品胎之兆父少母老産女必羸母壯父衰生男必弱古之良工首察乎此氣受偏瘁與之補之補羸女則養血壯脾補弱男則壯脾節色羸女宜及時而嫁弱男宜待壯而婚此疾外所務之本不可不察也丹溪曰成胎以精血之後先分男女者褚澄之論也愚竊惑焉後閲東垣方有曰經水斷後一二日血海始淨精勝其血感者成男四五日後血脈已旺精不勝血感者成女此論亦為未瑩何以言之易曰乾道成男坤道成女夫乾坤陰陽之性情也左右陰陽之道路也男女陰陽之儀象也父精母血因感而會精之泄陽之施也血能攝之陰之化也精成其骨此萬物資始於乾元也血成其胞此萬物資生於坤元也陰陽交媾胎孕乃凝胎之所居名曰子宮一系在下上有兩歧一達於左一達於右精勝其血及剛日陽時感者則陽為之主受氣於左子宮而男形成精不勝血及柔日陰時感者則陰為之主受氣於右子宮而女形成或曰分男分女吾知之矣其有雙胎者將何如曰精氣有餘歧而分之血因分而攝之故也故夫男女同孕者剛日陰時感柔日陽時感則陰陽混雜不屬左不屬右受氣於兩歧之間者也亦有三胎四胎五胎六胎者猶是而已或曰其有男不可為父女不可為母與男女之兼形者又若何而分之耶豫曰男不可為父得陽氣之虧者也女不可為母得陰氣之塞者也兼形者由陰為駁氣所乘而為狀不一以女兼男形者有二一則遇男為妻遇女為夫一則可妻而不可夫又有下為女體上具男之全形此又駁之者也或曰駁氣所乘獨見於陰而所乘之形又若是之不同耶豫曰陰體虛駁氣易於乘也駁氣所乘陰陽相混無所為主不可屬左不可屬右受氣於兩岐之間隨所得駁氣之輕重而成形故所兼之形有不可得而同也論男女各由百脈齊到程鳴謙云褚澄氏言男女交合陰血先至陽精後沖而男形成陽精先入陰血後參而女形成信斯言也人有精先泄而生男精後泄而生女者獨何歟東垣曰經水才斷一二日血海始淨感者成男四五日血脈已旺感者成女至於六七日後則雖交感亦不成胎信斯言也人有經始斷交合生女經久斷交合生男者亦有四五日以前交合無孕八九日以後交合有孕者獨何歟俞子木撰廣嗣要略著方立圖謂實陽能入虛陰實陰不能受陽即東垣之故見也又謂微陽不能射陰弱陰不能攝陽信斯言也世有尪羸之夫怯弱之婦屢屢受胎雖欲止之而不能止者亦有血氣方剛精力過人顧乃艱於育嗣而莫之救者獨何歟朱丹溪論治專以婦人經水為主然富貴之家侍妾已多其中寧無月水當期者乎有已經前夫頻頻生育而娶此以圖其易者顧亦不能得胎更道與他人轉盼生男矣豈不能受孕於此而能受孕於彼乎愚以為父母之生子如天地之生物易曰坤道其順乎承天而時行承天之行乃是至理然有不毛之地豈坤道不順乎夫知地之生物不過須承乎天則知母之生子亦不過順承乎父而已知母之須承乎父則種子者果以婦人為主乎以男子為主乎然所謂主於男子者不拘老少強弱康寧病患精易泄難泄只以交感之時百脈齊到為善耳交感而百脈齊到雖老弱病患易泄亦可以成胎交感而百脈參差雖少強雖康寧雖難泄亦難以成胎矣婦人所構之血固由於百脈合聚較之男子之精不能無輕重之分也孔子贊乾元資始曰大贊坤元資生曰至得無意乎若男女之辨又不以精血先後為拘不以經盡幾日為拘不以夜半前後交感為拘不以父強母弱母強父弱為拘只以精血各由百脈齊到者別勝負耳是故精之百脈齊到有以勝乎血則成男矣血之百脈齊到有以勝乎精則成女矣至有既孕而小産者有産而不育有育而不壽者有壽而黃者無疆者則亦精血之堅脆分為修短耳世人不察其精血之堅脆已定於稟受之初乃以小産專責之母以不育專付之兒以壽夭專諉之數不亦謬乎趕經法求嗣全書載趕經調和訣云有一等女人月經來時專在下弦之期必用養血之法以逐之視其色紫則知血熱服涼血藥以緩其氣則氣血和而來遲漸漸趕之定到初頭視其色淡短少者則服養血和血藥養其命門亦趕到初頭察女人肥瘦強弱而用藥一月便不能合趕之之久定到上弦此趕經之法也經有不可趕者謂女人之經有一年一度行者有四季行者以女人上弦交多生男耳又有一等女人身體肥胖子宮脂膜長滿經水雖調亦令無子須服開子宮之藥以消其脂膜逐月養胎法袁先生云巢氏論婦人妊娠一月名胎胚足厥陰脈養之二月名始膏足少陽脈養之三月名始胎手少陰脈養之四月始受水精以行血脈手少陽脈養之五月始受火精以成其氣足太陰脈養之六月始受金精以成其筋足陽明脈養之七月始受木精以成其骨手太陰脈養之八月始受土精以成膚革手陽明脈養之九月始受石精以成毛髮足少陰脈養之十月臟腑關節人神俱備足太陽脈養之此其大略也胚胎兆於一氣胚者氣之形膏者氣之凝胎者形之著先天以制生化故以水火金木土石制而化焉後天順序而成故以木火土金水相生而養以逆而化以順而成自然之妙也若求其細則受胎在腹七日一變展轉相成各有相生大集經備矣今婦人墮胎在三月五月七月者多在二四六月者少臟陰而腑陽三月屬心五月屬脾七月屬肺皆在五臟之脈陰常易虧故多墮耳如昔曾三月墮胎則心脈受傷先須調心不然至三月復墮昔曾五月墮胎則脾脈受傷先宜治脾不然至五月復墮惟有一月之內墮胎則人皆不知有胎但知不受妊不知其受而墮也一月屬肝怒則墮多洗下體則竅開亦墮一次既墮則肝脈受傷他次亦墮今之無子者大半是一月墮胎非盡不受妊也故凡初交之後最宜將息勿復交接以擾其子宮勿令怒勿令勞勿令舉重勿令洗浴而又多服養肝平氣之藥胎可固矣論痰飲不孕張子和云戴人過譙都營中飲會有一卒説出妻事戴人問其故答曰吾婦為室女時心下有冷積如覆杯按之如水聲以熱手尉之如冰娶來已十五年矣恐斷吾嗣是以去之戴人曰公勿黜也如用吾藥病可除孕可得卒從之戴人診其脈寸脈沉而遲尺脈洪大有力非無子之候也可不逾年而孕其良人笑曰試之先以三聖散吐涎一斗心下平軟次服白朮調中湯五苓散後以四物湯和之不再月氣血合度數月而娠一子戴人常曰用吾此法無不子之婦此言不誣一婦人年三十四歲夢與鬼神交驚怕異常及見神堂陰司舟楫橋梁如此一十五年竟無妊娠巫祈覡禱無所不至鑽肌炙肉孔穴萬千黃瘦發熱引飲中滿足腫委命於天一日苦請戴人戴人曰陽火盛於上陰水盛於下見鬼神者陰之靈神堂者陰之所舟楫橋梁水之用兩手寸脈皆沉而伏知胸中有實痰也凡三湧三泄三汗不旬日而無夢一月而有娠此二案非子和先生不能論求子禁用熱劑丹溪秦桂丸論曰無子之因多起於婦人醫者不求其因起於何處遍閲古方惟秦桂丸其辭確其意專用溫熱藥近乎人情欣然受之鋭然服之甘受燔灼之禍猶懵然不悔何者陽精之施陰血能攝之精成其子血成其胞胎孕乃成今婦人之無子者率由血少不足以攝精也血之少也固非一端然欲得子者必須調補陰血使無虧欠乃可推其有餘以成胎孕何乃輕用熱劑煎熬臟腑血氣沸騰禍不旋踵矣或曰春氣溫和妙在溫和二字蓋大寒大熱皆不能生物故也則萬物發生冬氣寒凜則萬物消隕非秦桂丸之溫熱何以得子臟溫暖而成胎耶豫曰詩曰婦人和平則樂有子和則血氣均平則陰陽不爭今得此藥經血必轉紫黑漸成衰少或先或後始則飲食驟進久則口苦而干陰陽不平血氣不和疾病蜂起焉能成胎縱然成胎生子亦多病而不壽以秦桂丸耗損天真之陰也戒之慎之按秦桂丸施於肥人而少其丸數兼服調理補藥亦無妨但忌施於瘦人火多者也此注最當論孕子雜法丹溪曰婦人無子者多由血少不能攝精俗醫悉謂子宮虛冷投以辛熱之藥煎熬臟腑血氣沸騰禍不旋踵或有服艾者不知艾性至熱艾性雖熱實暖下焦寒者宜之入火炙則下行入藥服則上行多服則致毒咎將誰挽若是肥盛婦人稟受甚厚恣於酒食之人經水不調不能成胎謂之軀脂滿溢閉塞子宮宜行濕燥痰用星半蒼朮臺芎防風羌活滑石或導痰湯之類若是瘦怯性急之人經水不調不能成胎謂之子宮乾澀無血不能攝受精氣宜涼血降火或四物湯加香附黃芩柴胡養血養陰等藥東垣有六味地黃丸以補婦人之陰血不足六味丸果驗無子服之者能使胎孕薛氏曰婦人之不孕亦有因六淫七情之邪有傷衝任或宿疾淹留傳遺臟腑或子宮虛冷或氣旺血衰或血中伏熱又有脾胃虛損不能營養衝任求責極當誠哉言也審此更當察其男子之形質虛實何如有腎虛精弱不能融育成胎者有稟賦元弱氣血虛損者有嗜欲無度陰精衰憊者各當求其原而治之至於大要則當審男女之尺脈若左尺微細或虛大無力者用八味丸左尺洪大按之無力者用六味丸兩尺俱微細或浮大者用十補丸豈此三方所能盡宜擴充之若誤用辛熱燥血不惟無益反受其害脈法素問曰督脈生病女子不孕脈經曰婦人少腹冷惡寒久年少者得之此為無子年大者得之絶産脈微弱而澀年少得此為無子中年得此為絶産肥人脈細胞有寒故令少子其色黃者胸中有寒治血虛不孕加味四物湯治婦人不孕久服有子甚好當歸川芎各二錢白朮微炒熟地黃酒洗各一錢半白茯苓芍藥微炒續斷阿膠各一錢香附醋煮八分橘紅七分甘草炙三分上銼水二鍾煎八分食遠服極穩當但氣旺血熱者須去芎術而當歸味辛有熱症者亦須裁酌加味四物湯治血氣兩虛不孕當歸酒洗白芍藥炒肉蓯蓉各二錢熟地黃酒洗白朮白茯苓各一錢人參五分川芎一錢上銼水煎服每月經前三服經正行三服經行後三服調經種玉湯凡婦人無子多因七情所傷致使血衰氣盛經水不調或前或後或多或少或色淡如水或紫如血塊或崩漏帶下或肚腹疼痛或子宮虛冷不能受孕宜此藥百發百中效可通神當歸酒洗川芎吳茱萸炒各四錢熟地黃酒洗香附炒各六錢白芍藥白茯苓去皮陳皮牡丹皮玄胡索各三錢上銼作四劑每一劑加生薑三片水一碗半煎一碗空心溫服渣再煎臨臥服待經至之日服起一日一劑藥盡經止則當交媾即成孕矣縱不成孕經當對期俟經來再服四劑必孕無疑若過期而經水色淡者加官桂炒乾薑熟艾各二錢若先期三五日色紫者加條芩三錢經驗育胎丸治婦人久無子嗣服此經調血盛子宮溫暖成孕孕後服之可保胎氣堅固妙在調氣當歸酒浸熟地黃酒蒸白朮香附各四兩砂仁三兩芍藥酒炒川芎川續斷酒洗陳皮黃芩酒炒各二兩上為細末糯米糊丸如桐子大每服七八十丸空心淡醋湯下酒亦可以乾物壓之婦人歸附丸不但重子且無小産産後諸證香附子大者砂罐內醋煮極熟水洗焙乾為末一斤當歸大者去蘆梢用身酒洗切片焙乾為末十兩鹿角大者刮去粗皮鎊末二三兩綿紙墊鐵鍋內文火炒為細末用二兩二味簡切尤妙在鹿角屑上三味和勻醋糊丸如桐子大每服三錢早起臨睡各一服白滾湯下一月經後入房即孕神仙附益丸不惟治婦人百病而生育之功效如神不雜血藥而能調血不類辛香而能調氣凡胎前産後俱可服謂之仙方亦宜香附米一斤用童便浸透取出水洗淨露一宿曬乾再浸再露再曬如此二次用益母草十二兩東流水洗淨烘乾為末上再用香附四兩北艾一兩煮汁用三分醋七分和前藥為丸如桐子大每服五七十丸空心臨臥淡醋湯下加味地黃丸治婦人久無孕育者效如影響熟地黃四兩山茱萸肉山藥各二兩白茯苓牡丹皮各一兩五錢澤瀉香附子童便炒各一兩蘄艾醋煮五錢上為末煉蜜丸如桐子大每服七八十丸滾湯下金蓮種子仙方一名夢熊丸有小茴香二兩無熟地黃女人服之有孕熟地黃酒洗當歸酒洗白芍藥酒炒黃益母草川芎酒洗蒼朮米泔水浸一宿各三兩蛇床子酒洗炒條芩酒洗覆盆子炒玄胡索微炒陳皮水洗去白丹參水洗各二兩砂仁去殼一兩五錢山茱萸酒浸去核香附四制各五兩上為極細末先用白毛烏骨雄雞一隻預先餵養一月勿令與雌雞同處臨時將雞縊死不出血干去毛剖開去腸內汙物並嗉內宿食肫內黃皮用酒洗淨一應時件仍裝入雞肚內不令見水置壇內入酒二斤封固重湯煮爛取出割下淨肉搗如泥仍將雞骨用酥油和原汁或酒炙酥為末入前藥末內拌勻再用醋煮米糊同雞肉木臼內搗極細為丸如桐子大每服四五十丸漸至八九十丸空心清米飲下此亦烏骨雞丸之變方他方多用參耆白朮以補氣而此兼蒼朮砂仁益母以行氣他方又佐以艾桂椒薑等熱藥以溫經此則以蛇床山茱萸暖其下而又以條芩佐之則寒熱平均可無偏弊之害矣服之當自有驗如月信先期而至者加黃芩地骨皮黃連各一兩半清米飲下如月信後期而至者加黃耆一兩人參白朮各一兩半溫酒或淡鹽湯下如白帶者加蒼朮白朮升麻白芷各一兩半淡薑湯下此方加法服法尤為精當可冠諸方而變通之理又頭頭是道矣玩之玩之百子建中湯女人服此藥調經養血安胎順氣不問胎前産後月事參差有餘不足諸證悉皆治之當歸酒洗南川芎白芍藥酒炒熟地黃薑汁浸焙真阿膠蛤粉炒成珠蘄艾葉醋煮各二兩上為細末煉蜜丸如桐子大每服八十丸空心白沸湯點醋少許下內寒者溫酒下服法須知加味養榮丸此方服之有孕且無小産之患當歸酒浸熟地黃酒浸白朮各二兩芍藥川芎黃芩香附各一兩半陳皮貝母去心茯苓麥門冬去心各一兩阿膠甘草炙各五錢黑豆炒去皮四十九粒上為細末煉蜜丸如桐子大每服七八十丸食前空心白湯酒任下忌食諸血此平順之劑而麥門黑豆亦心腎藥也而貝母與熟地同用能無功過相掩乎加味香附丸男服聚精丸女服此香附一斤分四分一分酒浸二宿搗碎炒一分米醋浸同上一分童便浸同上一分用山梔四兩煎濃汁浸同上澤蘭淨葉六兩酒洗海螵蛸六兩搗稍碎炒當歸四兩酒洗川芎三兩白芍四兩酒炒熟地黃八兩搗膏焙乾上為末用浮小麥面酒醋水打糊為丸如緑豆大每日早晚兩服白湯酒任下忌食萊蔔及牛肉生冷此妙在澤蘭螵蛸而學者尤須審症的確熟察本草便能得方中三昧靈素一言矣大五補丸瘦人無孕乃無血攝精宜潤天門冬去心麥門冬去心菖蒲茯苓人參益智枸杞子地骨皮遠志肉熟地黃各等分上為細末煉蜜丸如桐子大每服三十丸空心酒下服本方數服後以七宣丸泄之增損三才丸天門冬酒浸去心熟地黃酒蒸人參遠志去心五味子茯苓酒洗鹿角酥炙上為細末煉蜜杵千下為丸如桐子大每服五十丸空心好酒下年老欲補加混元衣即頭生兒胎衣全個酒浸曬乾為末入藥一方加白馬莖酥炙一方加附子補相火不足一方加麥門冬令人有力一方加續斷以續筋骨一方加沉香暖下焦虛冷此二方系男人藥也藉以治婦人之無嗣者正所謂因病以變方勿拘方以治病神效墨附丸治婦人久無子而經事不調及數墮胎者服之可立致效香附一斤分四分用米醋童便鹽水酒各浸一日夜綿艾四兩用米醋二碗同香附煮乾搗爛成餅新瓦焙乾白茯苓人參當歸川芎熟地黃酒浸一宿上等徽墨火煅醋淬各一兩木香五錢上九味各另為末醋糊丸如桐子大每服五十丸空心好酒下青蒿烏雞丸婦人服能令多子青蒿即野蒿五月採一斤香附子童便鹽水酒醋各浸四兩炒共一斤蘄艾醋煮秦當歸酒浸一宿炒牡丹皮地骨皮白芍藥酒浸炒黃耆蜜炙茯苓人參白朮川芎各二兩鱉甲醋煮一兩五錢上為細末取白毛烏骨雄雞一隻初發聲者絞殺干去毛不用水湯亦不用水洗惟用水去腳上粗皮用好酒入瓷器內同熟地黃二兩煮雞熟去骨合前藥搗爛作餅復曬乾為末仍用煮雞酒調糯米粉為糊丸如桐子大每服七八十丸酒下日二三服不拘時一月見效造藥忌鐵器大烏雞丸治女人羸瘦血虛有熱經水不調崩漏帶下不能成胎及骨蒸等證香附一斤四制熟地黃四兩生地黃當歸白芍藥人參各三兩川芎鱉甲各三兩半白朮黃耆牛膝柴胡牡丹皮知母貝母各二兩黃連地骨皮玄胡索乾薑各一兩白茯苓二兩半秦艽一兩半艾葉青蒿各四兩上香附等二十一味俱為細末用白毛烏骨雄雞一隻緝死去毛與腸將艾蒿各一半裝入腹內將雞並余艾蒿同入壇內以童便和水浸過雞二寸許隔湯煮爛取出去骨焙肉乾為末如有筋骨疼痛者去肉焙骨焦為末與前末和勻雞汁打糊為丸如桐子大每服五六十丸漸加至七八十丸溫酒或米飲下忌煎炒莧菜小烏雞丸治婦人百病吳茱萸良薑白薑當歸白芍藥玄胡索破故紙川椒陳皮劉寄奴生地黃莪朮川芎各一兩北艾二兩荷葉灰四兩巧只在荷葉灰一味上為末用白毛烏骨雞緝死煮爛去骨取肉搗如泥拌藥末曬乾磨細以雞汁作糊為丸如桐子大每服五十丸空心隨引下如從來未曾生育者乃油膜包裹子宮以致不能生氣成孕宜加鳳凰衣燒存性七個用鳳凰衣更巧中之巧硃砂為衣如腹痛血黑色者加炒黃連有濕痰者加南星蒼朮香附同丸月水不通紅花蘇木酒下子宮久冷茯苓煎湯下赤帶清茶下白帶牡蠣粉調酒下血崩豆淋酒調綿灰下胎不安蜜酒下此方太熱非胎不安者所宜腸風陳米飲調百草霜下心痛菖蒲酒下腹痛芍藥酒下胎漏下血烏梅酒下胎死不動斑蝥三個調酒下斑蝥太毒不可妄試胎衣不下蕓薹菜研水下胎前産後白痢乾薑煎湯下赤痢甘草煎湯下赤痢之用亦在荷葉乎耳聾臘茶清下頭風薄荷煎湯下頭風眼黑甘草湯下身體疼痛黃耆末調酒下腰腳痛當歸酒下生瘡地黃煎湯下頭風眼黑俱宗青震之義生瘡豈可用熱藥氣塊血塊作痛與蔥白湯間服四肢浮腫麝香湯下咳嗽喘滿杏仁桑白皮煎湯下常服溫酒醋任下十全濟陰丸方論曰胎嗣主於濟陰者何也蓋人之所稟陽常有餘陰常不足氣常有餘血常不足在女人癸水易虧而難盈以至不育舊方多以辛香熱燥之劑為溫暖子宮偏助陽氣反耗陰血豈能成胎況女性多氣多郁氣多則為火郁多則血滯故經脈不行諸病交作生育之道遂阻矣又如脾胃虛弱者偏用四物涼血等藥則脾胃益虛飲食頓減使氣血無資生之地何以得成胎孕為子嗣之計者莫如養血順氣調經為本而兼以甘溫養脾辛溫開鬱斯為至當其調經之法又當因人而加減之初無一定之法也此方則以當歸身養血和氣為君入手少陰經以心主血也入足太陰經以脾裹血也入足厥陰經以肝藏血也熟地黃補腎中元氣生心血與芍藥同用又生肝血川芎乃血中之氣藥下行血海通經導氣為臣人參通經活血助熟地黃以補下元白朮利腰臍間血與人參同用補益脾氣香附疏氣散郁佐澤蘭能生新血而和平氣體牡丹皮養新血去壞血固真氣行結氣山藥能強陰補虛枸杞子補腎水而止下血腰疼為佐紫石英補心氣散心中結氣填補下焦艾葉助香附和百脈溫子宮兼行血藥而平其寒炙甘草通經脈血氣而和諸藥且緩肝經之急為使十年不孕者此藥主之當歸身酒洗熟地黃香附子童便煮各四兩乾山藥白朮各二兩五錢枸杞子人參各二兩蘄艾葉去梗筋二兩同香附用陳醋老酒煮一時搗爛焙乾川芎白芍藥牡丹皮紫石英火煅淬各一兩五錢澤蘭一兩紫河車一具在淨水內洗去穢血用銀針挑去紫筋上各藥俱咀片同河車入砂鍋內用陳老酒三碗陳米醋一碗清白童便一碗米泔水數碗和勻傾入鍋內浮於藥寸許如尚少再加米泔以鍋蓋蓋密勿令透氣桑柴火慢煮以河車融化汁干為度同藥俱取出在石臼內搗極爛捻作餅子日曬夜露三晝夜宜在月滿之時以受日精月華仍焙乾為末煉蜜搗千餘杵丸如桐子大每服五十丸漸加至八九十丸空心淡鹽湯下隨用早飯使藥下行忌食生蘿蔔竊謂此方妙在氣血虛之人而先期者將行腹痛者經水紫黑者肥人濕者婢妾多郁者如此之類皆非所宜雖有加減亦須斟酌凡月經過期而行或少或不行皆血寒血少也尺脈必微弱加桂心五錢夏月三錢黃耆一兩炙先期而來者血熱也脈來必數加條實黃芩二兩炒酒製生地黃一兩五錢腹痛加白芍藥一兩凡經將行而腹中先作痛者血實而氣滯也去血成塊者氣凝也脈來弦數滑大加玄胡索一兩酒炒陳皮八錢廣木香柴胡梢各五錢凡經水行後作痛者氣血俱虛也尺脈必虛澀而兼緊加炒乾薑三錢白茯苓一兩桂心夏月二錢余月五錢凡經行三五日後腹中綿綿作痛或淋瀝不止血因氣滯未盡也尺脈見沉澀或沉弦加廣木香五錢柴胡六錢凡經水紫色及黑色血熱之甚也尺脈見洪數加條實黃芩一兩黃柏一兩炒生地黃一兩五錢酒浸凡過期行經而色淡者肥人則有濕痰加白茯苓水淘陳皮蒼朮米泔浸一宿鹽水炒各一兩白朮五錢減去熟地黃一兩瘦人則血虛少而水混之加桂心五錢經行或來或斷或發寒熱者或來或斷或寒熱者此肝經及心包絡氣血不調加柴胡八錢白茯苓一兩凡經脈不調多白帶者肥人主胃中濕痰流注加制過蒼朮白茯苓各一兩五錢減熟地黃一兩凡瘦人氣多血少脾虛加木香五錢牡蠣火煅赤石脂火煅白茯苓各一兩凡多崩漏者減香附艾葉各一兩加荊芥穗炒黑一兩黃芩一兩五錢血崩或多加阿膠珠一兩乾薑五錢炒黑黃耆一兩炙以多崩漏而減香附艾葉加荊穗黃芩則治崩漏者可想矣阿膠乾薑黃耆之治崩又可想其意也元氣虛弱經水閉者加牛膝二兩酒洗屬寒加桂心五錢屬熱加黃芩一兩酒炒凡婢妾素見忌於嫡室者必多抑鬱事屬揣摩至此亦著苦心以致經水不調加味制香附二兩或血弱心虛交感時驚恐不寧則精氣不聚加琥珀另研酸棗仁隔紙略炒茯神各一兩辰砂水飛紫石英各五錢治宮冷不孕調生丸一名詵詵丸治婦人衝任虛寒胎孕不成成多損墜澤蘭葉當歸洗焙熟地黃洗焙川芎白芍藥牡丹皮玄胡索石斛酒浸炒各一兩白朮一兩乾薑炮肉桂去皮各五錢上為末醋糊丸如桐子大每服五十丸空心酒下沖為血海任主胞胎此方以四物養榮以白朮石斛養氣澤蘭丹皮玄胡蕩胞中之穢乾薑肉桂暖子宮之寒去舊生新溫中益胃亦溫和之正方也調氣暖宮丸不用地黃恐凝滯也再查分兩果否當歸酒洗川芎肉桂各二錢白芍藥煨香附艾葉醋炒阿膠蛤粉炒成珠各四兩上為末醋糊丸如桐子大每服五十丸食前米湯下艾附暖宮丸治婦人子宮虛冷帶下白淫面色萎黃四肢疼痛倦怠無力飲食減少經脈不調血無顏色肚腹時痛久無子息服藥更能戒惱怒生冷纍用經驗香附子六兩用醋五升以砂石罐煮一晝夜搗爛成餅慢火焙乾艾葉大者去枝梗川芎酒洗各三兩吳茱萸去梗黃耆白芍藥淡酒炒各二兩續斷去蘆一兩五錢生地黃酒洗一兩官桂五錢上共為細末用上好醋打糊丸如桐子大每服五七十丸淡醋湯食遠下擇壬子日或天德月德日修合勝金丸一名女金丹治婦人久虛或産後失調觸犯禁忌斷産少子及經事遲來赤白帶下腰腳重痛寒熱不一身體瘦削眩暈嘔逆此藥善調經候每日一丸若胎前三日一丸産後二日一丸去一切雜證效難具述珍之寶之香附子十五兩醋浸三日當歸川芎白芍藥人參白朮茯苓甘草炙桂心白薇玄胡索牡丹皮藁本香白芷沒藥另研赤石脂另研各一兩上除香附沒藥赤石脂其餘十三味用好酒浸三日此方妙在配合及酒浸三日之功去酒曬乾連前香附一處為末方入沒藥石脂煉蜜為丸如彈子大每服一丸五更初嚼服溫酒送下白湯亦可此藥多在四十九丸後以癸水調平受孕為度倘有孕依前三日一服無所忌戒一方去沒藥加沉香一方去桂心加熟地黃丸如桐子大每服五十丸空心溫酒或白湯下以乾物壓之白薇丸治婦人月水不利四肢羸瘦漸覺虛乏以溫行則可以治羸則不可當歸白薇柏子仁白芍藥川芎白朮桂心附子萆薢木香檳榔細辛吳茱萸各五錢人參白茯苓石斛川牛膝澤蘭葉各七錢半牡丹皮紫石英各一兩熟地黃二兩上為末煉蜜丸如桐子大每服五十丸空心溫酒下白薇丸治婦人無子或斷緒上熱下冷百病皆主之以之補氣行血則是以治上熱恐非白薇熟地黃川椒去目及閉口者微炒出汗白龍骨各一兩麥門冬去心一兩半藁本卷柏白芷覆盆子桃仁湯浸去皮尖雙仁麩微炒黃人參白茯苓桂心菖蒲遠志去心各七錢半車前子當歸微炒芎藭蛇床子細辛乾薑炮各五錢半上為細末煉蜜丸如桐子大每服三十丸空心日午溫酒下昔有數人無嗣俱用此方逾年而皆有子故述之秦桂丸治婦人血海久冷不能孕育有燥濕溫經之治而無清順平和之性非真陰寒者不可服內有沙參未知其解附子一方用香附白薇半夏茯苓杜仲厚朴當歸秦艽各三兩防風肉桂乾薑牛膝沙參各二兩二錢細辛人參各四錢上為末煉蜜丸如桐子大每服五十丸空心酒下無效更加丸數經調受補者服七日即交合孕後忌服艾附丸此藥能暖子宮胎前産後各隨飲用溫平之方當歸芍藥熟地黃生地黃香附子蘄艾各一兩陳皮藿香白芷牡丹皮藁本各五錢丁皮木香各三錢上為細末酒糊丸每服三錢子宮冷熱酒下白濁鹽湯下産後積血艾醋煎湯下壬子丸此藥服之不過一月有孕試之有效吳茱萸白及白茯苓白蘞各一兩人參桂心沒藥各四兩乳香三兩川牛膝厚朴各五錢當歸石菖蒲白附子炮去皮各一錢上為細末煉蜜丸如桐子大每服三四十丸溫酒或鹽湯下日進三服用壬子日雞犬不聞之處修合有孕毋服無夫婦人不可服以水旺之日而和溫熱之藥其意欲求既濟之法也而白及白蘞之用何居南嶽魏夫人濟陰丹治婦人血海虛冷久無孕育及數墮胎一切經候不調崩中漏下積聚諸證秦艽人參藁本石斛甘草蠶布燒灰桔梗各二兩京墨煅醋淬木香桃仁去皮尖炒各一兩糯米炒一升川芎當歸肉桂乾薑炮細辛牡丹皮各一兩半茯苓三兩熟地黃酒蒸香附子炒澤蘭葉各四兩川椒炒去目山藥各三兩蒼朮米泔浸八兩大豆黃卷炒半斤一方川椒山藥各七錢半上為末煉蜜為劑每兩作六丸每服一丸細嚼空心溫酒醋湯任下或以醋調和丸如桐子大每服五十丸亦可此方藥品雖多自成一局補氣而不用耆術補血而不用白芍行血而用丹皮澤蘭黃卷行氣而有木香香附蒼朮川椒止血有蠶布京墨破血有桃仁丹皮溫暖則肉桂乾薑細辛引經則藁本石斛糯米和胃而養陰秦艽行經而散濕補而不滯溫而不燥若再以熱易涼以燥易平即涼行之法也紫石英丸治婦人子宮久冷不成孕育及數經墮胎月候不勻崩中漏下七癥八瘕白淫白帶並宜服之紫石英天門冬桂心川芎卷柏烏頭炮熟地黃辛夷仁禹餘糧煅醋淬當歸石斛各三兩紫葳牡蒙各二兩粉草烏賊骨燒灰薯蕷各一兩半牛膝柏子仁炒吳茱萸桑寄生牡丹皮人參細辛厚朴續斷乾薑炮各一兩上為末煉蜜丸如桐子大每服五十丸空心米飲溫酒任下此與前方相表裡而餘糧烏賊又有燥濕治帶之功天冬柏子又有清涼潤燥之用惟用古者能斟酌之蕩胞湯治婦人全不産育及斷絶久不産二三十年者此方為稟厚斷産者設朴硝牡丹皮當歸大黃蒸一飯久桃仁各三兩細辛厚朴薑汁炙桔梗赤芍藥人參茯苓桂心甘草牛膝陳皮各二兩附子炮一兩半虻蟲炒焦去翅足水蛭炒各十枚上為末每服六錢水酒各半盞煎至六分溫服日二服夜一服溫覆得少汗必下積血與冷赤膿如小豆汁斟酌不盡若力弱大困不堪者只一二服止如惡物不盡用坐導藥坐導藥治婦人全不産及斷續服前蕩胞湯惡物不盡用此方皂角去皮子一兩吳茱萸當歸各二兩大黃細辛五味子乾薑炮各一兩白礬枯戎鹽蜀椒各半兩一方無大黃有黃葵花半兩上為細末以絹袋盛如指狀入婦人陰戶中坐臥任意勿行走小便時去之一日一度易新者必下清黃冷汁汁盡止若未見病出可十日安之本為子宮有冷惡物故令無子值天陰冷則發疼痛須俟病出盡方已不可中輟每日早晚用苦菜煎湯熏洗之內藥續生丸母丁香附子肉豆蔻枯礬烏魚骨上為末糊為軟丸綿裹納陰中治痰塞不孕丹溪植芝湯治婦人肥盛無子以身中有脂膜閉塞子宮也宜先服此調理痰在上須用子和法當歸酒洗一兩川芎七錢半白芍藥白朮半夏湯泡香附陳皮各一兩茯苓二兩甘草半兩上銼作十帖每帖加生薑三片水煎吞後丸子丹溪茂芝丸白朮二兩半夏曲川芎香附子各一兩茯苓神麯炒各半兩橘紅四錢甘草不用四物上為末粥丸如桐子大每服八十丸煎湯下如熱多加黃連枳實各一兩用枳實黃連服此藥後卻服螽斯丸螽斯丸即前秦桂丸無當歸防風二味上每服五丸空心酒下加至十丸不妨覺有娠三月後不可更服按此方即秦桂丸也丹溪忌服之者蓋忌於瘦人無血者若肥人濕多者又兼前調理藥而所服丸數十減其九只服五丸無妨也纍試有效丹溪深闢秦桂丸之非而螽斯丸又為取用豈自相左耶抑各因其病而為去取耳消脂膜導痰湯半夏薑製南星火炮橘紅枳殼去穰麩炒茯苓滑石研細各一錢川芎防風羌活各五分車前子七分上細切作一服加生薑五片水煎空心服以乾物壓之要知南星滑石防風羌活之意一方治肥盛婦人稟受甚厚恣於酒食經水不調不能成胎謂之軀脂滿溢閉塞子宮南星半夏羌活蒼朮又加蒼朮臺芎防風滑石上銼水煎服或導痰湯亦可治婢妾不孕煮附丸治婢妾多郁情不宣暢經多不調故難孕此方最妙不須更服他藥可與神仙附益丸並駕香附子不拘多少去毛與粗皮米泔水浸一宿曬乾用上好米醋砂鍋內煮之旋添醋旋煮妙在多醋意以極爛為度取出焙乾為末仍用醋糊為丸如桐子大每服五七十丸經不調即調久不孕者亦變一方治婦人妒妾誤夫無子常服不妒姑存之試之天門冬去心赤黍米去殼微炒薏苡仁去殼炒各四兩上為末煉蜜丸桐子大每服八九十丸白湯下附斷子法用白麵曲一升無灰酒五升打作糊煮二升半用絹帛濾去渣作三服候月經將來日晚下吃一服天明吃一服月經即行終身絶子一方用故蠶紙方圓一尺燒為末酒飲調服終身不復懷孕一云産後酒服之又方用油煎水銀一日方息空心服棗核大一丸永斷孕不損人一方四物湯五錢加蕓薹子二錢於經行後空心溫服良方論曰易曰天地之大德曰生然婦人有臨産艱難或生育不已而欲斷之故録驗方以備用若服水銀虻蟲水蛭之類不惟孕不復懷且禍在反掌薛氏曰大抵斷産之法多用峻厲往往有不起者是則産之害未若斷産之害也吾聞閣老張羅峰太常李恆齋之夫人俱因服斷産之劑自謂形體俱怯遇勞必病今雖列如上方以備萬一之用用者尚其慎之
