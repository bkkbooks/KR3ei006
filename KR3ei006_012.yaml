body:
  text: 卷之十二産後門中外感風寒李氏曰産後外感離床太早或換衣襲風冷入下部令人寒熱似瘧頭疼不歇寒熱似瘧頭疼不歇是冒下數項又消息酌用血虛者芎歸湯加人參紫蘇乾葛血氣虛者補虛湯加陳皮乾薑寒熱甚者熟料五積散熱不止者黃龍湯主之如體盛發熱惡寒及瘧痢者小柴胡湯合四君子四物湯加黃耆名三分散切不可以傷寒治法若誤服熱藥過多熱證大見久而便閉者柴胡破瘀湯或四物湯加大黃芒硝暫服即調補之良方曰産後外感風寒發熱頭痛身疼雖如傷寒時氣當用麻黃亦不可輕易吃緊語如早起勞動為寒所傷則淅淅惡寒翕翕發熱頭項肩背骨節皆痛至七八日乃瘥若大便堅作嘔不能食用小柴胡湯加生薑地黃以嘔加地黃宜酌用吳氏曰新産後患傷寒不可輕易發汗蓋有産時傷力發熱去血過多發熱惡露不去發熱三日蒸乳發熱或有早起勞動飲食停滯一皆發熱狀類傷寒要在仔細詳辨切不可輒便發汗大抵産後大血空虛大虛變症若汗之則變筋惕肉瞤或鬱冒昏迷而不省或風搐搦而不定或大便閉澀而難去其害非輕切宜詳審凡有發熱且與四物湯以川芎當歸為君最多白芍藥須炒過酒蒸熟地黃佐之如發熱加軟苗柴胡人參乾薑炮之最效蓋乾薑之辛熱能引血藥入血分氣藥入氣分也且能去惡養新有陽生陰長之道以熱治熱深合內經之旨豫嘗用之取效如神故録以勸如有惡露未盡者益母丸黑神散必兼用之若胃虛少食者必加白朮茯苓有痰嘔逆者必加陳皮半夏其餘六經各條治例皆同但藥中必加四物湯為主乃養血務本之要也大全云凡産後發熱頭痛身疼不可便作感冒治之此等多是血虛或敗血作梗宜以和平之劑與服必效如玉露散或四物湯加北柴胡等分煎服等分法乃善守法若便以小柴胡湯及竹葉石膏湯之類竟不救者多矣産後中風數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出雖多陽旦證耳可與陽旦湯即桂枝湯方見傷寒仲景所謂中風即今人所謂傷風陽旦湯者從仲景方也加味芎歸湯治産後血氣虛外感風寒頭痛憎寒壯熱當歸川芎各二錢人參紫蘇乾葛各一錢上銼加生薑三片水煎服竹葉湯治産後中風發熱面赤喘而頭痛竹葉一把葛根三兩防風桔梗桂枝人參甘草炙各一兩上㕮咀每服五錢棗一枚薑五片水一盞半煎一盞去滓服溫覆使汗出若頭項強用大附子五分煎藥揚去沫嘔者加半夏一錢以竹葉乾葛為君為面赤而喘也然不用血藥而用參桂從中風也此雖大法用須斟酌附子亦須善用中風大全云夫産後中風者由産時傷動血氣勞損臟腑未曾平復早起勞動致使氣虛而風邪乘虛入之邪乘虛入外因也若中臟便不可治矣即治亦須從本氣為主故風邪冷氣客於皮膚經絡但疼痹羸乏不任少氣大凡筋脈挾寒則攣急喎僻挾濕則縱緩虛弱若入諸臟恍惚驚悸隨其所傷腑臟經絡而生病焉郭稽中論曰産後中風者何答曰産後五七日內強力下床或一月之內傷於房室或懷憂怒擾蕩沖和或因食生硬傷動臟腑得病之初眼澀口噤肌肉瞤搐漸至腰脊筋急強直者不可治此乃人作非偶爾中風所得也薛氏曰前證果外邪所屬形氣不足病氣有餘當補元氣為主稍佐以治病之藥若強力不休月內入房屬形氣俱不足當純補元氣多有復蘇者若誤投風藥乃促其危也産後中風風藥不可擅用丹溪曰産後中風口眼喎斜必用大補氣血然後治痰當以左右手脈分其氣血多少以治切不可作中風治而用小續命湯及發表治風之藥大全云産後下血過多虛極生風者何答曰婦人以榮血為主因産血下太多氣無所主唇青肉冷汗出目眩神昏命在須臾者此虛極生風也宜急服濟危上丹若以風藥治之則誤矣薛氏曰前證若心脾血氣俱虛用大補湯如不應加附子鉤藤鉤若肝經血虛用逍遙散加鉤藤經云脾之榮在唇心之液在汗若心脾二臟虛極急用參附湯救之鉤藤是肝經風熱藥附子是脾腎虛寒藥豈並行不悖乎一婦人患前證用諸補劑四肢逆冷自汗泄瀉腸鳴腹痛余以陽氣虛寒用六君子加薑附各五錢不應以參附各一兩始應良久不服仍腸鳴腹痛復灸關元穴百餘壯及服十全大補湯方效大全云産後中風口噤者是血氣虛而風入於頷頰夾口之筋也手三陽之筋結入於頷産則勞損臟腑傷於筋脈風若乘之其三陽之筋脈則偏持之筋得風冷則急故令口噤也大全云産後角弓反張者是體虛受風風入諸陽之經也人之陰陽經絡周環於身風邪乘虛入於諸陽之經則腰背反折攣急如角弓之狀也反張在背屬太陽及督脈二經設果為風所中能不用續命等湯乎四物湯不妨配用薛氏曰前證因氣血耗損腠理不密汗出過多而患者虛象也宜固氣血為主佐以本方丹溪曰産後當大補氣血為先雖有他證以末治之如惡寒發熱等症乃氣血虛甚之極也宜大劑參耆歸術肉桂以培養之如不應急用炮附子再不應用人參一兩炮附子二三錢名參附湯倘有未應乃藥力未能及也宜多用之小續命湯治産後中風身體緩急或頑痹不仁或口眼喎斜牙關緊急角弓反張防風一錢麻黃去節黃芩芍藥人參川芎防己肉桂各七分附子炮杏仁去皮尖麩炒各五分甘草炙四分上銼加生薑水煎溫服有熱去附子減桂一半有汗去麻黃加乾葛骨節煩疼去附子加芍藥精神恍惚加茯神遠志煩心多驚加犀角嘔逆腹脹加人參半夏骨間疼痛加附子官桂臟寒下痢去防風黃芩加附子白朮煩悶大便澀去附子加芍藥入竹瀝盛冬初春去黃芩華他愈風散治産後中風口噤牙關緊急手足瘈瘲如角弓狀亦治産後血暈不省人事四肢強直或心眼倒築吐瀉欲死此藥清神氣通血脈其效如神荊芥穗略焙指迷方加當歸等分上為末每服三錢黑豆淬酒調服或童子小便亦可荊芥氣味辛涼不寒不熱散不傷氣行不害和且理血分風邪調以豆酒或童便祛風降火妙不可言誠産後血暈神方也口噤者斡開灌之或吹鼻中皆效李時珍曰此方諸書盛稱其妙姚僧垣集驗方以酒服名如聖散藥下可立效陳氏方名舉卿古拜散蕭存敬方用古老錢煎湯服名一捻金許叔微本事方云此藥委有奇效神聖之功一婦産後睡久及醒則昏昏如醉不省人事醫用此藥及交加散云服後當睡必以左手搔頭用之果然咱殷産寶方云此病多因怒氣傷肝或憂氣內郁或坐草受風而成宜服此藥也戴氏證治要訣名獨行散賈似道悅生隨抄呼為再生丹血氣湯治産後諸風攣急或痿弱無力秦艽羌活防風白芷川芎芍藥當歸熟地白朮茯苓各等分上為細末每服三錢溫酒調服一半煉蜜丸如桐子大每服五七十丸溫酒下防風湯治産後中風背項強急胸滿氣短防風獨活各去蘆葛根各五兩當歸人參白芍甘草炙各二兩上㕮咀每服八錢水一盞半棗二枚煎一盞溫服云岐方治産後中風半身手足不遂言語蹇澀恍惚多忘精神不定獨活當歸芍藥防風川芎元參天麻各五錢桂心三錢上㕮咀以水八升煮取二升半分為三服覺效更作一劑又作丸每服二十丸如有熱加葛根五錢有冷加白朮五錢有氣證加生薑一兩半手足不遂加牛膝一錢半萆薢三錢黃耆四錢腹痛加芍藥當歸各七錢半不食加人參五錢元參一兩若寒中三陰所患必冷小續命湯加薑煎若暑中三陽所患必熱小續命湯去附子減桂一半加薄荷煎防風羊角湯治産後氣血不足風邪所襲肢體攣痛背項強直防風一兩赤芍炒桂心各半兩羚羊角川芎羌活當歸酸棗仁炒牛蒡子炒各二錢上銼每服四錢水煎服此治心肝二經風藥也而羚羊桂心寒熱不同乃古人獨擅其長用之遠之存乎其人川芎散治産後中風身背拘急有如繩束如繩束者拘急收引之象川芎羌活羚羊角屑酸棗仁炒芍藥炒黃各四兩桑白皮兩半防風去蘆一兩二錢上銼每服一兩水煎日進三服濟危上丹治産後去血過多氣無所主以致唇青肉冷汗出目瞑神昏命在須臾此虛極生風也急服此藥若以風藥治之則誤矣乳香五靈脂硫黃玄精石以上各另研極細阿膠蛤粉炒卷柏生用桑寄生陳皮去白等分上將前四味同研勻入石臼內微火炒再研極細後入余藥末用生地黃汁丸如桐子大每服五十丸食前溫酒或當歸湯下靈脂硫黃鬚制用生地汁丸妙大豆紫湯治産後風虛五緩六急手足頑麻氣血不調等癥獨活去蘆兩半大豆半升酒三升上先用酒浸獨活煎一二沸別炒大豆令極熱焦煙出以酒沃之去渣每服一二合許得少汗則愈日夜數服一以去風一以消血結如妊婦折傷胎死在腹中服此即瘥此方以獨活一味而治風則妙矣於治虛則未也五緩六急者陰緩而陽急也皆風寒所為故服法如此一方無獨活只用大豆炒焦淋酒服獨活酒治産後中風獨活一斤桂心三兩秦艽五兩上三味㕮咀以酒一斗半漬三日飲五合稍加至一升不能多飲隨性服雞屎酒治産後中風及百病並男子中一切風神效烏雞糞一升炒黃雞糞入肝治汙濁之血豆酒去風通周身之氣蓋肝主筋風主氣氣行血流筋榮風散故治一切百病大豆一升炒令聲絶勿焦上二味以清酒三升乘熱先淋雞糞次淋大豆取汁每服一升溫服取汗病重者凡四五服無不愈交加散治産先後百病兼治婦人榮衛不通經脈不調腹中撮痛氣多血少結聚為瘕産後中風並宜服之生地一斤研取自然汁生薑十二兩研取自然汁上將地黃汁炒生薑滓生薑汁炒地黃滓交加炒法絶妙絶神各稍干焙為細末每服三錢溫酒調下尋常腹痛亦宜服産後尤不可離一物獨活湯治産後中風虛人不可服他藥者此藥及一物白鮮湯主之亦可與獨活合煮服川獨活三兩細切以水三升煮取一升分服飲酒者亦可酒水煮白鮮皮亦依獨活法羌活散治産後中風語澀四肢拘急羌活三兩為末每服五錢水酒各半盞煎服上産後中風用續命湯及羌活發散之藥必詳氣血以四物四君子相與各半停對分兩服之可也發痙郭稽中曰産後汗出多而變痙者因産後血虛腠理不密故多汗出遇風邪搏之則變痙也痙者口噤不開背強而直如發癇狀搖頭馬嘶身反折須臾又發氣息如絶宜速斡口灌小續命湯稍緩即汗出如雨手摸空者不可治也薛氏曰産後發痙因去血過多元氣虧極或外邪相搏以致牙關緊急四肢痙強或腰背反張肢體抽搐若有汗而不惡寒者曰柔痙無汗而惡寒者曰剛痙由亡血過多筋無所養而致故傷寒汗下過多潰瘍膿血大泄多患之乃敗證也急以十全大補湯大補血氣如下應急加附子或保無虞若攻風邪死無疑矣夷堅志云杜壬治郝質子婦産四日瘈瘲戴眼弓背反張壬以為痙病與大豆紫湯獨活湯而愈政和間余妻方分娩猶在蓐中忽作此症頭足反接相去幾二尺家人驚駭以數婢強拗之不直適記所云而藥草有獨活乃急為之召醫未至連進三劑遂能直醫至即愈矣更不須用大豆紫湯古人處方神驗屢矣陳臨川曰凡産後口噤腰背強直角弓反張皆名曰痙又名曰痓古人察有汗無汗以分剛柔陰陽而治今産寶諸書有中風口噤一門又有角弓反張一門其實一也如憎寒發熱有類傷寒皆不論及豈可只以一二藥治之按素問有痙字而無痓字仲景太陽經有痙病而無痙方則今書中痓字乃痙字傳寫之誤也夫徑痙二字諧體諧聲而痙之病狀有項背徑急反張之相則從痙字無疑若痓字於義莫解故當以痙字為正且寒主收引風寒在太陽經而項背強直者太陽筋病也諸方皆主續命從仲景論矣郭氏不問産後虛實邪之有無而概宗之似乎一偏至薛氏又謂産後亡血過多非急用十全大補不可若攻風邪死無疑矣又一見也及夷堅志案以大豆紫湯獨活湯而愈者則又主於風矣是續命亦不為妄但本方有麻黃附子於氣血兩虛之人不可輕用而郭氏論又有速灌之説稍緩即汗出如雨反不以麻黃為忌何其語之切也二説均不可廢臨證之際詳之可也小續命湯治産後汗多變痙口噤首強或搖頭馬嘶不時舉發氣息如絶方見前中風陳臨川云陳無擇評曰産後汗出多變痙亦令服小續命湯此又難信既汗多如何更服麻黃官桂防己黃芩輩不若大豆紫湯為佳局方大聖散亦良藥也愚觀朱奉議云凡剛柔二痓小續命湯並可加減與之若柔痓自汗者去麻黃加葛根之説朱奉議必有所據雖大豆紫湯大聖散良亦不可偏見曲説有妨古人之意大豆紫湯治中風頭眩惡風自汗吐冷水及産後百病或中風痱痙背強口噤直視煩熱脈緊大者不治方見前中風大豆湯治産後卒中風發痓倒悶不知人及妊娠挾風兼治在蓐諸疾大豆五升炒令微焦葛根獨活各一兩防己六兩防己行十二經虛者忌用今分兩且獨多宜斟酌上㕮咀每服五錢酒二盞煎至一盞半去渣溫服不拘時日三服一方治産後中風諸體疼痛自汗出者及余百疾獨活八兩當歸四兩上㕮咀以酒八升煮取四升去滓分四服日三夜一取微汗若上氣者加桂心二兩不瘥更作羚羊角飲子治産後氣實腹中堅硬兩脅脹滿心中煩熱渴欲飲水欲成剛痓中風之疾羚羊角半兩鎊防風羌活桔梗並去蘆敗醬各八錢敗醬近無識者不知當以何物代之桂心柴胡大黃酒浸過煨各一兩二錢上㕮咀每服五錢水一大盞半同煎至一盞去渣溫服不拘時更服地黃酒地黃酒妙甚用地黃切一升炒令黑瓷瓶中下熱酒三升密封口煮令減半任意服之防風當歸散防風川芎當歸地黃各五錢上銼每服一兩水三盞煎至二盞溫服樓氏曰續命湯大豆紫湯舉卿古拜散太陽厥陰藥也邪實脈浮弦有力者固宜但産後血氣大虛之人不宜輕發其表但用防風當歸散治之為妙瘈瘲薛氏曰瘈者筋脈拘急也瘲者筋脈張縱也瘈瘲者抽搐伸縮也經云肝主筋而藏血蓋肝氣為陽為火肝血為陰為水前證因産後陰血去多陽火熾盛筋無所養而然耳故癰疽膿水過多金瘡出血過甚則陽隨陰散亦多致此治法當用八珍加丹皮鉤藤以生陰血丹皮鉤藤為肝火而用則陽火自退諸症自愈如不應當用四君芎歸丹皮鉤藤以補脾土蓋血生於至陰至陰者脾土也故小兒吐瀉之後脾胃虛損亦多患之乃虛象也所謂虛象者土虛反見風木之化也無風可逐無痰可消若屬陽氣脫陷者用補中益氣加薑桂陽氣虛敗者用十全大補加桂附亦有復生者此等症候若肢體惡寒脈微細者此為真狀若脈浮大發熱煩渴此為假象惟當固本為善若無力抽搐戴眼反折汗出如珠流者皆不治真假虛實之辨一産婦因勞兩臂不能屈服蘇合香丸肢體痿軟汗出如水余謂前藥辛香耗散真氣腠理虛而津液妄泄也先用十全大補湯加五味子補實腠理收斂真氣汗頓止又佐以四君子調補元氣漸愈用逍遙散大補湯調理而痊一産婦先胸脅乳內脹痛後因怒口噤吐痰臂不能伸小便自遺左三部脈弦余謂此肝經血虛而風火所致不能養筋先用加味逍遙散治之臂能屈伸又以補肝散六味丸諸症悉愈一婦人發瘈遺尿自汗面赤或時面青飲食如故肝脈弦緊余曰此肝經血燥風熱名瘈也肝主小便其色青人心則赤法當滋陰血清肝火遂用加味逍遙散不數劑諸症悉退而安一婦人産後血風患此以小續命湯數服而安産後因虛傷風瘈瘲同傷寒表症未傳入里宜服防風湯前止言虛而施補此又因風而治風具見圓通之妙防風湯治風虛發熱項背拘急肢體不隨恍惚狂言來去無時不自覺悟亦治腳氣緩弱甚效此藥溫和不虛人秦艽獨活麻黃去節半夏湯洗七次防風去蘆各二兩升麻防己白朮石膏煅白芍黃芩當歸去蘆人參去蘆遠志去骨甘草各一兩上為粗末每服四錢水二中盞生薑七八分煎至一盞去滓取清汁六分入麝香末少許食後臨臥帶熱服華他愈風散方見前中風當歸散治産後中風牙關緊急不省人事口吐涎沫手足瘈瘲此即愈風湯法當歸去蘆荊芥穗各等分上為細末每服二錢水一盞酒半盞煎至一盞灌之如牙關緊急斡開微微灌之但下咽即生屢用救人大有神效增損柴胡湯治産後感異證手足牽搐涎潮昏悶柴胡三錢黃芩一錢二分人參甘草炙半夏各一錢半黃耆一錢石膏二錢知母一錢上㕮咀分二服水二盞生薑三片棗二枚煎八分不拘時服此以小柴胡合白虎加黃耆治虛熱痰飲變怪諸症乃陽明少陽藥也內無血藥亦有見秦艽湯前證已去次服此藥去其風邪此方榮肝去風是肝膽二經寒熱藥秦艽芍藥柴胡各一錢七分防風黃芩各一錢二分人參半夏各一錢甘草炙一錢三分上㕮咀作二帖每帖加生薑三片水煎食遠服拘攣大全云産後中風筋脈四肢攣急者是氣血不足臟腑俱虛月內未滿起早勞役動傷臟腑虛損未復為風所乘風邪冷氣初客於皮膚經絡則令人頑痹不仁羸乏少氣風氣入於筋脈挾寒則攣急也薛氏曰肝屬木而主筋前證若肝經風熱血燥用加味逍遙散如不應當用六味地黃丸以補腎水經云風客淫氣精乃亡邪傷肝也仍參前雜症諸風血方論治之一産婦筋攣臂軟肌肉掣動此氣血俱虛而自熱也用十全大補湯而安一産婦手麻服愈風丹遍身皆麻神思倦怠余謂氣血虛弱用十全大補加炮薑數劑漸愈去薑又數劑及逍遙散而痊舒筋湯治一切筋骨拘攣疼痛蓋因風濕所傷氣血凝滯經絡不行所致其效如神羌活片子薑黃甘草炙各二錢赤芍當歸海桐皮去粗皮白朮各一錢上切作一服加生薑三片水煎去滓磨沉香水少許入內溫服上痛食後腰以下痛食前芎藭散治産後中風四肢筋脈疼痛攣急背項強急川芎羌活當歸酸棗仁炒羚羊角屑各七錢半防風牛蒡子炒各一兩桂心赤芍各半兩上㕮咀每服八錢水煎溫服不拘時此即防風羚羊角湯但分兩少異而牛蒡獨多者以其能去皮膚風通十二經利腰腳也薛氏曰前方如不應當用八珍湯更不應用十全大補湯觀薛氏所言則亦先治風後議補要得此竅防己膏治産後中風四肢筋脈攣急身體麻痹漢防己去皮半斤茵芋五兩上㕮咀用酒五升浸藥一宿取豬肪脂一斤文武火熬三上三下成膏攤在紙花上貼病人患處以熱手不住下摩膏上千遍不語大全云人心有七孔三毛産後虛弱多致停積敗血閉於心竅神志不能明瞭又心氣通於舌心氣閉塞則舌亦強矣故令不語但服七珍散本論所重在敗血而七珍散不用破血之味為其本於虛也薛氏曰經云大腸之脈散舌下又云脾之脈是動則病舌本強不能言又云腎之別脈上入於心系舌本虛則不能言竊謂前證若心腎氣虛用七珍散腎虛風熱地黃飲大腸風熱加味逍遙散加防風白芷脾經風熱秦艽升麻湯肝經風熱柴胡清肝散加防風白芷脾氣鬱結加味歸脾湯加升麻肝木太過小柴胡加鉤藤鉤脾受土侮六君加升麻白芷鉤藤鉤肝脾血虛用佛手散脾氣虛用四君子氣血俱虛八珍湯如不應用獨參湯更不應急加附子補其氣而生其血若竟用血藥則誤矣一産婦不語用七珍散而愈後復不語內熱晡熱肢體倦怠飲食不進用加味歸脾湯為主佐以七珍散而愈後因怒不語凡新産怒不可有口噤腰背反張手足發搐或小便見血面赤或青或黃或時兼赤余曰面青肝之本色也黃者脾氣虛也赤者心血虛也用八珍湯加鉤藤鉤茯苓遠志漸愈又用加味歸脾湯而痊李氏曰有臨産服湯藥過多胃濕使然者熟料五積散六君子湯痰熱迷心不語者不語由於胃濕謂生痰也而謂湯藥過多何歟五積散之用又難解導痰湯或痰氣鬱滯閉目不語者用孤鳳散七珍散治産後虛弱多致停積敗血閉於心竅神志不明又心氣通於舌心氣閉塞則舌亦強故令不語人參石菖蒲生地黃川芎各一兩細辛一錢防風辰砂另研各五錢上為細末每服一錢薄荷煎湯調服胡氏孤鳳散治産後閉目不語生白礬為末每服一錢熱水調下一方冶産後不語人參石蓮肉不去心石菖蒲各等分上銼每服五錢水煎服逐血補心湯産後失音不語者心肺二竅為血所侵又感傷風故也當歸一錢半赤芍生地桔梗蘇葉前胡茯苓防風膽星黃連粉葛紅花各一錢人參薄荷升麻各七分甘草五分半夏一錢二分上銼加生薑三片水煎空心服妄言譫語大全云産後語言顛倒或妄言譫語如見鬼神者其源不一須仔細辨證用藥治療産後驚風語言亂道如見鬼神精神不定者研好硃砂調酒下龍虎丹方見局方三丸作一服兼琥珀地黃丸服之諸條俱不言痰一則因産後心虛敗血停積上干於心而狂言獨語者當在乍見鬼神條求之二則産後臟虛心神驚悸志意不安言語錯亂不自覺知神思不安者當在驚悸條求之三則宿有風毒因産心虛氣弱腰背強直或歌哭嗔笑言語亂道當作風痙治療當在心驚中風條求之四則産後心虛中風心神恍惚言語錯亂當在中風恍惚條求之五則産後多因敗血迷亂心經而癲狂言語錯亂無常或暈悶者當於本卷血暈類求之六則因産後感冒風寒惡露斬然不行憎寒發熱如瘧晝日明瞭暮則譫語如見鬼狀當作熱入血室治之宜琥珀地黃丸及四物湯只用生乾地黃加北柴胡等分煎服如不退者以小柴胡湯加生乾地黃如黃芩分兩煎服愈雖然以上諸症大抵胎前産後自有專門一定之法毫髮不同如産後首當逐敗生新然後仔細詳辨疾證不可妄立名色自生新意加減方藥大宜對證依古法施治未有不安者也薛氏曰前證當固胃氣為主而佐以見證之藥若一干攻痰則誤矣一産婦形體甚倦時發譫語用柏子散稍愈又用加味歸脾湯而愈又因怒仍狂言脅痛小便下血用加味逍遙散以清肝火養肝血頓瘥又佐以加味歸脾湯而安一靈三聖散治産後敗血衝心發熱妄言奔走脈虛大者乾荷葉生乾地黃牡丹皮生蒲黃另研各二錢上前三味濃煎湯調入蒲黃末一服即定奪命散治産後血入心經語言癲狂健忘失志方見前血暈調經散治血氣虛損陰虛發熱或瘀血停滯以致心神煩躁如見鬼神或言語譫妄沒藥琥珀並細研桂心各一錢赤芍炒當歸酒浸各一錢細辛二錢半麝香少許上為細末每服半錢生薑汁溫酒各少許調服此方重在瘀血停滯不治陰虛發熱故用桂心麝香或用蘇合香丸一錢以童便調服即醒産後用蘇合香恐芳香太過走散真氣以童便調服具見妙用柏子仁散治産後元氣虛弱瘀血停滯妄言亂語乍見鬼神柏子仁遠志生地黃焙人參當歸桑寄生桑寄生治産後余疾益血脈防風琥珀另研甘草炙各等分上為粗末先用白羊心一個切片以水三盞煮取清汁七分入藥末五錢煎至六分服妙香散治産後心神顛倒語言錯亂如見鬼神乾山藥白茯苓茯神去木黃耆遠志去心各一兩人參桔梗甘草各五錢辰砂三錢麝香一錢木香二錢五分上為末每服二錢溫酒調服一方用生乾地黃當歸二味煎湯調服立效烏金散治産後三五日或半月間忽妄言亂語目見鬼神等證當歸川芎赤芍藥熟地黃白朮遠志肉茯神去木羌活酸棗仁辰砂另研入防風香附子各二錢半夏三錢白芷陳皮各一錢五分人參牛膝麥門冬天麻全蠍各一錢甘草九分上銼作二服薑三片蔥三枝入金銀同煎服經曰心者君主之官神明出焉故神非心有而天與之有也天與之者清淨光明之氣也是故心室清淨則志意治而神明居之少有邪乘則神無所歸志無所定而有妄言妄見之病矣故心室不可一日不清而神明不可一日不居也夫生神者氣養心者血故氣血盛則神明旺而思慮精氣血虛則神明衰而思慮少如産後三五半月之間其氣血誠虛矣若或卒有所驚則神出舍空邪襲其室遂使神無所歸心無所主而妄亂生矣所謂邪者風痰也敗血也本方以羌活芷蠍天麻半夏以去風痰四君四物以培氣血血有所瘀則以牛膝赤芍行之氣有所滯則以香附陳皮理之神不歸則招之以茯神棗仁志不定則寧之以辰砂遠志而麥冬者為清心要藥金銀者為安鎮靈丹引之以蔥則上通天氣加之以薑則內通神明制方者其神全者與曰烏金貴之辭血脫益氣故不用血藥尤妙在成膏四物補心湯治産後言語恍惚顛倒錯亂當歸五錢川芎白芍藥生地黃白朮半夏桔梗茯神各四錢陳皮三錢甘草一錢上銼為散分作六服每用薑三片水煎空心服有熱加酒炒黃連二錢無熱不用寧神膏治失血過多心神昏悶言語失常不得睡臥辰砂乳香酸棗仁炒人參茯苓各一兩琥珀七錢半上為末每服一錢燈心棗子煎湯調服或蜜丸彈子大薄荷煎湯化下一丸琥珀地黃丸治心血虛而言語譫妄琥珀另研玄胡索糯米炒赤去米當歸各一兩蒲黃炒四兩生地黃生薑各二斤上地黃生薑各另搗汁留渣以生薑汁炒地黃渣地黃汁炒生薑渣各干與前四味俱為末煉蜜丸如彈子大每服一丸當歸煎湯下癲狂大全云療産後因驚敗血衝心昏悶發狂如有鬼祟宜用局方大聖澤蘭散加好辰砂研令極細每服加一字許煎酸棗仁湯調下一服可安薛氏曰前證乃血虛神不守舍非補養元氣不可仍參後各門互用一産婦患前證或用大澤蘭湯而愈後又怔忡妄言其痰甚多用茯苓散補其心虛頓愈又用八珍散加遠志茯神養其氣血而瘥一産婦亦患此證用化痰安神等藥病益甚神思消鑠余以為心脾血氣不足用大劑參朮芎歸茯神酸棗仁四斤余而安乃以歸脾湯五十餘劑而愈大聖澤蘭散治婦人血海虛冷久無子息及産後敗血衝心中風口噤子死腹中劈開口灌藥須臾生下便得無恙治墮胎腹中攻刺疼痛橫生逆産胎衣不下血暈血癖血滯血崩血入四肢一應血臟有患及諸證風氣或傷寒吐逆咳嗽寒熱往來遍身生瘡頭痛惡心經脈不調赤白帶下乳生惡氣胎臟虛冷數曾墮胎崩中不定因此成痰室女經脈不通並宜服之常服暖子宮和血氣悅顏色退風冷消除萬病兼療丈夫五勞七傷虛損等病澤蘭葉石膏研各二兩生地黃一兩半當歸川芎芍藥蕪荑甘草炙各一兩七錢半肉桂一兩二錢半厚朴薑汁炒白茯苓防風細辛吳茱萸湯洗七次卷柏柏子仁微炒桔梗各一兩黃耆人參白朮丹參五味子川椒去目並閉口者微炒川烏頭炮去皮臍乾薑炮藁本去苗白芷各七錢半白薇阿膠碎炒燥各半兩上為細末每服二錢空心臨臥熱酒調下若急疾不拘時日三服抱膽丸治産後過驚發狂或遇經行發狂水銀二兩黑鉛一兩五錢硃砂一兩細研乳香一兩細研上將黑鉛入銚內火熔開下水銀攪結成砂子下硃砂乳香乘熱用柳木槌研勻丸如雞頭實大每服一丸空心薄荷湯下得睡勿驚覺覺來即安人之神以心為宅水銀之液以硃砂為宅朱之色通乎心水銀之液通乎神神以妙應無方銀以圓通不滯二者皆萬劫不衰故以類從焉然心火之下陰精承之則安水銀之流真鉛製之則定所以者皆以真水制真火也本方以乳香通心氣硃砂養心血鉛汞交心腎於頃刻而引神歸舍也神歸則睡安矣妙香散亦善辰砂遠志丸治産後中風驚狂起臥不安或痰涎上湧石菖蒲遠志去心人參茯苓去木辰砂各三錢川芎山藥鐵粉細辛麥門冬去心天麻半夏湯泡南星白附子各一兩上為末薑汁煮糊丸如緑豆大別以硃砂為衣每服三十丸臨臥薑湯下加味八珍湯産後癲狂乃血虛神不守舍非補養元氣不可用此或茯苓散歸脾湯下二方見後驚悸門人參白朮茯苓甘草炙當歸川芎芍藥熟地遠志茯神各二錢上銼加薑棗水煎服乍見鬼神與前癲狂譫語門參看大全云心主身之血脈因産傷以耗血脈致心氣虛其敗血停積上干於心心不受觸遂致心中煩躁臥起不安乍見鬼神言語顛錯醫人不識呼為風邪如此為治必不得愈但服調經散每服加龍腦一捻得睡即安妙在加龍腦一捻薛氏曰前證若敗血停滯用調經散若血虛發熱用八珍加炮薑若心血虛損用柏子仁散大抵此證皆心脾血少所致但調補胃氣則痰清而神自安矣前論止言瘀血而不言痰此言痰而又不治痰但調胃氣設果有痰亦須觀人勇怯為之若果系鬼祟所附即灸鬼穴可愈其或不起多因豁痰降火攻伐之過也一産婦患前證或用調經散愈而復作仍服前藥益甚痰涎上湧朝寒暮熱余朝用八珍散夕用加味歸脾湯各五十餘劑而愈云岐治産後發熱狂言奔走脈虛大者四物湯加柴胡脈虛者豈可加柴胡但從症則可如不愈加甘草柴胡生地黃等分煎服亦可調經散方見前妄言譫語琥珀散治産後瘀血攻心迷悶妄言見鬼人參茯神生地黃阿膠各七錢半硃砂五錢另研甘草琥珀鐵粉另研麝香另研各一錢上為細末每服一錢用金銀煎湯調下茯神散治産後血邪心神恍惚言語失度睡臥不安茯神去木一兩人參黃耆赤芍牛膝琥珀研龍齒研各七錢半生地黃一兩半桂心半兩上為末每服三錢水煎服一方治産後血暈心迷狂亂恍惚如見鬼凡逐瘀之藥必香熱此方不芳香不燥熱為清涼降火逐瘀聖藥蓋與時宜者也氣虛者忌用生益母草三合根亦可生地黃汁二合童便一合雞子清三枚上同煎三四沸後入雞子清攪勻作一服驚悸大全云産後臟虛心神驚悸者由體虛心氣不足心之經為風邪所乘也或恐懼憂迫令心氣受於風邪邪搏於心則驚不自安若驚不已則悸動不定其狀目睛不轉而不能動診其脈動而弱者驚悸也動則為驚弱則為悸矣薛氏曰按人之所主者心心之所主者血心血一虛神氣不守此驚悸所由作也當補氣血為主一産婦患前證二度服琥珀地黃丸局方妙香散隨效再患服之其證益甚而脈浮大按之如無發熱惡寒此血氣俱虛用十全大補加味歸脾二湯各百餘劑而愈後遇驚恐勞怒復作仍服前藥而安加味四物湯治産後血少怔忡無時當歸川芎白芍炒熟地酒洗茯神去木各一錢遠志去心棗仁炒各七分上㕮咀水煎食遠服白茯苓散治産後心神驚悸言語失常白茯苓人參熟地黃各一兩半黃耆當歸白芍藥遠志去心麥門冬去心桂心甘草炙各一兩石菖蒲桑寄生各七錢半上㕮咀每服八錢水一大盞半生薑五片棗三枚竹葉三七片煎至一大盞去滓溫服無時熟乾地黃散治産後心神驚悸神思不安熟乾地黃二兩黃耆白薇龍齒另研各一兩茯神去木人參羌活遠志肉各七錢桂心防風甘草炙各半兩上㕮咀每服五錢水一大盞半生薑五片棗三枚煎至一大盞去滓溫服不拘時以氣血藥為主似矣而以羌活為佐者豈果有風邪乘之耶一方無黃耆有荊芥産乳七寶散初産後服之調和血氣補虛安心神鎮驚悸當歸川芎人參白茯苓桂心羚羊角燒存性硃砂水飛各二錢乾薑一錢上為細末每服一錢用羌活豆淋酒調下不飲酒者用清米飲調下凡産後方古人喜用熱藥今人仍古方者亦十之九此方以芎歸薑桂為主似太熱矣為之溫血行血則可若謂其能調和血氣安神鎮驚則未可也臨症者悉再詳之如覺心煩熱悶以麥門冬去心煎湯調下若心下煩悶而痛用童便調下若覺心胸煩熱即減薑桂心寒卻加之腹痛加當歸心悶加羚羊角心虛氣怯加桂心不思飲食或噁心加人參虛煩加茯苓以意斟酌日二夜一服之人參散治産後臟腑虛心怔驚悸言語錯亂人參麥冬去心各八錢茯神遠志去心獨活防風生地黃甘草炙天竺黃另研龍齒另研硃砂水飛各四錢牛黃另研白薇各一錢龍腦另研麝香另研各一錢上為細末每服二錢薄荷酒調下不拘時此方清涼氣血並補而治痰不用燥劑清心不入苦寒可補辛熱之未備而獨活防風又治風升舉之法須察之琥珀散治血虛驚悸少寐及産後敗血停留少腹作痛辰砂另研沒藥琥珀並研細當歸等分上為細末每服二錢空心日午臨臥白湯調下茯苓散治産後狂語志意不定精神昏亂心氣虛風邪所致茯苓一方用茯神生地黃各三兩遠志白薇龍齒各二兩五錢人參防風獨活各二兩上為末以銀一斤妙在用銀一斤水一斗五升煮取七升下諸藥煮取三升溫分三服忌菘菜豬肉生冷一方加荊芥二兩甘草一兩二錢半一方治産後多虛羸弱若大汗利皆至於死此重虛故也若中風語謬昏悶不知人者宜服此人參茯苓羌活遠志大棗各二兩竹瀝一升上用水六升煮取二升下竹瀝更煎二升半分三服既不宜大汗何以用羌活二兩所未信也下竹瀝一升妙甚歸脾湯治産後血氣大虛心神驚悸怔忡不寐或心脾傷痛嗜臥少食或憂思傷脾血虛發熱人參黃耆蜜炒白朮土炒白茯苓龍眼肉當歸遠志去心酸棗仁炒各一錢木香甘草各五分上加薑棗煎服加柴胡牡丹皮名加味歸脾湯遠志丸治産後臟虛不足心神驚悸志意不安腹中急痛或時怕怖夜臥不寧遠志去心麥門冬去心黃耆當歸炒人參白朮獨活去蘆白茯苓桂心柏子仁山茱萸石菖蒲熟地黃鍾乳粉阿膠碎炒各一兩上為細末煉蜜和搗五七百下丸如桐子大每服三十丸溫酒送下不拘時日進三服白茯苓丸治産後心虛驚悸神志不安白茯苓熟地黃各一兩人參桂心遠志去心石菖蒲柏子仁琥珀另研各半兩上為細末煉蜜和搗二三百下丸如桐子大每服三十丸不拘時粥飲送下此溫補法於虛寒者宜之然心虛則熱收於內用熱藥又當斟酌恍惚大全云産後中風恍惚者由心主血血氣通於榮衛臟腑遍行經絡産則血氣俱傷五臟皆虛榮衛不足即為風邪所乘則令心神恍惚不定也自不語至恍惚等症有謂氣血虛有謂敗血入心有謂風邪所乘一皆名為心風然此風從何來當從何治前人亦未之悉但言治痰治風而丹溪立齋則以大補氣血為主各有所見在臨症酌用可也薛氏曰前證當大補血氣為主而佐以後方為善蓋風為虛極之假象也固其本源諸病自退若專治風則速其危矣一産婦患前證盜汗自汗發熱晡熱面色黃白四肢畏冷此氣血俱虛以虛中之火故用如是耳用八珍湯不應更用十全大補加味歸脾二湯始應後因勞怒發厥昏憒左目牽緊兩唇抽動小便自遺余謂肝火熾盛用十全大補加鉤藤山梔而安再用十全大補湯辰砂遠志丸而愈千金方治産後暴苦心悸不定言語錯亂恍惚皆因心虛所致茯苓三兩芍藥二兩當歸桂心蓋古方恆以桂為補今之治者又畏其太熱反以傷血遵古法今所當因病制宜也甘草各一兩麥冬去心一升生薑一兩半大棗三十枚上為散用水三升煎取一升去滓分作二服經效方療産後心虛忪悸志意不定煩躁恍惚此涼心之劑心熱者宜之茯神當歸芍藥人參麥門冬去心酸棗仁炒黃芩甘草白鮮皮各二兩大棗七枚上為粗末水二升煮取七合去滓溫服琥珀散治産後中風恍惚語澀心神煩悶四肢不隨琥珀另研茯神去木各一兩遠志去心石菖蒲人參黃耆麥門冬去心川芎赤芍防風獨活桑寄生羚羊角屑各半兩甘草炙二錢半上㕮咀每服五錢水煎溫服不拘時真産後中風者宜之若曰虛風所為則不宜用風藥遠志散治産後中風心神恍惚言語錯亂煩悶睡臥不安此與前方不甚遠而且加桂心故非真中風者不敢用丹溪有云北方之人真中風者恆有之南方之人皆是痰生熱熱生風且如恍惚錯亂煩悶不安皆熱也何敢用焉遠志去心防風去蘆各一兩當歸茯神去木棗仁炒麥冬去心桑寄生羚羊角屑獨活去蘆桂心各七錢半甘草炙半兩上㕮咀每服五錢水煎服天麻丸治産後中風恍惚語澀四肢不隨天麻防風去蘆羌活去蘆硃砂水飛各一兩殭蠶炒七錢半乾蠍炒五靈脂炒白附子炮各半兩雄雀糞炒牛黃另研各二錢半上為細末糯米飯為丸如桐子大每服二三十丸薄荷酒送下日進二服辰砂遠志丸治産後中風消風化痰安神鎮心辰砂遠志肉甘草煮石菖蒲人參茯神去木各五分川芎山藥麥門冬去心細辛天麻半夏南星白附子鐵粉各一兩上為末薑汁煮糊丸如緑豆大別以硃砂為衣每服三十丸夜臥時生薑湯下
